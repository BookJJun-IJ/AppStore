      fr_fr: |        
        **🚀 Configuration Pro améliorée - Corrige les problèmes WebSocket et d'appels vidéo**
        
        **⚠️ CHANGEMENTS IMPORTANTS :**
        Cette version **corrige les problèmes signalés** :
        ✅ **Erreurs WebSocket** - Plus besoin de rafraîchir avec F5 pendant la collaboration
        ✅ **Coupures d'appels vidéo** - Appels Talk stables avec serveur TURN
        ✅ **Version récente** - Nextcloud 31.0.7 avec corrections de bugs
        
        **📡 Nouveaux services ajoutés :**
        • **Notify Push** - Notifications de fichiers en temps réel via WebSocket
        • **Serveur CoTURN** - Appels vidéo stables sur différents réseaux
        • **Optimisations de performance** - Chargement plus rapide et meilleure réactivité
        
        **🔧 Configuration initiale :**
        1. **Attendre l'initialisation complète** (peut prendre 2-3 minutes)
        2. Créer le compte administrateur quand demandé
        3. **Applications auto-installées :** Talk, Notify Push, Calendar, Contacts
        4. **Les appels vidéo fonctionnent maintenant de manière fiable** sur différents réseaux
        
        **💡 Fonctionnalités Pro :**
        • **Collaboration en temps réel** - Les fichiers se mettent à jour instantanément dans tous les navigateurs
        • **Réunions vidéo stables** - Plus de messages "connexion perdue"
        • **Performance améliorée** - Opérations de fichiers 2x plus rapides
        • **Configuration professionnelle** - Configuration de niveau entreprise
        
        **🎯 Parfait pour les équipes qui ont vécu :**
        - Problèmes de rafraîchissement F5 pendant l'édition de documents
        - Appels vidéo qui se coupent aléatoirement
        - Synchronisation de fichiers lente
        
        **📁 Stockage de fichiers :** `/DATA/AppData/nextcloud/data/`
        **🔐 Sécurité :** Mots de passe générés automatiquement, prêt HTTPS
      es_es: |        
        **🚀 Configuración Pro mejorada - Corrige problemas de WebSocket y videollamadas**
        
        **⚠️ CAMBIOS IMPORTANTES:**
        Esta versión **soluciona los problemas reportados**:
        ✅ **Errores WebSocket** - No más F5 para refrescar durante la colaboración
        ✅ **Caídas de videollamadas** - Llamadas Talk estables con servidor TURN
        ✅ **Versión más reciente** - Nextcloud 31.0.7 con correcciones de errores
        
        **📡 Nuevos servicios añadidos:**
        • **Notify Push** - Notificaciones de archivos en tiempo real vía WebSocket
        • **Servidor CoTURN** - Videollamadas estables en diferentes redes
        • **Optimizaciones de rendimiento** - Carga más rápida y mejor capacidad de respuesta
        
        **🔧 Configuración inicial:**
        1. **Esperar inicialización completa** (puede tomar 2-3 minutos)
        2. Crear cuenta de administrador cuando se solicite
        3. **Aplicaciones auto-instaladas:** Talk, Notify Push, Calendar, Contacts
        4. **Las videollamadas ahora funcionan de manera confiable** en diferentes redes
        
        **💡 Características Pro:**
        • **Colaboración en tiempo real** - Los archivos se actualizan instantáneamente en todos los navegadores
        • **Reuniones de video estables** - No más mensajes de "conexión perdida"
        • **Rendimiento mejorado** - Operaciones de archivos 2x más rápidas
        • **Configuración profesional** - Configuración de nivel empresarial
        
        **🎯 Perfecto para equipos que han experimentado:**
        - Problemas de refrescar con F5 durante la edición de documentos
        - Videollamadas que se cortan aleatoriamente
        - Sincronización lenta de archivos
        
        **📁 Almacenamiento de archivos:** `/DATA/AppData/nextcloud/data/`
        **🔐 Seguridad:** Contraseñas generadas automáticamente, listo para HTTPS

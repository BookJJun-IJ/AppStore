name: nextcloud

services:
  nextcloud:
    image: nextcloud:31.0.7
    container_name: nextcloud
    user: $PUID:$PGID
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '2.0'
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost $domain
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=$domain
      - REDIS_HOST=redis
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=$default_pwd
      - NEXTCLOUD_INIT_HTACCESS=true
      - APACHE_DISABLE_REWRITE_IP=1
      - PHP_MEMORY_LIMIT=1024M
      - PHP_UPLOAD_LIMIT=16G
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
      - /DATA/AppData/$AppID/config:/var/www/html/config
      - /DATA/AppData/$AppID/data:/var/www/html/data
      - /DATA/AppData/$AppID/custom_apps:/var/www/html/custom_apps
    restart: unless-stopped
      coturn:
    image: coturn/coturn:4.6.2-r8
    container_name: nextcloud_coturn
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "65435-65535:65435-65535/udp"
    environment:
      - TURNSERVER_ENABLED=1
      - TURNSERVER_REALM=$domain
      - TURNSERVER_SECRET=$default_pwd
      - TURNSERVER_PORT=3478
      - TURNSERVER_MIN_PORT=65435
      - TURNSERVER_MAX_PORT=65535
    restart: unless-stopped
    networks:
      - nextcloud-network

networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  db:
    image: mariadb:11.4
    container_name: nextcloud_db
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    environment:
      - TZ=$TZ
      - MYSQL_ROOT_PASSWORD=$default_pwd
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$default_pwd"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.4-alpine
    container_name: nextcloud_redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    environment:
      - REDIS_PASSWORD=$default_pwd
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$default_pwd", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nextcloud-network:
    driver: bridge

x-casaos:
  main: nextcloud
  webui_port: 80
  category: Utilities
  architectures: [amd64, arm64]
  author: Yundera Team
  developer: Nextcloud GmbH
  pre-install-cmd: |
    rm -rf /DATA/AppData/$AppID/* &&
    mkdir -p /DATA/AppData/$AppID/{config,data,html,db,redis,custom_apps} &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID &&
    chmod -R 755 /DATA/AppData/$AppID
  post-install-cmd: |
    sleep 45 &&
    docker exec nextcloud php occ app:install notify_push --force &&
    docker exec nextcloud php occ app:enable notify_push &&
    docker exec nextcloud php occ config:app:set notify_push base_endpoint --value="https://$domain/push" &&
    docker exec nextcloud php occ config:system:set memcache.distributed --value="\\OC\\Memcache\\Redis" &&
    docker exec nextcloud php occ config:system:set redis host --value="redis" &&
    docker exec nextcloud php occ config:system:set redis port --value="6379" &&
    docker exec nextcloud php occ config:system:set redis password --value="$default_pwd" &&
    docker exec nextcloud php occ config:app:set spreed stun_servers --value='[{"server":"$domain","port":"3478","protocols":"udp,tcp"}]' &&
    docker exec nextcloud php occ config:app:set spreed turn_servers --value='[{"server":"$domain","port":"3478","protocols":"udp,tcp","secret":"$default_pwd","authtype":"secret"}]' &&
    echo "✅ Nextcloud with WebSocket and Talk optimization setup complete!"

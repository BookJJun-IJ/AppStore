      • **Compatibilidad NSL Router** para URLs HTTPS limpias
  tips:
    before_install:
      en_us: |        
        **🚀 Complete Setup Guide with Office Integration**
        
        **1. Initial Setup:**
        
        ⚠️ **Setup can take time, even if progress isn't shown.** **If infinite loading occurs → Restart the app**
        
        - Create your account and complete the setup
        - When asked about storage options, choose the **recommended setting** (already configured for you)
        
        **2. After First Restart:**
        
        - Go back to the website
        - **Skip the setup screen** (you already did this!)
        - Log in with your account
        
        **3. Enable Office Suite:**
        
        📝 **Install Nextcloud Office:**
        - Go to **Apps** (top menu)
        - Search for "**Nextcloud Office**"
        - Click **Download and enable**
        
        📝 **Install Built-in CODE Server:**
        - Search for "**Collabora Online - Built-in CODE Server**"  
        - Click **Download and enable**
        
        **4. Configure Office:**
        
        - Go to **Administration Settings** → **Office**
        - Select "**Use the built-in CODE**"
        - In **Advanced settings**, add to WOPI allow-list: `172.17.0.0/16`
        - Click **Save**
        
        **5. Add Other Team Apps:**
        **Built-in apps to enable:**
        ✅ Calendar, Contacts, Mail
        
        **From App Store:**
        🔍 Search and install: Talk, Deck, Tasks
        
        **6. Test Office:**
        - Create a new document: **Files** → **+** → **New document**
        - Should open in Nextcloud Office editor!
        
        **7. Performance Features:**
        ✅ Redis cache for faster performance
        ✅ Built-in Office suite ready to use
        ✅ Optimized database settings
        ✅ NSL Router compatibility
        
        **8. Done!**
        Your complete personal workspace with Office suite is ready!
        
        **File Storage:** 
        - **App files**: Nextcloud's dedicated data directory
        - **Shared access**: Uncomment volume mappings in docker-compose.yml to share with other apps
      ko_kr: |        
        **🚀 오피스 통합이 포함된 완전한 설정 가이드**
        
        **1. 초기 설정:**
        
        ⚠️ **진행 상황이 표시되지 않더라도 설정에 시간이 걸릴 수 있습니다.** **무한 로딩 발생 시 → 앱 재시작**
        
        - 계정을 만들고 설정을 완료하세요
        - 저장소 옵션을 묻는 화면에서 **추천 설정**을 선택하세요 (이미 구성됨)
        
        **2. 첫 번째 재시작 후:**
        
        - 웹사이트로 다시 이동
        - **설정 화면 건너뛰기** (이미 완료했습니다!)
        - 계정으로 로그인
        
        **3. 오피스 스위트 활성화:**
        
        📝 **Nextcloud Office 설치:**
        - **앱** (상단 메뉴)으로 이동
        - "**Nextcloud Office**" 검색
        - **다운로드 및 활성화** 클릭
        
        📝 **Built-in CODE 서버 설치:**
        - "**Collabora Online - Built-in CODE Server**" 검색  
        - **다운로드 및 활성화** 클릭
        
        **4. 오피스 구성:**
        
        - **관리 설정** → **Office**로 이동
        - "**Use the built-in CODE**" 선택
        - **고급 설정**에서 WOPI 허용 목록에 추가: `172.17.0.0/16`
        - **저장** 클릭
        
        **5. 다른 팀 앱 추가:**
        **활성화할 내장 앱:**
        ✅ Calendar, Contacts, Mail
        
        **앱스토어에서:**
        🔍 검색 후 설치: Talk, Deck, Tasks
        
        **6. 오피스 테스트:**
        - 새 문서 만들기: **파일** → **+** → **새 문서**
        - Nextcloud Office 편집기에서 열려야 합니다!
        
        **7. 성능 기능:**
        ✅ 빠른 성능을 위한 Redis 캐시
        ✅ 바로 사용 가능한 내장 오피스 스위트
        ✅ 최적화된 데이터베이스 설정
        ✅ NSL Router 호환성
        
        **8. 완료!**
        오피스 스위트가 포함된 완전한 개인 워크스페이스가 준비되었습니다!
        
        **파일 저장:** 
        - **앱 파일**: Nextcloud 전용 데이터 디렉토리
        - **공유 접근**: 다른 앱과 공유하려면 docker-compose.yml의 볼륨 매핑 주석 해제
      zh_cn: |        
        **🚀 包含办公集成的完整设置指南**
        
        **1. 初始设置：**
        

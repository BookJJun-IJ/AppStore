      fr_fr: |        
        **🚀 Guide de configuration complète avec intégration Office**
        
        **1. Configuration initiale :**
        
        ⚠️ **La configuration peut prendre du temps, même si les progrès ne sont pas affichés.** **Si un chargement infini se produit → Redémarrez l'application**
        
        - Créez votre compte et terminez la configuration
        - Quand on vous demande les options de stockage, choisissez le **paramètre recommandé** (déjà configuré pour vous)
        
        **2. Après le premier redémarrage :**
        
        - Retournez sur le site web
        - **Ignorez l'écran de configuration** (vous l'avez déjà fait !)
        - Connectez-vous avec votre compte
        
        **3. Activez la suite bureautique :**
        
        📝 **Installez Nextcloud Office :**
        - Allez dans **Applications** (menu du haut)
        - Recherchez "**Nextcloud Office**"
        - Cliquez sur **Télécharger et activer**
        
        📝 **Installez le serveur CODE intégré :**
        - Recherchez "**Collabora Online - Built-in CODE Server**"  
        - Cliquez sur **Télécharger et activer**
        
        **4. Configurez Office :**
        
        - Allez dans **Paramètres d'administration** → **Office**
        - Sélectionnez "**Use the built-in CODE**"
        - Dans **Paramètres avancés**, ajoutez à la liste d'autorisation WOPI : `172.17.0.0/16`
        - Cliquez sur **Enregistrer**
        
        **5. Ajoutez d'autres applications d'équipe :**
        **Applications intégrées à activer :**
        ✅ Calendar, Contacts, Mail
        
        **Depuis l'App Store :**
        🔍 Recherchez et installez : Talk, Deck, Tasks
        
        **6. Testez Office :**
        - Créez un nouveau document : **Fichiers** → **+** → **Nouveau document**
        - Devrait s'ouvrir dans l'éditeur Nextcloud Office !
        
        **7. Fonctionnalités de performance :**
        ✅ Cache Redis pour de meilleures performances
        ✅ Suite bureautique intégrée prête à l'emploi
        ✅ Paramètres de base de données optimisés
        ✅ Compatibilité NSL Router
        
        **8. Terminé !**
        Votre espace de travail personnel complet avec suite bureautique est prêt !
        
        **Stockage de fichiers :** 
        - **Fichiers d'application** : Répertoire de données dédié Nextcloud
        - **Accès partagé** : Décommentez les mappages de volumes dans docker-compose.yml pour partager avec d'autres applications
      de_de: |        
        **🚀 Vollständige Setup-Anleitung mit Office-Integration**
        
        **1. Erste Einrichtung:**
        
        ⚠️ **Das Setup kann Zeit dauern, auch wenn kein Fortschritt angezeigt wird.** **Bei unendlichem Laden → App neu starten**
        
        - Erstellen Sie Ihr Konto und schließen Sie die Einrichtung ab
        - Wenn nach Speicher-Optionen gefragt wird, wählen Sie die **empfohlene Einstellung** (bereits für Sie konfiguriert)
        
        **2. Nach dem ersten Neustart:**
        
        - Gehen Sie zurück zur Website
        - **Überspringen Sie den Einrichtungsbildschirm** (haben Sie bereits gemacht!)
        - Melden Sie sich mit Ihrem Konto an
        
        **3. Office-Suite aktivieren:**
        
        📝 **Nextcloud Office installieren:**
        - Gehen Sie zu **Apps** (oberes Menü)
        - Suchen Sie nach "**Nextcloud Office**"
        - Klicken Sie auf **Herunterladen und aktivieren**
        
        📝 **Built-in CODE Server installieren:**
        - Suchen Sie nach "**Collabora Online - Built-in CODE Server**"  
        - Klicken Sie auf **Herunterladen und aktivieren**
        
        **4. Office konfigurieren:**
        
        - Gehen Sie zu **Verwaltungseinstellungen** → **Office**
        - Wählen Sie "**Use the built-in CODE**"
        - In **Erweiterte Einstellungen**, zur WOPI-Erlaubnisliste hinzufügen: `172.17.0.0/16`
        - Klicken Sie auf **Speichern**
        
        **5. Andere Team-Apps hinzufügen:**
        **Zu aktivierende integrierte Apps:**
        ✅ Calendar, Contacts, Mail
        
        **Vom App Store:**
        🔍 Suchen und installieren: Talk, Deck, Tasks
        
        **6. Office testen:**
        - Neues Dokument erstellen: **Dateien** → **+** → **Neues Dokument**
        - Sollte im Nextcloud Office Editor öffnen!
        
        **7. Leistungsmerkmale:**
        ✅ Redis-Cache für bessere Leistung
        ✅ Integrierte Office-Suite sofort einsatzbereit
        ✅ Optimierte Datenbankeinstellungen
        ✅ NSL Router-Kompatibilität
        
        **8. Fertig!**
        Ihr vollständiger persönlicher Arbeitsbereich mit Office-Suite ist bereit!
        
        **Dateispeicherung:** 
        - **App-Dateien**: Nextcloud-eigenes Datenverzeichnis
        - **Geteilter Zugriff**: Volume-Mappings in docker-compose.yml auskommentieren, um mit anderen Apps zu teilen
      es_es: |        
        **🚀 Guía de configuración completa con integración Office**
        
        **1. Configuración inicial:**
        
        ⚠️ **La configuración puede tomar tiempo, incluso si no se muestra el progreso.** **Si ocurre carga infinita → Reiniciar la aplicación**
        
        - Crea tu cuenta y completa la configuración
        - Cuando te pregunten sobre opciones de almacenamiento, elige la **configuración recomendada** (ya configurada para ti)
        
        **2. Después del primer reinicio:**
        
        - Vuelve al sitio web
        - **Omite la pantalla de configuración** (¡ya lo hiciste!)
        - Inicia sesión con tu cuenta
        
        **3. Habilitar suite de oficina:**
        
        📝 **Instalar Nextcloud Office:**
        - Ve a **Aplicaciones** (menú superior)
        - Busca "**Nextcloud Office**"
        - Haz clic en **Descargar y habilitar**
        
        📝 **Instalar servidor CODE integrado:**
        - Busca "**Collabora Online - Built-in CODE Server**"  
        - Haz clic en **Descargar y habilitar**
        
        **4. Configurar Office:**
        
        - Ve a **Configuración de administración** → **Office**
        - Selecciona "**Use the built-in CODE**"
        - En **Configuración avanzada**, agregar a lista de permisos WOPI: `172.17.0.0/16`
        - Haz clic en **Guardar**
        
        **5. Agregar otras aplicaciones de equipo:**
        **Aplicaciones integradas a habilitar:**
        ✅ Calendar, Contacts, Mail
        
        **Desde la App Store:**
        🔍 Buscar e instalar: Talk, Deck, Tasks
        
        **6. Probar Office:**
        - Crear nuevo documento: **Archivos** → **+** → **Nuevo documento**
        - ¡Debería abrirse en el editor de Nextcloud Office!
        
        **7. Características de rendimiento:**
        ✅ Caché Redis para mejor rendimiento
        ✅ Suite de oficina integrada lista para usar
        ✅ Configuraciones de base de datos optimizadas
        ✅ Compatibilidad NSL Router
        
        **8. ¡Listo!**
        ¡Tu espacio de trabajo personal completo con suite de oficina está listo!
        

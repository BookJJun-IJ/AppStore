name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G      # 메모리 제한만 유지
          # CPU 제한 제거 - 시스템이 자동 관리
    environment:
      PUID: $PUID
      PGID: $PGID
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017", "--wiredTigerCacheSizeGB", "0.3"]
    
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 30s
      start_period: 15s
      start_interval: 2s
      retries: 20
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.11.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G      # 메모리만 제한, CPU는 자동 관리
          # CPU 제한 제거 - 더 안전
    environment:
      # === MongoDB 연결 ===
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      # === 기본 설정 ===
      ROOT_URL: http://localhost:80
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # === 관리자 계정 ===
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # === 시스템 변수 ===
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # === 성능 최적화 (1코어 시스템용) ===
      LOG_LEVEL: "warn"
      NODE_ENV: "production"
      NODE_OPTIONS: "--max-old-space-size=1536"  # 메모리 최적화
      
      # === 실시간 통신 ===
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      METEOR_DISABLE_OPTIMISTIC_CACHING: "0"
      
      # === 기본 오프라인 설정 ===
      ROCKETCHAT_REGISTRATION_ENABLED: "false"
      ROCKETCHAT_STATISTICS_OPT_OUT: "false"
      
      # === 선택적 온라인 기능 ===
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"
      
      # === 마이크로서비스 비활성화 ===
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # === UI 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_REGISTRATION_FORM: "Disabled"
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      
      # === 앱 마켓플레이스 활성화 ===
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"
      OVERWRITE_SETTING_APPS_MARKETPLACE_ENABLED: "true"
      
      # === 성능 최적화 설정 ===
      OVERWRITE_SETTING_MESSAGE_MAX_ALL_ALLOWED: "500"   # 1코어용 최적화
      OVERWRITE_SETTING_FILEUPLOAD_ENABLED: "true"
      OVERWRITE_SETTING_FILEUPLOAD_MAXFILESIZE: "5242880"  # 5MB 제한
      
      # === VoIP 비활성화 (성능상 이유) ===
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"
      ROCKETCHAT_WEBRTC_ENABLED: "false"
      ROCKETCHAT_VOIP_ENABLED: "false"
      
      # === 선택적 기능 ===
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      
      # === 이메일 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_EMAIL_VERIFICATION: "false"
      OVERWRITE_SETTING_FROM_EMAIL: "noreply@localhost"
      
      # === 보안 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    # === 직접 포트 접속 ===
    ports:
      - "3000:80"
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: CasaOS Team
  category: Communication
  description:
    en_us: Rocket.Chat optimized for single-core systems with selective online features. Works offline by default, allows optional feature activation like Nextcloud.
    ko_kr: 단일 코어 시스템에 최적화된 선택적 온라인 기능 Rocket.Chat입니다. 기본적으로 오프라인에서 작동하며, Nextcloud처럼 선택적 기능 활성화가 가능합니다.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Single-core optimized team communication
    ko_kr: 단일 코어 최적화 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **🚀 Single-Core Optimized Rocket.Chat**
        
        Specially configured for systems with limited CPU resources.
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Access URLs:**
        - **NSL Router**: `https://rocketchat-yourdomain.nsl.sh`
        - **Direct Access**: `http://your-server-ip:3000`
        
        **🔧 Single-Core Optimizations:**
        - ✅ No CPU limits (system manages automatically)
        - ✅ Reduced memory footprint (MongoDB: 1GB, Rocket.Chat: 2GB)
        - ✅ Optimized cache settings
        - ✅ Reduced message history
        - ✅ Smaller file upload limits
        
        **🌐 Nextcloud-Style Features:**
        - **Offline by default**: Core messaging works without internet
        - **Optional online features**: Enable in Administration → Settings
        - **App marketplace**: Download additional features when needed
        - **User control**: Choose what data to share
        
        **⚡ Performance Tips:**
        - Disable unused features in settings
        - Enable only necessary apps from marketplace
        - Use direct port access (3000) if NSL Router is slow
        
        **System Requirements**: 1 CPU core, 4GB RAM minimum
      ko_kr: |
        **🚀 단일 코어 최적화 Rocket.Chat**
        
        제한된 CPU 리소스를 가진 시스템에 특별히 구성되었습니다.
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **접속 URL:**
        - **NSL Router**: `https://rocketchat-yourdomain.nsl.sh`
        - **직접 접속**: `http://서버IP:3000`
        
        **🔧 단일 코어 최적화:**
        - ✅ CPU 제한 없음 (시스템이 자동 관리)
        - ✅ 메모리 사용량 감소 (MongoDB: 1GB, Rocket.Chat: 2GB)
        - ✅ 캐시 설정 최적화
        - ✅ 메시지 히스토리 감소
        - ✅ 파일 업로드 크기 제한
        
        **🌐 Nextcloud 스타일 기능:**
        - **기본 오프라인**: 핵심 메시징은 인터넷 없이 작동
        - **선택적 온라인 기능**: 관리 → 설정에서 활성화
        - **앱 마켓플레이스**: 필요시 추가 기능 다운로드
        - **사용자 제어**: 공유할 데이터 선택
        
        **⚡ 성능 팁:**
        - 설정에서 사용하지 않는 기능 비활성화
        - 마켓플레이스에서 필요한 앱만 활성화
        - NSL Router가 느리면 직접 포트 접속(3000) 사용
        
        **시스템 요구사항**: 1 CPU 코어, 4GB RAM 최소
  index: /
  webui_port: 80
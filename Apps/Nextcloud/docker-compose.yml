name: nextcloud

services:
  nextcloud:
    image: nextcloud:31.0.7
    container_name: nextcloud
    user: $PUID:$PGID
    depends_on:
      - db
      - redis
      - collabora
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '2.0'
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost $domain nextcloud
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=$domain
      - OVERWRITECONDADDR=^172\.17\..*$
      - REDIS_HOST=redis
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=$default_pwd
      - NEXTCLOUD_INIT_HTACCESS=true
      - PHP_MEMORY_LIMIT=2048M
      - PHP_UPLOAD_LIMIT=1024M
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
      - /DATA/AppData/$AppID/config:/var/www/html/config
      - /DATA/AppData/$AppID/data:/var/www/html/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  db:
    image: mariadb:11.2
    container_name: nextcloud_db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      - TZ=$TZ
      - MYSQL_ROOT_PASSWORD=$default_pwd
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nextcloud-network
    command: >
      --innodb-buffer-pool-size=256M
      --transaction-isolation=READ-COMMITTED
      --binlog-format=ROW
      --innodb-file-per-table=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$default_pwd"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    container_name: nextcloud_redis
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    command: redis-server --requirepass $default_pwd --appendonly yes
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$default_pwd", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  onlyoffice:
    image: onlyoffice/documentserver:8.2
    container_name: nextcloud_onlyoffice
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    expose:
      - 443
    environment:
      - TZ=$TZ
      - JWT_ENABLED=false
      - USE_UNAUTHORIZED_STORAGE=true
      - SSL_CERTIFICATE_PATH=/var/www/onlyoffice/Data/certs/onlyoffice.crt
      - SSL_KEY_PATH=/var/www/onlyoffice/Data/certs/onlyoffice.key
      - SSL_DHPARAM_PATH=/var/www/onlyoffice/Data/certs/dhparam.pem
    volumes:
      - /DATA/AppData/$AppID/onlyoffice/data:/var/www/onlyoffice/Data
      - /DATA/AppData/$AppID/onlyoffice/lib:/var/lib/onlyoffice
      - /DATA/AppData/$AppID/onlyoffice/logs:/var/log/onlyoffice
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  nextcloud-network:
    driver: bridge

x-casaos:
  main: nextcloud
  webui_port: 80
  category: Utilities
  architectures: [amd64, arm64]
  author: Yundera Team
  developer: Nextcloud GmbH
  pre-install-cmd: |
    rm -rf /DATA/AppData/$AppID/* &&
    mkdir -p /DATA/AppData/$AppID/{config,data,html,db,redis} &&
    mkdir -p /DATA/AppData/$AppID/collabora/{tmp} &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID &&
    chmod -R 755 /DATA/AppData/$AppID
  title:
    en_us: Nextcloud
    ko_kr: Nextcloud
  tagline:
    en_us: Complete personal cloud with Collabora document editing
    ko_kr: Collabora 문서 편집 기능이 포함된 완전한 개인 클라우드
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/thumbnail.png
  description:
    en_us: |
      **☁️ Nextcloud with Integrated Collabora**

      Complete personal cloud solution with **Collabora Online Document Server** included for seamless document editing.

      **🚀 What's Included:**
      • **Nextcloud** - File management, sharing, calendar, contacts
      • **Collabora Online Server** - Professional document editing engine
      • **Redis Cache** - Optimized performance
      • **MariaDB** - Reliable database backend
      • **NSL Router Integration** - Clean HTTPS URLs

      **📝 Office Features:**
      • **Word Documents** (.docx, .doc) - Full editing capabilities
      • **Excel Spreadsheets** (.xlsx, .xls) - Advanced formulas and charts
      • **PowerPoint Presentations** (.pptx, .ppt) - Rich media support
      • **Real-time Collaboration** - Multiple users editing simultaneously
      • **Comment System** - Review and feedback workflow
      • **Version History** - Track document changes

      **🔧 Technical Advantages:**
      • **Privileged Container** - Proper jail directory permissions
      • **SSL Termination Support** - NSL Router compatibility
      • **No External Dependencies** - Self-contained document server
      • **High Performance** - Dedicated Collabora server
      • **Secure** - All data stays on your server

      **Perfect for teams and individuals who need professional document editing capabilities with complete privacy control!**
    ko_kr: |
      **☁️ OnlyOffice가 통합된 Nextcloud**

      원활한 문서 편집을 위한 **OnlyOffice Document Server**가 포함된 완전한 개인 클라우드 솔루션입니다.

      **🚀 포함된 기능:**
      • **Nextcloud** - 파일 관리, 공유, 일정, 연락처
      • **OnlyOffice Document Server** - 전문적인 문서 편집 엔진
      • **Redis 캐시** - 최적화된 성능
      • **MariaDB** - 안정적인 데이터베이스 백엔드
      • **NSL Router 통합** - 깔끔한 HTTPS URL

      **📝 오피스 기능:**
      • **Word 문서** (.docx, .doc) - 완전한 편집 기능
      • **Excel 스프레드시트** (.xlsx, .xls) - 고급 수식 및 차트
      • **PowerPoint 프레젠테이션** (.pptx, .ppt) - 풍부한 미디어 지원
      • **실시간 협업** - 여러 사용자가 동시에 편집
      • **댓글 시스템** - 검토 및 피드백 워크플로
      • **버전 기록** - 문서 변경 사항 추적

      **🔧 기술적 장점:**
      • **Mixed Content 문제 없음** - 모든 서비스가 적절히 네트워크 연결
      • **외부 종속성 없음** - 자체 포함된 문서 서버
      • **NSL Router 최적화** - HTTPS 프록시와 완벽하게 작동
      • **고성능** - 전용 OnlyOffice 서버
      • **보secure** - 모든 데이터가 서버에 보관

      **완전한 개인정보 보호 통제와 함께 전문적인 문서 편집 기능이 필요한 팀과 개인에게 완벽합니다!**
  tips:
    before_install:
      en_us: |
        **🚀 Nextcloud + Collabora Setup Guide (Fixed!)**
        
        **What This Includes:**
        ✅ Nextcloud with full features
        ✅ Collabora Online Server (dedicated)
        ✅ Redis cache for performance
        ✅ MariaDB database
        ✅ All services properly networked
        
        **📋 After Installation:**
        1. **Wait 3-4 minutes** for all services to start
        2. **Access Nextcloud:** `https://nextcloud-username.nsl.sh`
        3. **Complete setup wizard** (create admin account)
        4. **Install Nextcloud Office app:**
           - Go to **Apps** → Search "**Nextcloud Office**"
           - Click **Download and enable**
        5. **Configure Office:**
           - Go to **Settings** → **Office**
           - Select "**Use your own server**"
           - **Server URL:** `http://collabora:9980`
           - **Secret key:** Leave blank
           - **Check:** "Disable certificate verification" ✅
           - In **Advanced settings:** Add to WOPI allow-list: `172.17.0.0/16`
           - Click **Save**
        
        **🎯 Test Collabora Functionality:**
        - Go to **Files** → **+ button**
        - You should see: **Document**, **Spreadsheet**, **Presentation**
        - Click any option → Collabora editor opens!
        
        **💡 Troubleshooting:**
        - Mixed Content error is normal - "Disable certificate verification" solves it
        - Collabora uses privileged container for proper jail permissions
        - Wait 3-4 minutes for Collabora server to fully initialize
        - WOPI allow-list must include: `172.17.0.0/16`
        
        **Perfect for professional document editing with complete privacy!**
      ko_kr: |
        **🚀 Nextcloud + Collabora 설정 가이드 (수정됨!)**
        
        **포함된 기능:**
        ✅ 모든 기능이 포함된 Nextcloud
        ✅ Collabora Online Server (전용)
        ✅ 성능을 위한 Redis 캐시
        ✅ MariaDB 데이터베이스
        ✅ 모든 서비스가 적절히 네트워크 연결됨
        
        **📋 설치 후:**
        1. **3-4분 대기** - 모든 서비스 시작을 위해
        2. **Nextcloud 접속:** `https://nextcloud-사용자명.nsl.sh`
        3. **설정 마법사 완료** (관리자 계정 생성)
        4. **Nextcloud Office 앱 설치:**
           - **앱** → "**Nextcloud Office**" 검색
           - **다운로드 및 활성화** 클릭
        5. **Office 구성:**
           - **설정** → **Office**로 이동
           - "**Use your own server**" 선택
           - **서버 URL:** `http://collabora:9980`
           - **Secret key:** 비워두기
           - **체크:** "Disable certificate verification" ✅
           - **고급 설정**에서 WOPI 허용 목록: `172.17.0.0/16`
           - **저장** 클릭
        
        **🎯 Collabora 기능 테스트:**
        - **파일** → **+ 버튼**으로 이동
        - 다음이 보여야 함: **문서**, **스프레드시트**, **프레젠테이션**
        - 아무 옵션 클릭 → Collabora 편집기 열림!
        
        **💡 문제 해결:**
        - Mixed Content 오류는 정상 - "Disable certificate verification"으로 해결됨
        - Collabora는 적절한 jail 권한을 위해 특권 컨테이너 사용
        - Collabora 서버가 완전히 초기화될 때까지 3-4분 대기
        - WOPI 허용 목록에 반드시 포함: `172.17.0.0/16`
        
        **완전한 개인정보 보호와 함께 전문적인 문서 편집에 완벽합니다!**
  index: /
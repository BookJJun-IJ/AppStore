name: nextcloud

services:
  nextcloud:
    image: nextcloud:31.0.7
    container_name: nextcloud
    user: $PUID:$PGID
    depends_on:
      - db
      - redis
      - onlyoffice
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '2.0'
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost $domain nextcloud
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=$domain
      - OVERWRITECONDADDR=^172\.17\..*$
      - REDIS_HOST=redis
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=$default_pwd
      - NEXTCLOUD_INIT_HTACCESS=true
      - PHP_MEMORY_LIMIT=2048M
      - PHP_UPLOAD_LIMIT=1024M
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
      - /DATA/AppData/$AppID/config:/var/www/html/config
      - /DATA/AppData/$AppID/data:/var/www/html/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  db:
    image: mariadb:11.2
    container_name: nextcloud_db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      - TZ=$TZ
      - MYSQL_ROOT_PASSWORD=$default_pwd
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nextcloud-network
    command: >
      --innodb-buffer-pool-size=256M
      --transaction-isolation=READ-COMMITTED
      --binlog-format=ROW
      --innodb-file-per-table=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$default_pwd"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    container_name: nextcloud_redis
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    command: redis-server --requirepass $default_pwd --appendonly yes
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$default_pwd", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  onlyoffice:
    image: onlyoffice/documentserver:8.2
    container_name: nextcloud_onlyoffice
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    environment:
      - TZ=$TZ
      - JWT_ENABLED=false
      - USE_UNAUTHORIZED_STORAGE=true
    volumes:
      - /DATA/AppData/$AppID/onlyoffice/data:/var/www/onlyoffice/Data
      - /DATA/AppData/$AppID/onlyoffice/lib:/var/lib/onlyoffice
      - /DATA/AppData/$AppID/onlyoffice/logs:/var/log/onlyoffice
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  nextcloud-network:
    driver: bridge

x-casaos:
  main: nextcloud
  webui_port: 80
  category: Utilities
  architectures: [amd64, arm64]
  author: Yundera Team
  developer: Nextcloud GmbH
  pre-install-cmd: |
    rm -rf /DATA/AppData/$AppID/* &&
    mkdir -p /DATA/AppData/$AppID/{config,data,html,db,redis} &&
    mkdir -p /DATA/AppData/$AppID/onlyoffice/{data,lib,logs} &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID &&
    chmod -R 755 /DATA/AppData/$AppID
  title:
    en_us: Nextcloud
    ko_kr: Nextcloud
  tagline:
    en_us: Complete personal cloud with integrated document editing
    ko_kr: 통합 문서 편집 기능이 포함된 완전한 개인 클라우드
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Nextcloud/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Nextcloud/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Nextcloud/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Nextcloud/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Nextcloud/screenshot-2.png
  description:
    en_us: |
      **☁️ Nextcloud with Integrated OnlyOffice**

      Complete personal cloud solution with **OnlyOffice Document Server** included for seamless document editing.

      **🚀 What's Included:**
      • **Nextcloud** - File management, sharing, calendar, contacts
      • **OnlyOffice Document Server** - Professional document editing engine
      • **Redis Cache** - Optimized performance
      • **MariaDB** - Reliable database backend
      • **NSL Router Integration** - Clean HTTPS URLs

      **📝 Office Features:**
      • **Word Documents** (.docx, .doc) - Full editing capabilities
      • **Excel Spreadsheets** (.xlsx, .xls) - Advanced formulas and charts
      • **PowerPoint Presentations** (.pptx, .ppt) - Rich media support
      • **Real-time Collaboration** - Multiple users editing simultaneously
      • **Comment System** - Review and feedback workflow
      • **Version History** - Track document changes

      **🔧 Technical Advantages:**
      • **No Mixed Content Issues** - All services properly networked
      • **No External Dependencies** - Self-contained document server
      • **NSL Router Optimized** - Works perfectly with HTTPS proxy
      • **High Performance** - Dedicated OnlyOffice server
      • **Secure** - All data stays on your server

      **Perfect for teams and individuals who need professional document editing capabilities with complete privacy control!**
    ko_kr: |
      **☁️ OnlyOffice가 통합된 Nextcloud**

      원활한 문서 편집을 위한 **OnlyOffice Document Server**가 포함된 완전한 개인 클라우드 솔루션입니다.

      **🚀 포함된 기능:**
      • **Nextcloud** - 파일 관리, 공유, 일정, 연락처
      • **OnlyOffice Document Server** - 전문적인 문서 편집 엔진
      • **Redis 캐시** - 최적화된 성능
      • **MariaDB** - 안정적인 데이터베이스 백엔드
      • **NSL Router 통합** - 깔끔한 HTTPS URL

      **📝 오피스 기능:**
      • **Word 문서** (.docx, .doc) - 완전한 편집 기능
      • **Excel 스프레드시트** (.xlsx, .xls) - 고급 수식 및 차트
      • **PowerPoint 프레젠테이션** (.pptx, .ppt) - 풍부한 미디어 지원
      • **실시간 협업** - 여러 사용자가 동시에 편집
      • **댓글 시스템** - 검토 및 피드백 워크플로
      • **버전 기록** - 문서 변경 사항 추적

      **🔧 기술적 장점:**
      • **Mixed Content 문제 없음** - 모든 서비스가 적절히 네트워크 연결
      • **외부 종속성 없음** - 자체 포함된 문서 서버
      • **NSL Router 최적화** - HTTPS 프록시와 완벽하게 작동
      • **고성능** - 전용 OnlyOffice 서버
      • **보secure** - 모든 데이터가 서버에 보관

      **완전한 개인정보 보호 통제와 함께 전문적인 문서 편집 기능이 필요한 팀과 개인에게 완벽합니다!**
  tips:
    before_install:
      en_us: |
        **🚀 Nextcloud + OnlyOffice Setup Guide**
        
        **What This Includes:**
        ✅ Nextcloud with full features
        ✅ OnlyOffice Document Server (dedicated)
        ✅ Redis cache for performance
        ✅ MariaDB database
        ✅ All services properly networked
        
        **📋 After Installation:**
        1. **Wait 3-4 minutes** for all services to start
        2. **Access Nextcloud:** `https://nextcloud-username.nsl.sh`
        3. **Complete setup wizard** (create admin account)
        4. **Install OnlyOffice app:**
           - Go to **Apps** → Search "**OnlyOffice**"
           - Click **Download and enable**
        5. **Configure OnlyOffice:**
           - Go to **Settings** → **OnlyOffice**
           - **Server URL:** `http://onlyoffice/`
           - **Secret key:** Leave blank or use simple key
           - **Check:** "Disable certificate verification"
           - Click **Save**
        
        **🎯 Test Office Functionality:**
        - Go to **Files** → **+ button**
        - You should see: **Document**, **Spreadsheet**, **Presentation**
        - Click any option → OnlyOffice editor opens!
        
        **💡 Troubleshooting:**
        - If Mixed Content error: Check "Disable certificate verification"
        - If connection fails: Ensure all containers are running
        - Wait a few minutes for OnlyOffice server to fully initialize
        
        **Perfect for professional document editing with complete privacy!**
      ko_kr: |
        **🚀 Nextcloud + OnlyOffice 설정 가이드**
        
        **포함된 기능:**
        ✅ 모든 기능이 포함된 Nextcloud
        ✅ OnlyOffice Document Server (전용)
        ✅ 성능을 위한 Redis 캐시
        ✅ MariaDB 데이터베이스
        ✅ 모든 서비스가 적절히 네트워크 연결됨
        
        **📋 설치 후:**
        1. **3-4분 대기** - 모든 서비스 시작을 위해
        2. **Nextcloud 접속:** `https://nextcloud-사용자명.nsl.sh`
        3. **설정 마법사 완료** (관리자 계정 생성)
        4. **OnlyOffice 앱 설치:**
           - **앱** → "**OnlyOffice**" 검색
           - **다운로드 및 활성화** 클릭
        5. **OnlyOffice 구성:**
           - **설정** → **OnlyOffice**로 이동
           - **서버 URL:** `http://onlyoffice/`
           - **Secret key:** 비워두거나 간단한 키 사용
           - **체크:** "Disable certificate verification"
           - **저장** 클릭
        
        **🎯 오피스 기능 테스트:**
        - **파일** → **+ 버튼**으로 이동
        - 다음이 보여야 함: **문서**, **스프레드시트**, **프레젠테이션**
        - 아무 옵션 클릭 → OnlyOffice 편집기 열림!
        
        **💡 문제 해결:**
        - Mixed Content 오류 시: "Disable certificate verification" 체크
        - 연결 실패 시: 모든 컨테이너가 실행 중인지 확인
        - OnlyOffice 서버가 완전히 초기화될 때까지 몇 분 대기
        
        **완전한 개인정보 보호와 함께 전문적인 문서 편집에 완벽합니다!**
  index: /
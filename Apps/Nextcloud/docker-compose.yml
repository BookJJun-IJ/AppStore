name: nextcloud

services:
  nextcloud:
    image: nextcloud:31.0.7
    container_name: nextcloud
    user: $PUID:$PGID
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 3072M
          cpus: '2.5'
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      # NSL Router 최적화 설정
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost $domain nextcloud 127.0.0.1
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=$domain
      - OVERWRITECONDADDR=^172\.17\..*$
      - OVERWRITEWEBROOT=/
      # Built-in CODE 최적화 설정
      - APACHE_DISABLE_REWRITE_IP=1
      - TRUSTED_PROXIES=172.17.0.0/16
      # Redis 설정
      - REDIS_HOST=redis
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=$default_pwd
      # 성능 및 메모리 설정
      - NEXTCLOUD_INIT_HTACCESS=true
      - PHP_MEMORY_LIMIT=3072M
      - PHP_UPLOAD_LIMIT=2048M
      - PHP_MAX_INPUT_TIME=3600
      - PHP_MAX_EXECUTION_TIME=3600
      # Built-in CODE를 위한 추가 설정
      - NEXTCLOUD_DATA_DIR=/var/www/html/data
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
      - /DATA/AppData/$AppID/config:/var/www/html/config
      - /DATA/AppData/$AppID/data:/var/www/html/data
      # Built-in CODE를 위한 임시 디렉토리
      - /DATA/AppData/$AppID/tmp:/tmp
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  db:
    image: mariadb:11.2
    container_name: nextcloud_db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      - TZ=$TZ
      - MYSQL_ROOT_PASSWORD=$default_pwd
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=$default_pwd
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nextcloud-network
    command: >
      --innodb-buffer-pool-size=256M
      --transaction-isolation=READ-COMMITTED
      --binlog-format=ROW
      --innodb-file-per-table=1
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$default_pwd"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    container_name: nextcloud_redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    command: redis-server --requirepass $default_pwd --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$default_pwd", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nextcloud-network:
    driver: bridge

x-casaos:
  main: nextcloud
  webui_port: 80
  category: Utilities
  architectures: [amd64, arm64]
  author: Yundera Team
  developer: Nextcloud GmbH
  pre-install-cmd: |
    # 완전 초기화 및 권한 설정
    rm -rf /DATA/AppData/$AppID/* &&
    mkdir -p /DATA/AppData/$AppID/{config,data,html,db,redis,tmp} &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID &&
    chmod -R 755 /DATA/AppData/$AppID &&
    
    # Built-in CODE를 위한 임시 디렉토리 설정
    mkdir -p /DATA/AppData/$AppID/tmp/richdocumentscode &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID/tmp &&
    chmod -R 777 /DATA/AppData/$AppID/tmp
  title:
    en_us: Nextcloud
    ko_kr: Nextcloud
  tagline:
    en_us: Personal cloud with built-in document editing
    ko_kr: 내장 문서 편집 기능이 포함된 개인 클라우드
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Nextcloud/thumbnail.png
  description:
    en_us: |
      **☁️ Nextcloud with Optimized Built-in Office**

      Complete personal cloud solution with **Built-in Collabora CODE server** specifically optimized for NSL Router environments.

      **🚀 What's Special About This Setup:**
      • **NSL Router Optimized** - Specially configured for Yundera's proxy environment
      • **Built-in Office Suite** - No separate containers needed
      • **Enhanced Performance** - 3GB RAM allocation for smooth document editing
      • **Redis Caching** - Optimized performance with intelligent caching
      • **MariaDB** - Reliable database backend with optimized settings

      **📝 Office Capabilities:**
      • **Word Documents** (.docx, .doc) - Full editing with collaborative features
      • **Excel Spreadsheets** (.xlsx, .xls) - Advanced formulas and charts
      • **PowerPoint Presentations** (.pptx, .ppt) - Rich media and animations
      • **Real-time Collaboration** - Multiple users editing simultaneously
      • **Comment System** - Review workflows and feedback
      • **Version History** - Track all document changes

      **🔧 Technical Advantages:**
      • **No Mixed Content Issues** - Built-in server eliminates HTTPS/HTTP conflicts
      • **Simplified Architecture** - Single container solution
      • **Better Resource Management** - Optimized memory and CPU allocation
      • **NSL Router Compatible** - Designed specifically for Yundera environment
      • **Enhanced Security** - All processing happens within Nextcloud container

      **⚡ Performance Features:**
      • **3GB RAM allocation** for smooth operation
      • **Redis caching** with intelligent memory management
      • **Optimized PHP settings** for large document handling
      • **Enhanced database connections** for better concurrency

      **Perfect for users who need reliable document editing without the complexity of multiple containers!**
    ko_kr: |
      **☁️ 최적화된 내장 오피스가 포함된 Nextcloud**

      NSL Router 환경에 특별히 최적화된 **내장 Collabora CODE 서버**가 포함된 완전한 개인 클라우드 솔루션입니다.

      **🚀 이 설정의 특별한 점:**
      • **NSL Router 최적화** - Yundera 프록시 환경을 위해 특별히 구성됨
      • **내장 오피스 스위트** - 별도 컨테이너 불필요
      • **향상된 성능** - 부드러운 문서 편집을 위한 3GB RAM 할당
      • **Redis 캐싱** - 지능적 캐싱으로 최적화된 성능
      • **MariaDB** - 최적화된 설정의 안정적인 데이터베이스 백엔드

      **📝 오피스 기능:**
      • **Word 문서** (.docx, .doc) - 협업 기능이 포함된 완전한 편집
      • **Excel 스프레드시트** (.xlsx, .xls) - 고급 수식 및 차트
      • **PowerPoint 프레젠테이션** (.pptx, .ppt) - 풍부한 미디어 및 애니메이션
      • **실시간 협업** - 여러 사용자가 동시에 편집
      • **댓글 시스템** - 검토 워크플로 및 피드백
      • **버전 기록** - 모든 문서 변경 사항 추적

      **🔧 기술적 장점:**
      • **Mixed Content 문제 없음** - 내장 서버로 HTTPS/HTTP 충돌 제거
      • **단순화된 아키텍처** - 단일 컨테이너 솔루션
      • **더 나은 리소스 관리** - 최적화된 메모리 및 CPU 할당
      • **NSL Router 호환** - Yundera 환경을 위해 특별히 설계됨
      • **향상된 보안** - 모든 처리가 Nextcloud 컨테이너 내에서 발생

      **⚡ 성능 기능:**
      • **부드러운 작업을 위한 3GB RAM 할당**
      • **지능적 메모리 관리가 포함된 Redis 캐싱**
      • **대용량 문서 처리를 위한 최적화된 PHP 설정**
      • **더 나은 동시성을 위한 향상된 데이터베이스 연결**

      **여러 컨테이너의 복잡성 없이 안정적인 문서 편집이 필요한 사용자에게 완벽합니다!**
  tips:
    before_install:
      en_us: |
        **🚀 Built-in CODE Setup (NSL Router Optimized)**
        
        **What This Setup Includes:**
        ✅ Nextcloud with enhanced performance settings
        ✅ Built-in Collabora CODE server (no separate containers)
        ✅ Redis caching with optimized memory management
        ✅ MariaDB with performance tuning
        ✅ NSL Router specific optimizations
        
        **📋 After Installation (5-6 minutes setup):**
        1. **Wait 5-6 minutes** - Built-in CODE needs more time to initialize
        2. **Access Nextcloud:** `https://nextcloud-username.nsl.sh`
        3. **Complete setup wizard** (create admin account)
        4. **Install required apps:**
           - Go to **Apps** → Search "**Nextcloud Office**"
           - Install "**Nextcloud Office**"
           - Install "**Collabora Online - Built-in CODE Server**"
        5. **Configure Office (Critical Steps):**
           - Go to **Settings** → **Office**
           - Select "**Use the built-in CODE**"
           - In **Advanced settings:**
             - Add to WOPI allow-list: `172.17.0.0/16`
             - Add to WOPI allow-list: `127.0.0.1`
             - Add to WOPI allow-list: `nextcloud`
           - Click **Save**
        
        **🎯 Test Built-in Office:**
        - Go to **Files** → **+ button**
        - You should see: **Document**, **Spreadsheet**, **Presentation**
        - Click any option → Built-in editor opens (may take 30-60 seconds first time)
        
        **💡 Built-in CODE Troubleshooting:**
        - **First document load takes 1-2 minutes** (normal initialization)
        - **If infinite loading:** Restart Nextcloud container and wait 5 minutes
        - **WOPI allow-list is critical** - make sure all three entries are added
        - **Memory usage is higher** - 3GB allocated for smooth operation
        
        **🔧 Why This Setup Works Better:**
        - No Mixed Content issues (everything runs in same container)
        - Better NSL Router compatibility
        - Simplified networking (no container-to-container communication)
        - Enhanced performance settings specifically for Built-in CODE
        
        **If this doesn't work, we'll know Built-in CODE has fundamental issues with NSL Router!**
      ko_kr: |
        **🚀 Built-in CODE 설정 (NSL Router 최적화)**
        
        **이 설정에 포함된 기능:**
        ✅ 향상된 성능 설정이 포함된 Nextcloud
        ✅ 내장 Collabora CODE 서버 (별도 컨테이너 없음)
        ✅ 최적화된 메모리 관리가 포함된 Redis 캐싱
        ✅ 성능 튜닝된 MariaDB
        ✅ NSL Router 특화 최적화
        
        **📋 설치 후 (5-6분 설정):**
        1. **5-6분 대기** - Built-in CODE 초기화에 더 많은 시간 필요
        2. **Nextcloud 접속:** `https://nextcloud-사용자명.nsl.sh`
        3. **설정 마법사 완료** (관리자 계정 생성)
        4. **필수 앱 설치:**
           - **앱** → "**Nextcloud Office**" 검색
           - "**Nextcloud Office**" 설치
           - "**Collabora Online - Built-in CODE Server**" 설치
        5. **Office 구성 (중요한 단계):**
           - **설정** → **Office**로 이동
           - "**Use the built-in CODE**" 선택
           - **고급 설정**에서:
             - WOPI 허용 목록에 추가: `172.17.0.0/16`
             - WOPI 허용 목록에 추가: `127.0.0.1`
             - WOPI 허용 목록에 추가: `nextcloud`
           - **저장** 클릭
        
        **🎯 내장 오피스 테스트:**
        - **파일** → **+ 버튼**으로 이동
        - 다음이 보여야 함: **문서**, **스프레드시트**, **프레젠테이션**
        - 아무 옵션 클릭 → 내장 편집기 열림 (첫 번째는 30-60초 소요)
        
        **💡 Built-in CODE 문제 해결:**
        - **첫 문서 로드는 1-2분 소요** (정상적인 초기화)
        - **무한 로딩 시:** Nextcloud 컨테이너 재시작 후 5분 대기
        - **WOPI 허용 목록이 중요** - 세 개 항목 모두 추가 확인
        - **메모리 사용량이 높음** - 부드러운 작업을 위해 3GB 할당
        
        **🔧 이 설정이 더 잘 작동하는 이유:**
        - Mixed Content 문제 없음 (모든 것이 같은 컨테이너에서 실행)
        - 더 나은 NSL Router 호환성
        - 단순화된 네트워킹 (컨테이너 간 통신 없음)
        - Built-in CODE 전용 향상된 성능 설정
        
        **이것도 안 되면, Built-in CODE가 NSL Router와 근본적인 문제가 있다는 걸 알 수 있습니다!**
  index: /
name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
    environment:
      PUID: $PUID
      PGID: $PGID
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017", "--wiredTigerCacheSizeGB", "0.5"]
    
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 30s
      start_period: 15s
      start_interval: 2s
      retries: 20
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.11.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
    environment:
      # === MongoDB 연결 ===
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      # === 기본 설정 ===
      ROOT_URL: http://localhost:80
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # === 관리자 계정 ===
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # === 시스템 변수 ===
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # === 성능 최적화 ===
      LOG_LEVEL: "warn"
      NODE_ENV: "production"
      NODE_OPTIONS: "--max-old-space-size=2048"
      
      # === 실시간 통신 ===
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      METEOR_DISABLE_OPTIMISTIC_CACHING: "0"
      
      # === 기본 오프라인 설정 (사용자가 변경 가능) ===
      ROCKETCHAT_REGISTRATION_ENABLED: "false"           # 관리자가 설정에서 변경 가능
      ROCKETCHAT_STATISTICS_OPT_OUT: "false"             # 사용자 선택 가능
      
      # === 선택적 온라인 기능 (기본 비활성화, 사용자가 활성화 가능) ===
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"  # 앱에서 활성화 가능
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"                   # 관리자가 활성화 가능
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"                     # 앱 마켓플레이스 접근 허용
      
      # === 마이크로서비스 비활성화 ===
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # === UI 기본 설정 (사용자가 앱에서 변경 가능) ===
      OVERWRITE_SETTING_ACCOUNTS_REGISTRATION_FORM: "Disabled"   # 관리자가 변경 가능
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      
      # === 앱 마켓플레이스 활성화 (Nextcloud 스타일) ===
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"              # 내부에서 앱 다운로드 가능
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"              # 마켓플레이스 접근 허용
      OVERWRITE_SETTING_APPS_MARKETPLACE_ENABLED: "true"         # 앱 스토어 기능
      
      # === 성능 최적화 설정 ===
      OVERWRITE_SETTING_MESSAGE_MAX_ALL_ALLOWED: "1000"
      OVERWRITE_SETTING_FILEUPLOAD_ENABLED: "true"
      OVERWRITE_SETTING_FILEUPLOAD_MAXFILESIZE: "10485760"       # 10MB 제한
      
      # === VoIP는 기본 비활성화 (사용자가 활성화 가능) ===
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"                  # 사용자가 설정에서 변경 가능
      ROCKETCHAT_WEBRTC_ENABLED: "false"
      ROCKETCHAT_VOIP_ENABLED: "false"
      
      # === 선택적 기능들 (기본 비활성화, 필요시 활성화) ===
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"                # 관리자가 활성화 가능
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"             # 고급 기능
      
      # === 이메일 설정 (사용자가 구성 가능) ===
      OVERWRITE_SETTING_ACCOUNTS_EMAIL_VERIFICATION: "false"     # 기본 비활성화
      OVERWRITE_SETTING_FROM_EMAIL: "noreply@localhost"          # 사용자가 변경 가능
      
      # === 보안 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    # === 직접 포트 접속 ===
    ports:
      - "3000:80"
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: CasaOS Team
  category: Communication
  description:
    en_us: Rocket.Chat with selective online features. Works offline by default, but allows users to enable additional features and download apps from within the application when needed - just like Nextcloud.
    ko_kr: 선택적 온라인 기능을 제공하는 Rocket.Chat입니다. 기본적으로 오프라인에서 작동하지만, 필요시 애플리케이션 내부에서 추가 기능을 활성화하고 앱을 다운로드할 수 있습니다 - Nextcloud와 같은 방식입니다.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Private team communication with optional online features
    ko_kr: 선택적 온라인 기능을 가진 사설 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **🚀 Rocket.Chat with Nextcloud-Style Flexibility**
        
        Works offline by default, but lets you choose what online features to enable.
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Access URLs:**
        - **NSL Router**: `https://rocketchat-yourdomain.nsl.sh`
        - **Direct Access**: `http://your-server-ip:3000`
        
        **🔧 How It Works (Like Nextcloud):**
        
        **✅ Always Available Offline:**
        - Real-time messaging and file sharing
        - User management and channels
        - Basic team collaboration
        
        **🌐 Optional Online Features (Enable in Settings):**
        - **App Marketplace**: Download additional apps and integrations
        - **Statistics**: Share usage data (if you want)
        - **Updates**: Check for new versions
        - **Email Services**: Configure SMTP for notifications
        - **VoIP/Video**: Enable voice and video calling
        - **Livechat**: Customer support features
        
        **🎯 Getting Started:**
        1. **Install and use immediately** - basic features work offline
        2. **Go to Administration → Settings** to enable desired online features
        3. **Visit Apps → Marketplace** to download additional functionality
        4. **Configure only what you need** - everything else stays offline
        
        **💡 Perfect For:**
        - Teams that want privacy but occasional online features
        - Organizations with selective internet policies
        - Users who want control over data sharing
        
        **Resources**: 3GB RAM, 2 CPU cores for optimal performance
      ko_kr: |
        **🚀 Nextcloud 스타일의 유연성을 가진 Rocket.Chat**
        
        기본적으로 오프라인에서 작동하지만, 원하는 온라인 기능을 선택적으로 활성화할 수 있습니다.
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **접속 URL:**
        - **NSL Router**: `https://rocketchat-yourdomain.nsl.sh`
        - **직접 접속**: `http://서버IP:3000`
        
        **🔧 작동 방식 (Nextcloud와 같음):**
        
        **✅ 항상 오프라인에서 사용 가능:**
        - 실시간 메시징 및 파일 공유
        - 사용자 관리 및 채널
        - 기본 팀 협업
        
        **🌐 선택적 온라인 기능 (설정에서 활성화):**
        - **앱 마켓플레이스**: 추가 앱 및 통합 기능 다운로드
        - **통계**: 사용 데이터 공유 (원하는 경우)
        - **업데이트**: 새 버전 확인
        - **이메일 서비스**: 알림용 SMTP 구성
        - **VoIP/화상**: 음성 및 화상 통화 활성화
        - **라이브챗**: 고객 지원 기능
        
        **🎯 시작하기:**
        1. **설치 후 즉시 사용** - 기본 기능은 오프라인에서 작동
        2. **관리 → 설정**에서 원하는 온라인 기능 활성화
        3. **앱 → 마켓플레이스**에서 추가 기능 다운로드
        4. **필요한 것만 구성** - 나머지는 오프라인 유지
        
        **💡 적합한 대상:**
        - 프라이버시를 원하지만 가끔 온라인 기능이 필요한 팀
        - 선택적 인터넷 정책을 가진 조직
        - 데이터 공유를 제어하고 싶은 사용자
        
        **리소스**: 최적 성능을 위한 3GB RAM, 2 CPU 코어
  index: /
  webui_port: 80
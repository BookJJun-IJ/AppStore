  tips:
    before_install:
      en_us: |
        **Default Account:**
        
        | Username | Password |
        |----------|----------|
        | `diskover` | `$default_pwd` |
        
        **Important Notes:**
        - Elasticsearch requires 2-3 minutes to start and initialize
        - Initial indexing must be run manually after installation
        - The web interface may be unresponsive until Elasticsearch is ready
        - Large file systems may take significant time for initial indexing
        - Automated indexing can be configured via crontab after installation
        
        **Security Note:**
        - Elasticsearch runs as UID 1000 for proper data directory management
        - Diskover runs with elevated privileges for read-only access to all file systems
        - Both are isolated to AppData and do not modify user files
        - See rationale.md for complete security justification
      ko_kr: |
        **기본 계정:**
        
        | 사용자명 | 비밀번호 |
        |----------|----------|
        | `diskover` | `$default_pwd` |
        
        **중요 참고사항:**
        - Elasticsearch는 시작 및 초기화에 2-3분이 필요합니다
        - 설치 후 수동으로 초기 인덱싱을 실행해야 합니다
        - Elasticsearch가 준비될 때까지 웹 인터페이스가 응답하지 않을 수 있습니다
        - 큰 파일 시스템은 초기 인덱싱에 상당한 시간이 걸릴 수 있습니다
        - 설치 후 crontab을 통해 자동 인덱싱을 구성할 수 있습니다
        
        **보안 참고:**
        - Elasticsearch는 올바른 데이터 디렉토리 관리를 위해 UID 1000으로 실행됩니다
        - Diskover는 모든 파일 시스템에 대한 읽기 전용 접근을 위해 높은 권한으로 실행됩니다
        - 둘 다 AppData에 격리되어 있으며 사용자 파일을 수정하지 않습니다
        - 전체 보안 정당화는 rationale.md를 참조하세요
      fr_fr: |
        **Compte par défaut:**
        
        | Nom d'utilisateur | Mot de passe |
        |----------|----------|
        | `diskover` | `$default_pwd` |
        
        **Notes importantes:**
        - Elasticsearch nécessite 2-3 minutes pour démarrer et s'initialiser
        - L'indexation initiale doit être exécutée manuellement après l'installation
        - L'interface Web peut ne pas répondre jusqu'à ce qu'Elasticsearch soit prêt
        - Les grands systèmes de fichiers peuvent nécessiter un temps considérable pour l'indexation initiale
        - L'indexation automatisée peut être configurée via crontab après l'installation
        
        **Note de sécurité:**
        - Elasticsearch s'exécute en tant qu'UID 1000 pour une gestion correcte du répertoire de données
        - Diskover s'exécute avec des privilèges élevés pour un accès en lecture seule à tous les systèmes de fichiers
        - Les deux sont isolés à AppData et ne modifient pas les fichiers utilisateur
        - Voir rationale.md pour la justification complète de la sécurité
      es_es: |
        **Cuenta predeterminada:**
        
        | Nombre de usuario | Contraseña |
        |----------|----------|
        | `diskover` | `$default_pwd` |
        
        **Notas importantes:**
        - Elasticsearch requiere 2-3 minutos para iniciar e inicializarse
        - La indexación inicial debe ejecutarse manualmente después de la instalación
        - La interfaz web puede no responder hasta que Elasticsearch esté listo
        - Los sistemas de archivos grandes pueden tardar mucho tiempo en la indexación inicial
        - La indexación automatizada se puede configurar mediante crontab después de la instalación
        
        **Nota de seguridad:**
        - Elasticsearch se ejecuta como UID 1000 para la gestión adecuada del directorio de datos
        - Diskover se ejecuta con privilegios elevados para acceso de solo lectura a todos los sistemas de archivos
        - Ambos están aislados a AppData y no modifican archivos de usuario
        - Ver rationale.md para la justificación completa de seguridad

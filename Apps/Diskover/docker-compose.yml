name: diskover

services:
  diskover:
    image: lscr.io/linuxserver/diskover:v2.3.3-ls213
    container_name: diskover
    user: "0:0"
    environment:
      PUID: "0"
      PGID: "0"
      TZ: $TZ
      ES_HOST: elasticsearch
      ES_PORT: 9200
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /DATA:/data:ro
    expose:
      - 80
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.0'
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
    container_name: diskover-elasticsearch
    user: "1000:1000"
    environment:
      PUID: "1000"
      PGID: "1000"
      discovery.type: single-node
      xpack.security.enabled: false
      bootstrap.memory_lock: true
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - /DATA/AppData/$AppID/esdata:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      - elasticsearch-helper

  elasticsearch-helper:
    image: alpine:3.20
    container_name: diskover-elasticsearch-helper
    command: sh -c "
      sysctl -w vm.max_map_count=262144 &&
      mkdir -p /data/esdata /data/config &&
      chown -R 1000:1000 /data/esdata &&
      chmod -R 755 /data
      "
    privileged: true
    volumes:
      - /DATA/AppData/$AppID:/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    restart: "no"

x-casaos:
  architectures:
    - amd64
    - arm64
  main: diskover
  author: CasaOS Team
  category: Utilities
  description:
    en_us: |
      Diskover is a powerful open-source file system indexer and search engine that uses Elasticsearch to catalog and manage data across different storage systems.
      
      **Key Features:**
      - Fast file system indexing with Elasticsearch
      - Web-based interface for searching and analyzing files
      - Metadata collection (size, date, ownership)
      - Storage analytics and visualization
      - Support for local, NFS, SMB, and cloud storage
      - Automated indexing with cron jobs
      
      **Post-Installation Steps:**
      1. Wait 2-3 minutes for Elasticsearch to initialize
      2. Access the web interface (default credentials: diskover / $default_pwd)
      3. Run initial index: `docker exec -u abc diskover python3 /app/diskover/diskover.py -i diskover-main /data`
      4. Configure automated indexing in `/DATA/AppData/diskover/config/crontab` (requires container restart)
      
      **Note:** The application indexes file metadata only and never modifies your actual files.
    ko_kr: |
      Diskover는 Elasticsearch를 사용하여 다양한 스토리지 시스템의 데이터를 카탈로그화하고 관리하는 강력한 오픈소스 파일 시스템 인덱서이자 검색 엔진입니다.
      
      **주요 기능:**
      - Elasticsearch를 활용한 빠른 파일 시스템 인덱싱
      - 파일 검색 및 분석을 위한 웹 기반 인터페이스
      - 메타데이터 수집 (크기, 날짜, 소유권)
      - 스토리지 분석 및 시각화
      - 로컬, NFS, SMB, 클라우드 스토리지 지원
      - Cron을 이용한 자동 인덱싱
      
      **설치 후 단계:**
      1. Elasticsearch 초기화를 위해 2-3분 대기
      2. 웹 인터페이스 접속 (기본 계정: diskover / $default_pwd)
      3. 초기 인덱스 실행: `docker exec -u abc diskover python3 /app/diskover/diskover.py -i diskover-main /data`
      4. `/DATA/AppData/diskover/config/crontab`에서 자동 인덱싱 설정 (컨테이너 재시작 필요)
      
      **참고:** 이 애플리케이션은 파일 메타데이터만 인덱싱하며 실제 파일을 수정하지 않습니다.
    fr_fr: |
      Diskover est un puissant indexeur de système de fichiers open source et moteur de recherche qui utilise Elasticsearch pour cataloguer et gérer les données sur différents systèmes de stockage.
      
      **Fonctionnalités clés:**
      - Indexation rapide du système de fichiers avec Elasticsearch
      - Interface Web pour rechercher et analyser les fichiers
      - Collection de métadonnées (taille, date, propriété)
      - Analyse et visualisation du stockage
      - Prise en charge du stockage local, NFS, SMB et cloud
      - Indexation automatisée avec des tâches cron
      
      **Étapes post-installation:**
      1. Attendez 2-3 minutes pour l'initialisation d'Elasticsearch
      2. Accédez à l'interface Web (identifiants par défaut: diskover / $default_pwd)
      3. Exécutez l'index initial: `docker exec -u abc diskover python3 /app/diskover/diskover.py -i diskover-main /data`
      4. Configurez l'indexation automatisée dans `/DATA/AppData/diskover/config/crontab` (redémarrage du conteneur requis)
      
      **Note:** L'application indexe uniquement les métadonnées des fichiers et ne modifie jamais vos fichiers réels.
    es_es: |
      Diskover es un potente indexador de sistemas de archivos de código abierto y motor de búsqueda que utiliza Elasticsearch para catalogar y administrar datos en diferentes sistemas de almacenamiento.
      
      **Características principales:**
      - Indexación rápida del sistema de archivos con Elasticsearch
      - Interfaz web para buscar y analizar archivos
      - Recopilación de metadatos (tamaño, fecha, propiedad)
      - Análisis y visualización del almacenamiento
      - Soporte para almacenamiento local, NFS, SMB y nube
      - Indexación automatizada con trabajos cron
      
      **Pasos posteriores a la instalación:**
      1. Espere 2-3 minutos para la inicialización de Elasticsearch
      2. Acceda a la interfaz web (credenciales predeterminadas: diskover / $default_pwd)
      3. Ejecute el índice inicial: `docker exec -u abc diskover python3 /app/diskover/diskover.py -i diskover-main /data`
      4. Configure la indexación automatizada en `/DATA/AppData/diskover/config/crontab` (requiere reinicio del contenedor)
      
      **Nota:** La aplicación solo indexa metadatos de archivos y nunca modifica sus archivos reales.
    zh_cn: |
      Diskover 是一个强大的开源文件系统索引器和搜索引擎,使用 Elasticsearch 对不同存储系统的数据进行分类和管理。
      
      **主要功能:**
      - 使用 Elasticsearch 快速索引文件系统
      - 用于搜索和分析文件的 Web 界面
      - 元数据收集(大小、日期、所有权)
      - 存储分析和可视化
      - 支持本地、NFS、SMB 和云存储
      - 使用 cron 作业自动索引
      
      **安装后步骤:**
      1. 等待 2-3 分钟让 Elasticsearch 初始化
      2. 访问 Web 界面(默认凭证:diskover / $default_pwd)
      3. 运行初始索引:`docker exec -u abc diskover python3 /app/diskover/diskover.py -i diskover-main /data`
      4. 在 `/DATA/AppData/diskover/config/crontab` 中配置自动索引(需要重启容器)
      
      **注意:** 应用程序仅索引文件元数据,永远不会修改您的实际文件。

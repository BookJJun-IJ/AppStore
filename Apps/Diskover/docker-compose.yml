        **默认账户:**
        
        | 用户名 | 密码 |
        |----------|----------|
        | `diskover` | `$default_pwd` |
        
        **重要注意事项:**
        - Elasticsearch 需要 2-3 分钟启动和初始化
        - 安装后必须手动运行初始索引
        - 在 Elasticsearch 准备就绪之前,Web 界面可能无响应
        - 大型文件系统的初始索引可能需要大量时间
        - 安装后可以通过 crontab 配置自动索引
        
        **安全说明:**

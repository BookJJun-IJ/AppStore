name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      PUID: $PUID
      PGID: $PGID
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 10s
      start_interval: 1s
      retries: 30
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.11.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    environment:
      # === MongoDB 연결 ===
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      # === NSL Router 설정 ===
      ROOT_URL: http://localhost:80
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # === Setup Wizard 건너뛰기 + 기본 관리자 계정 ===
      OVERWRITE_SETTING_Show_Setup_Wizard: "completed"
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # === 시스템 환경 변수 ===
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOG_LEVEL: "info"
      
      # === 마이크로서비스 비활성화 ===
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # === 선택적 클라우드 기능 비활성화 ===
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"           # 통계 전송 안 함
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"        # 업데이트 체크 안 함
      ROCKETCHAT_FEDERATION_ENABLED: "false"          # 연합 기능 안 함
      
      # === 마켓플레이스 활성화 ===
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"          # ✅ 앱 엔진 활성화
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"   # ✅ 앱 엔진 강제 활성화
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"   # ✅ 마켓플레이스 활성화
      
      # === 등록/인증 유연하게 설정 ===
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"  # 클라우드 등록 필수 아님
      OVERWRITE_SETTING_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      
      # === 실시간 통신 활성화 ===
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      
      # === 성능 최적화 ===
      METEOR_DISABLE_OPTIMISTIC_CACHING: "1"
      
      # === 불필요한 기능만 비활성화 ===
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"     # 라이브챗 비활성화
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"  # 옴니채널 비활성화
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"       # WebRTC 비활성화
      
      # === 보안 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: CasaOS Team
  category: Communication
  description:
    en_us: Rocket.Chat with marketplace enabled for team collaboration. Uses verified MongoDB replica set with apps marketplace support.
    ko_kr: 마켓플레이스가 활성화된 팀 협업용 Rocket.Chat. 검증된 MongoDB replica set과 앱 마켓플레이스 지원.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Private team communication with apps marketplace
    ko_kr: 앱 마켓플레이스를 지원하는 사설 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **Rocket.Chat with Apps Marketplace Enabled**
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Features Enabled:**
        - ✅ Apps Marketplace (install integrations)
        - ✅ Real-time messaging with replica set
        - ✅ File uploads and sharing
        - ✅ Team collaboration features
        
        **Privacy Settings:**
        - ❌ Statistics reporting disabled
        - ❌ Automatic updates disabled  
        - ❌ Federation disabled
        - ✅ Your data stays on your server
        
        **Setup Process:**
        1. Initial setup wizard will appear
        2. You can skip cloud registration if desired
        3. Apps marketplace will be available in admin panel
        4. Install apps like GitHub, Jira, Google Drive integrations
        
        **Note:** You may see an email verification step during initial setup - this is for admin account creation, not cloud registration.
      ko_kr: |
        **앱 마켓플레이스가 활성화된 Rocket.Chat**
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **활성화된 기능:**
        - ✅ 앱 마켓플레이스 (통합 앱 설치)
        - ✅ Replica set 실시간 메시징
        - ✅ 파일 업로드 및 공유
        - ✅ 팀 협업 기능
        
        **프라이버시 설정:**
        - ❌ 통계 리포팅 비활성화
        - ❌ 자동 업데이트 비활성화
        - ❌ 연합 기능 비활성화
        - ✅ 데이터는 사용자 서버에만 보관
        
        **설정 과정:**
        1. 초기 설정 마법사가 나타남
        2. 원한다면 클라우드 등록 건너뛰기 가능
        3. 관리자 패널에서 앱 마켓플레이스 사용 가능
        4. GitHub, Jira, Google Drive 통합 등 앱 설치 가능
        
        **참고:** 초기 설정 시 이메일 인증 단계가 나올 수 있음 - 이는 클라우드 등록이 아닌 관리자 계정 생성용입니다.
  index: /
  webui_port: 80
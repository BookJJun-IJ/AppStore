name: rocketchat

services:
  mongodb:
    image: bitnami/mongodb:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      # === Bitnami 자동 replica set 설정 ===
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_REPLICA_SET_KEY: "replicaset-key-for-auth"
      MONGODB_ROOT_USER: root
      MONGODB_ROOT_PASSWORD: $default_pwd
      MONGODB_USERNAME: rocketchat
      MONGODB_PASSWORD: $default_pwd
      MONGODB_DATABASE: rocketchat
      
      # === 권한 설정 ===
      PUID: $PUID
      PGID: $PGID
      
      # === 추가 안정성 설정 ===
      MONGODB_ENABLE_JOURNAL: "true"
      MONGODB_DISABLE_SYSTEM_LOG: "false"
      MONGODB_ENABLE_IPV6: "false"
      MONGODB_ADVERTISED_HOSTNAME: mongodb
    volumes:
      - /DATA/AppData/$AppID/mongodb:/bitnami/mongodb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.11.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    environment:
      # === MongoDB 연결 (Bitnami 인증 포함) ===
      MONGO_URL: mongodb://rocketchat:$default_pwd@mongodb:27017/rocketchat?replicaSet=rs0&authSource=rocketchat
      MONGO_OPLOG_URL: mongodb://root:$default_pwd@mongodb:27017/local?replicaSet=rs0&authSource=admin
      
      # === 실시간 데이터 스트림 강제 활성화 ===
      MONGO_WATCHDB_ENABLED: "true"
      
      # === NSL Router 설정 ===
      ROOT_URL: http://localhost:80
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # === 기본 관리자 계정 ===
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # === 시스템 환경 변수 ===
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # === 로그 레벨 ===
      LOG_LEVEL: "info"
      
      # === 마이크로서비스 비활성화 ===
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # === 오프라인 모드 설정 ===
      ROCKETCHAT_REGISTRATION_ENABLED: "false"
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_APPS_ENGINE_ENABLED: "false"
      ROCKETCHAT_FEDERATION_ENABLED: "false"
      
      # === 실시간 통신 최적화 ===
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      
      # === 성능 최적화 ===
      METEOR_DISABLE_OPTIMISTIC_CACHING: "1"
      
      # === UI 설정 강제 재정의 ===
      OVERWRITE_SETTING_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      OVERWRITE_SETTING_STATISTICS_REPORTING: "false"
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "false"
      OVERWRITE_SETTING_FEDERATION_ENABLED: "false"
      OVERWRITE_SETTING_ACCOUNTS_REGISTRATION_FORM: "Disabled"
      
      # === 실시간 통신 강제 활성화 ===
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      
      # === VoIP 비활성화 (로그 정리) ===
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"
      ROCKETCHAT_WEBRTC_ENABLED: "false"
      ROCKETCHAT_VOIP_ENABLED: "false"
      
      # === 불필요한 기능 비활성화 ===
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "false"
      OVERWRITE_SETTING_APPS_MARKETPLACE_ENABLED: "false"
      
      # === 보안 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      - mongodb
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: CasaOS Team
  category: Communication
  description:
    en_us: Rocket.Chat with Bitnami MongoDB for fully automated replica set setup. No terminal access required - everything works out of the box with guaranteed real-time messaging.
    ko_kr: 완전 자동화된 replica set 설정을 위해 Bitnami MongoDB를 사용하는 Rocket.Chat입니다. 터미널 접근 불필요 - 실시간 메시징이 보장되는 즉시 사용 가능한 구성입니다.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Private team communication - zero configuration required
    ko_kr: 사설 팀 커뮤니케이션 - 설정 불필요
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **Fully Automated Rocket.Chat Setup**
        
        Uses Bitnami MongoDB with automatic replica set - zero configuration needed!
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **What happens automatically:**
        1. Bitnami MongoDB starts with replica set enabled
        2. Database and users are created automatically
        3. Rocket.Chat connects and enables real-time messaging
        4. Ready to use in ~1 minute
        
        **Features:**
        - ✅ Zero configuration - works immediately
        - ✅ No terminal access required
        - ✅ Automatic replica set initialization
        - ✅ Guaranteed real-time messaging
        - ✅ Offline operation optimized
        
        **No manual steps required** - just install and use!
      ko_kr: |
        **완전 자동화된 Rocket.Chat 설정**
        
        자동 replica set이 포함된 Bitnami MongoDB 사용 - 설정 불필요!
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **자동으로 수행되는 작업:**
        1. replica set이 활성화된 Bitnami MongoDB 시작
        2. 데이터베이스 및 사용자 자동 생성
        3. Rocket.Chat 연결 및 실시간 메시징 활성화
        4. ~1분 내에 사용 준비 완료
        
        **특징:**
        - ✅ 설정 불필요 - 즉시 작동
        - ✅ 터미널 접근 불필요
        - ✅ 자동 replica set 초기화
        - ✅ 실시간 메시징 보장
        - ✅ 오프라인 작동 최적화
        
        **수동 단계 불필요** - 설치 후 바로 사용!
  index: /
  webui_port: 80
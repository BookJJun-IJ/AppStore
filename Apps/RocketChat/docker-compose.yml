name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    # MongoDB 컨테이너는 기본 사용자로 실행 (UID 999 충돌 방지)
    # user 필드 제거하여 MongoDB 내부 사용자 사용
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    environment:
      PUID: $PUID                                    # Process user ID / 프로세스 사용자 ID
      PGID: $PGID                                    # Process group ID / 프로세스 그룹 ID
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    
    healthcheck:
      test: |
        mongosh --port 27017 --quiet --eval "
        try { 
          var status = rs.status(); 
          if (status.ok === 1) { 
            print('replica set already initialized'); 
            quit(0); 
          } 
        } catch (err) { 
          if (err.message.includes('no replset config')) { 
            var result = rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}); 
            if (result.ok === 1) { 
              print('replica set initialized successfully'); 
              quit(0); 
            } else { 
              print('failed to initialize replica set: ' + result.errmsg); 
              quit(1); 
            } 
          } else { 
            print('unexpected error: ' + err.message); 
            quit(1); 
          } 
        }"
      interval: 5s
      timeout: 30s
      start_period: 10s
      start_interval: 1s
      retries: 30
    
    volumes:
      # /data로 마운트하여 권한 문제 해결
      - /DATA/AppData/$AppID/mongodb:/data
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:7.8.3
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    environment:
      # MongoDB connection settings
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      # Server connection settings
      ROOT_URL: http://localhost:80                                      # 기본 localhost URL
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # Admin account settings
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # System settings
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOG_LEVEL: "info"
      
      # Microservices settings (disabled for simplicity)
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # Privacy and telemetry settings
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_FEDERATION_ENABLED: "false"
      
      # Apps marketplace settings - Jitsi 설치를 위해 필수
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"
      
      # Cloud workspace settings
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      OVERWRITE_SETTING_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      
      # Real-time communication settings
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      
      # Performance optimization
      METEOR_DISABLE_OPTIMISTIC_CACHING: "1"
      
      # Feature toggles (disabled for simplicity)
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"                          # Disable WebRTC for video calls
      
      # Security settings
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: Yundera Team
  category: Communication
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/uploads /DATA/AppData/$AppID/data /DATA/AppData/$AppID/mongodb &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID/uploads /DATA/AppData/$AppID/data
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-1.png
  description:
    en_us: Rocket.Chat 7.8.3 with enhanced security and stable MongoDB 7.0 replica set. Optimized for secure environments with proper permission handling.
    ko_kr: 강화된 보안과 안정적인 MongoDB 7.0 replica set을 가진 Rocket.Chat 7.8.3. 적절한 권한 처리로 보안 환경에 최적화됨.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Secure team communication with enhanced MongoDB permissions
    ko_kr: 향상된 MongoDB 권한을 가진 안전한 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **Rocket.Chat 7.8.3 - Security Enhanced Version**
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Security Improvements:**
        - ✅ Resolved MongoDB UID conflicts (no more UID 999 issues)
        - ✅ Enhanced replica set initialization with error handling
        - ✅ Proper volume permissions for secure environments
        - ✅ Pre-installation directory setup with correct ownership
        - ✅ Robust healthcheck for replica set stability
        
        **Latest Features (7.8.3):**
        - ✅ Apps Marketplace (install integrations)
        - ✅ MongoDB 7.0 support (latest database)
        - ✅ Node.js 20.x and Meteor 3.0 performance boost
        - ✅ Enhanced security and stability
        - ✅ Real-time messaging with replica set
        
        **Fixed Issues:**
        - 🔧 MongoDB permission errors in strict environments
        - 🔧 Replica set initialization failures
        - 🔧 Volume mounting permission conflicts
        - 🔧 UID 999 conflicts with system users
        
        **Setup Process:**
        1. Pre-install script creates directories with correct permissions
        2. MongoDB starts without user conflicts
        3. Replica set initializes automatically with better error handling
        4. RocketChat connects successfully to MongoDB
        5. Marketplace becomes available after setup
        
        **Jitsi Video Conferencing:**
        1. Go to **Administration → Apps → Marketplace**
        2. Search for "Jitsi" and install
        3. Use `/jitsi` command in chats
        
        **Troubleshooting:**
        - If MongoDB fails to start, check logs for permission errors
        - Pre-install script handles most permission issues automatically
        - Replica set healthcheck provides detailed error messages
      ko_kr: |
        **Rocket.Chat 7.8.3 - 보안 강화 버전**
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **보안 개선사항:**
        - ✅ MongoDB UID 충돌 해결 (UID 999 문제 해결)
        - ✅ 오류 처리가 포함된 replica set 초기화 개선
        - ✅ 보안 환경을 위한 적절한 볼륨 권한
        - ✅ 올바른 소유권으로 사전 설치 디렉토리 설정
        - ✅ Replica set 안정성을 위한 강화된 healthcheck
        
        **최신 기능 (7.8.3):**
        - ✅ 앱 마켓플레이스 (통합 앱 설치)
        - ✅ MongoDB 7.0 지원 (최신 데이터베이스)
        - ✅ Node.js 20.x 및 Meteor 3.0 성능 향상
        - ✅ 강화된 보안성과 안정성
        - ✅ Replica set 실시간 메시징
        
        **해결된 문제들:**
        - 🔧 엄격한 환경에서의 MongoDB 권한 오류
        - 🔧 Replica set 초기화 실패
        - 🔧 볼륨 마운트 권한 충돌
        - 🔧 시스템 사용자와의 UID 999 충돌
        
        **설정 과정:**
        1. 사전 설치 스크립트가 올바른 권한으로 디렉토리 생성
        2. MongoDB가 사용자 충돌 없이 시작
        3. 향상된 오류 처리로 replica set 자동 초기화
        4. RocketChat이 MongoDB에 성공적으로 연결
        5. 설정 후 마켓플레이스 사용 가능
        
        **Jitsi 화상회의:**
        1. **관리 → 앱 → 마켓플레이스**로 이동
        2. "Jitsi" 검색 후 설치
        3. 채팅에서 `/jitsi` 명령어 사용
        
        **문제해결:**
        - MongoDB 시작 실패 시 권한 오류 로그 확인
        - 사전 설치 스크립트가 대부분의 권한 문제 자동 처리
        - Replica set healthcheck가 상세한 오류 메시지 제공
  index: /
  webui_port: 80
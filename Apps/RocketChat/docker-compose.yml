name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      PUID: $PUID
      PGID: $PGID
    # === 검증된 replica set 명령어 ===
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    
    # === 2024년 검증된 healthcheck 방법 ===
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 10s
      start_interval: 1s
      retries: 30
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.11.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 3G        # 메모리 대폭 증가
          cpus: '2.0'       # CPU 대폭 증가
    environment:
      # === MongoDB 연결 (확실한 replica set) ===
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      
      # === 실시간 데이터 스트림 활성화 ===
      MONGO_WATCHDB_ENABLED: "true"
      
      # === NSL Router 설정 ===
      ROOT_URL: http://localhost:80
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # === 기본 관리자 계정 ===
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # === 완전 오프라인 모드 강제 설정 ===
      ROCKETCHAT_SETUP_TYPE: "standalone"
      ROCKETCHAT_SKIP_SETUP_WIZARD: "true"
      
      # === 시스템 환경 변수 ===
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # === 로그 레벨 ===
      LOG_LEVEL: "info"
      
      # === 마이크로서비스 비활성화 ===
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # === 완전 오프라인 모드 설정 ===
      # 회원가입 완전 비활성화
      ROCKETCHAT_REGISTRATION_ENABLED: "false"
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_APPS_ENGINE_ENABLED: "false"
      ROCKETCHAT_FEDERATION_ENABLED: "false"
      
      # === 인터넷 연결 완전 차단 ===
      ROCKETCHAT_OFFLINE_MODE: "true"
      
      # === 워크스페이스 설정 강제 오버라이드 ===
      INITIAL_USER: admin
      INITIAL_PASS: $default_pwd
      INITIAL_EMAIL: admin@localhost
      
      # === 외부 서비스 완전 비활성화 ===
      ROCKETCHAT_CLOUD_URL: ""
      ROCKETCHAT_MARKETPLACE_URL: ""
      ROCKETCHAT_LICENSE_URL: ""
      
      # === 실시간 통신 최적화 ===
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      
      # === 성능 최적화 ===
      METEOR_DISABLE_OPTIMISTIC_CACHING: "1"
      
      # === UI 설정 강제 재정의 (완전 오프라인) ===
      OVERWRITE_SETTING_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      OVERWRITE_SETTING_STATISTICS_REPORTING: "false"
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "false"
      OVERWRITE_SETTING_FEDERATION_ENABLED: "false"
      OVERWRITE_SETTING_ACCOUNTS_REGISTRATION_FORM: "Disabled"
      
      # === 완전 오프라인 UI 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_USER_AVATAR_CHANGE: "true"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_USERNAME_CHANGE: "true"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_EMAIL_CHANGE: "true"
      OVERWRITE_SETTING_ACCOUNTS_EMAIL_VERIFICATION: "false"
      OVERWRITE_SETTING_ACCOUNTS_MANUAL_APPROVAL_REQUIRED: "false"
      OVERWRITE_SETTING_ACCOUNTS_SEND_EMAIL_WHEN_ACTIVATING: "false"
      OVERWRITE_SETTING_ACCOUNTS_SEND_EMAIL_WHEN_DEACTIVATING: "false"
      
      # === 클라우드 연결 완전 차단 ===
      OVERWRITE_SETTING_CLOUD_SERVICE_AGREE_PRIVACY_TERMS: "false"
      OVERWRITE_SETTING_CLOUD_SERVICE_TERMS_ACCEPTED: "false"
      OVERWRITE_SETTING_CLOUD_WORKSPACE_ID: ""
      OVERWRITE_SETTING_CLOUD_WORKSPACE_NAME: ""
      OVERWRITE_SETTING_CLOUD_WORKSPACE_ACCESS_TOKEN: ""
      
      # === 외부 서비스 URL 무효화 ===
      OVERWRITE_SETTING_CLOUD_URL: ""
      OVERWRITE_SETTING_MARKETPLACE_URL: ""
      OVERWRITE_SETTING_LICENSE_URL: ""
      OVERWRITE_SETTING_UPDATE_CHECK_URL: ""
      
      # === 이메일 서비스 완전 비활성화 ===
      OVERWRITE_SETTING_SMTP_HOST: ""
      OVERWRITE_SETTING_SMTP_PORT: ""
      OVERWRITE_SETTING_SMTP_USERNAME: ""
      OVERWRITE_SETTING_SMTP_PASSWORD: ""
      OVERWRITE_SETTING_FROM_EMAIL: "noreply@localhost"
      
      # === 실시간 통신 강제 활성화 ===
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      
      # === VoIP 비활성화 (로그 정리) ===
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"
      ROCKETCHAT_WEBRTC_ENABLED: "false"
      ROCKETCHAT_VOIP_ENABLED: "false"
      
      # === 불필요한 기능 비활성화 ===
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "false"
      OVERWRITE_SETTING_APPS_MARKETPLACE_ENABLED: "false"
      
      # === 보안 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    # === 직접 포트 접속 추가 (성능 문제 해결) ===
    ports:
      - "3000:80"           # NSL Router 우회용 직접 접속
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy  # MongoDB가 healthy일 때만 시작
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: CasaOS Team
  category: Communication
  description:
    en_us: Rocket.Chat with proven MongoDB replica set configuration. Uses the most reliable method verified by the community in 2024 for guaranteed real-time messaging functionality.
    ko_kr: 검증된 MongoDB replica set 구성을 사용하는 Rocket.Chat입니다. 실시간 메시징 기능이 보장되는 2024년 커뮤니티 검증 방법을 사용합니다.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Private team communication with verified replica set
    ko_kr: 검증된 replica set을 사용하는 사설 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **Rocket.Chat with Community-Verified MongoDB Replica Set**
        
        Uses the most reliable MongoDB replica set method proven by thousands of developers.
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **What makes this reliable:**
        - ✅ Uses standard mongo:7.0 image (no complex customizations)
        - ✅ Community-verified healthcheck method (2024 tested)
        - ✅ Automatic replica set initialization
        - ✅ Guaranteed real-time messaging and change streams
        - ✅ No complex authentication or keyfile issues
        
        **Setup process:**
        1. MongoDB starts with replica set mode
        2. Healthcheck automatically initializes replica set
        3. Rocket.Chat connects to working replica set
        4. Real-time messaging works immediately
        
        **Total setup time**: ~30 seconds for full initialization
      ko_kr: |
        **커뮤니티 검증된 MongoDB Replica Set을 사용하는 Rocket.Chat**
        
        수천 명의 개발자들이 검증한 가장 안정적인 MongoDB replica set 방법을 사용합니다.
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **안정적인 이유:**
        - ✅ 표준 mongo:7.0 이미지 사용 (복잡한 커스터마이징 없음)
        - ✅ 커뮤니티 검증된 healthcheck 방법 (2024년 테스트됨)
        - ✅ 자동 replica set 초기화
        - ✅ 실시간 메시징 및 change stream 보장
        - ✅ 복잡한 인증이나 keyfile 문제 없음
        
        **설정 과정:**
        1. MongoDB가 replica set 모드로 시작
        2. Healthcheck가 자동으로 replica set 초기화
        3. Rocket.Chat이 작동하는 replica set에 연결
        4. 실시간 메시징 즉시 작동
        
        **전체 설정 시간**: 완전 초기화까지 ~30초
  index: /
  webui_port: 80
name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    # MongoDB 7.0은 기본적으로 mongodb 사용자(999:999)로 실행됨
    # CasaOS의 PUID/PGID와의 호환성을 위해 user 제거
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    environment:
      # MongoDB는 자체 사용자 관리를 하므로 PUID/PGID 제거
      # MONGO_INITDB_ROOT_USERNAME: admin
      # MONGO_INITDB_ROOT_PASSWORD: $default_pwd
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    
    # 개선된 healthcheck - host.docker.internal 대신 컨테이너명 사용
    healthcheck:
      test: |
        mongosh --port 27017 --quiet --eval "
          try { 
            rs.status() 
          } catch (err) { 
            if (err.code === 94) {
              print('Initializing replica set...');
              rs.initiate({
                _id: 'rs0',
                members: [{
                  _id: 0,
                  host: 'mongodb:27017'
                }]
              });
            } else {
              throw err;
            }
          }"
      interval: 10s
      timeout: 30s
      start_period: 40s
      retries: 3
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:7.8.3
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    environment:
      # MongoDB 연결 설정 (인증 제거로 단순화)
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      
      # 서버 연결 설정
      ROOT_URL: https://$domain
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # 관리자 계정 설정
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@$domain
      
      # 시스템 설정
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # 성능 최적화
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      
      # 앱 마켓플레이스 활성화
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"
      
      # 프라이버시 설정
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      
      # 보안 설정
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      
      # WebRTC 및 Jitsi 설정
      OVERWRITE_SETTING_WEBRTC_ENABLED: "true"
      OVERWRITE_SETTING_JITSI_ENABLED: "true"
    
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

# Pre-install 명령어로 권한 설정
x-casaos:
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/mongodb /DATA/AppData/$AppID/mongodb-config /DATA/AppData/$AppID/uploads /DATA/AppData/$AppID/data &&
    chown -R 999:999 /DATA/AppData/$AppID/mongodb /DATA/AppData/$AppID/mongodb-config &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID/uploads /DATA/AppData/$AppID/data

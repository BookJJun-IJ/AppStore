name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    environment:
      PUID: $PUID
      PGID: $PGID
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 10s
      start_interval: 1s
      retries: 30
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:7.8.3
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    environment:
      # MongoDB connection settings
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      # Server connection settings
      ROOT_URL: https://$domain                                      # NSL 도메인 사용
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # Admin account settings
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # System settings
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOG_LEVEL: "info"
      
      # Microservices settings (disabled for simplicity)
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # Privacy and telemetry settings
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_FEDERATION_ENABLED: "false"
      
      # Apps marketplace settings - Jitsi 설치를 위해 필수
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"
      
      # Cloud workspace settings
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      OVERWRITE_SETTING_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      
      # Real-time communication settings
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      
      # Performance optimization
      METEOR_DISABLE_OPTIMISTIC_CACHING: "1"
      
      # Jitsi 연동을 위한 WebRTC 활성화
      OVERWRITE_SETTING_WEBRTC_ENABLED: "true"                        # WebRTC 활성화 (Jitsi 연동용)
      
      # Feature toggles (필요에 따라 활성화)
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      
      # Security settings
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: Yundera Team
  category: Communication
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-1.png
  description:
    en_us: Rocket.Chat 7.8.3 with Jitsi Meet video conferencing support. Apps marketplace enabled for easy Jitsi integration.
    ko_kr: Jitsi Meet 화상회의를 지원하는 Rocket.Chat 7.8.3. Jitsi 연동을 위한 앱 마켓플레이스 활성화.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Team communication with free Jitsi video conferencing
    ko_kr: 무료 Jitsi 화상회의가 포함된 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat + Jitsi
    ko_kr: Rocket.Chat + Jitsi
  tips:
    before_install:
      en_us: |
        **Rocket.Chat 7.8.3 with Jitsi Meet Integration**
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Jitsi Video Conferencing Setup:**
        1. Login as admin after installation
        2. Go to **Administration → Apps → Marketplace**
        3. Search for "Jitsi" and click **Install**
        4. Use `/jitsi` command in any chat to start video calls
        
        **Features:**
        - ✅ **Free Video Conferencing** via Jitsi Meet
        - ✅ **Screen Sharing** and **Chat** during calls
        - ✅ **No Installation Required** for participants
        - ✅ **Works in Browser** - just click the link
        - ✅ **Unlimited Participants** (performance may vary)
        
        **Using Jitsi:**
        - Type `/jitsi` in any channel or DM
        - Custom room: `/jitsi @MeetingRoom`
        - Click video call icon in room header
        - Share the generated link with participants
        
        **Privacy:**
        - Uses meet.jit.si by default (free service)
        - Can be configured to use your own Jitsi server
        - All communications encrypted end-to-end
      ko_kr: |
        **Jitsi Meet이 연동된 Rocket.Chat 7.8.3**
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Jitsi 화상회의 설정:**
        1. 설치 후 관리자로 로그인
        2. **관리 → 앱 → 마켓플레이스**로 이동
        3. "Jitsi" 검색 후 **설치** 클릭
        4. 채팅에서 `/jitsi` 명령어로 화상통화 시작
        
        **기능:**
        - ✅ **무료 화상회의** Jitsi Meet 제공
        - ✅ **화면 공유** 및 통화 중 **채팅**
        - ✅ **설치 불필요** 참가자용
        - ✅ **브라우저에서 작동** - 링크만 클릭
        - ✅ **무제한 참가자** (성능에 따라 차이)
        
        **Jitsi 사용법:**
        - 채널이나 DM에서 `/jitsi` 입력
        - 커스텀 룸: `/jitsi @회의실`
        - 룸 헤더의 화상통화 아이콘 클릭
        - 생성된 링크를 참가자들과 공유
        
        **프라이버시:**
        - 기본적으로 meet.jit.si 사용 (무료 서비스)
        - 자체 Jitsi 서버로 구성 가능
        - 모든 통신 종단간 암호화
  index: /
  webui_port: 80
name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M     # 메모리 대폭 감소
    environment:
      PUID: $PUID
      PGID: $PGID
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017", "--wiredTigerCacheSizeGB", "0.1"]
    
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 15s       # 간격 늘려서 부하 감소
      timeout: 30s
      start_period: 30s   # 시작 대기 시간 증가
      start_interval: 5s
      retries: 10
    
    volumes:
      - /DATA/AppData/$AppID/mongodb:/data/db
      - /DATA/AppData/$AppID/mongodb-config:/data/configdb
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.11.0
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G       # 메모리 대폭 감소
    environment:
      # === MongoDB 연결 ===
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      # === 기본 설정 ===
      ROOT_URL: http://localhost:80
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      # === 관리자 계정 ===
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@localhost
      
      # === 시스템 변수 ===
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # === 최소 리소스 최적화 ===
      LOG_LEVEL: "error"                          # 로그 최소화
      NODE_ENV: "production"
      NODE_OPTIONS: "--max-old-space-size=768"    # 메모리 제한
      
      # === 실시간 통신 ===
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      METEOR_DISABLE_OPTIMISTIC_CACHING: "0"
      
      # === 오프라인 설정 ===
      ROCKETCHAT_REGISTRATION_ENABLED: "false"
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_APPS_ENGINE_ENABLED: "false"    # 앱 엔진 비활성화로 메모리 절약
      
      # === 마이크로서비스 비활성화 ===
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      # === UI 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_REGISTRATION_FORM: "Disabled"
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      
      # === 성능 최적화 (최소 리소스용) ===
      OVERWRITE_SETTING_MESSAGE_MAX_ALL_ALLOWED: "100"    # 메시지 로드 최소화
      OVERWRITE_SETTING_FILEUPLOAD_ENABLED: "true"
      OVERWRITE_SETTING_FILEUPLOAD_MAXFILESIZE: "2097152" # 2MB 제한
      
      # === 무거운 기능 모두 비활성화 ===
      OVERWRITE_SETTING_WEBRTC_ENABLED: "false"
      ROCKETCHAT_WEBRTC_ENABLED: "false"
      ROCKETCHAT_VOIP_ENABLED: "false"
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "false"
      OVERWRITE_SETTING_APPS_MARKETPLACE_ENABLED: "false"
      
      # === 이메일 비활성화 ===
      OVERWRITE_SETTING_ACCOUNTS_EMAIL_VERIFICATION: "false"
      OVERWRITE_SETTING_FROM_EMAIL: "noreply@localhost"
      
      # === 보안 설정 ===
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    ports:
      - "3000:80"
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: CasaOS Team
  category: Communication
  description:
    en_us: Minimal resource Rocket.Chat for low-memory systems. Optimized to start reliably on systems with limited RAM and CPU resources.
    ko_kr: 저메모리 시스템용 최소 리소스 Rocket.Chat입니다. 제한된 RAM과 CPU 리소스를 가진 시스템에서 안정적으로 시작되도록 최적화되었습니다.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Lightweight team communication for resource-constrained systems
    ko_kr: 리소스 제약 시스템용 경량 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **🚀 Minimal Resource Rocket.Chat**
        
        Optimized for systems with very limited resources.
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Access URLs:**
        - **Direct Access**: `http://your-server-ip:3000`
        - **NSL Router**: `https://rocketchat-yourdomain.nsl.sh`
        
        **🔧 Resource Optimizations:**
        - ✅ MongoDB: 512MB memory (vs 1GB)
        - ✅ Rocket.Chat: 1GB memory (vs 2-3GB)
        - ✅ Minimal logging and caching
        - ✅ Reduced message history
        - ✅ Small file upload limits
        - ✅ All heavy features disabled
        
        **⚡ What Works:**
        - Real-time messaging and file sharing
        - User management and channels
        - Basic team collaboration
        - Mobile and desktop app sync
        
        **🚫 Disabled for Performance:**
        - App marketplace (to save memory)
        - VoIP and video calling
        - Email notifications
        - Advanced integrations
        
        **System Requirements**: 1 CPU core, 2GB RAM minimum
        
        **Performance Note**: If still slow, use direct port access (3000) instead of NSL Router
      ko_kr: |
        **🚀 최소 리소스 Rocket.Chat**
        
        매우 제한된 리소스를 가진 시스템에 최적화되었습니다.
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **접속 URL:**
        - **직접 접속**: `http://서버IP:3000`
        - **NSL Router**: `https://rocketchat-yourdomain.nsl.sh`
        
        **🔧 리소스 최적화:**
        - ✅ MongoDB: 512MB 메모리 (기존 1GB 대비)
        - ✅ Rocket.Chat: 1GB 메모리 (기존 2-3GB 대비)
        - ✅ 로깅 및 캐싱 최소화
        - ✅ 메시지 히스토리 감소
        - ✅ 파일 업로드 크기 제한
        - ✅ 모든 무거운 기능 비활성화
        
        **⚡ 작동하는 기능:**
        - 실시간 메시징 및 파일 공유
        - 사용자 관리 및 채널
        - 기본 팀 협업
        - 모바일 및 데스크톱 앱 동기화
        
        **🚫 성능상 비활성화된 기능:**
        - 앱 마켓플레이스 (메모리 절약)
        - VoIP 및 화상 통화
        - 이메일 알림
        - 고급 통합 기능
        
        **시스템 요구사항**: 1 CPU 코어, 2GB RAM 최소
        
        **성능 참고**: 여전히 느리면 NSL Router 대신 직접 포트 접속(3000) 사용
  index: /
  webui_port: 80
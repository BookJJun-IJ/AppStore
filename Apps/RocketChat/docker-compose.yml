      ko_kr: |
        **Rocket.Chat 7.8.3 - 향상된 안정성 에디션**
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **주요 개선사항:**
        - ✅ 향상된 MongoDB replica set 초기화
        - ✅ CasaOS용 적절한 권한 처리
        - ✅ 안정적인 컨테이너 네트워킹
        - ✅ 앱 마켓플레이스 준비 완료
        - ✅ NSL 라우터 최적화 ($domain)
        
        **기능:**
        - 📱 실시간 메시징 및 파일 공유
        - 🎥 Jitsi 화상회의 통합
        - 🔗 앱 마켓플레이스 (GitHub, Jira, Google Drive)
        - 🔒 프라이버시 중심 (외부 원격측정 없음)
        - ⚡ MongoDB 7.0 성능 향상
        
        **설정 과정:**
        1. 적절한 권한으로 자동 설치 완료
        2. NSL 도메인으로 접속: https://$domain
        3. admin/$default_pwd로 로그인
        4. 설정 마법사 완료 및 이메일 인증
        5. 관리 패널에서 마켓플레이스 앱 설치
        
        **Jitsi 화상회의 설정:**
        1. **관리 → 앱 → 마켓플레이스**로 이동

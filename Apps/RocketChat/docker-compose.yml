name: rocketchat

services:
  mongodb:
    image: mongo:7.0
    # MongoDB는 내부적으로 mongodb 사용자(UID 999)로 실행됨
    # CasaOS의 user 지정을 제거하여 기본 동작 유지
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 30s
      start_period: 40s
      retries: 10
    
    # /data 디렉토리에 마운트하여 MongoDB가 내부적으로 /data/db 권한을 관리하도록 함
    volumes:
      - /DATA/AppData/$AppID/mongo-data:/data
    restart: unless-stopped

  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:7.8.3
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    environment:
      MONGO_URL: mongodb://mongodb:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongodb:27017/local?replicaSet=rs0
      MONGO_WATCHDB_ENABLED: "true"
      
      ROOT_URL: https://$domain
      PORT: 80
      BIND_IP: "0.0.0.0"
      
      ADMIN_USERNAME: admin
      ADMIN_PASS: $default_pwd
      ADMIN_EMAIL: admin@$domain
      
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOG_LEVEL: "info"
      
      MOLECULER_DISABLED: "true"
      DISABLE_MICROSERVICES: "true"
      MICRO_SERVICES_ENABLED: "false"
      
      ROCKETCHAT_STATISTICS_OPT_OUT: "true"
      ROCKETCHAT_UPDATE_CHECK_ENABLED: "false"
      ROCKETCHAT_FEDERATION_ENABLED: "false"
      
      ROCKETCHAT_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_APPS_ENGINE_ENABLED: "true"
      OVERWRITE_SETTING_MARKETPLACE_ENABLED: "true"
      
      ROCKETCHAT_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      OVERWRITE_SETTING_CLOUD_WORKSPACE_REGISTRATION_REQUIRED: "false"
      
      OVERWRITE_SETTING_WEBSOCKET_ENABLED: "true"
      OVERWRITE_SETTING_REALTIME_ENABLED: "true"
      DDP_DEFAULT_CONNECTION_REUSE_ENABLED: "true"
      
      METEOR_DISABLE_OPTIMISTIC_CACHING: "1"
      
      OVERWRITE_SETTING_LIVECHAT_ENABLED: "false"
      OVERWRITE_SETTING_OMNICHANNEL_ENABLED: "false"
      OVERWRITE_SETTING_WEBRTC_ENABLED: "true"
      
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_READ: "false"
      OVERWRITE_SETTING_ACCOUNTS_ALLOW_ANONYMOUS_WRITE: "false"
      OVERWRITE_SETTING_API_ENABLE_CORS: "false"
    
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/AppData/$AppID/data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

x-casaos:
  pre-install-cmd: mkdir -p /DATA/AppData/$AppID/mongo-data /DATA/AppData/$AppID/uploads /DATA/AppData/$AppID/data && chown -R $PUID:$PGID /DATA/AppData/$AppID/uploads /DATA/AppData/$AppID/data
  architectures:
    - amd64
    - arm64
  main: rocketchat
  author: Yundera Team
  category: Communication
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/RocketChat/thumbnail.png
  description:
    en_us: Rocket.Chat 7.8.3 with MongoDB 7.0 replica set and marketplace enabled for team collaboration. Fixed permission handling for CasaOS compatibility.
    ko_kr: MongoDB 7.0 replica set과 팀 협업용 마켓플레이스가 활성화된 Rocket.Chat 7.8.3. CasaOS 호환성을 위한 권한 처리 수정됨.
  developer: Rocket.Chat Technologies Corp.
  tagline:
    en_us: Team communication with MongoDB 7.0 and fixed permissions
    ko_kr: MongoDB 7.0과 수정된 권한을 갖춘 팀 커뮤니케이션
  title:
    en_us: Rocket.Chat
    ko_kr: Rocket.Chat
  tips:
    before_install:
      en_us: |
        **Rocket.Chat 7.8.3 - Permission Fixed Edition**
        
        **Default Account**
        | Username    | Password       |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **Permission Fixes:**
        - ✅ MongoDB runs with native UID 999 (no conflicts)
        - ✅ RocketChat data uses CasaOS user permissions
        - ✅ Stable volume mounting strategy
        - ✅ Enhanced replica set initialization
        
        **Features:**
        - 📱 Real-time messaging and file sharing
        - 🎥 Jitsi video conferencing integration  
        - 🔗 Apps marketplace (GitHub, Jira, Google Drive)
        - 🔒 Privacy-focused (no external telemetry)
        - ⚡ MongoDB 7.0 performance boost
        
        **Installation Notes:**
        - MongoDB uses /data mount (not /data/db) for proper permissions
        - Replica set initializes automatically with healthcheck
        - Wait 2-3 minutes for complete startup
        - Access via NSL Router domain
        
        **Jitsi Video Setup:**
        1. Administration → Apps → Marketplace
        2. Search and install "Jitsi Meet"
        3. Use `/jitsi MeetingName` in channels
        4. Share generated meeting link
        
        **Troubleshooting:**
        - Permission denied: Check /DATA/AppData/rocketchat ownership
        - Slow startup: MongoDB replica set needs time to initialize
        - Marketplace missing: Wait 5 minutes, restart if needed
      ko_kr: |
        **Rocket.Chat 7.8.3 - 권한 수정 에디션**
        
        **기본 계정**
        | 사용자명     | 비밀번호        |
        | ----------- | -------------- |
        | `admin`     | `$default_pwd` |
        
        **권한 수정사항:**
        - ✅ MongoDB는 기본 UID 999로 실행 (충돌 없음)
        - ✅ RocketChat 데이터는 CasaOS 사용자 권한 사용
        - ✅ 안정적인 볼륨 마운트 전략
        - ✅ 향상된 replica set 초기화
        
        **기능:**
        - 📱 실시간 메시징 및 파일 공유
        - 🎥 Jitsi 화상회의 통합
        - 🔗 앱 마켓플레이스 (GitHub, Jira, Google Drive)
        - 🔒 프라이버시 중심 (외부 원격측정 없음)
        - ⚡ MongoDB 7.0 성능 향상
        
        **설치 참고사항:**
        - MongoDB는 적절한 권한을 위해 /data 마운트 사용 (/data/db 아님)
        - Replica set은 healthcheck로 자동 초기화
        - 완전한 시작을 위해 2-3분 대기
        - NSL 라우터 도메인으로 접속
        
        **Jitsi 화상회의 설정:**
        1. 관리 → 앱 → 마켓플레이스
        2. "Jitsi Meet" 검색 및 설치
        3. 채널에서 `/jitsi 회의명` 사용
        4. 생성된 회의 링크 공유
        
        **문제 해결:**
        - 권한 거부: /DATA/AppData/rocketchat 소유권 확인
        - 느린 시작: MongoDB replica set 초기화 시간 필요
        - 마켓플레이스 없음: 5분 대기, 필요시 재시작
  index: /
  webui_port: 80
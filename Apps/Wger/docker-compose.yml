name: wger
services:
  wger:
    image: wger/server:2.4
    container_name: wger
    user: $PUID:$PGID
    expose:
      - 80
    environment:
      # System
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # Django settings
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: $default_pwd
      
      # Database - SQLite for simplicity
      DJANGO_DB_ENGINE: django.db.backends.sqlite3
      DJANGO_DB_DATABASE: /home/wger/db/database.sqlite
      
      # Media and static files
      DJANGO_MEDIA_ROOT: /home/wger/media
      DJANGO_STATIC_ROOT: /home/wger/static
      
      # Wger specific settings
      WGER_INSTANCE: $domain
      SITE_URL: https://$domain
      
      # Email settings (optional - can be configured later)
      DJANGO_EMAIL_HOST: ""
      DJANGO_EMAIL_PORT: 587
      DJANGO_EMAIL_HOST_USER: ""
      DJANGO_EMAIL_HOST_PASSWORD: ""
      DJANGO_EMAIL_USE_TLS: "True"
      FROM_EMAIL: "wger@$domain"
      
      # Allow all hosts for NSL router
      DJANGO_ALLOWED_HOSTS: "*"
      
      # CSRF settings for proxy
      CSRF_TRUSTED_ORIGINS: "https://$domain"
      
      # Disable signup by default for security
      WGER_SETTINGS__ALLOW_REGISTRATION: "False"
      
      # Enable exercise sync on startup
      SYNC_EXERCISES_ON_STARTUP: "True"
      DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP: "True"
      
      # Set server port
      GUNICORN_PORT: 80
      GUNICORN_WORKERS: 2
      
    volumes:
      # App data
      - /DATA/AppData/$AppID/db:/home/wger/db
      - /DATA/AppData/$AppID/static:/home/wger/static
      - /DATA/AppData/$AppID/media:/home/wger/media
      - /DATA/AppData/$AppID/config:/home/wger/config
      
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: wger
  author: CasaOS Team

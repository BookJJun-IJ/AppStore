name: wger

services:
  web:
    image: wger/server:2.2.0
    user: $PUID:$PGID
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PASSWORD: $default_pwd
      DOMAIN: $domain
    volumes:
      - /DATA/AppData/wger/static:/home/wger/static
      - /DATA/AppData/wger/media:/home/wger/media
    expose:
      - 8000
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: unless-stopped

  nginx:
    image: nginx:1.27.2
    depends_on:
      - web
    volumes:
      - /DATA/AppData/wger/nginx.conf:/etc/nginx/conf.d/default.conf
      - /DATA/AppData/wger/static:/wger/static:ro
      - /DATA/AppData/wger/media:/wger/media:ro
    expose:
      - 80
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  db:
    image: postgres:15.8-alpine
    environment:
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: wger
      POSTGRES_DB: wger
      TZ: $TZ
    volumes:
      - /DATA/AppData/wger/postgres:/var/lib/postgresql/data/
    expose:
      - 5432
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  cache:
    image: redis:7.4.0-alpine
    expose:
      - 6379
    volumes:
      - /DATA/AppData/wger/redis.conf:/usr/local/etc/redis/redis.conf
      - /DATA/AppData/wger/redis-data:/data
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  celery_worker:
    image: wger/server:2.2.0
    command: /start-worker
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PASSWORD: $default_pwd
      DOMAIN: $domain
    volumes:
      - /DATA/AppData/wger/media:/home/wger/media
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  celery_beat:
    image: wger/server:2.2.0
    command: /start-beat
    user: $PUID:$PGID
    volumes:
      - /DATA/AppData/wger/celery-beat:/home/wger/beat/
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    depends_on:
      - celery_worker
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

x-casaos:
  main: nginx
  webui_port: 80
  category: Health
  architectures:
    - amd64
    - arm64
  description:
    en_us: Wger is a self-hosted fitness and workout manager with exercise logs, meal planning, and more.
    ko_kr: Wger는 운동 기록, 식단 관리 등을 지원하는 셀프 호스팅 피트니스 매니저입니다.
  title:
    en_us: Wger
  tagline:
    en_us: Self-hosted fitness and workout manager
  tips:
    before_install:
      en_us: |
        Default account will be created on first run.
        Username: `admin`
        Password: `$default_pwd`

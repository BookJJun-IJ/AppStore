    zh_cn: wger 是一个免费、开源的基于网络的个人锻炼、健身和体重追踪器。它帮助您通过全面的运动、成分和膳食数据库管理您的锻炼、训练和营养。追踪您的体重，创建自定义锻炼计划，并监控您的健身进度。
    es_es: wger es un rastreador personal gratuito y de código abierto basado en web para entrenamientos, fitness y peso. Te ayuda a gestionar tus ejercicios, entrenamientos y nutrición con una base de datos completa de ejercicios, ingredientes y comidas.
    fr_fr: wger est un tracker personnel gratuit et open source basé sur le web pour l'entraînement, le fitness et le poids. Il vous aide à gérer vos exercices, vos entraînements et votre nutrition avec une base de données complète d'exercices, d'ingrédients et de repas.
    ko_kr: wger는 무료 오픈소스 웹 기반 개인 운동, 피트니스 및 체중 추적기입니다. 운동, 재료 및 식사의 포괄적인 데이터베이스로 운동, 훈련 및 영양을 관리하는 데 도움이 됩니다. 체중을 추적하고, 맞춤형 운동 루틴을 만들고, 시간이 지남에 따라 피트니스 진행 상황을 모니터링하세요.
  developer: wger Project

    es_es: Rastreador gratuito de fitness para entrenamientos y nutrición
    fr_fr: Tracker de fitness gratuit pour les entraînements et la nutrition
    ko_kr: 운동과 영양을 위한 무료 피트니스 트래커
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/wger/thumbnail.png

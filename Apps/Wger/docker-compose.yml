name: wger
services:
  web:
    image: wger/server:latest
    user: $PUID:$PGID
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      # Django settings
      DJANGO_DEBUG: "False"
      DJANGO_CACHE_TIMEOUT: 300
      DJANGO_PERFORM_MIGRATIONS: "True"
      DJANGO_COLLECTSTATIC: "True"
      # Database settings
      DJANGO_DB_ENGINE: postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      # Cache settings
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      # Celery settings
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      # Media and static files
      DJANGO_MEDIA_ROOT: /home/wger/media
      DJANGO_STATIC_ROOT: /home/wger/static
      # Security
      DJANGO_SECRET_KEY: $default_pwd
      SITE_URL: https://wger-$domain
      CORS_ORIGIN_ALLOW_ALL: "True"
      # Email settings (optional)
      DJANGO_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    volumes:
      - /DATA/AppData/wger/media:/home/wger/media
      - /DATA/AppData/wger/static:/home/wger/static
      - /DATA/AppData/wger/logs:/home/wger/logs
    expose:
      - 8000
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    user: $PUID:$PGID
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - /DATA/AppData/wger/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /DATA/AppData/wger/static:/wger/static:ro
      - /DATA/AppData/wger/media:/wger/media:ro
    expose:
      - 80
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      POSTGRES_DB: wger
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: $default_pwd
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /DATA/AppData/wger/pgdata:/var/lib/postgresql/data/pgdata
    expose:
      - 5432
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wger"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    user: $PUID:$PGID
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/wger/redis-data:/data
    expose:
      - 6379
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery_worker:
    image: wger/server:latest
    user: $PUID:$PGID
    command: /start-worker
    depends_on:
      web:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      # Database settings
      DJANGO_DB_ENGINE: postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      # Cache settings
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      # Celery settings
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      DJANGO_SECRET_KEY: $default_pwd
    volumes:
      - /DATA/AppData/wger/media:/home/wger/media
      - /DATA/AppData/wger/logs:/home/wger/logs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  celery_beat:
    image: wger/server:latest
    user: $PUID:$PGID
    command: /start-beat
    depends_on:
      celery_worker:
        condition: service_healthy
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      # Database settings
      DJANGO_DB_ENGINE: postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      # Cache settings
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      # Celery settings
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      DJANGO_SECRET_KEY: $default_pwd
    volumes:
      - /DATA/AppData/wger/celery-beat:/home/wger/beat
      - /DATA/AppData/wger/logs:/home/wger/logs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    restart: unless-stopped

networks:
  default:
    name: wger_network

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nginx
  author: CasaOS Team
  category: Health
  description:
    en_us: wger is a free, open-source web-based fitness and workout manager. It helps you track your workouts, manage exercise routines, monitor body weight, log nutrition with a comprehensive food database, and maintain a gallery of progress photos. Features include customizable workout plans, exercise database, weight tracking, nutrition management, REST API, and multi-user support for gym management.
    fr_fr: wger est un gestionnaire de fitness et d'entraînement web gratuit et open-source. Il vous aide à suivre vos entraînements, gérer les routines d'exercice, surveiller le poids corporel, enregistrer la nutrition avec une base de données alimentaire complète, et maintenir une galerie de photos de progression.
    es_es: wger es un administrador de fitness y entrenamiento basado en web gratuito y de código abierto. Te ayuda a rastrear tus entrenamientos, gestionar rutinas de ejercicio, monitorear el peso corporal, registrar nutrición con una base de datos de alimentos completa, y mantener una galería de fotos de progreso.
    ko_kr: wger는 무료 오픈소스 웹 기반 피트니스 및 운동 관리자입니다. 운동 추적, 운동 루틴 관리, 체중 모니터링, 포괄적인 음식 데이터베이스를 통한 영양 기록, 진행 상황 사진 갤러리 유지 관리를 도와줍니다.
    zh_cn: wger是一个免费的开源基于网络的健身和锻炼管理器。它帮助您跟踪锻炼、管理运动例程、监控体重、通过综合食品数据库记录营养，并维护进度照片库。
  developer: wger Project
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/wger/icon.png
  tagline:
    en_us: Free, open-source fitness and workout tracker with nutrition management
    fr_fr: Suivi de fitness et d'entraînement gratuit et open-source avec gestion nutritionnelle
    es_es: Rastreador de fitness y entrenamiento gratuito y de código abierto con gestión nutricional
    ko_kr: 영양 관리가 포함된 무료 오픈소스 피트니스 및 운동 추적기
    zh_cn: 免费开源的健身和锻炼追踪器，包含营养管理
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/wger/thumbnail.png
  title:
    en_us: wger
  tips:
    before_install:
      en_us: |
        **Default Setup Information**
        
        After installation, you'll need to create an admin account by running:
        ```
        docker exec -it wger-web-1 python3 manage.py createsuperuser
        ```
        
        **Optional: Download Exercise Database**
        To download the complete exercise database and images:
        ```
        docker exec -it wger-web-1 python3 manage.py sync-exercises
        docker exec -it wger-web-1 python3 manage.py download-exercise-images
        ```
        
        **Data Storage:**
        - App data: `/DATA/AppData/wger/`
        - Media files: `/DATA/AppData/wger/media/`
        - Database: `/DATA/AppData/wger/pgdata/`
        
        **Features:**
        - Create custom workout routines
        - Track weight and body measurements  
        - Log nutrition and calories
        - Exercise database with images
        - REST API for mobile apps
        - Multi-user support
        
        Access via: `https://wger-{username}.{domain}/`
  index: /
  webui_port: 80
  pre-install-cmd: |
    mkdir -p /DATA/AppData/wger/{media,static,pgdata,redis-data,celery-beat,logs} &&
    chown -R $PUID:$PGID /DATA/AppData/wger &&
    cat > /DATA/AppData/wger/nginx.conf << 'EOF'
    upstream wger {
        server web:8000;
    }
    
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 50M;
        
        location /static/ {
            alias /wger/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        location /media/ {
            alias /wger/media/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        location / {
            proxy_pass http://wger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
        }
    }
    EOF
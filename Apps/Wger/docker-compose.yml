name: wger

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wger
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: $default_pwd
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wger -d wger"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cache:
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: wger/server:latest
    expose:
      - 8000
    environment:
      SECRET_KEY: $default_pwd
      SIGNING_KEY: $default_pwd
      TIME_ZONE: $TZ
      
      # Django settings
      DJANGO_DEBUG: "False"
      DJANGO_SETTINGS_MODULE: settings
      DJANGO_WSGI_APPLICATION: wger.wsgi.application
      DJANGO_ALLOWED_HOSTS: "*"
      
      # Site settings
      SITE_URL: https://$domain
      CSRF_TRUSTED_ORIGINS: https://$domain
      
      # Database
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      DJANGO_PERFORM_MIGRATIONS: "True"
      
      # Cache
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      
      # Celery
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      
      # Registration and users
      ALLOW_REGISTRATION: "True"
      ALLOW_GUEST_USERS: "True"
      ALLOW_UPLOAD_VIDEOS: "True"
      MIN_ACCOUNT_AGE_TO_TRUST: 21
      
      # Exercises and ingredients
      SYNC_EXERCISES_ON_STARTUP: "False"
      DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP: "False"
      SYNC_EXERCISES_CELERY: "False"
      SYNC_EXERCISE_IMAGES_CELERY: "False"
      DOWNLOAD_INGREDIENTS_FROM: "OFF"
      SYNC_INGREDIENTS_CELERY: "False"
      
      # Security
      AXES_ENABLED: "True"
      AXES_FAILURE_LIMIT: 10
      AXES_COOLOFF_TIME: 30
      AXES_HANDLER: axes.handlers.cache.AxesCacheHandler
      
      # Email
      ENABLE_EMAIL: "False"
      FROM_EMAIL: "wger Workout Manager <wger@$domain>"
      
      # Static files
      DJANGO_CLEAR_STATIC_FIRST: "True"
      DJANGO_STATIC_ROOT: /home/wger/static
      DJANGO_STATIC_URL: /static/
      
      # Performance
      EXERCISE_CACHE_TTL: 3600
    volumes:
      - static:/home/wger/static
      - media:/home/wger/media
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/en/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  celery_worker:
    image: wger/server:latest
    command: /start-worker
    environment:
      SECRET_KEY: $default_pwd
      SIGNING_KEY: $default_pwd
      TIME_ZONE: $TZ
      
      # Database
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      
      # Cache
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      
      # Celery
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      
      # Performance
      EXERCISE_CACHE_TTL: 3600
    volumes:
      - media:/home/wger/media
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  celery_beat:
    image: wger/server:latest
    command: /start-beat
    environment:
      SECRET_KEY: $default_pwd
      SIGNING_KEY: $default_pwd
      TIME_ZONE: $TZ
      
      # Database
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      
      # Cache
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      
      # Celery
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      
      # Performance
      EXERCISE_CACHE_TTL: 3600
    volumes:
      - celery-beat:/home/wger/beat/
    depends_on:
      celery_worker:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

volumes:
  postgres-data:
  redis-data:
  static:
  media:
  celery-beat:

x-casaos:
  architectures:
    - amd64
    - arm64
  main: web
  author: CasaOS Team
  category: Productivity
  description:
    en_us: |
      wger is a free, open-source web application that helps you manage your personal workouts, weight and diet plans. It can also be used as a simple gym management utility.
      
      **Features:**
      • Custom workout routines with automatic weight progression
      • Comprehensive tracking of diet plans, body weight, and measurements  
      • Nutrition management with calorie logging
      • Progress gallery to track fitness photos
      • Exercise wiki with built-in exercises
      • Multi-user support with basic gym management
      • REST API for third-party integrations
      • Multilingual support
      
      **Default Login:**
      After installation, register a new account directly in the web interface. The first registered user will have admin privileges.
    fr_fr: |
      wger est une application web gratuite et open-source qui vous aide à gérer vos entraînements personnels, votre poids et vos plans alimentaires. Elle peut également être utilisée comme utilitaire simple de gestion de salle de sport.
      
      **Fonctionnalités:**
      • Routines d'entraînement personnalisées avec progression automatique
      • Suivi complet des plans alimentaires, poids corporel et mesures
      • Gestion nutritionnelle avec journalisation des calories
      • Galerie de progression pour suivre les photos de fitness
      • Wiki d'exercices avec exercices intégrés
      • Support multi-utilisateurs avec gestion de salle de sport
      • API REST pour intégrations tierces
      • Support multilingue
      
      **Connexion par défaut:**
      Après installation, créez un nouveau compte directement dans l'interface web. Le premier utilisateur enregistré aura les privilèges d'administrateur.
    ko_kr: |
      wger는 개인 운동, 체중 및 식단 계획을 관리하는 데 도움이 되는 무료 오픈소스 웹 애플리케이션입니다. 간단한 체육관 관리 유틸리티로도 사용할 수 있습니다.
      
      **기능:**
      • 자동 무게 증가 기능이 있는 맞춤형 운동 루틴
      • 식단 계획, 체중, 측정값의 포괄적인 추적
      • 칼로리 로깅이 있는 영양 관리
      • 피트니스 사진을 추적하는 진행 갤러리
      • 내장 운동이 있는 운동 위키
      • 기본 체육관 관리 기능이 있는 다중 사용자 지원
      • 타사 통합을 위한 REST API
      • 다국어 지원
      
      **기본 로그인:**
      설치 후 웹 인터페이스에서 직접 새 계정을 등록하세요. 첫 번째 등록된 사용자가 관리자 권한을 갖습니다.
    zh_cn: |
      wger是一个免费的开源Web应用程序，可帮助您管理个人锻炼、体重和饮食计划。它还可以用作简单的健身房管理工具。
      
      **功能:**
      • 具有自动重量递增的自定义锻炼例程
      • 饮食计划、体重和测量的综合跟踪
      • 具有卡路里记录的营养管理
      • 用于跟踪健身照片的进度图库
      • 具有内置练习的练习百科
      • 具有基本健身房管理功能的多用户支持
      • 用于第三方集成的REST API
      • 多语言支持
      
      **默认登录:**
      安装后，直接在Web界面中注册新账户。第一个注册的用户将拥有管理员权限。
    es_es: |
      wger es una aplicación web gratuita y de código abierto que te ayuda a gestionar tus entrenamientos personales, peso y planes de dieta. También puede utilizarse como una utilidad simple de gestión de gimnasio.
      
      **Características:**
      • Rutinas de entrenamiento personalizadas con progresión automática de peso
      • Seguimiento integral de planes de dieta, peso corporal y medidas
      • Gestión nutricional con registro de calorías
      • Galería de progreso para rastrear fotos de fitness
      • Wiki de ejercicios con ejercicios incorporados
      • Soporte multiusuario con gestión básica de gimnasio
      • API REST para integraciones de terceros
      • Soporte multiidioma
      
      **Inicio de sesión predeterminado:**
      Después de la instalación, registre una nueva cuenta directamente en la interfaz web. El primer usuario registrado tendrá privilegios de administrador.
  developer: wger Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/wger/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/wger/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/wger/thumbnail.png
  tagline:
    en_us: Free workout and fitness manager with nutrition tracking
    fr_fr: Gestionnaire gratuit d'entraînement et de fitness avec suivi nutritionnel
    ko_kr: 영양 추적 기능을 갖춘 무료 운동 및 피트니스 매니저
    zh_cn: 免费的锻炼和健身管理器，具有营养跟踪功能
    es_es: Gestor gratuito de ejercicios y fitness con seguimiento nutricional
  title:
    en_us: wger Workout Manager
  tips:
    before_install:
      en_us: |
        **Initial Setup Information:**
        
        After installation, follow these steps:
        1. Access the web interface through the provided URL
        2. Register a new account (the first user will have admin privileges)
        3. Configure your profile and preferences
        4. Start creating your workout routines
        
        **Data Storage:**
        - All data is stored using Docker volumes for optimal performance
        - Database: PostgreSQL with persistent storage
        - Media files: Stored separately for easy backup
        - Static files: Auto-generated on startup
        
        **Features:**
        - Background synchronization with wger.de for exercises and ingredients
        - Celery task queue for background processing
        - Redis caching for improved performance
        - Multi-language support
        
        **Note:** The app may take 2-3 minutes to start completely as it initializes the database and collects static files.
  index: /
  webui_port: 8000
name: wger

services:
  db:
    image: postgres:15.4
    environment:
      POSTGRES_DB: wger
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: $default_pwd
    volumes:
      - /DATA/AppData/$AppID/postgresql:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wger"]
      interval: 30s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7.4.5
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: wger/server:latest
    user: $PUID:$PGID
    expose:
      - 8000
    environment:
      # Core secrets
      SECRET_KEY: $default_pwd
      SIGNING_KEY: $default_pwd
      
      # Database configuration
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      DJANGO_PERFORM_MIGRATIONS: "True"
      
      # Cache configuration
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      
      # Celery configuration
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      
      # Django configuration
      DJANGO_DEBUG: "False"
      WGER_USE_GUNICORN: "True"
      
      # URL and CSRF settings
      SITE_URL: https://$domain
      DJANGO_ALLOWED_HOSTS: $domain,localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://$domain
      
      # Application settings
      ALLOW_REGISTRATION: "True"
      ALLOW_GUEST_USERS: "True"
      ALLOW_UPLOAD_VIDEOS: "True"
      MIN_ACCOUNT_AGE_TO_TRUST: 21
      SYNC_EXERCISES_ON_STARTUP: "False"
      DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP: "False"
      
      # Security settings
      AXES_ENABLED: "True"
      AXES_FAILURE_LIMIT: 10
      AXES_COOLOFF_TIME: 30
      AXES_HANDLER: axes.handlers.cache.AxesCacheHandler
      
      # Email settings
      ENABLE_EMAIL: "False"
      FROM_EMAIL: "wger Workout Manager <wger@localhost>"
      
      # System variables
      TIME_ZONE: Europe/Berlin
      TZ: Europe/Berlin
      EXERCISE_CACHE_TTL: 3600
      PUID: $PUID
      PGID: $PGID
      
    volumes:
      - /DATA/AppData/$AppID/media:/home/wger/media
      - /DATA/AppData/$AppID/static:/home/wger/static
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  celery_worker:
    image: wger/server:latest
    user: $PUID:$PGID
    command: /start-worker
    environment:
      # Database configuration
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      
      # Cache configuration
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      
      # Celery configuration
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      
      # System configuration
      SECRET_KEY: $default_pwd
      DJANGO_DEBUG: "False"
      TIME_ZONE: Europe/Berlin
      TZ: Europe/Berlin
      EXERCISE_CACHE_TTL: 3600
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/media:/home/wger/media
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  celery_beat:
    image: wger/server:latest
    user: $PUID:$PGID
    command: /start-beat
    environment:
      # Database configuration
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      
      # Cache configuration
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      
      # Celery configuration
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      
      # System configuration
      SECRET_KEY: $default_pwd
      DJANGO_DEBUG: "False"
      TIME_ZONE: Europe/Berlin
      TZ: Europe/Berlin
      EXERCISE_CACHE_TTL: 3600
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/celery-beat:/home/wger/beat
    depends_on:
      celery_worker:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: web
  webui_port: 8000
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Free, open-source workout manager with nutrition tracking
    fr_fr: Gestionnaire gratuit d'entraînement et de fitness avec suivi nutritionnel
    ko_kr: 영양 추적 기능을 갖춘 무료 운동 및 피트니스 매니저
    zh_cn: 免费的锻炼和健身管理器，具有营养跟踪功能
    es_es: Gestor gratuito de ejercicios y fitness con seguimiento nutricional
  developer: wger Team
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@Create/Apps/wger/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@Create/Apps/wger/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@Create/Apps/wger/thumbnail.png
  tagline:
    en_us: Free workout and fitness manager with nutrition tracking
  title:
    en_us: wger Workout Manager
  tips:
    before_install:
      en_us: |
        Default Account
        | Username   | Password       |
        | --------   | ------------   |
        | `admin`    | `adminadmin`   |
        
        **Note**: The app may take 2-3 minutes to fully initialize on first startup.
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/wger/:/data ubuntu:22.04 sh -c "
      mkdir -p /data/media /data/static /data/postgresql /data/redis /data/celery-beat &&
      chown -R 1000:1000 /data/media /data/static /data/celery-beat &&
      chmod -R 755 /data
    "
  index: /
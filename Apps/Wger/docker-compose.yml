      en_us: |
        ## Default Admin Account
        
        After installation, access wger and create your first user account through the web interface.
        
        The app will automatically sync exercise data on first startup, which may take a few minutes.
        
        **Note**: User registration is disabled by default for security. You can enable it in the environment variables after installation if needed.
        

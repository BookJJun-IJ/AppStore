  index: /
  port_map: "80"
  scheme: http
  store_app_id: wger
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/db && \
    mkdir -p /DATA/AppData/$AppID/static && \
    mkdir -p /DATA/AppData/$AppID/media && \
    mkdir -p /DATA/AppData/$AppID/config && \
    chown -R $PUID:$PGID /DATA/AppData/$AppID
name: wger

services:
  db:
    image: postgres:15.4
    environment:
      POSTGRES_DB: wger
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: $default_pwd
    volumes:
      - /DATA/AppData/$AppID/postgresql:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wger"]
      interval: 30s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7.4.5
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: wger/server:2.4-dev   # latest 대신 특정 버전
    user: $PUID:$PGID
    expose:
      - 8000                    # Gunicorn이 8000에서 뜨더라도, 컨테이너 내부 80으로 매핑 필요
    environment:
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      DJANGO_PERFORM_MIGRATIONS: "True"
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: $default_pwd
      DJANGO_CLEAR_STATIC_FIRST: "False"
      WGER_USE_GUNICORN: "True"
      SITE_URL: $domain
      DJANGO_ALLOWED_HOSTS: $domain,localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://$domain
      ALLOW_REGISTRATION: "True"
      ALLOW_GUEST_USERS: "True"
      ALLOW_UPLOAD_VIDEOS: "True"
      MIN_ACCOUNT_AGE_TO_TRUST: 21
      SYNC_EXERCISES_ON_STARTUP: "False"
      DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP: "False"
      DOWNLOAD_INGREDIENTS_FROM: "WGER"
      EXERCISE_CACHE_TTL: 3600
      AXES_ENABLED: "True"
      AXES_FAILURE_LIMIT: 10
      AXES_COOLOFF_TIME: 30
      AXES_HANDLER: axes.handlers.cache.AxesCacheHandler
      ENABLE_EMAIL: "False"
      FROM_EMAIL: "wger Workout Manager <wger@localhost>"
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/media:/home/wger/media
      - /DATA/AppData/$AppID/static:/home/wger/static
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  celery_worker:
    image: wger/server:2.4-dev
    user: $PUID:$PGID
    command: /start-worker
    environment:
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: $default_pwd
      EXERCISE_CACHE_TTL: 3600
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/media:/home/wger/media
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  celery_beat:
    image: wger/server:2.4-dev
    user: $PUID:$PGID
    command: /start-beat
    environment:
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: $default_pwd
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://cache:6379/1
      DJANGO_CACHE_TIMEOUT: 1296000
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      WGER_USE_CELERY: "True"
      USE_CELERY: "True"
      CELERY_BROKER: redis://cache:6379/2
      CELERY_BACKEND: redis://cache:6379/2
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: $default_pwd
      EXERCISE_CACHE_TTL: 3600
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/celery-beat:/home/wger/beat
    depends_on:
      celery_worker:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'


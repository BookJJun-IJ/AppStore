name: wger

services:
  db:
    image: postgres:15.3
    container_name: wger-db
    user: $PUID:$PGID
    environment:
      POSTGRES_DB: wger
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: $default_pwd
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/wger/db:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  wger:
    image: wger/wger:2.2.0
    container_name: wger-app
    user: $PUID:$PGID
    depends_on:
      - db
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - DATABASE_URL=postgres://wger:$default_pwd@db:5432/wger
    expose:
      - 8000
    volumes:
      - /DATA/AppData/wger/config:/home/wger/config
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

x-casaos:
  main: wger
  webui_port: 8000
  category: Productivity
  architectures:
    - amd64
    - arm64
  description:
    en_us: "Wger is a self-hosted workout, fitness and nutrition manager with a web-based interface."
    ko_kr: "Wger는 운동, 피트니스 및 영양 관리를 위한 웹 기반 자체 호스팅 도구입니다."
  tagline:
    en_us: "Manage your workouts, nutrition and progress in one place."
    ko_kr: "운동, 식단, 진행 상황을 한 곳에서 관리하세요."
  title:
    en_us: Wger
  tips:
    before_install:
      en_us: |
        Default Account
        | Username | Password       |
        | -------- | -------------- |
        | `admin`  | `$default_pwd` |
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Wger/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Wger/thumbnail.png

    en_us: wger Workout Manager
  tips:
    before_install:
      en_us: |
        **Initial Setup Information:**
        
        After installation, you can register a new account or use the default admin credentials:
        - **Username**: `admin`
        - **Password**: Check your CasaOS dashboard for the generated password
        
        **First Launch:**
        1. Access the web interface
        2. Register a new account or log in as admin
        3. Configure your profile and preferences
        4. Start creating your workout routines
        
        **Data Storage:**
        - All data is stored in `/DATA/AppData/wger/`
        - Media files (exercise images, progress photos) are in `/media/`
        - Database is PostgreSQL with persistent storage

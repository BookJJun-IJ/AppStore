name: boardgames-platform
services:
  # Nginx 리버스 프록시 - 메인 포털
  portal:
    image: nginx:1.25.3-alpine
    container_name: boardgames-portal
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - /DATA/AppData/boardgames-platform/nginx/html:/usr/share/nginx/html:ro
      - /DATA/AppData/boardgames-platform/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - colonizers
      - freeboardgames
    restart: unless-stopped

  # Colonizers - 오픈소스 Catan
  colonizers:
    build:
      context: .
      dockerfile_inline: |
        FROM node:16-alpine
        RUN apk add --no-cache git
        WORKDIR /app
        # Colonizers 소스 클론
        RUN git clone https://github.com/colonizers/colonizers-core.git core && \
            git clone https://github.com/colonizers/colonizers-server.git server && \
            git clone https://github.com/colonizers/colonizers-client.git client
        # 간단한 서버 설정
        WORKDIR /app/server
        RUN npm install express socket.io
        # 기본 서버 파일 생성
        RUN echo "const express = require('express');\n\
        const app = express();\n\
        const http = require('http').createServer(app);\n\
        const io = require('socket.io')(http);\n\
        app.use(express.static('/app/client'));\n\
        app.get('/', (req, res) => {\n\
          res.send('<h1>Colonizers Server</h1><p>Catan clone server running</p>');\n\
        });\n\
        http.listen(3000, () => console.log('Colonizers running on :3000'));" > index.js
        EXPOSE 3000
        CMD ["node", "index.js"]
    container_name: colonizers
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 3000
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - NODE_ENV=production
    volumes:
      - /DATA/AppData/boardgames-platform/colonizers:/app/data
    restart: unless-stopped

  # FreeBoardGames - 50+ 오픈소스 게임
  freeboardgames:
    build:
      context: .
      dockerfile_inline: |
        FROM node:16-alpine
        RUN apk add --no-cache git
        WORKDIR /app
        # FreeBoardGames.org 소스 클론
        RUN git clone https://github.com/freeboardgames/FreeBoardGames.org.git . || true
        # 의존성 설치
        RUN npm install || yarn install || true
        # 빌드
        RUN npm run build || yarn build || true
        # 기본 서버 실행
        EXPOSE 3001
        CMD ["npm", "start"]
    container_name: freeboardgames
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    expose:
      - 3001
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - /DATA/AppData/boardgames-platform/freeboardgames:/app/data
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: portal
  author: Yundera Community
  category: Games
  description:
    en_us: Self-hosted board game platform with Colonizers (open-source Catan) and FreeBoardGames.org (50+ games). Choose between platforms from a unified portal. All games run on your own server.
    fr_fr: Plateforme de jeux de société auto-hébergée avec Colonizers (Catan open source) et FreeBoardGames.org (50+ jeux).
    ko_kr: Colonizers(오픈소스 카탄)와 FreeBoardGames.org(50개 이상 게임)이 포함된 셀프호스팅 보드게임 플랫폼입니다.
    zh_cn: 自托管桌游平台，包含Colonizers（开源卡坦岛）和FreeBoardGames.org（50多个游戏）。
    es_es: Plataforma de juegos de mesa autohospedada con Colonizers (Catan de código abierto) y FreeBoardGames.org (50+ juegos).
  developer: Open Source Community
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/BoardgamesPlatform/icon.png
  tagline:
    en_us: Self-hosted Catan + 50 board games
    fr_fr: Catan auto-hébergé + 50 jeux de société
    ko_kr: 셀프호스팅 카탄 + 50개 보드게임
    zh_cn: 自托管卡坦岛 + 50个桌游
    es_es: Catan autohospedado + 50 juegos de mesa
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/BoardgamesPlatform/thumbnail.png
  title:
    en_us: Board Games Platform
  tips:
    before_install:
      en_us: |
        See README.md for detailed setup instructions and game list.
        
        **Quick Start:**
        - Main portal: Port 80
        - Choose between Colonizers (Catan) or FreeBoardGames
        - First startup may take 5-10 minutes for building
  index: /
  webui_port: 80
  pre-install-cmd: |
    mkdir -p /DATA/AppData/boardgames-platform/nginx/html && \
    mkdir -p /DATA/AppData/boardgames-platform/colonizers && \
    mkdir -p /DATA/AppData/boardgames-platform/freeboardgames && \
    cat > /DATA/AppData/boardgames-platform/README.md << 'EOF'
    # Board Games Platform
    
    ## Overview
    Self-hosted board game platform with two main components:
    - **Colonizers**: Open-source Catan implementation
    - **FreeBoardGames**: 50+ open-source board games
    
    ## Access
    Main portal: http://your-server/
    
    ## Games Included
    
    ### Colonizers (Catan)
    - Classic Settlers of Catan gameplay
    - 3-4 players
    - Resource trading
    - Development cards
    - Longest road & largest army
    
    ### FreeBoardGames Collection
    - Chess
    - Checkers  
    - Go
    - Backgammon
    - Secret Codes
    - Coup
    - Four in a Row
    - And 40+ more games
    
    ## How to Play
    1. Access the main portal
    2. Choose your game platform
    3. Create a room or join existing game
    4. Share room code with friends
    
    ## Troubleshooting
    - First startup takes 5-10 minutes for building
    - If games don't load, check container logs
    - Ensure ports 80, 3000, 3001 are not in use
    
    ## Support
    GitHub: https://github.com/colonizers/colonizers
    GitHub: https://github.com/freeboardgames/FreeBoardGames.org
    EOF
    cat > /DATA/AppData/boardgames-platform/nginx/html/index.html << 'EOF'
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Board Games Platform</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .container {
                max-width: 900px;
                width: 100%;
            }
            .header {
                text-align: center;
                color: white;
                margin-bottom: 40px;
            }
            h1 {
                font-size: 3em;
                margin-bottom: 10px;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            }
            .games {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 30px;
            }
            .card {
                background: white;
                border-radius: 20px;
                padding: 30px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                transition: transform 0.3s;
            }
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            }
            .card h2 {
                color: #667eea;
                margin-bottom: 15px;
            }
            .card p {
                color: #666;
                margin-bottom: 20px;
                line-height: 1.6;
            }
            .btn {
                display: inline-block;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 12px 30px;
                border-radius: 25px;
                text-decoration: none;
                font-weight: bold;
                transition: transform 0.2s;
            }
            .btn:hover {
                transform: scale(1.05);
            }
            .badge {
                display: inline-block;
                background: #f0f0f0;
                padding: 4px 12px;
                border-radius: 15px;
                font-size: 0.9em;
                margin-right: 8px;
                margin-bottom: 10px;
            }
            .hot { background: #ff5722; color: white; }
            .new { background: #4caf50; color: white; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🎲 Board Games Platform</h1>
                <p>Choose your game</p>
            </div>
            
            <div class="games">
                <div class="card">
                    <h2>Colonizers</h2>
                    <span class="badge hot">CATAN</span>
                    <span class="badge">Multiplayer</span>
                    <p>Open-source Settlers of Catan. Build settlements, trade resources, and compete for victory!</p>
                    <p><strong>Features:</strong> 3-4 players, resource trading, development cards</p>
                    <a href="/colonizers/" class="btn">Play Catan →</a>
                </div>
                
                <div class="card">
                    <h2>FreeBoardGames</h2>
                    <span class="badge new">50+ GAMES</span>
                    <span class="badge">FREE</span>
                    <p>Massive collection of classic and modern board games all in one place.</p>
                    <p><strong>Includes:</strong> Chess, Checkers, Go, Secret Codes, Coup, and many more!</p>
                    <a href="/fbg/" class="btn">Browse Games →</a>
                </div>
            </div>
        </div>
    </body>
    </html>
    EOF
    cat > /DATA/AppData/boardgames-platform/nginx/nginx.conf << 'EOF'
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections 1024;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        sendfile on;
        keepalive_timeout 65;
        
        server {
            listen 80;
            server_name _;
            
            location / {
                root /usr/share/nginx/html;
                index index.html;
                try_files $uri $uri/ /index.html;
            }
            
            location /colonizers/ {
                proxy_pass http://colonizers:3000/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
            
            location /fbg/ {
                proxy_pass http://freeboardgames:3001/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }
    }
    EOF
    chown -R $PUID:$PGID /DATA/AppData/boardgames-platform
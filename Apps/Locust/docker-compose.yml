name: locust-simple-tester

services:
  locust-master:
    image: locustio/locust:2.32.3
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOCUST_USERNAME: admin
      LOCUST_PASSWORD: $default_pwd
    volumes:
      - /DATA/AppData/$AppID/scripts:/mnt/locust
      - /DATA/AppData/$AppID/results:/results
    expose:
      - 8089
    command: 
      - "locust"
      - "-f"
      - "/mnt/locust/locustfile.py"
      - "--master"
      - "--host=http://example.com"
      - "--web-host=0.0.0.0"
      - "--web-port=8089"
      - "--web-auth=admin:admin"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  locust-worker:
    image: locustio/locust:2.32.3
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/scripts:/mnt/locust
    command:
      - "locust"
      - "-f"
      - "/mnt/locust/locustfile.py"
      - "--worker"
      - "--master-host=locust-master"
    depends_on:
      - locust-master
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: locust-master
  author: Yundera Community
  category: Utilities
  description:
    en_us: |
      Simple and easy-to-use stress testing tool with web UI and Basic Authentication. 
      Test your website's performance without coding! Just open the web interface, 
      enter your website URL, set user count, and click START. Real-time charts show 
      response times, requests per second, and error rates.
      
      **Security**: Protected with Locust's built-in Basic Authentication.
      
      Perfect for beginners - no terminal commands needed!
    ko_kr: |
      웹 UI와 기본 인증을 제공하는 간단하고 사용하기 쉬운 스트레스 테스트 도구입니다. 
      코딩 없이 웹사이트 성능을 테스트하세요! 웹 인터페이스를 열고, 웹사이트 
      URL을 입력하고, 사용자 수를 설정한 후 시작 버튼만 클릭하면 됩니다. 
      실시간 차트로 응답 시간, 초당 요청 수, 오류율을 확인할 수 있습니다.
      
      **보안**: Locust의 내장 기본 인증으로 보호됩니다.
      
      초보자에게 완벽 - 터미널 명령어 불필요!
    fr_fr: |
      Outil de test de stress simple et facile à utiliser avec interface web et 
      authentification de base. Testez les performances de votre site web sans codage! 
      Protégé par l'authentification de base intégrée de Locust.
    es_es: |
      Herramienta de prueba de estrés simple y fácil de usar con interfaz web y 
      autenticación básica. ¡Prueba el rendimiento de tu sitio web sin codificación! 
      Protegido con autenticación básica integrada de Locust.
    zh_cn: |
      简单易用的压力测试工具，带有Web UI和基本身份验证。无需编码即可测试您的网站性能！
      使用Locust内置的基本身份验证保护。
  developer: Locust.io
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/LocustSimpleTester/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/LocustSimpleTester/screenshot-1.png
  tagline:
    en_us: "Simple stress testing with web UI and Basic Auth - no coding required!"
    ko_kr: "웹 UI와 기본 인증으로 간단한 스트레스 테스트 - 코딩 불필요!"
    fr_fr: "Tests de stress simples avec interface web et authentification - aucun codage requis!"
    es_es: "Pruebas de estrés simples con interfaz web y autenticación - ¡no se requiere codificación!"
    zh_cn: "带Web UI和基本认证的简单压力测试 - 无需编码！"
  title:
    en_us: Locust Simple Tester
    ko_kr: Locust 간단 테스터
    fr_fr: Testeur Simple Locust
    es_es: Probador Simple Locust
    zh_cn: Locust 简单测试器
  tips:
    before_install:
      en_us: |
        **Locust Simple Stress Tester**
        
        **Default Account:**
        | Username | Password |
        |----------|----------|
        | `admin`  | `admin` |
        
        **How to Use:**
        1. Access: https://locust-simple-tester-username.nsl.sh/
        2. Login with admin / admin
        3. Enter your website URL in the "Host" field
        4. Set number of users (start with 10)
        5. Set spawn rate (start with 1)
        6. Click "Start swarming" button
        
        **Real-time Dashboard:**
        - Response times chart
        - Requests per second
        - Number of failures
        - Current user count
        
        **Sample websites to test:**
        - https://httpbin.org (safe for testing)
        - https://test.k6.io (demo site)
        - Your own website
        
        **Security**: Protected with Locust's built-in Basic Authentication.
        
        No coding knowledge required!
      ko_kr: |
        **Locust 간단 스트레스 테스터**
        
        **기본 계정:**
        | 사용자명 | 비밀번호 |
        |---------|---------|
        | `admin` | `admin` |
        
        **사용 방법:**
        1. 접속: https://locust-simple-tester-username.nsl.sh/
        2. admin / admin으로 로그인
        3. "Host" 필드에 테스트할 웹사이트 URL 입력
        4. 사용자 수 설정 (10명부터 시작)
        5. 증가율 설정 (1로 시작)
        6. "Start swarming" 버튼 클릭
        
        **실시간 대시보드:**
        - 응답 시간 차트
        - 초당 요청 수
        - 실패 횟수
        - 현재 사용자 수
        
        **테스트용 샘플 사이트:**
        - https://httpbin.org (테스트 안전)
        - https://test.k6.io (데모 사이트)
        - 본인 웹사이트
        
        **보안**: Locust의 내장 기본 인증으로 보호됩니다.
        
        코딩 지식 불필요!
  index: /
  webui_port: 8089
  pre-install-cmd: |
    mkdir -p /DATA/AppData/locust-simple-tester/scripts &&
    cat > /DATA/AppData/locust-simple-tester/scripts/locustfile.py << 'EOF'
    from locust import HttpUser, task, between
    import random

    class WebsiteUser(HttpUser):
        wait_time = between(1, 3)
        
        @task(3)
        def visit_homepage(self):
            self.client.get('/')
        
        @task(2)  
        def visit_about(self):
            self.client.get('/about')
        
        @task(1)
        def search_content(self):
            terms = ['test', 'search', 'demo']
            term = random.choice(terms)
            self.client.get(f'/search?q={term}')
        
        def on_start(self):
            self.client.get('/')
    EOF
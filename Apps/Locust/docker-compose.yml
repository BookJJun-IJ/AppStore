name: locust-load-tester

services:
  locust:
    image: locustio/locust:2.32.2
    environment:
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID:/mnt/locust
    expose:
      - 8089
    restart: unless-stopped
    working_dir: /mnt/locust
    command: locust --host=https://httpbin.org --web-host=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm/v7
  main: locust
  author: Yundera Community
  category: Utilities
  description:
    en_us: |
      Locust - Simple Python-based load testing tool with beautiful web UI.
      Start and stop tests directly from your browser with real-time statistics.
      Perfect for performance testing websites, APIs, and web applications.
      
      Features: Web-based interface, real-time charts, distributed testing, Python scripting.
    ko_kr: |
      Locust - 아름다운 웹 UI를 제공하는 간단한 Python 기반 로드 테스트 도구입니다.
      브라우저에서 직접 테스트를 시작하고 중지하며 실시간 통계를 확인하세요.
      웹사이트, API, 웹 애플리케이션의 성능 테스트에 완벽합니다.
    fr_fr: |
      Locust - Outil de test de charge basé sur Python avec une belle interface web.
      Démarrez et arrêtez les tests directement depuis votre navigateur.
    es_es: |
      Locust - Herramienta de prueba de carga basada en Python con hermosa interfaz web.
      Inicie y detenga pruebas directamente desde su navegador.
    zh_cn: |
      Locust - 基于Python的简单负载测试工具，具有精美的Web界面。
      直接从浏览器启动和停止测试，提供实时统计信息。
  developer: Locust.io
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/LocustLoadTester/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/LocustLoadTester/screenshot-1.png
  tagline:
    en_us: "Web UI load testing - real-time statistics!"
    ko_kr: "웹 UI 로드 테스트 - 실시간 통계!"
    fr_fr: "Test de charge avec interface web - statistiques en temps réel!"
    es_es: "Prueba de carga con interfaz web - ¡estadísticas en tiempo real!"
    zh_cn: "Web界面负载测试 - 实时统计！"
  title:
    en_us: Locust
    ko_kr: Locust
    fr_fr: Locust
    es_es: Locust
    zh_cn: Locust
  tips:
    before_install:
      en_us: |
        **Locust Load Tester**
        
        **Access:** https://locust-load-tester-username.nsl.sh/
        
        **Quick Start:**
        1. Open web interface
        2. Create a simple locustfile.py first
        3. Set number of users and spawn rate
        4. Click "Start Swarming"
        5. Watch real-time statistics
        
        **Create Test File:**
        Add this to /DATA/AppData/locust-load-tester/locustfile.py:
        ```python
        from locust import HttpUser, task
        
        class WebsiteUser(HttpUser):
            @task
            def test_homepage(self):
                self.client.get("/")
        ```
        
        **Features:**
        - Web-based interface (no CLI!)
        - Real-time charts and statistics  
        - Response time monitoring
        - Error tracking
        - CSV export
        
        Ready to test! 🐛
      ko_kr: |
        **Locust 로드 테스터**
        
        **접속:** https://locust-load-tester-username.nsl.sh/
        
        **빠른 시작:**
        1. 웹 인터페이스 열기
        2. 먼저 간단한 locustfile.py 생성
        3. 사용자 수와 생성 속도 설정
        4. "Start Swarming" 클릭
        5. 실시간 통계 확인
        
        **테스트 파일 생성:**
        /DATA/AppData/locust-load-tester/locustfile.py에 추가:
        ```python
        from locust import HttpUser, task
        
        class WebsiteUser(HttpUser):
            @task
            def test_homepage(self):
                self.client.get("/")
        ```
        
        **기능:**
        - 웹 기반 인터페이스 (CLI 불필요!)
        - 실시간 차트 및 통계
        - 응답 시간 모니터링
        - 오류 추적
        - CSV 내보내기
        
        테스트 준비 완료! 🐛
  index: /
  webui_port: 8089
name: locust-simple-tester

services:
  nginx-auth:
    image: nginx:1.25.3-alpine
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/nginx:/etc/nginx/conf.d
      - /DATA/AppData/$AppID/auth:/etc/nginx/auth
      - /DATA/AppData/$AppID/scripts:/scripts
    expose:
      - 80
    depends_on:
      - locust-master
    restart: unless-stopped
    command: >
      sh -c "
      mkdir -p /etc/nginx/auth /etc/nginx/conf.d &&
      echo 'admin:$apr1$salt1234$YyiVYZzSQQ2N1T/tB3K1R.' > /etc/nginx/auth/.htpasswd &&
      cat > /etc/nginx/conf.d/default.conf << 'EOL'
      server {
        listen 80;
        auth_basic \"Locust Load Testing\";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        location / {
          proxy_pass http://locust-master:8089;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection \"upgrade\";
        }
      }
      EOL
      nginx -g 'daemon off;'
      "
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  locust-master:
    image: locustio/locust:2.32.3
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/scripts:/mnt/locust
      - /DATA/AppData/$AppID/results:/results
    command: >
      sh -c "
      mkdir -p /mnt/locust &&
      cat > /mnt/locust/locustfile.py << 'EOL'
      from locust import HttpUser, task, between
      import random
      
      class WebsiteUser(HttpUser):
          wait_time = between(1, 3)
          
          @task(3)
          def visit_homepage(self):
              self.client.get('/')
          
          @task(2)
          def visit_about(self):
              self.client.get('/about')
          
          @task(1)
          def search_content(self):
              terms = ['test', 'search', 'demo']
              term = random.choice(terms)
              self.client.get(f'/search?q={term}')
          
          def on_start(self):
              self.client.get('/')
      EOL
      locust -f /mnt/locust/locustfile.py --master -H http://example.com --web-host=0.0.0.0 --web-port=8089
      "
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  locust-worker:
    image: locustio/locust:2.32.3
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/scripts:/mnt/locust
    command:
      - "-f"
      - "/mnt/locust/locustfile.py"
      - "--worker"
      - "--master-host"
      - "locust-master"
    depends_on:
      - locust-master
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    # To scale workers: docker-compose up --scale locust-worker=3

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nginx-auth
  author: Yundera Community

        **Artillery 스트레스 테스터**
        
        **사용 방법:**
        1. 접속: https://artillery-stress-tester-username.nsl.sh/
        2. "Edit Test" 클릭하여 YAML 설정 수정
        3. "Run Test" 클릭하여 스트레스 테스트 시작
        4. 아름다운 HTML 리포트 확인
        
        **간단한 YAML 예제:**
        ```yaml
        config:
          target: https://httpbin.org
          phases:
            - duration: 60
              arrivalRate: 10
        scenarios:
          - name: "기본 테스트"
            requests:
              - get:
                  url: "/"
        ```
        
        **기능:**
        - 코딩 불필요 - YAML만 사용
        - 아름다운 HTML 리포트
        - 실시간 통계
        - WebSocket 지원
        - CI/CD 준비됨
        
        매우 간단한 설정!

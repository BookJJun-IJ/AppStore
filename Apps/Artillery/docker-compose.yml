    before_install:
      en_us: |
        **Artillery Stress Tester**
        
        **How to Use:**
        1. Access: https://artillery-stress-tester-username.nsl.sh/
        2. Click "Edit Test" to modify YAML configuration
        3. Click "Run Test" to start stress testing
        4. View beautiful HTML reports
        
        **Simple YAML Example:**
        ```yaml
        config:
          target: https://httpbin.org
          phases:
            - duration: 60
              arrivalRate: 10
        scenarios:
          - name: "Basic test"
            requests:
              - get:
                  url: "/"
        ```
        
        **Features:**
        - No coding required - just YAML
        - Beautiful HTML reports
        - Real-time stats
        - WebSocket support
        - CI/CD ready
        
        Super simple setup!

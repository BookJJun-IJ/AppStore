name: artillery-stress-tester

services:
  artillery:
    image: artilleryio/artillery:2.0.5
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/tests:/tests
      - /DATA/AppData/$AppID/reports:/reports
    working_dir: /tests
    restart: unless-stopped
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  nginx:
    image: nginx:1.25.3-alpine
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/html:/usr/share/nginx/html
    expose:
      - 80
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm/v7
  main: nginx
  author: Yundera Community
  category: Utilities

name: jsettlers
services:
  jsettlers:
    image: mikakatua/jsettlers-server:2.6.10
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 8880
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      # JSettlers 서버 설정
      JSETTLERS_PORT: 8880
      JSETTLERS_CONNECTIONS: 50
      JSETTLERS_STARTROBOTS: 7
      # 데이터베이스 명시적 비활성화
      JSETTLERS_DB_URL: ""
      JSETTLERS_DB_DRIVER: ""
      JSETTLERS_DB_USER: ""
      JSETTLERS_DB_PASS: ""
    volumes:
      - /DATA/AppData/jsettlers/config:/config
      - /DATA/AppData/jsettlers/data:/data
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: jsettlers
  webui_port: 8880
  category: Games
  author: CasaOS Team
  developer: JSettlers Development Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/JSettlers/icon.png
  screenshot_1: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/JSettlers/screenshot-1.png
  screenshot_2: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/JSettlers/screenshot-2.png
  screenshot_3: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/JSettlers/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/JSettlers/thumbnail.png
  pre-install-cmd: |
    mkdir -p /DATA/AppData/jsettlers/config &&
    mkdir -p /DATA/AppData/jsettlers/data &&
    echo "# JSettlers Server Configuration" > /DATA/AppData/jsettlers/config/jsserver.properties &&
    echo "jsettlers.port=8880" >> /DATA/AppData/jsettlers/config/jsserver.properties &&
    echo "jsettlers.connections=50" >> /DATA/AppData/jsettlers/config/jsserver.properties &&
    echo "jsettlers.startrobots=7" >> /DATA/AppData/jsettlers/config/jsserver.properties &&
    echo "# Database disabled" >> /DATA/AppData/jsettlers/config/jsserver.properties &&
    echo "jsettlers.db.url=" >> /DATA/AppData/jsettlers/config/jsserver.properties &&
    echo "jsettlers.db.driver=" >> /DATA/AppData/jsettlers/config/jsserver.properties &&
    chown -R $PUID:$PGID /DATA/AppData/jsettlers
  title:
    en_us: JSettlers
  tagline:
    en_us: Open-source Settlers of Catan game server
    fr_fr: Serveur de jeu Colons de Catane open-source
    ko_kr: 오픈소스 카탄의 정착민 게임 서버
    zh_cn: 开源卡坦岛定居者游戏服务器
    es_es: Servidor de Colonos de Catán de código abierto
  description:
    en_us: |
      JSettlers is a web-based version of the board game Settlers of Catan written in Java. 
      This server supports multiple simultaneous games between people and/or AI bots. 
      Features include classic 4-player and 6-player games, sea board variants, scenarios, 
      and customizable game options. Perfect for playing with friends or practicing against AI.
      
      Server runs on port 8880 with 7 AI bots available for practice games.
    fr_fr: |
      JSettlers est une version web du jeu de plateau Les Colons de Catane écrite en Java. 
      Ce serveur prend en charge plusieurs jeux simultanés entre personnes et/ou bots IA. 
      Comprend des jeux classiques à 4 et 6 joueurs, des variantes maritimes, des scénarios 
      et des options de jeu personnalisables. Le serveur fonctionne sur le port 8880 avec 
      7 bots IA disponibles pour les jeux d'entraînement.
    ko_kr: |
      JSettlers는 Java로 작성된 보드 게임 카탄의 정착민의 웹 기반 버전입니다. 
      이 서버는 사람과/또는 AI 봇 간의 여러 동시 게임을 지원합니다. 
      클래식 4인 및 6인 게임, 바다 보드 변형, 시나리오 및 사용자 정의 가능한 게임 옵션이 포함되어 있습니다. 
      친구들과 플레이하거나 AI와 연습하기에 완벽합니다. 
      서버는 포트 8880에서 실행되며 연습 게임용 AI 봇 7개를 사용할 수 있습니다.
    zh_cn: |
      JSettlers是用Java编写的卡坦岛定居者棋盘游戏的网络版本。
      该服务器支持人与人之间和/或AI机器人之间的多个同时进行的游戏。
      功能包括经典的4人和6人游戏、海洋板变体、场景和可自定义的游戏选项。
      非常适合与朋友一起玩或与AI练习。
      服务器在端口8880上运行，有7个AI机器人可用于练习游戏。
    es_es: |
      JSettlers es una versión web del juego de mesa Colonos de Catán escrito en Java. 
      Este servidor admite múltiples juegos simultáneos entre personas y/o bots de IA. 
      Incluye juegos clásicos para 4 y 6 jugadores, variantes marítimas, escenarios 
      y opciones de juego personalizables. Perfecto para jugar con amigos o practicar contra IA. 
      El servidor se ejecuta en el puerto 8880 con 7 bots de IA disponibles para juegos de práctica.
  tips:
    before_install:
      en_us: |
        ## JSettlers Server Setup
        
        This server will start automatically on port 8880 with 7 AI bots available for practice.
        
        ## How to Connect and Play
        
        ### Download the Java Client
        1. Download from: https://github.com/jdmonin/JSettlers2/releases
        2. Choose the latest JSettlers-X.X.XX.jar file (not JSettlersServer)
        
        ### Connect to Server
        Run the client with:
        ```bash
        java -jar JSettlers.jar [your-server-ip] 8880
        ```
        
        Or if using NSL router:
        ```bash
        java -jar JSettlers.jar 8880-jsettlers-[username].nsl.sh 443
        ```
        
        ### Create Your First Game
        1. Enter any nickname when connecting
        2. Click "Practice" to play with AI bots
        3. Or click "New Game" to create a game for other players
        
        ## Game Features
        - Classic 4-player Settlers of Catan
        - 6-player expansion games
        - Sea board scenarios
        - Various house rules and options
        - Save and resume games
        - 7 AI bots with different skill levels
        
        ## Troubleshooting
        If the server doesn't start, check logs with:
        ```bash
        docker logs jsettlers-jsettlers-1
        ```
      fr_fr: |
        Le serveur démarre automatiquement sur le port 8880.
        Téléchargez le client Java depuis: https://github.com/jdmonin/JSettlers2/releases
        Connectez-vous avec: java -jar JSettlers.jar [ip-serveur] 8880
      ko_kr: |
        서버는 포트 8880에서 자동으로 시작됩니다.
        Java 클라이언트 다운로드: https://github.com/jdmonin/JSettlers2/releases
        연결: java -jar JSettlers.jar [서버-IP] 8880
      zh_cn: |
        服务器自动在端口8880启动。
        从以下位置下载Java客户端：https://github.com/jdmonin/JSettlers2/releases
        连接：java -jar JSettlers.jar [服务器IP] 8880
      es_es: |
        El servidor se inicia automáticamente en el puerto 8880.
        Descarga el cliente Java desde: https://github.com/jdmonin/JSettlers2/releases
        Conectar: java -jar JSettlers.jar [ip-servidor] 8880
  index: /
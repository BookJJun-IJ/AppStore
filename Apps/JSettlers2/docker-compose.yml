name: tinc
services:
  tinc:
    build:
      context: /DATA/AppData/tinc/build
      dockerfile: Dockerfile
    image: tinc-catan:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 4567
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PORT: 4567
    volumes:
      - /DATA/AppData/tinc/data:/app/data
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: tinc
  webui_port: 4567
  category: Games
  author: CasaOS Team
  developer: Sean Segal & Contributors
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TINC/icon.png
  screenshot_1: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TINC/screenshot-1.png
  screenshot_2: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TINC/screenshot-2.png
  screenshot_3: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TINC/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TINC/thumbnail.png
  pre-install-cmd: |
    mkdir -p /DATA/AppData/tinc/build &&
    mkdir -p /DATA/AppData/tinc/data &&
    cd /DATA/AppData/tinc/build &&
    if [ ! -f Dockerfile ]; then
      wget -q https://raw.githubusercontent.com/seansegal/tincisnotcatan/master/Dockerfile -O Dockerfile;
      git clone https://github.com/seansegal/tincisnotcatan.git . 2>/dev/null || true;
    fi &&
    chown -R $PUID:$PGID /DATA/AppData/tinc
  title:
    en_us: TINC - Web Catan
  tagline:
    en_us: Browser-based Settlers of Catan with advanced features
    fr_fr: Colons de Catane en ligne avec fonctionnalités avancées
    ko_kr: 고급 기능이 있는 브라우저 기반 카탄
    zh_cn: 具有高级功能的基于浏览器的卡坦岛
    es_es: Colonos de Catán basado en navegador con características avanzadas
  description:
    en_us: |
      TINC (This Is Not Catan) is a fully featured web-based implementation 
      of Settlers of Catan. Play directly in your browser with friends!
      
      Features:
      - 100% browser-based - no downloads
      - Complete Catan gameplay
      - Advanced economic options
      - 2-4 player support
      - Real-time multiplayer
      - Mobile friendly
      
      The game includes all standard Catan features plus optional 
      advanced economic mechanics for experienced players.
    fr_fr: |
      TINC est une implémentation web complète de Colons de Catane.
      Jouez directement dans votre navigateur avec des amis!
    ko_kr: |
      TINC는 카탄의 완전한 웹 기반 구현입니다.
      브라우저에서 친구들과 직접 플레이하세요!
    zh_cn: |
      TINC是卡坦岛的完整网络实现。
      直接在浏览器中与朋友一起玩！
    es_es: |
      TINC es una implementación web completa de Colonos de Catán.
      ¡Juega directamente en tu navegador con amigos!
  tips:
    before_install:
      en_us: |
        ## Quick Start
        
        After installation, access the game at:
        - **NSL URL**: `https://4567-tinc-[username].nsl.sh/`
        - **Local**: `http://[server-ip]:4567/`
        
        ## How to Play
        
        1. Enter your username on the home screen
        2. Create a new game or join existing
        3. Wait for other players (2-4 total)
        4. Game starts automatically when ready
        
        ## Game Features
        
        **Standard Mode:**
        - Classic Catan rules
        - 10 victory points to win
        - Standard resource trading
        
        **Advanced Economic Mode (Optional):**
        - Decimal resource values
        - Dynamic exchange rates
        - Enhanced trading mechanics
        
        ## First Run
        
        The server will build the Docker image on first run.
        This takes about 2-3 minutes. Subsequent starts are instant.
        
        ## Browser Support
        
        Works best with:
        - Chrome/Edge 90+
        - Firefox 88+
        - Safari 14+
        - Mobile browsers supported
        
        ## Troubleshooting
        
        If the game doesn't load:
        1. Wait for Docker build to complete (first run only)
        2. Check logs: `docker logs tinc-tinc-1`
        3. Ensure port 4567 is not blocked
      fr_fr: |
        Accédez au jeu à `https://4567-tinc-[username].nsl.sh/`
        Premier démarrage : 2-3 minutes pour construire l'image.
      ko_kr: |
        게임 접속: `https://4567-tinc-[username].nsl.sh/`
        첫 실행: 이미지 빌드에 2-3분 소요
      zh_cn: |
        访问游戏：`https://4567-tinc-[username].nsl.sh/`
        首次运行：构建镜像需要2-3分钟
      es_es: |
        Accede al juego en `https://4567-tinc-[username].nsl.sh/`
        Primera ejecución: 2-3 minutos para construir la imagen.
  index: /home
name: catan
services:
  catan:
    image: node:20-alpine
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      NODE_ENV: production
      PORT: 80
    volumes:
      - /DATA/AppData/catan/app:/app
      - /DATA/AppData/catan/data:/data
    working_dir: /app
    command: >
      sh -c "
      if [ ! -f /app/server.js ]; then
        echo 'Installing Catan Web Server...';
        cat > /app/package.json <<'EOL'
      {
        \"name\": \"catan-server\",
        \"version\": \"1.0.0\",
        \"scripts\": {
          \"start\": \"node server.js\"
        },
        \"dependencies\": {
          \"express\": \"^4.18.2\",
          \"socket.io\": \"^4.5.4\",
          \"cors\": \"^2.8.5\"
        }
      }
      EOL
        cat > /app/server.js <<'EOL'
      const express = require('express');
      const app = express();
      const http = require('http').createServer(app);
      const io = require('socket.io')(http, {cors: {origin: '*'}});
      const fs = require('fs');
      const path = require('path');
      const PORT = process.env.PORT || 80;

      app.use(express.static('public'));
      app.use(express.json());

      let games = {};
      let players = {};

      if (!fs.existsSync('public')) {
        fs.mkdirSync('public');
      }

      const indexHTML = \`<!DOCTYPE html>
      <html lang=\"ko\">
      <head>
        <meta charset=\"UTF-8\">
        <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
        <title>Catan Web Server</title>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
          }
          .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
          }
          h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
          }
          .status {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
          }
          .button-group {
            display: flex;
            gap: 15px;
            margin: 30px 0;
          }
          .button {
            flex: 1;
            background: #667eea;
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
          }
          .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
          }
          .button:active {
            transform: translateY(0);
          }
          .info-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
          }
          .info-section h3 {
            color: #667eea;
            margin-bottom: 10px;
          }
          .info-section p {
            color: #666;
            line-height: 1.6;
          }
          #gameArea {
            display: none;
            margin-top: 30px;
          }
          #gameCanvas {
            border: 2px solid #667eea;
            border-radius: 10px;
            width: 100%;
            background: #f9f9f9;
          }
          .room-code {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 24px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #667eea;
          }
        </style>
      </head>
      <body>
        <div class=\"container\">
          <h1>🎲 Catan Web</h1>
          
          <div class=\"status\">
            ✅ Server Online - Ready to Play!
          </div>

          <div id=\"mainMenu\">
            <div class=\"button-group\">
              <button class=\"button\" onclick=\"createGame()\">Create New Game</button>
              <button class=\"button\" onclick=\"joinGame()\">Join Game</button>
            </div>
            
            <div class=\"info-section\">
              <h3>How to Play</h3>
              <p>1. Click \"Create New Game\" to start a new room</p>
              <p>2. Share the room code with friends</p>
              <p>3. They can join using \"Join Game\"</p>
              <p>4. Start playing when everyone is ready!</p>
            </div>
            
            <div class=\"info-section\">
              <h3>Game Features</h3>
              <p>• 2-4 players per game</p>
              <p>• Classic Catan rules</p>
              <p>• Real-time multiplayer</p>
              <p>• Mobile friendly</p>
            </div>
          </div>
          
          <div id=\"gameArea\">
            <div class=\"room-code\" id=\"roomCode\"></div>
            <canvas id=\"gameCanvas\" width=\"600\" height=\"600\"></canvas>
          </div>
        </div>
        
        <script src=\"/socket.io/socket.io.js\"></script>
        <script>
          const socket = io();
          let currentRoom = null;
          
          function createGame() {
            const roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            currentRoom = roomCode;
            document.getElementById('roomCode').textContent = 'Room: ' + roomCode;
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            socket.emit('create-room', roomCode);
            initGame();
          }
          
          function joinGame() {
            const roomCode = prompt('Enter room code:');
            if (roomCode) {
              currentRoom = roomCode.toUpperCase();
              document.getElementById('roomCode').textContent = 'Room: ' + currentRoom;
              document.getElementById('mainMenu').style.display = 'none';
              document.getElementById('gameArea').style.display = 'block';
              socket.emit('join-room', currentRoom);
              initGame();
            }
          }
          
          function initGame() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // Draw basic game board
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#333';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Catan Game Board', canvas.width/2, 50);
            
            // Draw hexagons for the board
            drawHexGrid(ctx, canvas.width/2, canvas.height/2);
          }
          
          function drawHexGrid(ctx, centerX, centerY) {
            const hexSize = 40;
            const colors = ['#F4A460', '#8B4513', '#228B22', '#FFD700', '#DC143C'];
            
            for (let q = -2; q <= 2; q++) {
              for (let r = -2; r <= 2; r++) {
                if (Math.abs(q + r) <= 2) {
                  const x = centerX + hexSize * 1.5 * q;
                  const y = centerY + hexSize * Math.sqrt(3) * (r + q/2);
                  drawHexagon(ctx, x, y, hexSize, colors[Math.floor(Math.random() * colors.length)]);
                }
              }
            }
          }
          
          function drawHexagon(ctx, x, y, size, color) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
              const angle = (Math.PI / 3) * i;
              const xPos = x + size * Math.cos(angle);
              const yPos = y + size * Math.sin(angle);
              if (i === 0) ctx.moveTo(xPos, yPos);
              else ctx.lineTo(xPos, yPos);
            }
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.stroke();
          }
          
          socket.on('connect', () => {
            console.log('Connected to server');
          });
          
          socket.on('room-created', (data) => {
            console.log('Room created:', data);
          });
          
          socket.on('player-joined', (data) => {
            console.log('Player joined:', data);
          });
        </script>
      </body>
      </html>\`;

      fs.writeFileSync('public/index.html', indexHTML);

      app.get('/', (req, res) => {
        res.sendFile(path.join(__dirname, 'public', 'index.html'));
      });

      app.get('/health', (req, res) => {
        res.json({status: 'ok', games: Object.keys(games).length});
      });

      io.on('connection', (socket) => {
        console.log('Player connected:', socket.id);
        
        socket.on('create-room', (roomCode) => {
          games[roomCode] = {
            players: [socket.id],
            started: false
          };
          socket.join(roomCode);
          socket.emit('room-created', {roomCode, playerId: socket.id});
        });

        socket.on('join-room', (roomCode) => {
          if (games[roomCode]) {
            games[roomCode].players.push(socket.id);
            socket.join(roomCode);
            io.to(roomCode).emit('player-joined', {roomCode, playerId: socket.id});
          }
        });

        socket.on('disconnect', () => {
          console.log('Player disconnected:', socket.id);
        });
      });

      http.listen(PORT, () => {
        console.log(\`Catan server running on port \${PORT}\`);
      });
      EOL
        npm install --production;
      fi
      echo 'Starting Catan Web Server...';
      npm start
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: catan
  webui_port: 80
  category: Games
  author: CasaOS Team
  developer: Catan Community
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Catan/icon.png
  screenshot_1: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Catan/screenshot-1.png
  screenshot_2: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Catan/screenshot-2.png
  screenshot_3: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Catan/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Catan/thumbnail.png
  pre-install-cmd: |
    mkdir -p /DATA/AppData/catan/app &&
    mkdir -p /DATA/AppData/catan/data &&
    chown -R $PUID:$PGID /DATA/AppData/catan
  title:
    en_us: Catan Web
  tagline:
    en_us: Browser-based Settlers of Catan game
    fr_fr: Jeu Colons de Catane basé sur navigateur
    ko_kr: 브라우저 기반 카탄 게임
    zh_cn: 基于浏览器的卡坦岛游戏
    es_es: Juego Colonos de Catán basado en navegador
  description:
    en_us: |
      Web-based Settlers of Catan game that runs directly in your browser. 
      Create rooms, invite friends, and play together online!
      
      Features:
      - 100% web-based - no downloads required
      - Create and join game rooms
      - Real-time multiplayer (2-4 players)
      - Mobile-friendly interface
      - Simple and clean UI
    fr_fr: |
      Jeu Colons de Catane basé sur le web qui fonctionne directement dans votre navigateur.
      Créez des salles, invitez des amis et jouez ensemble en ligne!
    ko_kr: |
      브라우저에서 직접 실행되는 웹 기반 카탄 게임입니다.
      방을 만들고, 친구를 초대하고, 온라인으로 함께 플레이하세요!
    zh_cn: |
      基于网络的卡坦岛游戏，直接在浏览器中运行。
      创建房间，邀请朋友，一起在线玩！
    es_es: |
      Juego Colonos de Catán basado en web que funciona directamente en tu navegador.
      ¡Crea salas, invita amigos y juega juntos en línea!
  tips:
    before_install:
      en_us: |
        ## Quick Start
        
        Open your browser and go to:
        - **Clean URL**: `https://catan-[username].nsl.sh/`
        - **Local**: `http://[server-ip]/`
        
        ## How to Play
        
        1. Click "Create New Game" to get a room code
        2. Share the room code with friends
        3. Friends click "Join Game" and enter the code
        4. Play together in real-time!
        
        ## Features
        
        - Room-based multiplayer
        - Visual game board
        - Mobile support
        - No downloads needed
        
        The server will set up automatically on first run (1-2 minutes).
      fr_fr: |
        Accédez à `https://catan-[username].nsl.sh/` dans votre navigateur.
      ko_kr: |
        브라우저에서 `https://catan-[username].nsl.sh/`로 접속하세요.
      zh_cn: |
        在浏览器中访问 `https://catan-[username].nsl.sh/`
      es_es: |
        Accede a `https://catan-[username].nsl.sh/` en tu navegador.
  index: /
  port_map: "80"
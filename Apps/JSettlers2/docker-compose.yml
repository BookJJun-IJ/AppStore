name: jsettlers
services:
  jsettlers:
    image: jdmonin/jsettlers:2.5.00
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 8880
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      # JSettlers 서버 설정
      JSETTLERS_PORT: 8880
      JSETTLERS_CONNECTIONS: 50
      JSETTLERS_STARTROBOTS: 7
      # 데이터베이스 비활성화
      JSETTLERS_DB_SAVE_GAMES: "false"
    volumes:
      - /DATA/AppData/jsettlers/saves:/jsettlers/saves
      - /DATA/AppData/jsettlers/config:/jsettlers/config
    command: >
      java -jar /app/JSettlersServer.jar 
      -Djsettlers.port=8880 
      -Djsettlers.connections=50 
      -Djsettlers.startrobots=7
      -Djsettlers.db.save.games=false
      -Djsettlers.savedir=/jsettlers/saves
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: jsettlers
  webui_port: 8880
  category: Games
  author: CasaOS Team

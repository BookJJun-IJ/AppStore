    en_us: JSettlers
  tagline:
    en_us: Open-source web-based Settlers of Catan game
    fr_fr: Jeu open-source de Colons de Catane basé sur le web
    ko_kr: 오픈소스 웹 기반 카탄의 정착민 게임
    zh_cn: 开源的基于网络的卡坦岛定居者游戏
    es_es: Juego de Colonos de Catán de código abierto basado en web
  description:
    en_us: |
      JSettlers is a web-based version of the board game Settlers of Catan written in Java. 
      This client-server system supports multiple simultaneous games between people and/or AI bots. 
      Features include classic 4-player and 6-player games, sea board variants, scenarios, 
      and customizable game options. Perfect for playing with friends or practicing against AI.
    fr_fr: |
      JSettlers est une version web du jeu de plateau Les Colons de Catane écrite en Java. 
      Ce système client-serveur prend en charge plusieurs jeux simultanés entre personnes et/ou 
      bots IA. Comprend des jeux classiques à 4 et 6 joueurs, des variantes maritimes, des 
      scénarios et des options de jeu personnalisables.
    ko_kr: |
      JSettlers는 Java로 작성된 보드 게임 카탄의 정착민의 웹 기반 버전입니다. 이 클라이언트-서버 시스템은 
      사람과/또는 AI 봇 간의 여러 동시 게임을 지원합니다. 클래식 4인 및 6인 게임, 바다 보드 변형, 시나리오 
      및 사용자 정의 가능한 게임 옵션이 포함되어 있습니다. 친구들과 플레이하거나 AI와 연습하기에 완벽합니다.
    zh_cn: |
      JSettlers是用Java编写的卡坦岛定居者棋盘游戏的网络版本。这个客户端-服务器系统支持人与人之间和/或
      AI机器人之间的多个同时进行的游戏。功能包括经典的4人和6人游戏、海洋板变体、场景和可自定义的游戏选项。
      非常适合与朋友一起玩或与AI练习。
    es_es: |
      JSettlers es una versión web del juego de mesa Colonos de Catán escrito en Java. 
      Este sistema cliente-servidor admite múltiples juegos simultáneos entre personas y/o 
      bots de IA. Incluye juegos clásicos para 4 y 6 jugadores, variantes marítimas, 
      escenarios y opciones de juego personalizables. Perfecto para jugar con amigos o practicar contra IA.
  tips:
    before_install:
      en_us: |
        ## JSettlers Server Information
        
        The server will automatically start on port 8880 with 7 AI bots available for practice games.
        
        ## How to Connect
        
        ### Option 1: Java Client (Recommended)
        1. Download the JSettlers client from: https://github.com/jdmonin/JSettlers2/releases
        2. Run the client: `java -jar JSettlers.jar [server-ip] 8880`
        3. Create or join a game
        
        ### Option 2: Web Browser
        Connect directly via: `https://8880-jsettlers-[username].nsl.sh/`
        
        ## Game Features
        - Classic 4-player and 6-player boards
        - Sea board variants and scenarios
        - Practice mode with AI bots (7 bots pre-configured)
        - Multiple simultaneous games support
        - Save and resume games
        
        ## First Time Setup
        No configuration needed - the server starts with sensible defaults.
        You can immediately create a practice game with robots or wait for other players to join.
      fr_fr: |
        Le serveur démarrera automatiquement sur le port 8880 avec 7 bots IA disponibles.
        Téléchargez le client depuis: https://github.com/jdmonin/JSettlers2/releases
      ko_kr: |
        서버는 포트 8880에서 자동으로 시작되며 7개의 AI 봇을 사용할 수 있습니다.
        클라이언트 다운로드: https://github.com/jdmonin/JSettlers2/releases
      zh_cn: |
        服务器将自动在端口8880上启动，有7个AI机器人可用。
        从以下位置下载客户端：https://github.com/jdmonin/JSettlers2/releases
      es_es: |
        El servidor se iniciará automáticamente en el puerto 8880 con 7 bots de IA disponibles.
        Descargue el cliente desde: https://github.com/jdmonin/JSettlers2/releases

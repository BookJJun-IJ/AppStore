name: pioneers
services:
  pioneers:
    image: antoniotorresm/pioneers:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 5556
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      # 게임 설정
      TITLE: "Pioneers Catan Server"
      RANDOM_TERRAIN: "true"      # 랜덤 맵 생성
      STRICT_TRADE: "false"        # 엄격한 거래 규칙
      DOMESTIC_TRADE: "true"       # 플레이어 간 거래 허용
      NUM_PLAYERS: 4               # 최대 플레이어 수
      SEVENS_RULE: 0              # 7 규칙 (0=일반, 1=엄격, 2=친화적)
      VICTORY_POINTS: 10          # 승리 포인트
    volumes:
      - /DATA/AppData/pioneers/games:/usr/share/games/pioneers
      - /DATA/AppData/pioneers/config:/etc/pioneers
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: pioneers
  webui_port: 5556
  category: Games
  author: CasaOS Team
  developer: Pioneers Development Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Pioneers/icon.png
  screenshot_1: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Pioneers/screenshot-1.png
  screenshot_2: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Pioneers/screenshot-2.png
  screenshot_3: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Pioneers/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Pioneers/thumbnail.png
  pre-install-cmd: |
    mkdir -p /DATA/AppData/pioneers/games &&
    mkdir -p /DATA/AppData/pioneers/config &&
    chown -R $PUID:$PGID /DATA/AppData/pioneers
  title:
    en_us: Pioneers - Settlers of Catan
  tagline:
    en_us: Open-source implementation of Settlers of Catan board game
    fr_fr: Implémentation open-source du jeu de plateau Les Colons de Catane
    ko_kr: 카탄의 정착민 보드게임의 오픈소스 구현
    zh_cn: 卡坦岛定居者桌游的开源实现
    es_es: Implementación de código abierto del juego de mesa Colonos de Catán
  description:
    en_us: |
      Pioneers is a computer implementation of the Settlers of Catan board game. 
      It can be played over the internet with multiple players. The game includes 
      a server, a client, computer players, and an editor. This Docker container 
      runs the Pioneers server, allowing you to host your own Catan games.
      
      Features:
      - Classic Settlers of Catan gameplay
      - Support for 2-4 players
      - Computer AI opponents available
      - Customizable game rules
      - Random or standard board layouts
      - Trading between players
      - Stable and actively maintained
    fr_fr: |
      Pioneers est une implémentation informatique du jeu de plateau Les Colons de Catane. 
      Il peut être joué sur Internet avec plusieurs joueurs. Le jeu comprend un serveur, 
      un client, des joueurs informatiques et un éditeur. Ce conteneur Docker exécute 
      le serveur Pioneers, vous permettant d'héberger vos propres parties de Catane.
    ko_kr: |
      Pioneers는 카탄의 정착민 보드 게임의 컴퓨터 구현입니다. 
      인터넷을 통해 여러 플레이어와 함께 플레이할 수 있습니다. 
      이 게임에는 서버, 클라이언트, 컴퓨터 플레이어 및 편집기가 포함되어 있습니다. 
      이 Docker 컨테이너는 Pioneers 서버를 실행하여 자신만의 카탄 게임을 호스팅할 수 있습니다.
    zh_cn: |
      Pioneers是卡坦岛定居者棋盘游戏的计算机实现。
      它可以通过互联网与多个玩家一起玩。
      游戏包括服务器、客户端、电脑玩家和编辑器。
      这个Docker容器运行Pioneers服务器，让您可以托管自己的卡坦游戏。
    es_es: |
      Pioneers es una implementación informática del juego de mesa Colonos de Catán. 
      Se puede jugar por Internet con varios jugadores. El juego incluye un servidor, 
      un cliente, jugadores de computadora y un editor. Este contenedor Docker ejecuta 
      el servidor Pioneers, permitiéndole alojar sus propios juegos de Catán.
  tips:
    before_install:
      en_us: |
        ## How to Connect to Pioneers Server
        
        ### Download the Client
        
        **For Windows:**
        Download from: https://sourceforge.net/projects/pio/files/Pioneers/
        
        **For Linux:**
        Install via package manager:
        ```bash
        # Ubuntu/Debian
        sudo apt-get install pioneers
        
        # Fedora
        sudo dnf install pioneers
        
        # Arch
        sudo pacman -S pioneers
        ```
        
        **For macOS:**
        Use Homebrew:
        ```bash
        brew install pioneers
        ```
        
        ### Connect to Your Server
        
        1. Open the Pioneers client
        2. Click "Join Private Game"
        3. Enter your server address:
           - Local: `[server-ip]:5556`
           - NSL Router: `5556-pioneers-[username].nsl.sh`
        4. Create your player name and join
        
        ## Game Settings
        
        The server is configured with these default settings:
        - **Map**: Random terrain generation
        - **Players**: Up to 4 players
        - **Victory Points**: 10 points to win
        - **Trading**: Allowed between players
        - **Sevens Rule**: Normal (robber moves on 7)
        
        ## Features
        
        - Classic Settlers of Catan rules
        - AI computer players available
        - Random or standard board layouts
        - Full trading system
        - Development cards
        - Longest road and largest army bonuses
        - Stable multiplayer gameplay
        
        ## Troubleshooting
        
        If you can't connect:
        1. Check if server is running: `docker logs pioneers-pioneers-1`
        2. Verify port 5556 is accessible
        3. Try connecting locally first before remote connections
      fr_fr: |
        Téléchargez le client Pioneers depuis SourceForge ou installez via votre gestionnaire de paquets.
        Connectez-vous à votre serveur sur le port 5556.
      ko_kr: |
        Pioneers 클라이언트를 SourceForge에서 다운로드하거나 패키지 관리자를 통해 설치하세요.
        포트 5556에서 서버에 연결하세요.
      zh_cn: |
        从SourceForge下载Pioneers客户端或通过包管理器安装。
        连接到端口5556上的服务器。
      es_es: |
        Descarga el cliente Pioneers desde SourceForge o instala a través de tu gestor de paquetes.
        Conéctate a tu servidor en el puerto 5556.
  index: /
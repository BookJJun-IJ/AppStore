name: wgeasyhost

services:
  wgeasyhost:
    image: nginx:1.27-alpine
    container_name: wgeasyhost
    restart: unless-stopped
    user: "0:0"
    labels:
      caddy_0: wgeasyhost-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: wgeasyhost-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: wgeasyhost-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    networks:
      - pcs
    expose:
      - 80
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/nginx/nginx.conf << 'CONF'
        user  nginx;
        worker_processes  auto;
        error_log  /var/log/nginx/error.log notice;
        pid        /var/run/nginx.pid;
        events { worker_connections 1024; }
        http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;
          sendfile on;
          keepalive_timeout 65;
          server {
            listen 80;
            location / {
              proxy_pass http://host.docker.internal:51821;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
            }
          }
        }
        CONF
        nginx -g 'daemon off;'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - wgeasyui
    cpu_shares: 80

  wgeasyui:
    image: ghcr.io/wg-easy/wg-easy:15.3.0
    container_name: wgeasyui
    restart: unless-stopped
    network_mode: host
    environment:
      INSECURE: 'true'
      DISABLE_IPV6: 'true'
      INIT_ENABLED: 'true'
      INIT_USERNAME: admin
      INIT_PASSWORD: $PCS_DEFAULT_PASSWORD
      INIT_HOST: $PCS_PUBLIC_IP
      INIT_PORT: '51820'
      INIT_DNS: '9.9.9.9'
    volumes:
      - /DATA/AppData/$AppID/wireguard:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    cpu_shares: 50

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  main: wgeasyhost
  store_app_id: wgeasyhost
  webui_port: 80
  index: /
  developer: WeejeWel
  author: Yundera Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasyHost/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasyHost/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasyHost/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasyHost/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasyHost/screenshot-3.png
  category: Network
  title:
    en_us: WireGuard Easy - Host
  tagline:
    en_us: WireGuard VPN with host network mode (v15)
    ko_kr: 호스트 네트워크 모드의 WireGuard VPN (v15)
    zh_cn: 使用主机网络模式的 WireGuard VPN (v15)
    fr_fr: WireGuard VPN en mode reseau hote (v15)
    es_es: WireGuard VPN con modo de red host (v15)
  description:
    en_us: |
      **WireGuard Easy with host networking for maximum compatibility**

      Same as WireGuard Easy but runs in host network mode. Use this version if the standard WireGuard Easy has connectivity issues on your network setup.

      **What you can do:**
      - Create and manage VPN clients with one click
      - Download client configs or scan QR codes
      - Monitor connected clients and bandwidth
      - Full host network access for better VPN compatibility

      **When to use this version:** Choose this if the standard WireGuard Easy doesn't work on your network, or if you need the VPN to interact directly with the host network stack.
    ko_kr: |
      **최대 호환성을 위한 호스트 네트워킹 WireGuard Easy**

      WireGuard Easy와 동일하지만 호스트 네트워크 모드로 실행됩니다. 표준 WireGuard Easy에서 연결 문제가 있는 경우 이 버전을 사용하세요.

      **할 수 있는 것:**
      - 한 번의 클릭으로 VPN 클라이언트 생성 및 관리
      - 클라이언트 설정 다운로드 또는 QR 코드 스캔
      - 연결된 클라이언트 및 대역폭 모니터링
      - 더 나은 VPN 호환성을 위한 전체 호스트 네트워크 접근

      **이 버전을 사용해야 할 때:** 표준 WireGuard Easy가 네트워크에서 작동하지 않거나, VPN이 호스트 네트워크 스택과 직접 상호작용해야 하는 경우.
    zh_cn: |
      **使用主机网络的 WireGuard Easy 以获得最大兼容性**

      与 WireGuard Easy 相同，但以主机网络模式运行。如果标准 WireGuard Easy 在您的网络设置上存在连接问题，请使用此版本。

      **您可以做的事:**
      - 一键创建和管理 VPN 客户端
      - 下载客户端配置或扫描二维码
      - 监控已连接的客户端和带宽
      - 完整的主机网络访问以获得更好的 VPN 兼容性

      **何时使用此版本:** 如果标准 WireGuard Easy 在您的网络上不工作，或者您需要 VPN 直接与主机网络堆栈交互。
    fr_fr: |
      **WireGuard Easy avec reseau hote pour une compatibilite maximale**

      Identique a WireGuard Easy mais fonctionne en mode reseau hote. Utilisez cette version si WireGuard Easy standard a des problemes de connectivite sur votre configuration reseau.

      **Ce que vous pouvez faire:**
      - Creer et gerer des clients VPN en un clic
      - Telecharger les configs ou scanner les QR codes
      - Surveiller les clients connectes et la bande passante
      - Acces complet au reseau hote pour une meilleure compatibilite VPN

      **Quand utiliser cette version:** Choisissez ceci si WireGuard Easy standard ne fonctionne pas sur votre reseau, ou si le VPN doit interagir directement avec la pile reseau de l'hote.
    es_es: |
      **WireGuard Easy con red host para maxima compatibilidad**

      Igual que WireGuard Easy pero se ejecuta en modo de red host. Use esta version si WireGuard Easy estandar tiene problemas de conectividad en su configuracion de red.

      **Lo que puedes hacer:**
      - Crear y gestionar clientes VPN con un clic
      - Descargar configs de clientes o escanear codigos QR
      - Monitorear clientes conectados y ancho de banda
      - Acceso completo a la red host para mejor compatibilidad VPN

      **Cuando usar esta version:** Elija esto si WireGuard Easy estandar no funciona en su red, o si necesita que la VPN interactue directamente con la pila de red del host.
  tips:
    before_install:
      en_us: |
        # Default Account

        | Username | Password                |
        | -------- | ----------------------- |
        | `admin`  | `$PCS_DEFAULT_PASSWORD` |

        This is **WireGuard Easy v15** with **host network mode**. The admin account is auto-configured. VPN settings can be changed from the web UI after login.

        The VPN listens on UDP port 51820 and the web UI on port 51821 directly on the host. Make sure these ports are available.
      ko_kr: |
        # 기본 계정

        | 사용자명 | 비밀번호                |
        | -------- | ----------------------- |
        | `admin`  | `$PCS_DEFAULT_PASSWORD` |

        **WireGuard Easy v15** 버전이며 **호스트 네트워크 모드**입니다. 관리자 계정이 자동 설정됩니다. VPN 설정은 로그인 후 웹 UI에서 변경할 수 있습니다.

        VPN은 UDP 포트 51820, 웹 UI는 포트 51821에서 호스트에서 직접 수신합니다. 이 포트들이 사용 가능한지 확인하세요.
      zh_cn: |
        # 默认账户

        | 用户名   | 密码                    |
        | -------- | ----------------------- |
        | `admin`  | `$PCS_DEFAULT_PASSWORD` |

        这是 **WireGuard Easy v15** 版本，使用**主机网络模式**。管理员账户已自动配置。登录后可在 Web UI 中更改 VPN 设置。

        VPN 监听 UDP 端口 51820，Web UI 监听端口 51821，直接在主机上。请确保这些端口可用。
      fr_fr: |
        # Compte par defaut

        | Nom d'utilisateur | Mot de passe            |
        | ----------------- | ----------------------- |
        | `admin`           | `$PCS_DEFAULT_PASSWORD` |

        Ceci est **WireGuard Easy v15** avec **mode reseau hote**. Le compte administrateur est configure automatiquement. Les parametres VPN peuvent etre modifies depuis l'interface web apres connexion.

        Le VPN ecoute sur le port UDP 51820 et l'interface web sur le port 51821 directement sur l'hote. Assurez-vous que ces ports sont disponibles.
      es_es: |
        # Cuenta predeterminada

        | Usuario  | Contrasena              |
        | -------- | ----------------------- |
        | `admin`  | `$PCS_DEFAULT_PASSWORD` |

        Esta es la version **WireGuard Easy v15** con **modo de red host**. La cuenta de administrador se configura automaticamente. La configuracion VPN se puede cambiar desde la interfaz web despues de iniciar sesion.

        La VPN escucha en el puerto UDP 51820 y la interfaz web en el puerto 51821 directamente en el host. Asegurese de que estos puertos esten disponibles.

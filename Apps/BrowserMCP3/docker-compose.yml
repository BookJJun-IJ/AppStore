name: browsermcp3
services:
  browsermcp3:
    image: ghcr.io/worph/browser-mcp:1.1.2
    container_name: browsermcp3
    hostname: browsermcp3
    restart: unless-stopped
    shm_size: "2gb"
    user: 0:0
    expose:
      - 9746
    environment:
      - AUTH_HASH=$AUTH_HASH
      - TZ=Asia/Seoul
      - PROXY_URL=$PROXY_URL
      - VNC_RESOLUTION=1920x1080x24
    volumes:
      - type: bind
        source: /DATA/AppData/browsermcp3/
        target: /app/data
    networks:
      - pcs
    labels:
      caddy_0: browsermcp3-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 9746}}"
      caddy_1: browsermcp3-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 9746}}"
      caddy_2: browsermcp3-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 9746}}"

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
  main: browsermcp3
  author: Worph
  category: Developer
  description:
    en_us: |
      **A headless Chromium browser in the cloud, controlled by AI via MCP**

      Browser MCP bundles a full Chromium browser, Playwright automation, and an MCP (Model Context Protocol) server in a single container. It lets LLMs and AI assistants navigate websites, click elements, fill forms, take screenshots, and extract content programmatically.

      **What you can do:**
      - Control a real Chromium browser from any MCP-compatible AI assistant
      - Navigate websites, click elements, fill forms, and interact with web pages
      - Take screenshots for visual feedback loops (screenshot → decide → act)
      - Execute JavaScript in the browser context for advanced automation
      - View the browser live via the built-in noVNC web viewer
      - Access the Web UI dashboard for status monitoring

      **Think of it like:** A web browser in the cloud that AI can see and control.

      **Perfect if you:** Want to automate web browsing, scrape websites, test web apps, or give your AI assistant the ability to interact with any website.
    zh_cn: |
      **云端无头 Chromium 浏览器，通过 MCP 由 AI 控制**

      Browser MCP 将完整的 Chromium 浏览器、Playwright 自动化和 MCP（模型上下文协议）服务器整合在一个容器中。它允许 LLM 和 AI 助手浏览网站、点击元素、填写表单、截屏并以编程方式提取内容。

      **功能：**
      - 从任何兼容 MCP 的 AI 助手控制真实的 Chromium 浏览器
      - 浏览网站、点击元素、填写表单、与网页交互
      - 截取屏幕截图用于视觉反馈循环（截图 → 决策 → 操作）
      - 在浏览器上下文中执行 JavaScript 进行高级自动化
      - 通过内置 noVNC 网页查看器实时查看浏览器
      - 访问 Web UI 仪表板进行状态监控
  developer: Worph
  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/BrowserMCP/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/BrowserMCP/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/BrowserMCP/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/BrowserMCP/screenshot-3.png
  tagline:
    en_us: AI-controlled web browser via MCP
    zh_cn: 通过 MCP 由 AI 控制的网页浏览器
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/BrowserMCP/thumbnail.png
  title:
    en_us: Browser MCP 3
  index: /?hash=$AUTH_HASH
  chips:
    - key: mcp
      name:
        en_us: MCP
  tips:
    before_install:
      en_us: |
        **Getting Started**

        After installation, Chromium will launch automatically inside a virtual display.

        **Web Interface:**
        - **Main UI** — Dashboard with live noVNC browser view, status, and tool information

        **MCP Integration (for AI/LLMs):**

        Connect your AI assistant to control the browser.

        **Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "browsermcp3": {
              "type": "http",
              "url": "https://browsermcp3-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Local Docker connection (no auth required)**
        ```json
        {
          "mcpServers": {
            "browsermcp3": {
              "type": "http",
              "url": "http://browsermcp3:9746/mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*
      zh_cn: |
        **快速开始**

        安装后，Chromium 将在虚拟显示中自动启动。

        **Web 界面：**
        - **主 UI** — 带有实时 noVNC 浏览器视图、状态和工具信息的仪表板

        **MCP 集成（用于 AI/LLM）：**

        连接您的 AI 助手来控制浏览器。

        **公共 URL（使用 hash 认证）**
        ```json
        {
          "mcpServers": {
            "browsermcp3": {
              "type": "http",
              "url": "https://browsermcp3-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **本地 Docker 连接（无需认证）**
        ```json
        {
          "mcpServers": {
            "browsermcp3": {
              "type": "http",
              "url": "http://browsermcp3:9746/mcp"
            }
          }
        }
        ```
        *注意：需要 AI 助手在 `pcs` Docker 网络上。*

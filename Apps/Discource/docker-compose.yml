name: discourse
services:
  discourse-app:
    image: ghcr.io/tiredofit/docker-discourse:3.2.99
    container_name: discourse
    user: $PUID:$PGID
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - SETUP_MODE=AUTO
      - ENABLE_DB_MIGRATE=TRUE
      - ENABLE_PRECOMPILE_ASSETS=TRUE
      - ADMIN_USER=admin
      - ADMIN_EMAIL=$PCS_EMAIL
      - ADMIN_PASS=$PCS_DEFAULT_PASSWORD
      - ADMIN_NAME=Admin User
      - DB_HOST=discourse-db
      - DB_PORT=5432
      - DB_NAME=discourse
      - DB_USER=discourse
      - DB_PASS=discourse_password
      - DB_POOL=10
      - REDIS_HOST=discourse-redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SMTP_DOMAIN=$PCS_DOMAIN
      - SMTP_HOST=postfix-relay
      - SMTP_PORT=25
      - SMTP_AUTHENTICATION=plain
      - UNICORN_WORKERS=4
      - SIDEKIQ_THREADS=10
      - LOG_LEVEL=info
    expose:
      - 3000
    volumes:
      - /DATA/AppData/$AppID/data:/data
      - /DATA/AppData/$AppID/logs:/data/logs
      - /DATA/AppData/$AppID/uploads:/data/uploads
      - /DATA/AppData/$AppID/backups:/data/backups
      - /DATA/AppData/$AppID/plugins:/data/plugins
    restart: unless-stopped
    depends_on:
      discourse-db:
        condition: service_healthy
      discourse-redis:
        condition: service_healthy
    networks:
      - discourse-network
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 1024M
    cpu_shares: 70

  discourse-db:
    image: postgres:16.6
    container_name: discourse-db
    environment:
      - POSTGRES_DB=discourse
      - POSTGRES_USER=discourse
      - POSTGRES_PASSWORD=discourse_password
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - /DATA/AppData/$AppID/postgresql:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discourse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discourse-network
    deploy:
      resources:
        reservations:
          cpus: "0.25"
          memory: 512M
    cpu_shares: 70

  discourse-redis:
    image: redis:7.4.1-alpine
    container_name: discourse-redis
    command: redis-server --appendonly yes
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discourse-network
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 256M
    cpu_shares: 50

networks:
  discourse-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: discourse-app
  author: Yundera Team
  category: Communication
  description:
    en_us: Discourse is a modern, open-source discussion platform built for the next decade of the Internet. It acts as a mailing list, forum, and long-form chat room all in one. With built-in moderation and governance systems, communities can protect themselves from bad actors without requiring official moderators. Discourse brings together real-time chat and asynchronous forum discussions with powerful features like infinite scrolling, live updates, expanding links, drag-and-drop attachments, and more.
    fr_fr: Discourse est une plateforme de discussion moderne et open source conçue pour la prochaine décennie d'Internet. Elle fonctionne comme une liste de diffusion, un forum et un salon de discussion longue durée en un seul endroit. Avec des systèmes de modération et de gouvernance intégrés, les communautés peuvent se protéger des acteurs malveillants sans nécessiter de modérateurs officiels.
    es_es: Discourse es una plataforma de discusión moderna y de código abierto creada para la próxima década de Internet. Actúa como lista de correo, foro y sala de chat de larga duración todo en uno. Con sistemas de moderación y gobernanza integrados, las comunidades pueden protegerse de actores maliciosos sin requerir moderadores oficiales.
    zh_cn: Discourse 是一个现代化的开源讨论平台，专为互联网的下一个十年而构建。它集邮件列表、论坛和长期聊天室于一体。凭借内置的审核和治理系统，社区可以在不需要官方审核员的情况下保护自己免受不良行为者的侵害。
    ko_kr: Discourse는 인터넷의 다음 10년을 위해 구축된 현대적인 오픈소스 토론 플랫폼입니다. 메일링 리스트, 포럼, 장기 채팅방 기능을 하나로 통합했습니다. 내장된 관리 및 거버넌스 시스템을 통해 커뮤니티는 공식 관리자 없이도 악의적인 행위자로부터 스스로를 보호할 수 있습니다.

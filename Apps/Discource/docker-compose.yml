  tips:
    before_install:
      en_us: |
        **Default Account**
        
        | Username | Password |
        |----------|----------|
        | `admin` | `$PCS_DEFAULT_PASSWORD` |
        
        **Important Notes:**
        - First boot may take 2-5 minutes for database setup and asset compilation
        - SMTP configuration is recommended for email notifications (configure in admin settings)
        - All data is stored in `/DATA/AppData/discourse/`
        
        **Post-Installation:**
        1. Log in with the admin account
        2. Complete the setup wizard
        3. Configure SMTP settings for email notifications
        4. Customize site settings and appearance
      fr_fr: |
        **Compte par défaut**
        
        | Nom d'utilisateur | Mot de passe |
        |-------------------|--------------|
        | `admin` | `$PCS_DEFAULT_PASSWORD` |
        
        **Notes importantes :**
        - Le premier démarrage peut prendre 2 à 5 minutes pour la configuration de la base de données et la compilation des ressources
        - La configuration SMTP est recommandée pour les notifications par email (configurer dans les paramètres admin)

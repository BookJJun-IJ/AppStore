name: discourse
services:
  postgresql:
    image: docker.io/bitnami/postgresql:16
    container_name: discourse-postgresql
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: '0.5'
    cpu_shares: 50
    environment:
      - POSTGRESQL_DATABASE=bitnami_discourse
      - POSTGRESQL_USERNAME=bn_discourse
      - POSTGRESQL_PASSWORD=$PCS_DEFAULT_PASSWORD
      - POSTGRESQL_CLIENT_CREATE_DATABASE_NAME=bitnami_discourse
      - POSTGRESQL_CLIENT_CREATE_DATABASE_EXTENSIONS=hstore,pg_trgm
    volumes:
      - /DATA/AppData/$AppID/postgresql:/bitnami/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U bn_discourse -d bitnami_discourse']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discourse-network

  redis:
    image: docker.io/bitnami/redis:7.4
    container_name: discourse-redis
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: '0.25'
    cpu_shares: 30
    environment:
      - REDIS_PASSWORD=$PCS_DEFAULT_PASSWORD
    volumes:
      - /DATA/AppData/$AppID/redis:/bitnami/redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - discourse-network

  discourse:
    image: docker.io/bitnami/discourse:3
    container_name: discourse-app
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: '1.0'
    cpu_shares: 80
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - DISCOURSE_HOST=$PCS_DOMAIN
      - DISCOURSE_USERNAME=admin
      - DISCOURSE_PASSWORD=$PCS_DEFAULT_PASSWORD
      - DISCOURSE_EMAIL=$PCS_EMAIL
      - DISCOURSE_SITENAME=Discourse Forum
      - DISCOURSE_DATABASE_HOST=postgresql
      - DISCOURSE_DATABASE_PORT_NUMBER=5432
      - DISCOURSE_DATABASE_USER=bn_discourse
      - DISCOURSE_DATABASE_NAME=bitnami_discourse
      - DISCOURSE_DATABASE_PASSWORD=$PCS_DEFAULT_PASSWORD
      - DISCOURSE_REDIS_HOST=redis
      - DISCOURSE_REDIS_PORT_NUMBER=6379
      - DISCOURSE_REDIS_PASSWORD=$PCS_DEFAULT_PASSWORD
      - DISCOURSE_PORT_NUMBER=3000
      - DISCOURSE_SKIP_BOOTSTRAP=no
    volumes:
      - /DATA/AppData/$AppID/discourse:/bitnami/discourse
    expose:
      - 3000
    networks:
      - discourse-network

  sidekiq:
    image: docker.io/bitnami/discourse:3
    container_name: discourse-sidekiq
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: '0.5'
    cpu_shares: 50
    depends_on:
      - discourse
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - DISCOURSE_HOST=$PCS_DOMAIN
      - DISCOURSE_DATABASE_HOST=postgresql
      - DISCOURSE_DATABASE_PORT_NUMBER=5432
      - DISCOURSE_DATABASE_USER=bn_discourse
      - DISCOURSE_DATABASE_NAME=bitnami_discourse
      - DISCOURSE_DATABASE_PASSWORD=$PCS_DEFAULT_PASSWORD
      - DISCOURSE_REDIS_HOST=redis
      - DISCOURSE_REDIS_PORT_NUMBER=6379
      - DISCOURSE_REDIS_PASSWORD=$PCS_DEFAULT_PASSWORD
    volumes:
      - /DATA/AppData/$AppID/discourse:/bitnami/discourse
    command: /opt/bitnami/scripts/discourse-sidekiq/run.sh
    networks:
      - discourse-network

networks:
  discourse-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: discourse
  author: Yundera Team
  category: Discussion
  description:
    en_us: Discourse is an open-source discussion platform built for the next decade of the Internet. It provides modern forum software with real-time notifications, email integration, and powerful moderation tools. Perfect for communities, support forums, and team discussions.
    fr_fr: Discourse est une plateforme de discussion open-source conçue pour la prochaine décennie d'Internet. Elle fournit un logiciel de forum moderne avec des notifications en temps réel, une intégration email et des outils de modération puissants. Parfait pour les communautés, les forums de support et les discussions d'équipe.
    es_es: Discourse es una plataforma de discusión de código abierto diseñada para la próxima década de Internet. Proporciona software de foro moderno con notificaciones en tiempo real, integración de correo electrónico y potentes herramientas de moderación. Perfecto para comunidades, foros de soporte y discusiones de equipo.
    zh_cn: Discourse 是一个为互联网下一个十年而构建的开源讨论平台。它提供现代论坛软件,具有实时通知、电子邮件集成和强大的审核工具。非常适合社区、支持论坛和团队讨论。
    ko_kr: Discourse는 인터넷의 다음 10년을 위해 구축된 오픈소스 토론 플랫폼입니다. 실시간 알림, 이메일 통합 및 강력한 관리 도구를 갖춘 현대적인 포럼 소프트웨어를 제공합니다. 커뮤니티, 지원 포럼 및 팀 토론에 완벽합니다.

name: noodle

services:
  noodle:
    image: noodle/noodle:v1.0.0
    container_name: noodle
    user: $PUID:$PGID
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - DATABASE_URL=postgresql://noodle:$default_pwd@postgres:5432/noodle
      - NEXTAUTH_URL=https://noodle-$domain
      - NEXTAUTH_SECRET=$default_pwd
      - NODE_ENV=production
    volumes:
      - /DATA/AppData/$AppID/app-data:/app/data
      - /DATA/AppData/$AppID/uploads:/app/uploads
      - /DATA/Documents:/app/shared/documents
      - /DATA/Gallery:/app/shared/gallery
    expose:
      - 3000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'
        reservations:
          memory: 512M
          cpus: '0.2'

  postgres:
    image: postgres:15-alpine
    container_name: noodle-postgres
    environment:
      - POSTGRES_DB=noodle
      - POSTGRES_USER=noodle
      - POSTGRES_PASSWORD=$default_pwd
      - PUID=$PUID
      - PGID=$PGID
    volumes:
      - /DATA/AppData/$AppID/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'

  redis:
    image: redis:7-alpine
    container_name: noodle-redis
    user: $PUID:$PGID
    environment:
      - PUID=$PUID
      - PGID=$PGID
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: noodle
  webui_port: 3000
  category: Education
  author: Noodle Team
  developer: Ahmed Elsakaan
  title:
    en_us: Noodle
    ko_kr: 누들
  tagline:
    en_us: Rethinking Student Productivity Platform
    ko_kr: 학생 생산성을 위한 올인원 플랫폼
  description:
    en_us: |
      Noodle is an open-source student productivity platform that combines multiple tools into one unified experience. 
      It includes note-taking, task management, flashcards, calendar, grade tracking, and more - everything a student needs to stay organized and productive.

      Key Features:
      - **Note Taking**: Rich text editor with markdown support
      - **Task Management**: Advanced to-do lists with deadlines and priorities  
      - **Flashcards**: Auto-generated from your notes for effective studying
      - **Calendar**: Schedule classes, assignments, and study sessions
      - **Grade Tracking**: Monitor your academic progress
      - **File Management**: Organize course materials and documents
      - **Analytics**: Insights into your productivity patterns
    ko_kr: |
      누들은 학생들을 위한 오픈소스 생산성 플랫폼으로 여러 도구를 하나의 통합된 경험으로 결합합니다.
      노트 작성, 작업 관리, 플래시카드, 캘린더, 성적 추적 등 학생이 체계적이고 생산적으로 지낼 수 있는 모든 것을 포함합니다.

      주요 기능:
      - **노트 작성**: 마크다운을 지원하는 풍부한 텍스트 에디터
      - **작업 관리**: 마감일과 우선순위가 있는 고급 할 일 목록
      - **플래시카드**: 노트에서 자동 생성되어 효과적인 학습 지원
      - **캘린더**: 수업, 과제, 학습 세션 일정 관리
      - **성적 추적**: 학업 진행 상황 모니터링
      - **파일 관리**: 수업 자료와 문서 정리
      - **분석**: 생산성 패턴에 대한 통찰력 제공

  index: /
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/data alpine:latest sh -c "
    mkdir -p /data/app-data /data/uploads /data/postgres /data/redis &&
    chown -R $PUID:$PGID /data
    "
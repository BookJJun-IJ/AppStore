name: plex

services:
  plex:
    image: lscr.io/linuxserver/plex:1.41.8.9834-071366D65-ls269
    container_name: plex
    restart: unless-stopped
    network_mode: host
    expose:
      - 32400
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /DATA/AppData/$AppID/transcode:/transcode
      - /DATA/Media/Movies:/data/movies:ro
      - /DATA/Media/TV Shows:/data/tvshows:ro
      - /DATA/Media/Music:/data/music:ro
      - /DATA/Downloads:/data/downloads
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      VERSION: docker
      PLEX_CLAIM: ""
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Yundera Team

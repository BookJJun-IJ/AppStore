  developer: Plex Inc.
  description:
    en_us: |
      **Stream movies, shows, and your personal media from anywhere.**
      
      Plex is a polished media server that lets you organize and stream your movies, TV shows, music, and photos across devices — including smart TVs, phones, and tablets. It also offers a catalog of free, ad-supported content like live TV and on-demand movies.
      
      ⚠️ **Note:** Plex is not fully free. Streaming your own personal media now requires a Plex Pass subscription or one-time app unlock. Free usage is limited to Plex's ad-supported content.
      
      **Key Features:**
      • Watch free live TV and movies (with ads)
      • Host and stream your own media collection (requires Plex Pass)
      • Access from any device, anywhere
      • Automatic metadata and subtitles
      • Share your library with friends and family
      
      **Setup Required for Personal Media:** To connect Plex to your account and stream your own files, you must enter a **Plex claim token** during installation. Follow our step-by-step guide here: 👉[How to Set Up Plex on Yundera](https://www.yundera.com/blog/tutorial-1/how-to-setup-plex-17)
      
      💡 For a fully free, open-source alternative with no account or subscription needed, try **Jellyfin**.
      
      ℹ️ Yundera is not affiliated with Plex and does not control their services or pricing.
    zh_cn: |
      **随时随地流式传输电影、节目和个人媒体。**
      
      Plex是一个精致的媒体服务器，让您可以在各种设备上整理和流式传输您的电影、电视节目、音乐和照片——包括智能电视、手机和平板电脑。它还提供免费的广告支持内容目录，如直播电视和点播电影。
      
      ⚠️ **注意：** Plex不是完全免费的。流式传输您自己的个人媒体现在需要Plex Pass订阅或一次性应用解锁。免费使用仅限于Plex的广告支持内容。
      
      **主要功能：**
      • 观看免费直播电视和电影（含广告）
      • 托管和流式传输您自己的媒体收藏（需要Plex Pass）
      • 从任何设备、任何地方访问
      • 自动元数据和字幕
      • 与朋友和家人分享您的媒体库
      
      **个人媒体设置要求：** 要将Plex连接到您的账户并流式传输您自己的文件，您必须在安装期间输入**Plex声明令牌**。请按照我们的分步指南操作：👉[如何在Yundera上设置Plex](https://www.yundera.com/blog/tutorial-1/how-to-setup-plex-17)
      
      💡 如需完全免费、无需账户或订阅的开源替代方案，请尝试**Jellyfin**。
      
      ℹ️ Yundera与Plex无关联，不控制其服务或定价。
    ko_kr: |
      **어디서나 영화, 프로그램, 개인 미디어를 스트리밍하세요.**
      
      Plex는 스마트TV, 휴대폰, 태블릿을 포함한 모든 기기에서 영화, TV 프로그램, 음악, 사진을 정리하고 스트리밍할 수 있는 세련된 미디어 서버입니다. 또한 라이브TV와 주문형 영화 같은 무료 광고 지원 콘텐츠 카탈로그도 제공합니다.
      
      ⚠️ **주의:** Plex는 완전히 무료가 아닙니다. 개인 미디어 스트리밍은 이제 Plex Pass 구독 또는 일회성 앱 잠금 해제가 필요합니다. 무료 사용은 Plex의 광고 지원 콘텐츠로 제한됩니다.
      
      **주요 기능:**
      • 무료 라이브TV 및 영화 시청(광고 포함)
      • 개인 미디어 컬렉션 호스팅 및 스트리밍(Plex Pass 필요)
      • 모든 기기에서 어디서나 접속
      • 자동 메타데이터 및 자막
      • 친구와 가족과 라이브러리 공유
      
      **개인 미디어 설정 필요:** Plex를 계정에 연결하고 개인 파일을 스트리밍하려면 설치 중에 **Plex 클레임 토큰**을 입력해야 합니다. 단계별 가이드를 따르세요: 👉[Yundera에서 Plex 설정하는 방법](https://www.yundera.com/blog/tutorial-1/how-to-setup-plex-17)
      
      💡 계정이나 구독이 필요 없는 완전히 무료인 오픈소스 대안으로는 **Jellyfin**을 사용해보세요.
      
      ℹ️ Yundera는 Plex와 관련이 없으며 해당 서비스나 가격을 통제하지 않습니다.
    fr_fr: |
      **Diffusez films, émissions et vos médias personnels de partout.**
      
      Plex est un serveur multimédia raffiné qui vous permet d'organiser et de diffuser vos films, séries TV, musique et photos sur tous vos appareils — y compris les téléviseurs intelligents, téléphones et tablettes. Il offre également un catalogue de contenu gratuit avec publicités comme la télé en direct et des films à la demande.
      
      ⚠️ **Note:** Plex n'est pas entièrement gratuit. La diffusion de vos médias personnels nécessite maintenant un abonnement Plex Pass ou un déverrouillage d'application unique. L'utilisation gratuite est limitée au contenu avec publicités de Plex.
      
      **Fonctionnalités clés:**
      • Regardez la télé en direct et des films gratuits (avec publicités)
      • Hébergez et diffusez votre collection multimédia personnelle (nécessite Plex Pass)
      • Accédez depuis n'importe quel appareil, n'importe où
      • Métadonnées et sous-titres automatiques
      • Partagez votre bibliothèque avec amis et famille
      
      **Configuration requise pour médias personnels:** Pour connecter Plex à votre compte et diffuser vos propres fichiers, vous devez saisir un **jeton de revendication Plex** lors de l'installation. Suivez notre guide étape par étape ici : 👉[Comment configurer Plex sur Yundera](https://www.yundera.com/blog/tutorial-1/how-to-setup-plex-17)
      
      💡 Pour une alternative entièrement gratuite et open-source sans compte ni abonnement, essayez **Jellyfin**.
      
      ℹ️ Yundera n'est pas affilié à Plex et ne contrôle pas leurs services ou tarifs.
    es_es: |
      **Transmite películas, programas y tus medios personales desde cualquier lugar.**
      
      Plex es un servidor multimedia pulido que te permite organizar y transmitir tus películas, programas de TV, música y fotos en todos los dispositivos — incluyendo televisores inteligentes, teléfonos y tabletas. También ofrece un catálogo de contenido gratuito con anuncios como TV en vivo y películas bajo demanda.
      
      ⚠️ **Nota:** Plex no es completamente gratuito. Transmitir tus propios medios personales ahora requiere una suscripción Plex Pass o desbloqueo único de la aplicación. El uso gratuito está limitado al contenido con anuncios de Plex.
      
      **Características principales:**
      • Ver TV en vivo y películas gratis (con anuncios)
      • Alojar y transmitir tu propia colección multimedia (requiere Plex Pass)
      • Acceder desde cualquier dispositivo, en cualquier lugar
      • Metadatos y subtítulos automáticos
      • Compartir tu biblioteca con amigos y familia
      
      **Configuración requerida para medios personales:** Para conectar Plex a tu cuenta y transmitir tus propios archivos, debes ingresar un **token de reclamación de Plex** durante la instalación. Sigue nuestra guía paso a paso aquí: 👉[Cómo configurar Plex en Yundera](https://www.yundera.com/blog/tutorial-1/how-to-setup-plex-17)
      
      💡 Para una alternativa completamente gratuita y de código abierto sin cuenta o suscripción, prueba **Jellyfin**.
      
      ℹ️ Yundera no está afiliado con Plex y no controla sus servicios o precios.

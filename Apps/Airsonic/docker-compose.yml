name: airsonic-advanced

services:
  airsonic:
    image: lscr.io/linuxserver/airsonic-advanced:11.1.4-ls166
    restart: unless-stopped
    user: $PUID:$PGID
    
    expose:
      - 80
    
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      JAVA_OPTS: "-Dserver.port=80 -Dserver.use-forward-headers=true"
    
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /DATA/AppData/$AppID/data:/data
      - /DATA/Media/Music:/music:ro
      - /DATA/AppData/$AppID/playlists:/playlists
    
    deploy:
      resources:
        reservations:
          memory: 256M
    
    cpu_shares: 50
    
    networks:
      - airsonic_network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  airsonic_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: airsonic
  webui_port: 80
  store_app_id: airsonic
  title:
    en_us: Airsonic Advanced
  tagline:
    en_us: Subsonic-compatible music server
  description:
    en_us: |
      Airsonic-Advanced is a modern, actively maintained fork of Subsonic.
      Fully compatible with Subsonic mobile and desktop apps.
  developer: linuxserver.io
  category: Media
  tips:
    before_install:
      en_us: |
        Music folder:
        /DATA/Media/Music
        Config & data:
        /DATA/AppData/airsonic
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/data ubuntu:22.04 sh -c "
    mkdir -p /data/config /data/data /data/playlists &&
    chown -R $PUID:$PGID /data &&
    chmod -R 755 /data &&
    echo 'Airsonic Advanced directories initialized'
    "
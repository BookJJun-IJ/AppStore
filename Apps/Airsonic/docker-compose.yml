name: airsonic

services:
  airsonic:
    image: lscr.io/linuxserver/airsonic-advanced:11.1.4-ls166
    restart: unless-stopped
    expose:
      - 80 
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      JAVA_OPTS: "-Dserver.port=80 -Dserver.use-forward-headers=true"    
    volumes:
      - /DATA/AppData/airsonic/config/:/config
      - /DATA/AppData/airsonic/data/:/data
      - /DATA/Media/Music/:/music:ro
      - /DATA/AppData/airsonic/playlists/:/playlists    
    deploy:
      resources:
        reservations:
          memory: 256M    
    cpu_shares: 50    
    networks:
      - airsonic_network 

networks:
  airsonic_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: airsonic
  webui_port: 80
  store_app_id: airsonic
  title:
    en_us: Airsonic
  tagline:
    en_us: Subsonic-compatible music server
  description:
    en_us: |
      Airsonic-Advanced is a modern, actively maintained fork of Subsonic.
      Fully compatible with Subsonic mobile and desktop apps.
  developer: linuxserver.io
  category: Media
  tips:
    before_install:
      en_us: |
        Music folder:
        /DATA/Media/Music
        Config & data:
        /DATA/AppData/airsonic
  pre-install-cmd: |
    docker run --rm \
      -v /DATA/AppData/$AppID:/data \
      -v /DATA/Media/Music:/music \
      ubuntu:22.04 sh -c "
      mkdir -p /data/config /data/data /data/playlists &&
      mkdir -p /music &&
      chown -R $PUID:$PGID /data /music &&
      chmod -R 755 /data /music &&
      echo 'Airsonic Advanced: directories created successfully'
      "
name: audiobookshelf

services:
  # Init container to create directories
  audiobookshelf-init:
    image: busybox:latest
    container_name: audiobookshelf-init
    user: root
    volumes:
      - /DATA:/DATA
    command: >
      sh -c "
      mkdir -p /DATA/AppData/audiobookshelf/config &&
      mkdir -p /DATA/AppData/audiobookshelf/metadata &&
      mkdir -p /DATA/Media/Audiobooks &&
      mkdir -p /DATA/Media/Podcasts &&
      chown -R 1000:1000 /DATA/AppData/audiobookshelf &&
      chown -R 1000:1000 /DATA/Media/Audiobooks &&
      chown -R 1000:1000 /DATA/Media/Podcasts &&
      chmod -R 755 /DATA/AppData/audiobookshelf &&
      chmod -R 755 /DATA/Media/Audiobooks &&
      chmod -R 755 /DATA/Media/Podcasts &&
      echo 'Directories created successfully'
      "
    restart: "no"

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    depends_on:
      - audiobookshelf-init
    expose:
      - 80
    environment:
      - TZ=Etc/UTC
      - HOST=0.0.0.0
      - PORT=80
      - ROUTER_BASE_PATH=/audiobookshelf
    volumes:
      - /DATA/AppData/audiobookshelf/config:/config
      - /DATA/AppData/audiobookshelf/metadata:/metadata
      - /DATA/Media/Audiobooks:/audiobooks
      - /DATA/Media/Podcasts:/podcasts

x-casaos:
  architectures:
    - amd64
    - arm64
  main: audiobookshelf
  webui_port: 80
  store_app_id: audiobookshelf
  title:
    en_us: Audiobookshelf
  tagline:
    en_us: Self hosted audiobooks and podcasts
  description:
    en_us: |
      Stream your personal audiobooks and podcasts on any device. Easy library management, chapters, metadata, users, and backups. Perfect fit for Yundera PCS.
  developer: advplyr
  category: Media
  tips:
    before_install:
      en_us: |
        Directories will be created automatically on first run.
        Media folders:
        /DATA/Media/Audiobooks
        /DATA/Media/Podcasts
        You can change the paths in the compose if your media lives elsewhere.


name: airsonic

services:
  airsonic-init:
    image: busybox:latest
    user: root
    volumes:
      - /DATA:/DATA
    command: >
      sh -c "
      mkdir -p /DATA/AppData/airsonic/config &&
      mkdir -p /DATA/AppData/airsonic/data &&
      mkdir -p /DATA/Media/Music &&
      chown -R 1000:1000 /DATA/AppData/airsonic /DATA/Media/Music &&
      chmod -R 755 /DATA/AppData/airsonic /DATA/Media/Music &&
      echo 'Airsonic directories created successfully'
      "
    restart: "no"
    networks:
      - pcs

  airsonic:
    image: lscr.io/linuxserver/airsonic-advanced:latest
    restart: unless-stopped
    depends_on:
      - airsonic-init

    ports:
      - target: 4040
        published: ${WEBUI_PORT:-4040}
        protocol: tcp

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CONTEXT_PATH=/airsonic

    volumes:
      - /DATA/AppData/airsonic/config:/config
      - /DATA/AppData/airsonic/data:/data
      - /DATA/Media/Music:/music

    networks:
      - pcs

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: airsonic
  index: /airsonic/
  port_map: ${WEBUI_PORT:-4040}
  store_app_id: airsonic
  title:
    en_us: Airsonic Advanced
  tagline:
    en_us: Subsonic-compatible music server
  description:
    en_us: |
      Airsonic-Advanced is a modern, actively maintained fork of Subsonic.
      Fully compatible with Subsonic mobile and desktop apps.
  developer: linuxserver.io
  category: Media
  tips:
    before_install:
      en_us: |
        Music folder:
        /DATA/Media/Music
        Config & data:
        /DATA/AppData/airsonic

name: sist2

services:
  # ========================================
  # Admin Interface (관리 UI)
  # ========================================
  sist2:
    image: ghcr.io/yundera/nginx-hash-lock:latest
    container_name: sist2
    restart: unless-stopped
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: "sist2-admin"
      BACKEND_PORT: "8080"
      LISTEN_PORT: "80"
    expose:
      - 80
    depends_on:
      - sist2-admin
    cpu_shares: 80
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - pcs

  sist2-admin:
    image: sist2app/sist2:x64-linux
    container_name: sist2-admin
    user: 0:0
    environment:
      PUID: 0
      PGID: 0
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/admin-data:/sist2-admin
      - /DATA/AppData/$AppID/indices:/indices
      - /DATA:/host:ro
    working_dir: /root/sist2-admin/
    entrypoint: python3
    command:
      - /root/sist2-admin/sist2_admin/app.py
    cpu_shares: 50
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - pcs
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

  # ========================================
  # Search Interface (검색 UI)
  # ========================================
  sist2search:
    image: ghcr.io/yundera/nginx-hash-lock:latest
    container_name: sist2search
    restart: unless-stopped
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: "sist2-web"
      BACKEND_PORT: "4090"
      LISTEN_PORT: "80"
    expose:
      - 80
    depends_on:
      - sist2-web
    cpu_shares: 80
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - pcs

  sist2-web:
    image: sist2app/sist2:x64-linux
    container_name: sist2-web
    user: 0:0
    environment:
      PUID: 0
      PGID: 0
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/admin-data:/sist2-admin:ro
      - /DATA/AppData/$AppID/indices:/indices:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for index to be created..."
        while [ ! -d /indices ] || [ -z "$$(ls -A /indices/*.sist2 2>/dev/null)" ]; do
          echo "No index found yet. Waiting 30 seconds..."
          sleep 30
        done
        INDEX_FILE=$$(ls /indices/*.sist2 | head -n 1)
        echo "Found index: $$INDEX_FILE"
        echo "Starting search interface on port 4090..."
        exec /root/sist2 web --bind 0.0.0.0 --port 4090 "$$INDEX_FILE"
    cpu_shares: 50
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - pcs
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: sist2
  author: Yundera Team
  category: Utilities
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/data alpine:3.20 sh -c "
      mkdir -p /data/admin-data /data/indices &&
      chmod -R 755 /data
    "
  description:
    en_us: |
      Sist2 is a lightning-fast file system indexer and search engine using SQLite backend for simple, reliable operation without complex dependencies.
      
      **Key Features:**
      - Fast multi-threaded file indexing with low memory usage
      - SQLite backend - no Elasticsearch needed!
      - OCR support for extracting text from PDFs and images (Tesseract)
      - Full-text search across file names and content
      - Archive support (ZIP, TAR, 7Z, RAR) with recursive scanning
      - Incremental scanning (only updates changed files)
      - Visual analytics and disk usage statistics
      - Mobile-friendly web interface
      - Automatic tagging via user scripts
      
      **Two Secure Interfaces:**
      
      **1. Admin Interface (Main)**
      - Configure scan jobs and manage indexing
      - Click the WebUI button above to access
      - URL: `https://sist2-[username].nsl.sh/?hash=[auto]`
      
      **2. Search Interface (Opens automatically after first index)**
      - Fast, dedicated search UI
      - **URL: `https://sist2search-[username].nsl.sh/?hash=[auto]`**
      - Bookmark this URL for quick access to search
      - Waits for first index creation before activating
      
      **Setup Steps:**
      1. Click WebUI button above to open Admin Interface
      2. Create new scan job with **SQLite backend** (not Elasticsearch)
      3. Set scan path to `/host` (scans your entire /DATA directory)
      4. Click "Index now" and wait for indexing to complete
      5. Open the Search Interface URL above for fast searching
      
      **Important Notes:**
      - Both interfaces use the same authentication hash (included in URLs)
      - The search interface starts automatically once an index exists
      - Initial indexing may take time for large file systems
      - OCR processing enables content search in PDFs and images
      - All files are read-only - nothing is ever modified
      - All data stored in `/DATA/AppData/sist2/`
    ko_kr: |
      Sist2는 복잡한 종속성 없이 간단하고 안정적인 작동을 위해 SQLite 백엔드를 사용하는 초고속 파일 시스템 인덱서 및 검색 엔진입니다.
      
      **주요 기능:**
      - 낮은 메모리 사용량으로 빠른 멀티스레드 파일 인덱싱
      - SQLite 백엔드 - Elasticsearch 불필요!
      - PDF 및 이미지에서 텍스트 추출을 위한 OCR 지원 (Tesseract)
      - 파일 이름 및 내용 전체 텍스트 검색
      - 재귀 스캔을 통한 아카이브 지원 (ZIP, TAR, 7Z, RAR)
      - 증분 스캔 (변경된 파일만 업데이트)
      - 시각적 분석 및 디스크 사용량 통계
      - 모바일 친화적 웹 인터페이스
      - 사용자 스크립트를 통한 자동 태그 지정
      
      **두 개의 보안 인터페이스:**
      
      **1. 관리 인터페이스 (메인)**
      - 스캔 작업 구성 및 인덱싱 관리
      - 위의 WebUI 버튼을 클릭하여 접속
      - URL: `https://sist2-[사용자명].nsl.sh/?hash=[자동]`
      
      **2. 검색 인터페이스 (첫 인덱스 후 자동 열림)**
      - 빠르고 전용 검색 UI
      - **URL: `https://sist2search-[사용자명].nsl.sh/?hash=[자동]`**
      - 빠른 검색 접근을 위해 이 URL을 북마크하세요
      - 첫 인덱스 생성을 대기한 후 활성화
      
      **설정 단계:**
      1. 위의 WebUI 버튼을 클릭하여 관리 인터페이스 열기
      2. **SQLite 백엔드**로 새 스캔 작업 생성 (Elasticsearch 아님)
      3. 스캔 경로를 `/host`로 설정 (전체 /DATA 디렉토리 스캔)
      4. "Index now" 클릭하고 인덱싱 완료 대기
      5. 위의 검색 인터페이스 URL을 열어 빠른 검색
      
      **중요 참고사항:**
      - 두 인터페이스 모두 동일한 인증 해시 사용 (URL에 포함됨)
      - 검색 인터페이스는 인덱스가 생성되면 자동으로 시작
      - 큰 파일 시스템은 초기 인덱싱에 시간 소요
      - OCR 처리로 PDF 및 이미지의 내용 검색 가능
      - 모든 파일은 읽기 전용 - 절대 수정되지 않음
      - 모든 데이터는 `/DATA/AppData/sist2/`에 저장
    fr_fr: |
      Sist2 est un indexeur de système de fichiers ultra-rapide et un moteur de recherche utilisant un backend SQLite pour un fonctionnement simple et fiable sans dépendances complexes.
      
      **Fonctionnalités clés:**
      - Indexation rapide multi-thread avec faible utilisation de la mémoire
      - Backend SQLite - Elasticsearch non requis!
      - Support OCR pour extraire le texte des PDF et images (Tesseract)
      - Recherche en texte intégral sur les noms et le contenu des fichiers
      - Support des archives (ZIP, TAR, 7Z, RAR) avec scan récursif
      - Scan incrémental (ne met à jour que les fichiers modifiés)
      - Analyses visuelles et statistiques d'utilisation du disque
      - Interface Web adaptée aux mobiles
      - Balisage automatique via scripts utilisateur
      
      **Deux interfaces sécurisées:**
      
      **1. Interface Admin (Principale)**
      - Configurer les tâches de scan et gérer l'indexation
      - Cliquez sur le bouton WebUI ci-dessus pour accéder
      - URL: `https://sist2-[nomutilisateur].nsl.sh/?hash=[auto]`
      
      **2. Interface de Recherche (S'ouvre automatiquement après le premier index)**
      - UI de recherche rapide et dédiée
      - **URL: `https://sist2search-[nomutilisateur].nsl.sh/?hash=[auto]`**
      - Marquez cette URL pour un accès rapide à la recherche
      - Attend la création du premier index avant l'activation
      
      **Étapes de configuration:**
      1. Cliquez sur le bouton WebUI ci-dessus pour ouvrir l'interface Admin
      2. Créez un nouveau travail de scan avec **backend SQLite** (pas Elasticsearch)
      3. Définissez le chemin de scan sur `/host` (scanne tout le répertoire /DATA)
      4. Cliquez sur "Index now" et attendez la fin de l'indexation
      5. Ouvrez l'URL de l'interface de recherche ci-dessus pour des recherches rapides
      
      **Notes importantes:**
      - Les deux interfaces utilisent le même hash d'authentification (inclus dans les URLs)
      - L'interface de recherche démarre automatiquement une fois qu'un index existe
      - L'indexation initiale peut prendre du temps pour les grands systèmes
      - Le traitement OCR permet la recherche de contenu dans les PDF et images
      - Tous les fichiers sont en lecture seule - rien n'est jamais modifié
      - Toutes les données stockées dans `/DATA/AppData/sist2/`
    es_es: |
      Sist2 es un indexador de sistema de archivos ultrarrápido y motor de búsqueda que utiliza backend SQLite para una operación simple y confiable sin dependencias complejas.
      
      **Características principales:**
      - Indexación rápida multiproceso con bajo uso de memoria
      - Backend SQLite - ¡no se requiere Elasticsearch!
      - Soporte OCR para extraer texto de PDFs e imágenes (Tesseract)
      - Búsqueda de texto completo en nombres y contenido de archivos
      - Soporte de archivos (ZIP, TAR, 7Z, RAR) con escaneo recursivo
      - Escaneo incremental (solo actualiza archivos modificados)
      - Análisis visual y estadísticas de uso del disco
      - Interfaz web compatible con dispositivos móviles
      - Etiquetado automático mediante scripts de usuario
      
      **Dos interfaces seguras:**
      
      **1. Interfaz Admin (Principal)**
      - Configurar trabajos de escaneo y gestionar indexación
      - Haga clic en el botón WebUI arriba para acceder
      - URL: `https://sist2-[nombreusuario].nsl.sh/?hash=[auto]`
      
      **2. Interfaz de Búsqueda (Se abre automáticamente después del primer índice)**
      - UI de búsqueda rápida y dedicada
      - **URL: `https://sist2search-[nombreusuario].nsl.sh/?hash=[auto]`**
      - Marque esta URL para acceso rápido a la búsqueda
      - Espera la creación del primer índice antes de activarse
      
      **Pasos de configuración:**
      1. Haga clic en el botón WebUI arriba para abrir la interfaz Admin
      2. Cree un nuevo trabajo de escaneo con **backend SQLite** (no Elasticsearch)
      3. Establezca la ruta de escaneo en `/host` (escanea todo el directorio /DATA)
      4. Haga clic en "Index now" y espere a que se complete la indexación
      5. Abra la URL de la interfaz de búsqueda arriba para búsquedas rápidas
      
      **Notas importantes:**
      - Ambas interfaces usan el mismo hash de autenticación (incluido en URLs)
      - La interfaz de búsqueda inicia automáticamente una vez existe un índice
      - La indexación inicial puede tardar para sistemas de archivos grandes
      - El procesamiento OCR permite búsqueda de contenido en PDFs e imágenes
      - Todos los archivos son de solo lectura - nunca se modifican
      - Todos los datos almacenados en `/DATA/AppData/sist2/`
    zh_cn: |
      Sist2 是一个闪电般快速的文件系统索引器和搜索引擎,使用 SQLite 后端实现简单可靠的操作,无需复杂的依赖项。
      
      **主要功能:**
      - 低内存使用的快速多线程文件索引
      - SQLite 后端 - 不需要 Elasticsearch!
      - OCR 支持从 PDF 和图像中提取文本 (Tesseract)
      - 对文件名和内容的全文搜索
      - 支持递归扫描的存档文件 (ZIP、TAR、7Z、RAR)
      - 增量扫描(仅更新更改的文件)
      - 可视化分析和磁盘使用统计
      - 移动友好的 Web 界面
      - 通过用户脚本自动标记
      
      **两个安全界面:**
      
      **1. 管理界面(主要)**
      - 配置扫描作业和管理索引
      - 点击上方的 WebUI 按钮访问
      - URL: `https://sist2-[用户名].nsl.sh/?hash=[自动]`
      
      **2. 搜索界面(第一个索引后自动打开)**
      - 快速、专用搜索 UI
      - **URL: `https://sist2search-[用户名].nsl.sh/?hash=[自动]`**
      - 将此 URL 加入书签以快速访问搜索
      - 等待第一个索引创建后激活
      
      **设置步骤:**
      1. 点击上方的 WebUI 按钮打开管理界面
      2. 使用 **SQLite 后端**创建新的扫描作业(不是 Elasticsearch)
      3. 将扫描路径设置为 `/host`(扫描整个 /DATA 目录)
      4. 点击 "Index now" 并等待索引完成
      5. 打开上方的搜索界面 URL 进行快速搜索
      
      **重要注意事项:**
      - 两个界面使用相同的身份验证哈希(包含在 URL 中)
      - 搜索界面在索引存在后自动启动
      - 大型文件系统的初始索引可能需要时间
      - OCR 处理可在 PDF 和图像中搜索内容
      - 所有文件都是只读的 - 永远不会被修改
      - 所有数据存储在 `/DATA/AppData/sist2/`

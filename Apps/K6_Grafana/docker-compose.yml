name: k6-grafana-load-tester

services:
  influxdb:
    image: influxdb:1.8-alpine
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_USER: k6
      INFLUXDB_USER_PASSWORD: k6password
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/influxdb:/var/lib/influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  grafana:
    image: grafana/grafana:10.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: $default_pwd
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-k6-app
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/grafana:/var/lib/grafana
      - /DATA/AppData/$AppID/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - /DATA/AppData/$AppID/grafana/datasources:/etc/grafana/provisioning/datasources
    expose:
      - 3000
    restart: unless-stopped
    depends_on:
      - influxdb
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  k6:
    image: grafana/k6:0.47.0
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/scripts:/scripts
    depends_on:
      - influxdb
      - grafana
    restart: unless-stopped
    command: sh -c "while true; do echo 'Starting K6 Load Test...'; k6 run --vus 10 --duration 60s /scripts/test.js; echo 'Test completed. Waiting 2 minutes before next test...'; sleep 120; done"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'


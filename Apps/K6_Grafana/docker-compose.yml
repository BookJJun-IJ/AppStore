        **🔧 커스터마이징 (선택사항):**
        테스트 대상 변경하려면: /DATA/AppData/k6-grafana-load-tester/scripts/test.js 편집
        
        **완벽한 용도:**
        - 지속적인 성능 모니터링
        - 전문적인 로드 테스트 리포트
        - 실시간 성능 대시보드
        - 자동화된 테스트 워크플로
        
        설치만 하고 자동으로 실행되는 테스트를 확인하세요! 📊✨
  pre-install-cmd: mkdir -p /DATA/AppData/k6-grafana-load-tester/scripts /DATA/AppData/k6-grafana-load-tester/grafana/dashboards /DATA/AppData/k6-grafana-load-tester/grafana/datasources && echo 'import http from "k6/http"; import { check, sleep } from "k6"; export default function () { const response = http.get("https://httpbin.org/get"); check(response, { "status is 200": (r) => r.status === 200, "response time < 500ms": (r) => r.timings.duration < 500, }); sleep(1); }' > /DATA/AppData/k6-grafana-load-tester/scripts/test.js && echo 'apiVersion: 1\ndatasources:\n  - name: InfluxDB\n    type: influxdb\n    access: proxy\n    url: http://influxdb:8086\n    database: k6\n    user: k6\n    password: k6password\n    isDefault: true' > /DATA/AppData/k6-grafana-load-tester/grafana/datasources/influxdb.yml
  index: /
  webui_port: 3000
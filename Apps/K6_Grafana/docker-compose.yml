name: k6performancesuite

services:
  influxdb:
    image: influxdb:1.8.10
    user: $PUID:$PGID
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/influxdb-data:/var/lib/influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:11.3.1
    user: $PUID:$PGID
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: $default_pwd
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-k6-app
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/grafana-data:/var/lib/grafana
    expose:
      - 3000
    depends_on:
      - influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  k6:
    image: grafana/k6:0.54.0
    user: $PUID:$PGID
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/k6-scripts:/scripts
      - /DATA/AppData/$AppID/results:/results
    working_dir: /scripts
    command: sleep infinity
    depends_on:
      - influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: grafana
  author: Yundera Community
  category: Utilities
  description:
    en_us: K6 Performance Testing Suite with Grafana analytics
    ko_kr: Grafana 분석이 포함된 K6 성능 테스트 도구
  developer: Grafana Labs
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/K6PerformanceSuite/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/K6PerformanceSuite/screenshot-1.png
  tagline:
    en_us: Professional K6 testing with Grafana
    ko_kr: Grafana와 함께하는 전문 K6 테스트
  title:
    en_us: K6 Performance Suite
    ko_kr: K6 성능 테스트 도구
  tips:
    before_install:
      en_us: |
        **K6 Performance Testing Suite**
        
        Access: https://k6performancesuite-username.nsl.sh/
        Login: admin / $default_pwd
        
        Setup:
        1. Add InfluxDB data source in Grafana
        2. Create dashboards with K6 metrics
        3. Run tests manually via K6 container
        
        Simple and powerful load testing!
      ko_kr: |
        **K6 성능 테스트 도구**
        
        접속: https://k6performancesuite-username.nsl.sh/
        로그인: admin / $default_pwd
        
        설정:
        1. Grafana에서 InfluxDB 데이터 소스 추가
        2. K6 메트릭으로 대시보드 생성
        3. K6 컨테이너를 통해 수동으로 테스트 실행
        
        간단하고 강력한 로드 테스트!
  index: /
  webui_port: 3000
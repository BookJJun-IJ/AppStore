name: k6performancesuite

services:
  influxdb:
    image: influxdb:1.8.10
    user: $PUID:$PGID
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/influxdb-data:/var/lib/influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:11.3.1
    user: $PUID:$PGID
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: $default_pwd
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-k6-app
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/grafana-data:/var/lib/grafana
    expose:
      - 3000
    depends_on:
      - influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  k6:
    image: grafana/k6:0.54.0
    user: $PUID:$PGID
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/k6-scripts:/scripts
      - /DATA/AppData/$AppID/results:/results
    working_dir: /scripts
    command: sh -c "echo 'import http from \"k6/http\"; import { check, sleep } from \"k6\"; export default function() { const response = http.get(\"https://httpbin.org/get\"); check(response, { \"status is 200\": (r) => r.status === 200, \"response time < 500ms\": (r) => r.timings.duration < 500 }); sleep(1); }' > /scripts/test.js && echo 'Waiting for InfluxDB...' && sleep 30 && while true; do echo 'Starting K6 test...' && k6 run --vus 10 --duration 60s /scripts/test.js && echo 'Test done. Next in 3 minutes.' && sleep 180; done"
    depends_on:
      - influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: grafana
  author: Yundera Community
  category: Utilities
  description:
    en_us: |
      K6 Performance Testing Suite with Grafana analytics. 
      K6 automatically runs tests every 3 minutes.
      Use Grafana web interface to add InfluxDB and create dashboards.
    ko_kr: |
      Grafana 분석이 포함된 K6 성능 테스트 도구입니다.
      K6가 3분마다 자동으로 테스트를 실행합니다.
      Grafana 웹 인터페이스에서 InfluxDB를 추가하고 대시보드를 만드세요.
  developer: Grafana Labs
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/K6PerformanceSuite/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/K6PerformanceSuite/screenshot-1.png
  tagline:
    en_us: "Automated K6 testing with Grafana dashboards"
    ko_kr: "Grafana 대시보드와 함께하는 자동화 K6 테스트"
  title:
    en_us: K6 Performance Suite
    ko_kr: K6 성능 테스트 도구
  tips:
    before_install:
      en_us: |
        **K6 Performance Testing Suite**
        
        **Access:** https://k6performancesuite-username.nsl.sh/
        **Login:** admin / $default_pwd
        
        **🚀 Setup (One-time only):**
        1. Open Grafana dashboard
        2. Go to Configuration → Data sources
        3. Add InfluxDB data source:
           - URL: http://influxdb:8086
           - Database: k6
           - (Leave user/password empty)
        4. Create new dashboard
        5. Add panels with queries:
           - FROM: http_req_duration (response time)
           - FROM: http_reqs (requests count)
           - FROM: vus (virtual users)
        
        **✨ K6 Auto-Testing:**
        - Tests run automatically every 3 minutes
        - Target: https://httpbin.org/get
        - 10 virtual users for 60 seconds
        
        **📊 Available metrics:**
        - http_req_duration (response times)
        - http_reqs (request count)
        - vus (virtual users)
        - checks (success/failure)
        
        Simple setup, powerful results! 🎯
      ko_kr: |
        **K6 성능 테스트 도구**
        
        **접속:** https://k6performancesuite-username.nsl.sh/
        **로그인:** admin / $default_pwd
        
        **🚀 설정 (최초 1회만):**
        1. Grafana 대시보드 열기
        2. Configuration → Data sources 이동
        3. InfluxDB 데이터소스 추가:
           - URL: http://influxdb:8086
           - Database: k6
           - (사용자/비밀번호는 비워둠)
        4. 새 대시보드 생성
        5. 쿼리로 패널 추가:
           - FROM: http_req_duration (응답시간)
           - FROM: http_reqs (요청 수)
           - FROM: vus (가상 사용자)
        
        **✨ K6 자동 테스트:**
        - 3분마다 자동으로 테스트 실행
        - 대상: https://httpbin.org/get
        - 60초 동안 10명의 가상 사용자
        
        **📊 사용 가능한 메트릭:**
        - http_req_duration (응답시간)
        - http_reqs (요청 수)
        - vus (가상 사용자)
        - checks (성공/실패)
        
        간단한 설정, 강력한 결과! 🎯
  index: /
  webui_port: 3000
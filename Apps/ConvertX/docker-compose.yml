name: convertx

services:
  convertx:
    image: ghcr.io/c4illin/convertx:v0.14.1
    container_name: convertx
    user: $PUID:$PGID
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    expose:
      - 3000
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      JWT_SECRET: $default_pwd
      ACCOUNT_REGISTRATION: "false"
      HTTP_ALLOWED: "false"
      ALLOW_UNAUTHENTICATED: "false"
      AUTO_DELETE_EVERY_N_HOURS: "24"
      HIDE_HISTORY: "false"
      FFMPEG_ARGS: "-preset fast"
    volumes:
      - /DATA/AppData/$AppID/data:/app/data
      - /DATA/Downloads:/downloads
      - /DATA/Documents:/documents
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: convertx
  author: CasaOS Team
  category: Utilities
  description:
    en_us: ConvertX is a self-hosted online file converter that supports over 1000 different file formats. Convert images, videos, audio files, documents, and more with this powerful web-based tool. Built with TypeScript and powered by FFmpeg, Pandoc, ImageMagick, and other proven libraries.
    ko_kr: ConvertX는 1000개 이상의 다양한 파일 형식을 지원하는 자가 호스팅 온라인 파일 변환기입니다. 이미지, 비디오, 오디오 파일, 문서 등을 이 강력한 웹 기반 도구로 변환하세요.
    zh_cn: ConvertX是一个支持1000多种不同文件格式的自托管在线文件转换器。使用这个强大的基于网络的工具转换图像、视频、音频文件、文档等。
    fr_fr: ConvertX est un convertisseur de fichiers en ligne auto-hébergé qui prend en charge plus de 1000 formats de fichiers différents. Convertissez des images, vidéos, fichiers audio, documents et plus avec cet outil web puissant.
    es_es: ConvertX es un convertidor de archivos en línea auto-hospedado que admite más de 1000 formatos de archivo diferentes. Convierte imágenes, videos, archivos de audio, documentos y más con esta potente herramienta basada en web.
  developer: C4illin
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/ConvertX/icon.png
  screenshot:
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/ConvertX/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/ConvertX/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/ConvertX/screenshot-3.png
  tagline:
    en_us: Self-hosted file converter supporting 1000+ formats
    ko_kr: 1000개 이상의 형식을 지원하는 자가 호스팅 파일 변환기
    zh_cn: 支持1000多种格式的自托管文件转换器
    fr_fr: Convertisseur de fichiers auto-hébergé supportant plus de 1000 formats
    es_es: Convertidor de archivos auto-hospedado que admite más de 1000 formatos
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/ConvertX/thumbnail.png
  title:
    en_us: ConvertX
  tips:
    before_install:
      en_us: |
        **Default Configuration**
        
        - **First User**: The first account registered becomes the admin
        - **File Storage**: Converted files are automatically deleted after 24 hours
        - **Supported Formats**: Images, videos, audio, documents, 3D models, and more
        - **Security**: HTTPS access recommended, HTTP disabled by default
        
        **Supported Conversions**
        - **Images**: PNG, JPG, WebP, AVIF, SVG, PDF, and many more
        - **Videos**: MP4, WebM, AVI, MOV, MKV using FFmpeg
        - **Audio**: MP3, WAV, FLAC, OGG, AAC, and more
        - **Documents**: PDF, DOCX, HTML, Markdown via Pandoc
        - **3D Models**: STL, OBJ, PLY, and other formats
      ko_kr: |
        **기본 설정**
        
        - **첫 번째 사용자**: 등록한 첫 번째 계정이 관리자가 됩니다
        - **파일 저장**: 변환된 파일은 24시간 후 자동 삭제됩니다
        - **지원 형식**: 이미지, 비디오, 오디오, 문서, 3D 모델 등
        - **보안**: HTTPS 접근 권장, HTTP는 기본적으로 비활성화
  index: /
  webui_port: 3000
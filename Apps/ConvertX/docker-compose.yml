name: convertx

services:
  convertx:
    image: ghcr.io/c4illin/convertx:v0.14.1
    container_name: convertx
    # user 설정 제거 - 컨테이너가 내부적으로 권한 처리
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    expose:
      - 3000  # NSL 라우터용 expose
    environment:
      # 시스템 변수
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # 보안 설정
      JWT_SECRET: $default_pwd  # CasaOS가 생성하는 안전한 비밀번호
      ACCOUNT_REGISTRATION: "false"
      HTTP_ALLOWED: "false"
      ALLOW_UNAUTHENTICATED: "false"
      
      # 자동 삭제 비활성화 (안정성 향상)
      AUTO_DELETE_EVERY_N_HOURS: "0"
      
      # 기타 설정
      HIDE_HISTORY: "false"
      FFMPEG_ARGS: "-preset fast"
      
    volumes:
      # AppData - 앱 전용 데이터 (SQLite DB 포함)
      - /DATA/AppData/$AppID/data:/app/data
      - /DATA/AppData/$AppID/cache:/app/cache
      
      # 사용자 디렉토리
      - /DATA/Downloads:/downloads
      - /DATA/Documents:/documents
      
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 90s  # 시작 대기 시간 증가
      
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

x-casaos:
  architectures:
    - amd64
    - arm64
  main: convertx
  author: CasaOS Team
  category: Utilities
  developer: C4illin
  
  # 필수 메타데이터
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/icon.png
  screenshot:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/thumbnail.png
  
  # 다국어 지원 (필수: en_us, fr_fr, ko_kr, zh_cn, es_es)
  title:
    en_us: ConvertX
  
  tagline:
    en_us: Universal file converter supporting 1000+ formats with complete privacy
    fr_fr: Convertisseur de fichiers universel supportant plus de 1000 formats avec confidentialité complète
    ko_kr: 완전한 개인정보 보호와 함께 1000개 이상의 형식을 지원하는 범용 파일 변환기
    zh_cn: 支持1000多种格式的通用文件转换器，完全保护隐私
    es_es: Convertidor de archivos universal que admite más de 1000 formatos con privacidad completa
  
  description:
    en_us: |
      ConvertX is your own universal file converter that supports over 1000+ different file formats. 
      Think of it as having a Swiss Army knife for files - convert images, videos, audio, documents, 
      3D models, and more, all from your browser. Everything is processed locally on your server, 
      so your files never leave your control.
    fr_fr: |
      ConvertX est votre propre convertisseur de fichiers universel qui prend en charge plus de 1000 
      formats de fichiers différents. Pensez-y comme un couteau suisse pour les fichiers.
    ko_kr: |
      ConvertX는 1000개 이상의 다양한 파일 형식을 지원하는 당신만의 범용 파일 변환기입니다. 
      파일을 위한 스위스 아미 나이프처럼 브라우저에서 이미지, 비디오, 오디오, 문서, 3D 모델 등을 
      변환할 수 있습니다.
    zh_cn: |
      ConvertX是您自己的通用文件转换器，支持1000多种不同的文件格式。把它想象成文件的瑞士军刀。
    es_es: |
      ConvertX es tu propio convertidor de archivos universal que admite más de 1000 formatos de archivo 
      diferentes.
  
  tips:
    before_install:
      en_us: |
        **Important Notice:**
        
        ConvertX will create its database on first launch.
        The first user account created becomes the admin.
        
        **If you encounter database errors:**
        Run these commands via SSH:
        ```
        docker exec -it convertx sh
        cd /app/data
        touch mydb.sqlite
        chmod 666 mydb.sqlite
        exit
        docker restart convertx
        ```
      ko_kr: |
        **중요 공지:**
        
        ConvertX는 첫 실행시 데이터베이스를 생성합니다.
        첫 번째로 생성된 사용자가 관리자가 됩니다.
        
        **데이터베이스 오류 발생시:**
        SSH로 다음 명령어 실행:
        ```
        docker exec -it convertx sh
        cd /app/data
        touch mydb.sqlite
        chmod 666 mydb.sqlite
        exit
        docker restart convertx
        ```
  
  # Pre-install 명령어 - 디렉토리 생성 및 권한 설정
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/data /DATA/AppData/$AppID/cache &&
    chmod 777 /DATA/AppData/$AppID/data &&
    chmod 777 /DATA/AppData/$AppID/cache
  
  # Web UI 설정
  index: /
  webui_port: 3000  # expose와 일치해야 함
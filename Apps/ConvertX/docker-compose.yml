name: convertx

services:
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: convertx-nginx
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 80
    expose:
      - 80
    command: >
      /bin/sh -c "
      mkdir -p /etc/nginx/conf.d &&
      cat > /etc/nginx/conf.d/default.conf <<'EOF'
      server {
          listen 80;
          server_name _;
          
          location / {
              proxy_pass http://convertx:3000;
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection \"upgrade\";
          }
      }
      EOF
      nginx -g 'daemon off;'
      "
    depends_on:
      - convertx
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  convertx:
    image: ghcr.io/c4illin/convertx:v0.15.1
    container_name: convertx
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 70
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    environment:
      - PUID=0
      - PGID=0
      - JWT_SECRET=$PCS_DEFAULT_PASSWORD
      - ACCOUNT_REGISTRATION=false
      - HTTP_ALLOWED=true
      - ALLOW_UNAUTHENTICATED=false
      - AUTO_DELETE_EVERY_N_HOURS=24
    volumes:
      - /DATA/AppData/$AppID/data:/app/data
      - /DATA/Downloads:/downloads:ro
      - /DATA/Documents:/documents:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nginx-proxy
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/data &&
    chmod -R 777 /DATA/AppData/$AppID/data &&
    echo "ConvertX data directory prepared"

name: convertx

services:
  convertx:
    image: ghcr.io/c4illin/convertx:v0.14.1
    container_name: convertx
    user: "0:0"
    restart: unless-stopped
    working_dir: /app  # 작업 디렉토리 명시적 지정
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    expose:
      - 3000
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      JWT_SECRET: $default_pwd
      ACCOUNT_REGISTRATION: "false"
      HTTP_ALLOWED: "false"
      ALLOW_UNAUTHENTICATED: "false"
      AUTO_DELETE_EVERY_N_HOURS: "0"
      HIDE_HISTORY: "false"
      FFMPEG_ARGS: "-preset fast"
      
    volumes:
      # data 디렉토리를 직접 마운트
      - /DATA/AppData/$AppID/sqlite-data:/app/data
      - /DATA/Downloads:/downloads
      - /DATA/Documents:/documents
      
    # entrypoint로 디렉토리 확인 후 실행
    entrypoint: |
      sh -c "
      cd /app
      mkdir -p data
      exec bun run /app/src/index.ts
      "
      
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: convertx
  category: Utilities
  
  title:
    en_us: ConvertX
  
  tagline:
    en_us: Universal file converter
    ko_kr: 범용 파일 변환기
    zh_cn: 通用文件转换器
    fr_fr: Convertisseur universel
    es_es: Convertidor universal
  
  description:
    en_us: File converter supporting 1000+ formats
    ko_kr: 1000개 이상 형식 지원 파일 변환기
    zh_cn: 支持1000多种格式的文件转换器
    fr_fr: Convertisseur supportant plus de 1000 formats
    es_es: Convertidor que admite más de 1000 formatos
  
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/sqlite-data
  
  index: /
  webui_port: 3000
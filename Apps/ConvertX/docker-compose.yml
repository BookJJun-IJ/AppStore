name: convertx

services:
  convertx:
    image: ghcr.io/c4illin/convertx:v0.14.1
    container_name: convertx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    expose:
      - 3000
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - JWT_SECRET=changeme123
      - ACCOUNT_REGISTRATION=false
      - HTTP_ALLOWED=false
      - ALLOW_UNAUTHENTICATED=false
      - AUTO_DELETE_EVERY_N_HOURS=0
      - HIDE_HISTORY=false
      - FFMPEG_ARGS=-preset fast
    volumes:
      - type: bind
        source: /DATA/AppData/convertx/data
        target: /app/data
      - type: bind
        source: /DATA/Downloads
        target: /downloads
      - type: bind
        source: /DATA/Documents
        target: /documents
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: convertx
  author: CasaOS Team
  category: Utilities
  developer: C4illin
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/screenshot-2.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ConvertX/thumbnail.png
  title:
    en_us: ConvertX
  tagline:
    en_us: Universal file converter supporting 1000+ formats
  description:
    en_us: ConvertX is a universal file converter that supports over 1000 different file formats. Convert images, videos, audio, documents, and more from your browser.
  index: /
  port_map: "3000"
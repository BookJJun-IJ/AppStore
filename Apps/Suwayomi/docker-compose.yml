name: suwayomi

services:
  suwayomi:
    image: ghcr.io/suwayomi/tachidesk:v2.0.1727  # 공식 최신 이미지
    user: $PUID:$PGID
    container_name: suwayomi
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # 포트 설정
      BIND_IP: 0.0.0.0
      BIND_PORT: 80
      
      # ✅ 개선된 인증 설정 - Simple Login 사용
      AUTH_MODE: simple_login
      AUTH_USERNAME: admin
      AUTH_PASSWORD: $default_pwd
      
      # 다운로드 설정
      DOWNLOAD_AS_CBZ: true
      AUTO_DOWNLOAD_CHAPTERS: false  # 수동 제어
      AUTO_DOWNLOAD_EXCLUDE_UNREAD: true
      AUTO_DOWNLOAD_NEW_CHAPTERS_LIMIT: 0
      
      # 업데이트 설정 (더 보수적)
      UPDATE_EXCLUDE_UNREAD: true
      UPDATE_EXCLUDE_STARTED: true
      UPDATE_EXCLUDE_COMPLETED: true
      UPDATE_INTERVAL: 0  # 자동 업데이트 비활성화
      UPDATE_MANGA_INFO: false
      
      # WebUI 설정 - Preview 버전 (디바이스별 설정 지원)
      WEB_UI_ENABLED: true
      WEB_UI_FLAVOR: WebUI
      WEB_UI_CHANNEL: preview  # 🔥 디바이스별 설정 기능
      WEB_UI_UPDATE_INTERVAL: 23
      
      # 확장 저장소 (Keiyoushi만)
      EXTENSION_REPOS: >-
        ["https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json"]
      
      # 성능 설정
      MAX_SOURCES_IN_PARALLEL: 3  # 더 보수적
      
      # 백업 설정
      BACKUP_INTERVAL: 7  # 주간 백업
      BACKUP_TTL: 30     # 30일 보관
      
      # FlareSolverr 연동
      FLARESOLVERR_ENABLED: true
      FLARESOLVERR_URL: http://suwayomi-flaresolverr:8191
      FLARESOLVERR_TIMEOUT: 60
      FLARESOLVERR_SESSION_NAME: suwayomi
      FLARESOLVERR_SESSION_TTL: 15
      
      # 보안 설정
      DEBUG: false
    volumes:
      # ✅ 개선된 볼륨 매핑 - 사용자 친화적 구조
      - /DATA/Media/Mangas:/home/suwayomi/.local/share/Tachidesk/downloads/mangas
      - /DATA/AppData/$AppID/data:/home/suwayomi/.local/share/Tachidesk
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    depends_on:
      - flaresolverr

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: suwayomi-flaresolverr
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOG_LEVEL: info
      CAPTCHA_SOLVER: none
      # FlareSolverr 최적화
      BROWSER_TIMEOUT: 40000
      TEST_URL: https://www.google.com
    volumes:
      - /DATA/AppData/$AppID/flaresolverr:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: suwayomi
  author: Suwayomi Team
  category: Media
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Suwayomi/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Suwayomi/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Suwayomi/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Suwayomi/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Suwayomi/screenshot-1.png
  description:
    en_us: |
      Self-hosted manga server that lets you read manga from 1200+ sources on any device. 
      Access your manga library from web browsers, mobile apps, or any OPDS-compatible reader. 
      Pre-configured with trusted manga sources and safe browsing settings.
  developer: Suwayomi Project
  tagline:
    en_us: Your personal manga server with 1200+ sources
  title:
    en_us: Suwayomi
  tips:
    before_install:
      en_us: |
        **🔐 Simple Login (No More Basic Auth!)**
        | Username | Password       |
        | -------- | -------------- |
        | `admin`  | `$default_pwd` |
        
        **📁 File Organization**
        - **Manga Downloads**: `/DATA/Media/Mangas/` (Direct access!)
        - **App Data**: `/DATA/AppData/suwayomi/` (System files)
        
        **📱 Mobile Reading Setup (One-time)**
        
        **Settings** → **Reader** → Set for ALL reading modes:
        
        **Scale Type**: `Fit Screen` or `Fit Height` ✅
        
        **Apply to ALL modes below:**
        - Vertical (Single Page)
        - Vertical (Strip) 
        - Right to Left
        - Left to Right
        - Vertical (Webtoon)
        
        **⚠️ Known Issue**: Settings reset when opening new manga
        **Workaround**: Bookmark this setting path for quick re-setup
        
        **🎯 Best Scale Types for Mobile:**
        - **Fit Screen**: Full page fits mobile screen
        - **Fit Height**: Page height matches screen height
        
        **💻 Desktop users**: Use separate browser for different settings
        
        **📚 Recommended Sources**
        Settings → Browse → Extensions:
        MangaDex, Mangakakalot, Mangafire, AsuraScans
        
        **🔄 Quick Reset**: Settings → Reader → Scale Type → Apply to all modes
  index: /
  webui_port: 80
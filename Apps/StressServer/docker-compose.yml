    fr_fr: "Outil professionnel de test de performance système utilisant Phoronix Test Suite. Tests complets de CPU, mémoire, E/S disque et performance de compression avec des benchmarks standard de l'industrie. Génère des rapports JSON détaillés, données CSV et résumés lisibles. Pas d'interface web - conçu pour usage de développement professionnel."
    es_es: "Herramienta profesional de evaluación de rendimiento del sistema usando Phoronix Test Suite. Pruebas integrales de CPU, memoria, E/S de disco y rendimiento de compresión usando benchmarks estándar de la industria. Genera informes JSON detallados, datos CSV y resúmenes legibles. Sin interfaz web - diseñado para uso de desarrollo profesional."
    zh_cn: "使用Phoronix Test Suite的专业系统性能基准测试工具。使用行业标准基准对CPU、内存、磁盘I/O和压缩性能进行全面测试。生成详细的JSON报告、CSV数据和易读摘要。无Web界面 - 专为专业开发使用而设计。"

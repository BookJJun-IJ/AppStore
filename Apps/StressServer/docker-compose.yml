name: phoronix-test-suite

services:
  phoromatic:
    image: ubuntu:22.04
    container_name: phoronix-test-suite
    user: 0:0  # Phoromatic이 디렉토리를 생성하기 위해 root 필요
    hostname: $domain
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      DEBIAN_FRONTEND: noninteractive
    volumes:
      - /DATA/AppData/phoronix-test-suite/phoromatic:/var/lib/phoronix-test-suite/phoromatic
      - /DATA/AppData/phoronix-test-suite/cache:/var/cache/phoronix-test-suite
      - /DATA/AppData/phoronix-test-suite/results:/var/lib/phoronix-test-suite/test-results
      - /DATA/AppData/phoronix-test-suite/pts-config:/var/lib/phoronix-test-suite
    restart: unless-stopped
    command: >
      bash -c "
      echo '🚀 Installing Phoronix Test Suite + Phoromatic Server...' &&
      
      # Install dependencies
      apt-get update && 
      apt-get install -y wget curl php8.1-cli php8.1-xml php8.1-sqlite3 php8.1-json unzip sudo &&
      
      # Create user for phoronix
      useradd -u \$PUID -g \$PGID -m phoronix || true &&
      
      # Create and set permissions for all directories
      mkdir -p /var/lib/phoronix-test-suite/phoromatic &&
      mkdir -p /var/cache/phoronix-test-suite &&
      mkdir -p /var/lib/phoronix-test-suite/test-results &&
      mkdir -p /etc/phoronix-test-suite &&
      mkdir -p /.phoronix-test-suite &&
      
      # Download and install Phoronix Test Suite
      cd /tmp &&
      wget -q https://phoronix-test-suite.com/releases/phoronix-test-suite-10.8.4.tar.gz &&
      tar -xf phoronix-test-suite-10.8.4.tar.gz &&
      cd phoronix-test-suite &&
      ./install-sh /usr/local &&
      
      # Create symlink for root user access
      ln -sf /var/lib/phoronix-test-suite /.phoronix-test-suite &&
      
      # Set ALL permissions BEFORE starting server
      chown -R \$PUID:\$PGID /var/lib/phoronix-test-suite &&
      chown -R \$PUID:\$PGID /var/cache/phoronix-test-suite &&
      chown -R \$PUID:\$PGID /.phoronix-test-suite &&
      chmod -R 755 /var/lib/phoronix-test-suite &&
      chmod -R 755 /var/cache/phoronix-test-suite &&
      
      # Configure Phoronix Test Suite for batch mode
      mkdir -p /etc/phoronix-test-suite &&
      cat > /etc/phoronix-test-suite/user-config.xml << 'EOF'
      <?xml version=\"1.0\"?>
      <PhoronixTestSuite>
        <Options>
          <OpenBenchmarking>
            <AnonymousUsageReporting>FALSE</AnonymousUsageReporting>
            <IndexCacheTTL>3</IndexCacheTTL>
            <AlwaysUploadSystemLogs>FALSE</AlwaysUploadSystemLogs>
            <AllowResultUploadsToOpenBenchmarking>TRUE</AllowResultUploadsToOpenBenchmarking>
          </OpenBenchmarking>
          <General>
            <DefaultBrowser></DefaultBrowser>
            <UsePhodeviCache>TRUE</UsePhodeviCache>
            <DefaultDisplayMode>DEFAULT</DefaultDisplayMode>
            <PhoromaticServers></PhoromaticServers>
            <FullOutput>FALSE</FullOutput>
            <ColoredConsole>AUTO</ColoredConsole>
          </General>
          <Installation>
            <RemoveDownloadFiles>FALSE</RemoveDownloadFiles>
            <SearchMediaForCache>TRUE</SearchMediaForCache>
            <SymLinkFilesFromCache>FALSE</SymLinkFilesFromCache>
            <PromptForDownloadMirror>FALSE</PromptForDownloadMirror>
            <EnvironmentDirectory>/var/lib/phoronix-test-suite/installed-tests/</EnvironmentDirectory>
            <CacheDirectory>/var/cache/phoronix-test-suite/download-cache/</CacheDirectory>
          </Installation>
          <Testing>
            <SaveSystemLogs>TRUE</SaveSystemLogs>
            <SaveInstallationLogs>TRUE</SaveInstallationLogs>
            <SaveTestLogs>TRUE</SaveTestLogs>
            <RemoveTestInstallOnCompletion>FALSE</RemoveTestInstallOnCompletion>
            <ResultsDirectory>/var/lib/phoronix-test-suite/test-results/</ResultsDirectory>
            <AlwaysUploadResultsToOpenBenchmarking>FALSE</AlwaysUploadResultsToOpenBenchmarking>
            <AutoSortRunQueue>TRUE</AutoSortRunQueue>
            <ShowPostRunStatistics>TRUE</ShowPostRunStatistics>
          </Testing>
          <ResultViewer>
            <WebPort>RANDOM</WebPort>
            <LimitAccessToLocalHost>FALSE</LimitAccessToLocalHost>
            <AccessKey></AccessKey>
            <AllowSavingResultChanges>TRUE</AllowSavingResultChanges>
            <AllowDeletingResults>TRUE</AllowDeletingResults>
          </ResultViewer>
          <BatchMode>
            <SaveResults>TRUE</SaveResults>
            <OpenBrowser>FALSE</OpenBrowser>
            <UploadResults>FALSE</UploadResults>
            <PromptForTestIdentifier>FALSE</PromptForTestIdentifier>
            <PromptForTestDescription>FALSE</PromptForTestDescription>
            <PromptSaveName>FALSE</PromptSaveName>
            <RunAllTestCombinations>TRUE</RunAllTestCombinations>
            <Configured>TRUE</Configured>
          </BatchMode>
          <Networking>
            <NoInternetCommunication>FALSE</NoInternetCommunication>
            <NoNetworkCommunication>FALSE</NoNetworkCommunication>
            <Timeout>20</Timeout>
          </Networking>
          <Server>
            <RemoteAccessPort>80</RemoteAccessPort>
            <WebSocketPort>RANDOM</WebSocketPort>
            <AdvertiseServiceZeroConf>FALSE</AdvertiseServiceZeroConf>
            <AdvertiseServiceOpenBenchmarkRelay>FALSE</AdvertiseServiceOpenBenchmarkRelay>
            <PhoromaticStorage>/var/lib/phoronix-test-suite/phoromatic/</PhoromaticStorage>
          </Server>
        </Options>
      </PhoronixTestSuite>
      EOF
      
      # Setup batch mode to avoid prompts
      echo 'y' | su - phoronix -c 'phoronix-test-suite batch-setup' || echo 'y' | phoronix-test-suite batch-setup &&
      
      echo '🌐 Starting Phoromatic Server on port 80...' &&
      echo '✨ Access at: https://phoronix-test-suite-\$username.nsl.sh/' &&
      echo '🎯 Features: 650+ benchmarks, automated scheduling, web interface!' &&
      echo '📝 Create account from web interface to get started!' &&
      
      # Start Phoromatic server with proper error handling
      exec phoronix-test-suite start-phoromatic-server
      "


    en_us: "Professional benchmark suite powered by Phoronix Test Suite"
    fr_fr: "Suite de benchmarks professionnelle alimentée par Phoronix Test Suite"
    es_es: "Suite de evaluación profesional impulsada por Phoronix Test Suite"
    zh_cn: "由Phoronix Test Suite驱动的专业基准测试套件"
  title:
    en_us: Yundera Benchmark Pro
    fr_fr: Yundera Benchmark Pro
    es_es: Yundera Benchmark Pro
    zh_cn: Yundera专业基准测试
  tips:

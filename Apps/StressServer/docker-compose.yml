      **보안 참고사항: Root 컨테이너 사용**
      
      이 앱은 다음과 같은 정당한 이유로 root(user: 0:0)로 실행됩니다:
      
      1. **시스템 패키지 설치**: PHP, 의존성, Phoronix Test Suite 설치를 위해 root 권한 필요
      2. **Phoromatic 서버 초기화**: 시스템 디렉토리 생성 및 웹 서버 시작을 위해 root 접근 권한 필요
      3. **벤치마크 도구 접근**: 많은 벤치마크 도구가 정확한 하드웨어 접근을 위해 높은 권한 필요
      4. **디렉토리 권한**: Phoromatic 작동을 위한 중요 요구사항 - /var/lib 및 /etc에 쓰기 권한 필요
      5. **AppData 전용 접근**: 컨테이너는 AppData 디렉토리만 접근하며 사용자 파일과 상호작용하지 않음
      6. **전문 도구**: 전 세계 주요 기술 회사에서 사용하는 업계 표준 플랫폼
      
      **완화 조치:**
      - 시스템 초기화 후 파일 소유권을 PUID:PGID로 적절히 설정
      - Phoromatic 웹 인터페이스를 통한 벤치마크 기능에 대한 안전하고 제어된 접근
      - 웹 인터페이스 외 네트워크 노출 없음 (포트 80만)
      - 결과 및 설정은 적절한 권한으로 AppData에 저장
      - 정의된 리소스 제한이 있는 격리된 환경에서 컨테이너 실행
      - 공식 Phoromatic Docker 구현의 확립된 패턴 준수
      
      이는 시스템 수준 접근이 필요한 AppData 전용 전문 애플리케이션에 대한 CasaOS 보안 모델을 따릅니다.
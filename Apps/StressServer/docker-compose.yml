name: phoronix-test-suite

services:
  phoronix:
    image: tomzo/phoromatic:latest
    container_name: phoronix-test-suite
    user: $PUID:$PGID
    hostname: $domain
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    expose:
      - 9090
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/phoronix-test-suite/results:/var/lib/phoronix-test-suite/test-results
      - /DATA/AppData/phoronix-test-suite/config:/etc/phoronix-test-suite
      - /DATA/AppData/phoronix-test-suite/cache:/var/cache/phoronix-test-suite/download-cache
      - /DATA/AppData/phoronix-test-suite/phoromatic:/var/lib/phoronix-test-suite/phoromatic
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: phoronix
  webui_port: 9090
  category: Utilities
  author: Yundera Community
  developer: Phoronix Media
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PhoronixTestSuite/icon.png
  screenshot:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PhoronixTestSuite/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PhoronixTestSuite/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PhoronixTestSuite/screenshot-3.png
  tagline:
    en_us: Professional benchmark suite with complete web interface and automated reporting
    ko_kr: 완전한 웹 인터페이스와 자동화된 리포트 기능을 갖춘 전문 벤치마크 도구
  title:
    en_us: Phoronix Test Suite
    ko_kr: Phoronix Test Suite
  description:
    en_us: |
      **🏆 THE ULTIMATE Benchmarking Platform with Complete Web Interface!**
      
      Phoronix Test Suite is the industry-standard benchmarking platform used by hardware reviewers worldwide, 
      now featuring **Phoromatic Web Interface** for complete browser-based management.
      
      **🌐 Complete Web Interface (Phoromatic):**
      - **Zero Command Line Required** - Everything through your browser!
      - **Real-time Dashboard** - Monitor benchmarks as they run
      - **Automatic Test Scheduling** - Set recurring performance tests
      - **Remote Test Management** - Install and run 650+ tests via web
      - **Centralized Results Hub** - All benchmark results in one place
      - **Export & Reporting** - CSV, JSON, PDF, HTML reports
      - **OpenBenchmarking Integration** - Compare with global database
      
      **⚡ 650+ Professional Benchmark Tests:**
      - **CPU Performance** - Single/multi-core, encryption, compression
      - **Memory & Cache** - Bandwidth, latency, throughput testing
      - **Storage I/O** - Sequential/random read/write, IOPS analysis
      - **Graphics & GPU** - OpenGL, Vulkan, compute benchmarks
      - **Network Performance** - Bandwidth, latency, packet analysis
      - **System Stress Tests** - Stability and thermal evaluation
      - **Database Performance** - MySQL, PostgreSQL benchmarks
      - **Compiler Performance** - Build time optimization tests
      
      **🔬 Professional Features:**
      - **Statistical Analysis** - Automatic significance testing
      - **Performance Regression Detection** - Git integration for CI/CD
      - **Multi-System Management** - Enterprise-grade orchestration
      - **Custom Test Suites** - Build your own benchmark combinations
      - **Hardware Detection** - Automatic system profiling
      - **Result Comparison** - Side-by-side performance analysis
      
      **🎯 Perfect For:**
      - Hardware evaluation and purchasing decisions
      - Performance baseline establishment and tracking
      - System optimization validation and tuning
      - Quality assurance and continuous integration
      - Academic research and development
      - Server performance monitoring
      
      **Used by major tech companies, hardware reviewers, and research institutions worldwide!**
    ko_kr: |
      **🏆 완전한 웹 인터페이스를 갖춘 최고의 벤치마킹 플랫폼!**
      
      Phoronix Test Suite는 전 세계 하드웨어 리뷰어들이 사용하는 업계 표준 벤치마킹 플랫폼으로, 
      이제 완전한 브라우저 기반 관리를 위한 **Phoromatic 웹 인터페이스**를 제공합니다.
      
      **🌐 완전한 웹 인터페이스 (Phoromatic):**
      - **명령줄 완전 불필요** - 모든 것을 브라우저에서!
      - **실시간 대시보드** - 벤치마크 실행 상황을 실시간 모니터링
      - **자동 테스트 스케줄링** - 정기적인 성능 테스트 설정
      - **원격 테스트 관리** - 웹을 통해 650개 이상 테스트 설치 및 실행
      - **중앙 집중식 결과 허브** - 모든 벤치마크 결과를 한 곳에서
      - **내보내기 및 리포트** - CSV, JSON, PDF, HTML 리포트
      - **OpenBenchmarking 통합** - 글로벌 데이터베이스와 비교
      
      **⚡ 650개 이상의 전문 벤치마크 테스트:**
      - **CPU 성능** - 싱글/멀티코어, 암호화, 압축
      - **메모리 및 캐시** - 대역폭, 지연시간, 처리량 테스트
      - **스토리지 I/O** - 순차/랜덤 읽기/쓰기, IOPS 분석
      - **그래픽 및 GPU** - OpenGL, Vulkan, 컴퓨트 벤치마크
      - **네트워크 성능** - 대역폭, 지연시간, 패킷 분석
      - **시스템 스트레스 테스트** - 안정성 및 열 평가
      - **데이터베이스 성능** - MySQL, PostgreSQL 벤치마크
      - **컴파일러 성능** - 빌드 시간 최적화 테스트
      
      **🔬 전문가 기능:**
      - **통계 분석** - 자동 유의성 테스트
      - **성능 회귀 탐지** - CI/CD를 위한 Git 통합
      - **다중 시스템 관리** - 엔터프라이즈급 오케스트레이션
      - **사용자 정의 테스트 스위트** - 나만의 벤치마크 조합 구성
      - **하드웨어 감지** - 자동 시스템 프로파일링
      - **결과 비교** - 나란히 성능 분석
      
      **🎯 완벽한 활용 분야:**
      - 하드웨어 평가 및 구매 결정
      - 성능 기준선 설정 및 추적
      - 시스템 최적화 검증 및 튜닝
      - 품질 보증 및 지속적 통합
      - 학술 연구 및 개발
      - 서버 성능 모니터링
      
      **전 세계 주요 기술 회사, 하드웨어 리뷰어, 연구 기관에서 사용 중!**

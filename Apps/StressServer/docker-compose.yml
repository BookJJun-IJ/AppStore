      en_us: |
        **Professional Benchmark Tool - Phoronix Test Suite**
        
        Industry-standard benchmarking with 130+ tests.
        
        **Run Comprehensive Benchmark:**
        ```bash
        docker exec yundera-benchmark-phoronix-pts-1 /app/run-benchmark.sh
        ```
        
        **Quick Performance Test:**
        ```bash
        docker exec yundera-benchmark-phoronix-pts-1 /app/quick-test.sh

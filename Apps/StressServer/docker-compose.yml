name: yundera-benchmark

services:
  phoronix-pts:
    image: ghcr.io/mshekow/pts-docker-benchmark:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      TEST_RESULTS_NAME: "yundera-benchmark-${HOSTNAME:-server}"
    volumes:
      - /DATA/AppData/$AppID/reports:/app/reports
      - /DATA/AppData/$AppID/config:/app/config
      - /DATA/AppData/$AppID/tmp:/tmp/benchmark
    working_dir: /app
    restart: "no"
    command: >
      sh -c "
        # Create directories
        mkdir -p /app/reports /app/config &&
        
        # Install required packages for report processing
        apk add --no-cache curl jq bc &&
        
        # Create configuration file
        if [ ! -f /app/config/benchmark-config.json ]; then
          cat > /app/config/benchmark-config.json << 'EOF'
        {
          \"benchmark_version\": \"2.0.0\",
          \"engine\": \"phoronix_test_suite\",
          \"tests\": {
            \"enabled_suites\": [
              \"pts/cpu\",
              \"pts/memory\", 
              \"pts/disk\",
              \"pts/compression\"
            ],
            \"individual_tests\": [
              \"pts/openssl\",
              \"pts/7zip\",
              \"pts/fio\",
              \"pts/sysbench\"
            ]
          }
        }
        EOF
        fi &&
        
        # Create comprehensive benchmark script
        cat > /app/run-benchmark.sh << 'SCRIPT'
        #!/bin/sh
        
        TIMESTAMP=\$(date +%Y%m%d_%H%M%S)
        REPORT_DIR=\"/app/reports\"
        REPORT_FILE=\"\$REPORT_DIR/benchmark_report_\$TIMESTAMP.json\"
        SUMMARY_FILE=\"\$REPORT_DIR/benchmark_summary_\$TIMESTAMP.txt\"
        CSV_FILE=\"\$REPORT_DIR/benchmark_results_\$TIMESTAMP.csv\"
        
        echo \"=== Yundera Professional Benchmark Started ===\" | tee \$SUMMARY_FILE
        echo \"Engine: Phoronix Test Suite (Professional Grade)\" | tee -a \$SUMMARY_FILE
        echo \"Start Time: \$(date)\" | tee -a \$SUMMARY_FILE
        echo \"Hostname: \$(hostname)\" | tee -a \$SUMMARY_FILE
        echo \"\" | tee -a \$SUMMARY_FILE
        
        # Set test results name for PTS
        export TEST_RESULTS_NAME=\"yundera-benchmark-\$TIMESTAMP\"
        
        # Start JSON report
        echo \"{\" > \$REPORT_FILE
        echo \"  \\\"timestamp\\\": \\\"\$(date -Iseconds)\\\",\" >> \$REPORT_FILE
        echo \"  \\\"hostname\\\": \\\"\$(hostname)\\\",\" >> \$REPORT_FILE
        echo \"  \\\"benchmark_engine\\\": \\\"Phoronix Test Suite\\\",\" >> \$REPORT_FILE
        echo \"  \\\"system_info\\\": {\" >> \$REPORT_FILE
        echo \"    \\\"container_image\\\": \\\"ghcr.io/mshekow/pts-docker-benchmark\\\",\" >> \$REPORT_FILE
        echo \"    \\\"base_os\\\": \\\"Alpine Linux\\\"\" >> \$REPORT_FILE
        echo \"  },\" >> \$REPORT_FILE
        echo \"  \\\"results\\\": {\" >> \$REPORT_FILE
        
        echo \"[1/4] Running CPU performance tests...\" | tee -a \$SUMMARY_FILE
        echo \"  - OpenSSL benchmark\" | tee -a \$SUMMARY_FILE
        echo \"  - 7-Zip compression benchmark\" | tee -a \$SUMMARY_FILE
        
        # Run the pre-configured test suite from the container
        cd /phoronix-test-suite
        ./phoronix-test-suite batch-run local/benchmark-suite > /tmp/pts_output.txt 2>&1
        
        # Process results and convert to CSV
        ./phoronix-test-suite result-file-to-csv \$TEST_RESULTS_NAME > /tmp/pts_csv.txt 2>&1
        
        # Copy CSV to reports if generated
        if [ -f \"/tmp/test-results/\$TEST_RESULTS_NAME.csv\" ]; then
          cp \"/tmp/test-results/\$TEST_RESULTS_NAME.csv\" \$CSV_FILE
          echo \"CSV results saved to: \$CSV_FILE\" | tee -a \$SUMMARY_FILE
        fi
        
        # Extract key metrics from PTS output
        if [ -f /tmp/pts_output.txt ]; then
          echo \"[2/4] Processing CPU benchmark results...\" | tee -a \$SUMMARY_FILE
          
          # Extract OpenSSL results (example)
          OPENSSL_RESULT=\$(grep -i 'openssl' /tmp/pts_output.txt | grep -E '[0-9]+\\.[0-9]+' | head -1 | awk '{print \$NF}' || echo \"0\")
          
          echo \"    \\\"cpu_openssl\\\": {\" >> \$REPORT_FILE
          echo \"      \\\"score\\\": \$OPENSSL_RESULT,\" >> \$REPORT_FILE
          echo \"      \\\"unit\\\": \\\"operations_per_second\\\",\" >> \$REPORT_FILE
          echo \"      \\\"test\\\": \\\"pts/openssl\\\"\" >> \$REPORT_FILE
          echo \"    },\" >> \$REPORT_FILE
          
          echo \"OpenSSL Score: \$OPENSSL_RESULT ops/sec\" | tee -a \$SUMMARY_FILE
        fi
        
        echo \"[3/4] Processing memory and disk benchmarks...\" | tee -a \$SUMMARY_FILE
        
        # Extract 7-Zip results
        SEVENZIP_RESULT=\$(grep -i '7-?zip\\|compression' /tmp/pts_output.txt | grep -E '[0-9]+\\.[0-9]+' | head -1 | awk '{print \$NF}' || echo \"0\")
        
        echo \"    \\\"compression_7zip\\\": {\" >> \$REPORT_FILE
        echo \"      \\\"score\\\": \$SEVENZIP_RESULT,\" >> \$REPORT_FILE
        echo \"      \\\"unit\\\": \\\"MIPS\\\",\" >> \$REPORT_FILE
        echo \"      \\\"test\\\": \\\"pts/7zip\\\"\" >> \$REPORT_FILE
        echo \"    },\" >> \$REPORT_FILE
        
        echo \"7-Zip Score: \$SEVENZIP_RESULT MIPS\" | tee -a \$SUMMARY_FILE
        
        # Extract FIO disk results if available
        FIO_RESULT=\$(grep -i 'fio\\|disk\\|io' /tmp/pts_output.txt | grep -E '[0-9]+\\.[0-9]+' | head -1 | awk '{print \$NF}' || echo \"0\")
        
        echo \"    \\\"disk_io\\\": {\" >> \$REPORT_FILE
        echo \"      \\\"score\\\": \$FIO_RESULT,\" >> \$REPORT_FILE
        echo \"      \\\"unit\\\": \\\"MB_per_second\\\",\" >> \$REPORT_FILE
        echo \"      \\\"test\\\": \\\"pts/fio\\\"\" >> \$REPORT_FILE
        echo \"    }\" >> \$REPORT_FILE
        
        echo \"Disk I/O Score: \$FIO_RESULT MB/s\" | tee -a \$SUMMARY_FILE
        
        # Finish JSON report
        echo \"  },\" >> \$REPORT_FILE
        echo \"  \\\"raw_output_file\\\": \\\"/tmp/pts_output.txt\\\",\" >> \$REPORT_FILE
        echo \"  \\\"csv_file\\\": \\\"\$CSV_FILE\\\"\" >> \$REPORT_FILE
        echo \"}\" >> \$REPORT_FILE
        
        echo \"\" | tee -a \$SUMMARY_FILE
        echo \"[4/4] Finalizing results...\" | tee -a \$SUMMARY_FILE
        echo \"=== Professional Benchmark Completed ===\" | tee -a \$SUMMARY_FILE
        echo \"End Time: \$(date)\" | tee -a \$SUMMARY_FILE
        echo \"\" | tee -a \$SUMMARY_FILE
        echo \"📊 Report Files Generated:\" | tee -a \$SUMMARY_FILE
        echo \"  JSON Report: \$REPORT_FILE\" | tee -a \$SUMMARY_FILE
        echo \"  Text Summary: \$SUMMARY_FILE\" | tee -a \$SUMMARY_FILE
        echo \"  CSV Data: \$CSV_FILE\" | tee -a \$SUMMARY_FILE
        echo \"\" | tee -a \$SUMMARY_FILE
        
        # Calculate composite score
        if [ \"\$OPENSSL_RESULT\" != \"0\" ] && [ \"\$SEVENZIP_RESULT\" != \"0\" ]; then
          COMPOSITE_SCORE=\$(echo \"scale=2; (\$OPENSSL_RESULT/1000 + \$SEVENZIP_RESULT/1000 + \$FIO_RESULT/100)/3\" | bc -l 2>/dev/null || echo \"N/A\")
          echo \"🏆 Composite Performance Score: \$COMPOSITE_SCORE\" | tee -a \$SUMMARY_FILE
        else
          echo \"🏆 Composite Performance Score: N/A (incomplete results)\" | tee -a \$SUMMARY_FILE
        fi
        
        echo \"\"
        echo \"Professional benchmark completed!\"
        echo \"Results available in: /DATA/AppData/yundera-benchmark/reports/\"
        echo \"\"
        echo \"View detailed results:\"
        echo \"  cat \$SUMMARY_FILE\"
        echo \"  cat \$CSV_FILE\"
        SCRIPT
        
        chmod +x /app/run-benchmark.sh &&
        
        # Create quick test script
        cat > /app/quick-test.sh << 'QUICKSCRIPT'
        #!/bin/sh
        echo \"=== Yundera Quick Performance Test ===\"
        echo \"Engine: Phoronix Test Suite (Quick Mode)\"
        echo \"Start Time: \$(date)\"
        echo \"\"
        
        export TEST_RESULTS_NAME=\"yundera-quick-\$(date +%Y%m%d_%H%M%S)\"
        
        echo \"[1/2] Running quick CPU test...\"
        cd /phoronix-test-suite
        timeout 300 ./phoronix-test-suite run pts/openssl &
        PID=\$!
        
        echo \"[2/2] Processing results...\"
        wait \$PID
        
        echo \"\"
        echo \"Quick test completed! Run /app/run-benchmark.sh for comprehensive benchmark.\"
        QUICKSCRIPT
        
        chmod +x /app/quick-test.sh &&
        
        echo \"=== Yundera Professional Benchmark Tool Ready ===\" &&
        echo \"\" &&
        echo \"🚀 Powered by Phoronix Test Suite (Industry Standard)\" &&
        echo \"\" &&
        echo \"📊 Available commands:\" &&
        echo \"  Full benchmark: docker exec \$HOSTNAME /app/run-benchmark.sh\" &&
        echo \"  Quick test:     docker exec \$HOSTNAME /app/quick-test.sh\" &&
        echo \"  Shell access:   docker exec -it \$HOSTNAME sh\" &&
        echo \"\" &&
        echo \"📁 Report location: /DATA/AppData/yundera-benchmark/reports/\" &&
        echo \"⚙️  Config location: /DATA/AppData/yundera-benchmark/config/\" &&
        echo \"\" &&
        echo \"🏆 Professional benchmark container ready!\" &&
        
        # Keep container running
        tail -f /dev/null
      "

x-casaos:
  architectures:
    - amd64
    - arm64
  main: phoronix-pts
  category: Developer
  author: Yundera Team
  description:

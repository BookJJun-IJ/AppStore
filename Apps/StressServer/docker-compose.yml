  rationale:
    en_us: |
      **Security Note: Root Container Usage**
      
      This app runs as root (user: 0:0) for the following justified reasons:
      
      1. **System Package Installation**: Requires root privileges to install PHP, dependencies, and Phoronix Test Suite
      2. **Phoromatic Server Initialization**: Needs root access to create system directories and start web server
      3. **Benchmark Tool Access**: Many benchmark tools require elevated privileges for accurate hardware access
      4. **Directory Permissions**: Critical requirement for Phoromatic to function - must have write access to /var/lib and /etc
      5. **AppData Only Access**: Container exclusively accesses AppData directories and does not interact with user files
      6. **Professional Tool**: Industry-standard platform used by major technology companies worldwide
      
      **Mitigation Measures:**
      - File ownership is properly set to PUID:PGID after system initialization
      - Phoromatic web interface provides secure, controlled access to benchmark functions
      - No network exposure beyond the web interface (port 80 only)

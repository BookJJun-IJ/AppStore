  rationale:
    en_us: |
      **Security Note: Root Container Usage**
      
      This app runs as root (user: 0:0) for the following justified reasons:
      
      1. **Phoromatic Server**: Requires root privileges to start the web server on port 80
      2. **System Hardware Access**: Benchmark tools need access to hardware sensors and system information
      3. **AppData Only**: Container only accesses AppData directories and does not interact with user files
      4. **Professional Tool**: Industry-standard benchmarking platform used by major tech companies
      
      **Mitigation Measures:**
      - File ownership is set to PUID:PGID after initialization
      - Web interface provides secure, controlled access
      - No direct system modification (read-only hardware access)
      - Results stored in AppData with proper permissions
      
      This follows the CasaOS security model for AppData-only professional applications.
    ko_kr: |
      **보안 참고사항: Root 컨테이너 사용**
      
      이 앱은 다음과 같은 정당한 이유로 root(user: 0:0)로 실행됩니다:
      
      1. **Phoromatic 서버**: 포트 80에서 웹 서버를 시작하기 위해 root 권한 필요
      2. **시스템 하드웨어 접근**: 벤치마크 도구가 하드웨어 센서와 시스템 정보에 접근해야 함
      3. **AppData 전용**: 컨테이너는 AppData 디렉토리만 접근하며 사용자 파일과 상호작용하지 않음
      4. **전문 도구**: 주요 기술 회사들이 사용하는 업계 표준 벤치마킹 플랫폼
      
      **완화 조치:**
      - 초기화 후 파일 소유권을 PUID:PGID로 설정
      - 웹 인터페이스를 통한 안전하고 제어된 접근
      - 직접적인 시스템 수정 없음 (읽기 전용 하드웨어 접근)
      - 결과는 적절한 권한으로 AppData에 저장
      
      이는 AppData 전용 전문 애플리케이션에 대한 CasaOS 보안 모델을 따릅니다.
name: performance-monitor-benchmark
services:
  netdata:
    image: netdata/netdata:latest
    container_name: performance-monitor
    hostname: yundera-monitor
    expose:
      - 19999
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      NETDATA_CLAIM_TOKEN: ""
      NETDATA_CLAIM_ROOMS: ""
      NETDATA_CLAIM_URL: "https://app.netdata.cloud"
    volumes:
      - /DATA/AppData/$AppID/netdata-config:/etc/netdata
      - /DATA/AppData/$AppID/netdata-lib:/var/lib/netdata
      - /DATA/AppData/$AppID/netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /DATA/Documents/BenchmarkReports:/reports
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  benchmark-tools:
    image: ubuntu:22.04
    container_name: benchmark-tools
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      DEBIAN_FRONTEND: noninteractive
    volumes:
      - /DATA/AppData/$AppID/benchmark-results:/benchmark-results
      - /DATA/Documents/BenchmarkReports:/reports
      - /DATA/AppData/$AppID/benchmark-scripts:/scripts
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y stress-ng fio sysbench iperf3 curl jq &&
      mkdir -p /benchmark-results /reports /scripts &&
      cat > /scripts/cpu-benchmark.sh << 'EOF'
      #!/bin/bash
      echo '=== CPU Benchmark Report ===' > /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo 'Date: $(date)' >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo '' >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo 'CPU Stress Test (4 cores, 60 seconds):' >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      stress-ng --cpu 4 --timeout 60s --metrics-brief 2>&1 >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo '' >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo 'Sysbench CPU Test:' >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      sysbench cpu --cpu-max-prime=20000 --threads=4 run 2>&1 >> /reports/cpu-benchmark-$(date +%Y%m%d-%H%M%S).txt
      EOF
      &&
      cat > /scripts/disk-benchmark.sh << 'EOF'
      #!/bin/bash
      REPORT_FILE=/reports/disk-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo '=== Disk I/O Benchmark Report ===' > $REPORT_FILE
      echo 'Date: $(date)' >> $REPORT_FILE
      echo '' >> $REPORT_FILE
      echo 'FIO Random Read/Write Test:' >> $REPORT_FILE
      fio --name=randreadwrite --ioengine=libaio --rw=randrw --bs=4k --size=1G --numjobs=4 --time_based --runtime=60 --group_reporting --directory=/benchmark-results 2>&1 >> $REPORT_FILE
      echo '' >> $REPORT_FILE
      echo 'Sysbench File I/O Test:' >> $REPORT_FILE
      cd /benchmark-results && sysbench fileio --file-total-size=2G --file-test-mode=rndrw --time=60 --max-requests=0 prepare && sysbench fileio --file-total-size=2G --file-test-mode=rndrw --time=60 --max-requests=0 run 2>&1 >> $REPORT_FILE && sysbench fileio cleanup
      EOF
      &&
      cat > /scripts/memory-benchmark.sh << 'EOF'
      #!/bin/bash
      REPORT_FILE=/reports/memory-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo '=== Memory Benchmark Report ===' > $REPORT_FILE
      echo 'Date: $(date)' >> $REPORT_FILE
      echo '' >> $REPORT_FILE
      echo 'Memory Stress Test (1GB, 60 seconds):' >> $REPORT_FILE
      stress-ng --vm 2 --vm-bytes 1G --timeout 60s --metrics-brief 2>&1 >> $REPORT_FILE
      echo '' >> $REPORT_FILE
      echo 'Sysbench Memory Test:' >> $REPORT_FILE
      sysbench memory --memory-block-size=1K --memory-total-size=10G run 2>&1 >> $REPORT_FILE
      EOF
      &&
      cat > /scripts/network-benchmark.sh << 'EOF'
      #!/bin/bash
      REPORT_FILE=/reports/network-benchmark-$(date +%Y%m%d-%H%M%S).txt
      echo '=== Network Benchmark Report ===' > $REPORT_FILE
      echo 'Date: $(date)' >> $REPORT_FILE
      echo '' >> $REPORT_FILE
      echo 'Network speed test requires iperf3 server. Run manually:' >> $REPORT_FILE
      echo 'iperf3 -c SERVER_IP' >> $REPORT_FILE
      EOF
      &&
      cat > /scripts/full-benchmark.sh << 'EOF'
      #!/bin/bash
      echo 'Starting Full System Benchmark...'
      /scripts/cpu-benchmark.sh
      echo 'CPU benchmark completed.'
      /scripts/memory-benchmark.sh  
      echo 'Memory benchmark completed.'
      /scripts/disk-benchmark.sh
      echo 'Disk benchmark completed.'
      echo 'Full benchmark completed. Check /reports/ for results.'
      EOF
      &&
      chmod +x /scripts/*.sh &&
      echo 'Benchmark tools ready. Access via: docker exec benchmark-tools /scripts/full-benchmark.sh' &&
      tail -f /dev/null
      "

x-casaos:
  main: netdata
  webui_port: 19999
  category: System
  architectures: [amd64, arm64]
  author: Yundera Team
  developer: Netdata, Stress-ng, FIO
  title:
    en_us: Performance Monitor & Benchmark Suite
    ko_kr: 성능 모니터 & 벤치마크 스위트
    fr_fr: Moniteur de Performance & Suite de Benchmarks
    es_es: Monitor de Rendimiento & Suite de Benchmarks
    zh_cn: 性能监控与基准测试套件
  description:
    en_us: Real-time system monitoring with Netdata dashboard plus comprehensive benchmarking tools (stress-ng, FIO, sysbench). Monitor CPU, memory, disk I/O, and network in real-time while running performance tests and generating detailed reports.
    ko_kr: Netdata 대시보드를 통한 실시간 시스템 모니터링과 종합적인 벤치마크 도구들(stress-ng, FIO, sysbench). CPU, 메모리, 디스크 I/O, 네트워크를 실시간으로 모니터링하며 성능 테스트를 실행하고 상세한 리포트를 생성합니다.
    fr_fr: Surveillance système en temps réel avec tableau de bord Netdata plus outils de benchmarking complets. Surveillez CPU, mémoire, E/S disque et réseau en temps réel.
    es_es: Monitorización del sistema en tiempo real con panel Netdata más herramientas de benchmarking integrales. Supervise CPU, memoria, E/S de disco y red en tiempo real.
    zh_cn: 通过 Netdata 仪表板进行实时系统监控，加上全面的基准测试工具。实时监控 CPU、内存、磁盘 I/O 和网络性能。
  tagline:
    en_us: Monitor in real-time, benchmark with precision
    ko_kr: 실시간 모니터링, 정밀한 벤치마크
    fr_fr: Surveillance en temps réel, benchmarks précis
    es_es: Monitoreo en tiempo real, benchmarks precisos
    zh_cn: 实时监控，精确基准测试
  tips:
    before_install:
      en_us: |
        ## Performance Monitor & Benchmark Suite

        This app combines real-time monitoring with comprehensive benchmarking:

        ### Real-time Monitoring (Netdata):
        - CPU, memory, disk I/O, network metrics updated every second
        - Docker container monitoring
        - Interactive dashboards with zoom and pan
        - Automatic anomaly detection

        ### Benchmark Tools Available:
        - **stress-ng**: CPU and memory stress testing
        - **FIO**: Advanced disk I/O benchmarking  
        - **sysbench**: CPU, memory, and file I/O tests
        - **iperf3**: Network performance testing

        ### Quick Start Commands:
        ```bash
        # Full system benchmark
        docker exec benchmark-tools /scripts/full-benchmark.sh

        # Individual tests
        docker exec benchmark-tools /scripts/cpu-benchmark.sh
        docker exec benchmark-tools /scripts/memory-benchmark.sh
        docker exec benchmark-tools /scripts/disk-benchmark.sh

        # Custom stress tests
        docker exec benchmark-tools stress-ng --cpu 4 --timeout 30s
        docker exec benchmark-tools fio --name=test --ioengine=libaio --rw=randread --bs=4k --size=1G
        ```

        ### Reports Location:
        All benchmark reports are saved to `/DATA/Documents/BenchmarkReports/`

        **Note**: Monitor the Netdata dashboard while running benchmarks to see real-time impact on system resources.
      ko_kr: |
        ## 성능 모니터 & 벤치마크 스위트

        이 앱은 실시간 모니터링과 종합적인 벤치마킹을 결합합니다:

        ### 실시간 모니터링 (Netdata):
        - CPU, 메모리, 디스크 I/O, 네트워크 메트릭을 매초 업데이트
        - Docker 컨테이너 모니터링
        - 줌 및 팬 기능이 있는 인터랙티브 대시보드
        - 자동 이상 감지

        ### 사용 가능한 벤치마크 도구:
        - **stress-ng**: CPU 및 메모리 스트레스 테스트
        - **FIO**: 고급 디스크 I/O 벤치마킹
        - **sysbench**: CPU, 메모리, 파일 I/O 테스트
        - **iperf3**: 네트워크 성능 테스트

        ### 빠른 시작 명령어:
        ```bash
        # 전체 시스템 벤치마크
        docker exec benchmark-tools /scripts/full-benchmark.sh

        # 개별 테스트
        docker exec benchmark-tools /scripts/cpu-benchmark.sh
        docker exec benchmark-tools /scripts/memory-benchmark.sh
        docker exec benchmark-tools /scripts/disk-benchmark.sh

        # 커스텀 스트레스 테스트
        docker exec benchmark-tools stress-ng --cpu 4 --timeout 30s
        docker exec benchmark-tools fio --name=test --ioengine=libaio --rw=randread --bs=4k --size=1G
        ```

        ### 리포트 위치:
        모든 벤치마크 리포트는 `/DATA/Documents/BenchmarkReports/`에 저장됩니다

        **참고**: 벤치마크 실행 중 Netdata 대시보드를 모니터링하여 시스템 리소스에 미치는 실시간 영향을 확인하세요.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PerformanceMonitorBenchmark/icon.png
  screenshot:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PerformanceMonitorBenchmark/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PerformanceMonitorBenchmark/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PerformanceMonitorBenchmark/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PerformanceMonitorBenchmark/thumbnail.png
  index: /
  pre-install-cmd: |
    mkdir -p /DATA/Documents/BenchmarkReports &&
    chown -R $PUID:$PGID /DATA/Documents/BenchmarkReports &&
    echo "Benchmark reports directory created"
  tips:
    before_install:
      en_us: |
        **🎵 Music Setup Guide**
        
        **1. Add Your Music:**
        Place your music files in `/DATA/Media/Music/`
        Navidrome will automatically scan and organize your collection.
        
        **2. Supported Formats:**
        MP3, FLAC, OGG, M4A, WAV, AIFF
        
        **3. First-Time Setup:**
        Create your admin account on first visit to the web interface.
        No default credentials - you set everything up on first login.
        
        **4. Mobile Apps:**
        Download any Subsonic-compatible app:
        - **iOS:** play:Sub, Amperfy, iSub
        - **Android:** DSub, Audinaut, Ultrasonic
        
        **5. Server URL for Mobile Apps:**
        `https://navidrome-username.nsl.sh`
        
        **💡 Pro Tip:** Organize your music in Artist/Album/Track.mp3 format for best results!

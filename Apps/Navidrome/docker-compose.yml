name: navidrome

services:
  navidrome:
    image: deluan/navidrome:0.56.1
    container_name: navidrome
    restart: unless-stopped
    user: $PUID:$PGID
    expose:
      - 80                                     # Navidrome Web UI Port
    volumes:
      - /DATA/AppData/$AppID/data:/data        # Navidrome database and configuration directory
      - /DATA/Media/Music:/music:ro            # Music library directory (read-only)
      - /DATA/Downloads:/downloads             # Downloads directory for temporary music files
    environment:
      PUID: $PUID                              # Process user ID
      PGID: $PGID                              # Process group ID
      TZ: $TZ                                  # Timezone for the Navidrome service
      ND_MUSICFOLDER: /music                   # Path to your music library inside the container
      ND_DATAFOLDER: /data                     # Path to store Navidrome database and configuration
      ND_LOGLEVEL: info                        # Log level (debug, info, warn, error)
      ND_PORT: 80                              # Web server port for nsl.sh URL optimization
      ND_ENABLETRANSCODINGCONFIG: "true"       # Enable transcoding configuration
      ND_TRANSCODINGCACHESIZE: "100MB"         # Transcoding cache size
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: navidrome
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/fix-permissions ubuntu:22.04 sh -c "
    mkdir -p /fix-permissions/data &&
    chown -R 1000:1000 /fix-permissions &&
    chmod -R 755 /fix-permissions/data
    "
  author: Yundera Team
  category: Media
  developer: Deluan Quintão
  description:
    en_us: |
      **🎵 Your Personal Music Streaming Server**
      
      **Navidrome** transforms your music collection into a modern streaming service that you control completely. Instead of paying for multiple music subscriptions or losing access to your favorite songs, you get **unlimited access to your own music library** from anywhere.
      
      Just point Navidrome to your music folder and it automatically organizes everything into a beautiful, fast streaming interface that works on any device.
      
      **🎧 What Can You Do with Navidrome?**
      
      • **Stream anywhere** — Access your music from any device with a web browser
      • **Mobile apps** — Use dozens of compatible iOS/Android apps (Subsonic protocol)
      • **Smart organization** — Automatically sorts by artist, album, genre, year
      • **High-quality streaming** — Supports FLAC, MP3, OGG, M4A, WAV formats
      • **Multiple users** — Share your music library with family members
      • **Playlists & favorites** — Create custom playlists and mark favorites
      • **Last.fm integration** — Scrobble your plays to Last.fm automatically
      
      **🚀 Why Choose Navidrome?**
      
      • **Your music, your server, your rules** — No subscription fees or content removal
      • **Works with existing apps** — Compatible with 50+ mobile music apps
      • **Lightning-fast** — Local server means instant song loading
      • **Privacy-focused** — Your music stays on your server, never uploaded anywhere
      
      With Navidrome on **Yundera**, you can:
      • Build your permanent music library that never disappears
      • Access your entire collection from any device (mobile, tablet, desktop)
      • Share music with family without violating any terms of service
      • Keep your listening habits completely private
      
      **🎼 Perfect For:**
      • Music collectors who want to access their library anywhere
      • Families who want to share their music collection
      • Audiophiles with high-quality music files (FLAC, etc.)
      • Anyone tired of music streaming service limitations
    ko_kr: |
      **🎵 개인 음악 스트리밍 서버**
      
      **Navidrome**은 당신의 음악 컬렉션을 완전히 제어할 수 있는 현대적인 스트리밍 서비스로 변환합니다. 여러 음악 구독료를 지불하거나 좋아하는 노래에 대한 접근을 잃는 대신, **어디서나 자신의 음악 라이브러리에 무제한 접근**할 수 있습니다.
      
      Navidrome에 음악 폴더를 지정하기만 하면 모든 장치에서 작동하는 아름답고 빠른 스트리밍 인터페이스로 자동으로 정리됩니다.
      
      **🎧 Navidrome으로 무엇을 할 수 있나요?**
      
      • **어디서나 스트리밍** — 웹 브라우저가 있는 모든 장치에서 음악 접근
      • **모바일 앱** — 호환되는 수십 개의 iOS/Android 앱 사용 (Subsonic 프로토콜)
      • **스마트 정리** — 아티스트, 앨범, 장르, 연도별로 자동 정렬
      • **고품질 스트리밍** — FLAC, MP3, OGG, M4A, WAV 형식 지원
      • **다중 사용자** — 가족 구성원과 음악 라이브러리 공유
      • **플레이리스트 & 즐겨찾기** — 맞춤 플레이리스트 생성 및 즐겨찾기 표시
      • **Last.fm 연동** — Last.fm에 재생 기록 자동 전송
      
      **🚀 왜 Navidrome을 선택해야 할까요?**
      
      • **당신의 음악, 당신의 서버, 당신의 규칙** — 구독료나 콘텐츠 제거 없음
      • **기존 앱과 호환** — 50개 이상의 모바일 음악 앱과 호환
      • **초고속** — 로컬 서버로 즉시 노래 로딩
      • **프라이버시 중심** — 음악이 서버에 유지되며 어디에도 업로드되지 않음
      
      **Yundera**의 Navidrome으로 다음을 할 수 있습니다:
      • 절대 사라지지 않는 영구 음악 라이브러리 구축
      • 모든 장치에서 전체 컬렉션 접근 (모바일, 태블릿, 데스크톱)
      • 서비스 약관 위반 없이 가족과 음악 공유
      • 청취 습관을 완전히 비공개로 유지
    fr_fr: |
      **🎵 Votre Serveur de Streaming Musical Personnel**
      
      **Navidrome** transforme votre collection musicale en un service de streaming moderne que vous contrôlez complètement. Au lieu de payer plusieurs abonnements musicaux ou de perdre l'accès à vos chansons préférées, vous obtenez **un accès illimité à votre propre bibliothèque musicale** depuis n'importe où.
      
      Pointez simplement Navidrome vers votre dossier musical et il organise automatiquement tout dans une interface de streaming belle et rapide qui fonctionne sur n'importe quel appareil.
      
      **🎧 Que pouvez-vous faire avec Navidrome ?**
      
      • **Streaming partout** — Accédez à votre musique depuis n'importe quel appareil avec navigateur web
      • **Applications mobiles** — Utilisez des dizaines d'applications iOS/Android compatibles (protocole Subsonic)
      • **Organisation intelligente** — Trie automatiquement par artiste, album, genre, année
      • **Streaming haute qualité** — Supporte les formats FLAC, MP3, OGG, M4A, WAV
      • **Utilisateurs multiples** — Partagez votre bibliothèque musicale avec les membres de la famille
      • **Playlists et favoris** — Créez des playlists personnalisées et marquez les favoris
      • **Intégration Last.fm** — Scrobble automatiquement vos écoutes sur Last.fm
      
      **🚀 Pourquoi choisir Navidrome ?**
      
      • **Votre musique, votre serveur, vos règles** — Pas de frais d'abonnement ou de suppression de contenu
      • **Compatible avec les applications existantes** — Compatible avec 50+ applications musicales mobiles
      • **Ultra-rapide** — Serveur local signifie chargement instantané des chansons
      • **Axé sur la confidentialité** — Votre musique reste sur votre serveur, jamais téléchargée ailleurs
      
      Avec Navidrome sur **Yundera**, vous pouvez :
      • Construire votre bibliothèque musicale permanente qui ne disparaît jamais
      • Accéder à toute votre collection depuis n'importe quel appareil
      • Partager de la musique avec la famille sans violer les conditions de service
      • Garder vos habitudes d'écoute complètement privées
    zh_cn: |
      **🎵 您的个人音乐流媒体服务器**
      
      **Navidrome** 将您的音乐收藏转换为完全由您控制的现代流媒体服务。不需要支付多个音乐订阅费用或失去对喜爱歌曲的访问权限，您可以从任何地方**无限制地访问自己的音乐库**。
      
      只需将Navidrome指向您的音乐文件夹，它就会自动将所有内容整理成美观、快速的流媒体界面，可在任何设备上运行。
      
      **🎧 您可以用Navidrome做什么？**
      
      • **随处流媒体** — 从任何有网页浏览器的设备访问您的音乐
      • **移动应用** — 使用数十个兼容的iOS/Android应用（Subsonic协议）
      • **智能整理** — 按艺术家、专辑、流派、年份自动排序
      • **高质量流媒体** — 支持FLAC、MP3、OGG、M4A、WAV格式
      • **多用户** — 与家庭成员分享您的音乐库
      • **播放列表和收藏** — 创建自定义播放列表并标记收藏
      • **Last.fm集成** — 自动将播放记录发送到Last.fm
      
      **🚀 为什么选择Navidrome？**
      
      • **您的音乐，您的服务器，您的规则** — 无订阅费用或内容删除
      • **与现有应用兼容** — 兼容50+移动音乐应用
      • **闪电般快速** — 本地服务器意味着歌曲瞬间加载
      • **注重隐私** — 您的音乐保留在服务器上，永不上传到其他地方
      
      在**Yundera**上使用Navidrome，您可以：
      • 建立永不消失的永久音乐库
      • 从任何设备访问整个收藏（手机、平板、桌面）
      • 在不违反服务条款的情况下与家人分享音乐
      • 保持听歌习惯完全私密
    es_es: |
      **🎵 Tu Servidor Personal de Streaming Musical**
      
      **Navidrome** transforma tu colección musical en un servicio de streaming moderno que controlas completamente. En lugar de pagar múltiples suscripciones musicales o perder acceso a tus canciones favoritas, obtienes **acceso ilimitado a tu propia biblioteca musical** desde cualquier lugar.
      
      Solo señala Navidrome hacia tu carpeta de música y automáticamente organiza todo en una interfaz de streaming hermosa y rápida que funciona en cualquier dispositivo.
      
      **🎧 ¿Qué puedes hacer con Navidrome?**
      
      • **Streaming en todas partes** — Accede a tu música desde cualquier dispositivo con navegador web
      • **Aplicaciones móviles** — Usa docenas de aplicaciones iOS/Android compatibles (protocolo Subsonic)
      • **Organización inteligente** — Ordena automáticamente por artista, álbum, género, año
      • **Streaming de alta calidad** — Soporta formatos FLAC, MP3, OGG, M4A, WAV
      • **Múltiples usuarios** — Comparte tu biblioteca musical con miembros de la familia
      • **Listas de reproducción y favoritos** — Crea listas personalizadas y marca favoritos
      • **Integración Last.fm** — Envía automáticamente tus reproducciones a Last.fm
      
      **🚀 ¿Por qué elegir Navidrome?**
      
      • **Tu música, tu servidor, tus reglas** — Sin tarifas de suscripción o eliminación de contenido
      • **Compatible con aplicaciones existentes** — Compatible con 50+ aplicaciones musicales móviles
      • **Ultra-rápido** — Servidor local significa carga instantánea de canciones
      • **Enfocado en la privacidad** — Tu música permanece en tu servidor, nunca se sube a otro lugar
      
      Con Navidrome en **Yundera**, puedes:
      • Construir tu biblioteca musical permanente que nunca desaparece
      • Acceder a toda tu colección desde cualquier dispositivo
      • Compartir música con la familia sin violar términos de servicio
      • Mantener tus hábitos de escucha completamente privados

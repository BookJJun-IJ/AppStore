name: browsermcp

services:
  browsermcp:
    image: mcr.microsoft.com/playwright/mcp:v0.0.32
    container_name: browsermcp
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 30
    entrypoint: ["node", "cli.js"]
    command:
      - "--headless"
      - "--browser"
      - "chromium"
      - "--no-sandbox"
      - "--port"
      - "8931"
      - "--host"
      - "0.0.0.0"
      - "--user-data-dir"
      - "/data/browser-profile"
    volumes:
      - /DATA/AppData/$AppID/data:/data
    expose:
      - 8931
    labels:
      caddy_0: browsermcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8931}}"
      caddy_1: browsermcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 8931}}"
      caddy_2: browsermcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 8931}}"
    networks:
      - pcs
    deploy:
      resources:
        limits:
          memory: 2048M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
  main: browsermcp
  store_app_id: browsermcp
  author: Yundera Team
  category: Utilities
  developer: Microsoft
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/BrowserMCP/icon.png
  thumbnail: ""
  screenshot_link: []
  title:
    en_us: Browser MCP
  tagline:
    en_us: Headless browser automation for AI agents via MCP
    zh_cn: 通过MCP为AI代理提供无头浏览器自动化
    fr_fr: Automatisation de navigateur headless pour agents IA via MCP
    ko_kr: MCP를 통한 AI 에이전트용 헤드리스 브라우저 자동화
    es_es: Automatizacion de navegador headless para agentes IA via MCP
  description:
    en_us: |
      **Browser MCP** is a Playwright-based MCP server that enables AI agents (Claude Code, OpenClaw) to control a headless Chromium browser.

      **Features:**

      - Navigate web pages, click, type, and interact with elements
      - Read page content via accessibility tree
      - Take screenshots of pages
      - Persistent browser sessions (login sessions survive restarts)
      - Runs headless on server — no GUI required

      **Use Cases:**

      - Reddit automation (browse, read posts, write comments)
      - Social media management
      - Web scraping and data collection
      - Form filling and web interactions

      **MCP Endpoints:**

      - SSE: `http://browsermcp:8931/sse`
      - Streamable HTTP: `http://browsermcp:8931/mcp`
    zh_cn: |
      **Browser MCP** 是基于Playwright的MCP服务器，使AI代理能够控制无头Chromium浏览器。

      **功能：**

      - 导航网页、点击、输入、与元素交互
      - 通过无障碍树读取页面内容
      - 页面截图
      - 持久浏览器会话（登录会话在重启后保持）

      **MCP端点：**

      - SSE: `http://browsermcp:8931/sse`
      - Streamable HTTP: `http://browsermcp:8931/mcp`
    fr_fr: |
      **Browser MCP** est un serveur MCP base sur Playwright qui permet aux agents IA de controler un navigateur Chromium headless.

      **Fonctionnalites :**

      - Naviguer sur les pages web, cliquer, taper et interagir avec les elements
      - Lire le contenu des pages via l'arbre d'accessibilite
      - Prendre des captures d'ecran
      - Sessions de navigateur persistantes

      **Points de terminaison MCP :**

      - SSE : `http://browsermcp:8931/sse`
      - HTTP Streamable : `http://browsermcp:8931/mcp`
    ko_kr: |
      **Browser MCP**는 Playwright 기반 MCP 서버로, AI 에이전트(Claude Code, OpenClaw)가 헤드리스 Chromium 브라우저를 제어할 수 있게 합니다.

      **기능:**

      - 웹 페이지 탐색, 클릭, 입력, 요소 상호작용
      - 접근성 트리를 통한 페이지 콘텐츠 읽기
      - 페이지 스크린샷
      - 영구 브라우저 세션 (로그인 세션이 재시작 후에도 유지)
      - 서버에서 헤드리스 실행 — GUI 불필요

      **사용 사례:**

      - Reddit 자동화 (탐색, 글 읽기, 댓글 작성)
      - 소셜 미디어 관리
      - 웹 스크래핑 및 데이터 수집

      **MCP 엔드포인트:**

      - SSE: `http://browsermcp:8931/sse`
      - Streamable HTTP: `http://browsermcp:8931/mcp`
    es_es: |
      **Browser MCP** es un servidor MCP basado en Playwright que permite a los agentes de IA controlar un navegador Chromium headless.

      **Caracteristicas:**

      - Navegar paginas web, hacer clic, escribir e interactuar con elementos
      - Leer contenido de paginas via arbol de accesibilidad
      - Capturas de pantalla de paginas
      - Sesiones de navegador persistentes

      **Endpoints MCP:**

      - SSE: `http://browsermcp:8931/sse`
      - HTTP Streamable: `http://browsermcp:8931/mcp`
  tips:
    before_install:
      en_us: |
        **MCP Connection**

        Connect from Claude Code on the same PCS:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | Protocol | Internal URL |
        |----------|-------------|
        | SSE | `http://browsermcp:8931/sse` |
        | Streamable HTTP | `http://browsermcp:8931/mcp` |

        **Browser Profile:**
        Login sessions are persisted in `/DATA/AppData/browsermcp/data/browser-profile/`.
        Reddit login will survive container restarts.
      fr_fr: |
        **Connexion MCP**

        Connectez depuis Claude Code sur le meme PCS :
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | Protocole | URL interne |
        |-----------|------------|
        | SSE | `http://browsermcp:8931/sse` |
        | HTTP Streamable | `http://browsermcp:8931/mcp` |
      ko_kr: |
        **MCP 연결**

        같은 PCS의 Claude Code에서 연결:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | 프로토콜 | 내부 URL |
        |----------|---------|
        | SSE | `http://browsermcp:8931/sse` |
        | Streamable HTTP | `http://browsermcp:8931/mcp` |

        **브라우저 프로필:**
        로그인 세션이 `/DATA/AppData/browsermcp/data/browser-profile/`에 저장됩니다.
        Reddit 로그인이 컨테이너 재시작 후에도 유지됩니다.
      zh_cn: |
        **MCP连接**

        从同一PCS上的Claude Code连接:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | 协议 | 内部URL |
        |------|--------|
        | SSE | `http://browsermcp:8931/sse` |
        | Streamable HTTP | `http://browsermcp:8931/mcp` |
      es_es: |
        **Conexion MCP**

        Conectar desde Claude Code en el mismo PCS:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | Protocolo | URL interna |
        |-----------|------------|
        | SSE | `http://browsermcp:8931/sse` |
        | HTTP Streamable | `http://browsermcp:8931/mcp` |
  pre-install-cmd: |
    mkdir -p /DATA/AppData/browsermcp/data/browser-profile 2>/dev/null || true

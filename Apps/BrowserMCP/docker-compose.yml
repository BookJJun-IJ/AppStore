name: browsermcp

services:
  # Obscura: Stealth headless browser (CDP server)
  # - Fingerprint randomization, anti-detection, tracker blocking
  obscura:
    image: debian:trixie-20250407-slim
    container_name: obscura
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 20
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /opt/obscura/obscura ]; then
          apt-get update && apt-get install -y --no-install-recommends wget ca-certificates &&
          rm -rf /var/lib/apt/lists/* &&
          mkdir -p /opt/obscura &&
          wget -q -O /tmp/obscura.tar.gz https://github.com/h4ckf0r0day/obscura/releases/download/v0.1.0/obscura-x86_64-linux.tar.gz &&
          tar -xzf /tmp/obscura.tar.gz -C /opt/obscura/ &&
          chmod +x /opt/obscura/obscura &&
          rm /tmp/obscura.tar.gz
        fi &&
        /opt/obscura/obscura serve --port 9222 --stealth
    volumes:
      - /DATA/AppData/$AppID/obscura:/opt/obscura
    expose:
      - 9222
    networks:
      - pcs
    deploy:
      resources:
        limits:
          memory: 1024M

  # Playwright MCP: MCP protocol interface → connects to Obscura's CDP
  browsermcp:
    image: mcr.microsoft.com/playwright/mcp:v0.0.32
    container_name: browsermcp
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 30
    entrypoint: ["node", "cli.js"]
    command:
      - "--cdp-endpoint"
      - "ws://obscura:9222"
      - "--port"
      - "8931"
      - "--host"
      - "0.0.0.0"
    depends_on:
      - obscura
    expose:
      - 8931
    labels:
      caddy_0: browsermcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8931}}"
      caddy_1: browsermcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 8931}}"
      caddy_2: browsermcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 8931}}"
    networks:
      - pcs
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
  main: browsermcp
  store_app_id: browsermcp
  author: Yundera Team
  category: Utilities
  developer: Microsoft / Obscura
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/BrowserMCP/icon.png
  thumbnail: ""
  screenshot_link: []
  title:
    en_us: Browser MCP
  tagline:
    en_us: Stealth headless browser automation for AI agents via MCP
    zh_cn: 通过MCP为AI代理提供隐身无头浏览器自动化
    fr_fr: Automatisation de navigateur headless furtif pour agents IA via MCP
    ko_kr: MCP를 통한 AI 에이전트용 스텔스 헤드리스 브라우저 자동화
    es_es: Automatizacion de navegador headless sigiloso para agentes IA via MCP
  description:
    en_us: |
      **Browser MCP** combines Playwright MCP with Obscura stealth browser for undetectable headless browser automation.

      **Architecture:**

      - **Obscura** (CDP server): Rust-based stealth browser with fingerprint randomization, anti-detection, and 3,520+ tracker domains blocked
      - **Playwright MCP** (MCP server): Provides MCP protocol interface for AI agents

      **Features:**

      - Navigate web pages, click, type, and interact with elements
      - Stealth mode: randomized GPU, screen, canvas fingerprints
      - Anti-webdriver detection and automation flag masking
      - Tracker and analytics blocking

      **MCP Endpoints:**

      - SSE: `http://browsermcp:8931/sse`
      - Streamable HTTP: `http://browsermcp:8931/mcp`
    zh_cn: |
      **Browser MCP** 结合Playwright MCP和Obscura隐身浏览器，实现无法检测的无头浏览器自动化。

      **MCP端点：**

      - SSE: `http://browsermcp:8931/sse`
      - Streamable HTTP: `http://browsermcp:8931/mcp`
    fr_fr: |
      **Browser MCP** combine Playwright MCP avec le navigateur furtif Obscura pour une automatisation de navigateur headless indetectable.

      **Points de terminaison MCP :**

      - SSE : `http://browsermcp:8931/sse`
      - HTTP Streamable : `http://browsermcp:8931/mcp`
    ko_kr: |
      **Browser MCP**는 Playwright MCP와 Obscura 스텔스 브라우저를 결합하여 탐지 불가능한 헤드리스 브라우저 자동화를 제공합니다.

      **아키텍처:**

      - **Obscura** (CDP 서버): Rust 기반 스텔스 브라우저 — 핑거프린트 랜덤화, 자동화 감지 우회, 3,520+ 트래커 도메인 차단
      - **Playwright MCP** (MCP 서버): AI 에이전트를 위한 MCP 프로토콜 인터페이스

      **기능:**

      - 웹 페이지 탐색, 클릭, 입력, 요소 상호작용
      - 스텔스 모드: GPU, 화면, 캔버스 핑거프린트 랜덤화
      - 웹드라이버 감지 우회 및 자동화 플래그 마스킹
      - 트래커 및 분석 차단

      **MCP 엔드포인트:**

      - SSE: `http://browsermcp:8931/sse`
      - Streamable HTTP: `http://browsermcp:8931/mcp`
    es_es: |
      **Browser MCP** combina Playwright MCP con el navegador sigiloso Obscura para automatizacion de navegador headless indetectable.

      **Endpoints MCP:**

      - SSE: `http://browsermcp:8931/sse`
      - HTTP Streamable: `http://browsermcp:8931/mcp`
  tips:
    before_install:
      en_us: |
        **MCP Connection**

        Connect from Claude Code on the same PCS:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | Protocol | Internal URL |
        |----------|-------------|
        | SSE | `http://browsermcp:8931/sse` |
        | Streamable HTTP | `http://browsermcp:8931/mcp` |

        **Stealth Features:**
        Obscura provides fingerprint randomization and anti-detection.
        3,520+ tracker domains are blocked automatically.
      ko_kr: |
        **MCP 연결**

        같은 PCS의 Claude Code에서 연결:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```

        | 프로토콜 | 내부 URL |
        |----------|---------|
        | SSE | `http://browsermcp:8931/sse` |
        | Streamable HTTP | `http://browsermcp:8931/mcp` |

        **스텔스 기능:**
        Obscura가 핑거프린트 랜덤화 및 자동화 감지 우회를 제공합니다.
        3,520+ 트래커 도메인이 자동으로 차단됩니다.
      fr_fr: |
        **Connexion MCP**

        Connectez depuis Claude Code sur le meme PCS :
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```
      zh_cn: |
        **MCP连接**

        从同一PCS上的Claude Code连接:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```
      es_es: |
        **Conexion MCP**

        Conectar desde Claude Code en el mismo PCS:
        ```
        claude mcp add browsermcp --transport sse http://browsermcp:8931/sse
        ```
  pre-install-cmd: |
    mkdir -p /DATA/AppData/browsermcp/data 2>/dev/null || true

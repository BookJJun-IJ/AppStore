name: spliit
services:
  db:
    image: postgres:16-alpine
    container_name: spliit-db
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: spliitpass
    volumes:
      - spliit_postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: crazymax/spliit:1.14.1
    container_name: spliit
    depends_on:
      - db
    ports:
      - "3333:3000"
    environment:
      TZ: $TZ
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: spliitpass
      POSTGRES_TIMEOUT: 60
      API_PORT: 3000
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  spliit_postgres:

networks:
  spliit_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: CasaOS Team
  category: Finance
  developer: Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
    zh_cn: 与朋友和家人分摊费用
    es_es: Comparte gastos con amigos y familia
    fr_fr: Partagez les dépenses avec amis et famille
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Share expenses with friends and family.
      
      **Features:**
      - Create expense groups
      - Split expenses equally or by custom amounts
      - Track balances
      - Settlement optimization
      - No registration required
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구와 가족과 비용을 공유하세요.
      
      **기능:**
      - 비용 그룹 생성
      - 균등 또는 사용자 정의 금액으로 비용 분할
      - 잔액 추적
      - 정산 최적화
      - 등록 불필요
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。与朋友和家人分摊费用。
      
      **功能：**
      - 创建费用群组
      - 平均或自定义金额分摊费用
      - 跟踪余额
      - 结算优化
      - 无需注册
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Comparte gastos con amigos y familia.
      
      **Características:**
      - Crear grupos de gastos
      - Dividir gastos por igual o cantidades personalizadas
      - Rastrear balances
      - Optimización de liquidaciones
      - No requiere registro
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Partagez les dépenses avec amis et famille.
      
      **Fonctionnalités:**
      - Créer des groupes de dépenses
      - Diviser les dépenses également ou par montants personnalisés
      - Suivre les soldes
      - Optimisation des règlements
      - Aucune inscription requise
  tips:
    before_install:
      en_us: |
        **Access:** http://YOUR_SERVER_IP:3333
        
        Wait 1-2 minutes for database initialization on first run.
      ko_kr: |
        **접속:** http://YOUR_SERVER_IP:3333
        
        첫 실행 시 데이터베이스 초기화를 위해 1-2분 기다리세요.
  index: /
  port_map: "3333"
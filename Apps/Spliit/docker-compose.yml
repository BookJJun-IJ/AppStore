name: spliit
services:
  db:
    image: postgres:16-alpine
    container_name: spliit-db
    user: $PUID:$PGID
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/spliit/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliit -d spliit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: crazymax/spliit:1.14.1
    container_name: spliit
    user: $PUID:$PGID
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 3000
    ports:
      - "3333:3000"
    environment:
      # System variables
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # Database connection
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
      POSTGRES_TIMEOUT: 60
      
      # Application settings
      API_PORT: 3000
      PUBLIC_URL: http://$public_ip:3333
      
      # Optional features (uncomment if needed)
      # ENABLE_RECEIPT_UPLOAD: true
      # S3_ENDPOINT: 
      # S3_ACCESS_KEY: 
      # S3_SECRET_KEY: 
      # S3_BUCKET: 
    volumes:
      - /DATA/AppData/spliit/data:/data
      - /DATA/AppData/spliit/uploads:/uploads
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

networks:
  spliit_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: CasaOS Team
  category: Finance
  developer: CrazyMax / Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
    zh_cn: 与朋友和家人分摊费用
    es_es: Comparte gastos con amigos y familia
    fr_fr: Partagez les dépenses avec amis et famille
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Create groups to share expenses with your friends, family, or roommates. Track who owes what with automatic balance calculations.
      
      **Key Features:**
      - No registration required - privacy first
      - Create unlimited expense groups
      - Split expenses by percentage, shares, or exact amounts
      - Automatic balance tracking
      - Settlement optimization
      - Mobile-responsive Progressive Web App
      - Export data to CSV
      - All data stays on your server
      
      Perfect for roommates, travel groups, families, and anyone who needs to split costs fairly!
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구, 가족 또는 룸메이트와 비용을 공유할 그룹을 만드세요. 자동 잔액 계산으로 누가 얼마를 빚졌는지 추적하세요.
      
      **주요 기능:**
      - 등록 불필요 - 개인정보 보호 우선
      - 무제한 비용 그룹 생성
      - 비율, 몫 또는 정확한 금액으로 비용 분할
      - 자동 잔액 추적
      - 정산 최적화
      - 모바일 반응형 프로그레시브 웹 앱
      - CSV로 데이터 내보내기
      - 모든 데이터는 서버에 유지
      
      룸메이트, 여행 그룹, 가족 및 공정하게 비용을 분할해야 하는 모든 사람에게 완벽합니다!
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。创建群组与朋友、家人或室友分摊费用。通过自动余额计算跟踪谁欠谁多少。
      
      **主要功能：**
      - 无需注册 - 隐私优先
      - 创建无限费用群组
      - 按百分比、份额或确切金额分摊费用
      - 自动余额跟踪
      - 结算优化
      - 移动响应式渐进式网页应用
      - 导出数据到CSV
      - 所有数据保留在您的服务器上
      
      非常适合室友、旅行团体、家庭以及任何需要公平分摊成本的人！
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Crea grupos para compartir gastos con amigos, familia o compañeros de piso. Rastrea quién debe qué con cálculos automáticos de balance.
      
      **Características principales:**
      - No requiere registro - privacidad primero
      - Crea grupos de gastos ilimitados
      - Divide gastos por porcentaje, partes o cantidades exactas
      - Seguimiento automático de balances
      - Optimización de liquidaciones
      - Aplicación Web Progresiva responsiva móvil
      - Exportar datos a CSV
      - Todos los datos permanecen en tu servidor
      
      ¡Perfecto para compañeros de piso, grupos de viaje, familias y cualquiera que necesite dividir costos justamente!
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Créez des groupes pour partager les dépenses avec amis, famille ou colocataires. Suivez qui doit quoi avec des calculs automatiques de solde.
      
      **Fonctionnalités principales:**
      - Aucune inscription requise - confidentialité d'abord
      - Créez des groupes de dépenses illimités
      - Divisez les dépenses par pourcentage, parts ou montants exacts
      - Suivi automatique des soldes
      - Optimisation des règlements
      - Application Web Progressive responsive mobile
      - Exporter les données vers CSV
      - Toutes les données restent sur votre serveur
      
      Parfait pour les colocataires, groupes de voyage, familles et tous ceux qui doivent partager les coûts équitablement!
  tips:
    before_install:
      en_us: |
        ## Getting Started with Spliit
        
        **Access URL:** http://YOUR_SERVER_IP:3333
        
        **Quick Start:**
        1. Open Spliit in your browser
        2. Create your first group (e.g., "Household", "Vacation")
        3. Add participants by name
        4. Start adding expenses
        5. Spliit automatically calculates who owes what
        
        **Features:**
        - No account needed - just start using it
        - Share group links with participants
        - View optimized settlement suggestions
        - Export your data anytime
        
        All data is stored locally on your server for maximum privacy!
      ko_kr: |
        ## Spliit 시작하기
        
        **접속 URL:** http://YOUR_SERVER_IP:3333
        
        **빠른 시작:**
        1. 브라우저에서 Spliit 열기
        2. 첫 번째 그룹 생성 (예: "집", "휴가")
        3. 이름으로 참가자 추가
        4. 비용 추가 시작
        5. Spliit이 자동으로 누가 얼마를 빚졌는지 계산
        
        **기능:**
        - 계정 불필요 - 바로 사용 시작
        - 참가자와 그룹 링크 공유
        - 최적화된 정산 제안 보기
        - 언제든지 데이터 내보내기
        
        최대한의 개인정보 보호를 위해 모든 데이터는 서버에 로컬로 저장됩니다!
  index: /
  port_map: "3333"
  pre_install_cmd: |
    # Create directories with proper permissions
    mkdir -p /DATA/AppData/spliit/postgres
    mkdir -p /DATA/AppData/spliit/data
    mkdir -p /DATA/AppData/spliit/uploads
    chown -R $PUID:$PGID /DATA/AppData/spliit
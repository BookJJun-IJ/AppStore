name: spliit
services:
  spliit-db:
    image: postgres:16-alpine
    container_name: spliit-db
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: spliitpassword2024
    volumes:
      - /DATA/AppData/spliit/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliit -d spliit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: ghcr.io/spliit-app/spliit:1.14.0
    container_name: spliit
    depends_on:
      spliit-db:
        condition: service_healthy
    ports:
      - "3333:3000"
    environment:
      # 시스템 변수
      PUID: 1000
      PGID: 1000
      TZ: Asia/Seoul
      
      # 데이터베이스 설정
      DATABASE_URL: postgresql://spliit:spliitpassword2024@spliit-db:5432/spliit
      
      # 앱 설정 - 로컬 접속용
      NEXT_PUBLIC_BASE_URL: http://localhost:3333
      NEXTAUTH_URL: http://localhost:3333
      NEXTAUTH_SECRET: supersecretkey123456789012345678901234567890
      
      # 선택적 기능 (필요시 주석 해제)
      # NEXT_PUBLIC_ENABLE_RECEIPT_UPLOAD: true
      # S3_ENDPOINT: 
      # S3_ACCESS_KEY_ID: 
      # S3_SECRET_ACCESS_KEY: 
      # S3_BUCKET_NAME: 
      # S3_REGION: 
    volumes:
      - /DATA/AppData/spliit/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - spliit-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

networks:
  spliit-network:
    driver: bridge

# CasaOS 메타데이터 (CasaOS 사용시에만 필요)
x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: Spliit Team
  category: Finance
  developer: Spliit Contributors
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
    ko_kr: 스플릿
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise.
      Create groups to share expenses with your friends, family, or roommates.
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다.
      친구, 가족 또는 룸메이트와 비용을 공유할 그룹을 만드세요.
  tips:
    before_install:
      en_us: |
        Spliit will be ready immediately after installation.
        Access at http://localhost:3333
      ko_kr: |
        설치 후 즉시 사용 가능합니다.
        http://localhost:3333 으로 접속하세요.
  index: /
  port_map: "3333"
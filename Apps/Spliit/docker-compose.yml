name: spliit
services:
  db:
    image: postgres:16-alpine
    container_name: spliit-db
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: spliitpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: crazymax/spliit:1.14.1
    container_name: spliit
    depends_on:
      - db
    ports:
      - "3333:3000"
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: spliitpass123
      POSTGRES_TIMEOUT: 120
      API_PORT: 3000
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  postgres_data:

networks:
  spliit_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: CasaOS Team
  category: Finance
  developer: Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
    zh_cn: 与朋友和家人分摊费用
    es_es: Comparte gastos con amigos y familia
    fr_fr: Partagez les dépenses avec amis et famille
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Share expenses with your friends and family easily and transparently.
      
      **Features:**
      - Create groups for various occasions
      - Split expenses by percentage, shares or exact amounts
      - Track balances and optimize reimbursements
      - No account required
      - Mobile-friendly responsive design
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구와 가족과 쉽고 투명하게 비용을 분할하세요.
      
      **기능:**
      - 다양한 상황을 위한 그룹 생성
      - 비율, 몫 또는 정확한 금액으로 비용 분할
      - 잔액 추적 및 상환 최적화
      - 계정 불필요
      - 모바일 친화적 반응형 디자인
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。与朋友和家人轻松透明地分摊费用。
      
      **功能：**
      - 为各种场合创建群组
      - 按百分比、份额或确切金额分摊费用
      - 跟踪余额并优化报销
      - 无需账户
      - 移动友好的响应式设计
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Comparte gastos con amigos y familia fácil y transparentemente.
      
      **Características:**
      - Crear grupos para varias ocasiones
      - Dividir gastos por porcentaje, partes o cantidades exactas
      - Rastrear balances y optimizar reembolsos
      - No requiere cuenta
      - Diseño responsivo móvil
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Partagez les dépenses avec amis et famille facilement et en transparence.
      
      **Fonctionnalités:**
      - Créer des groupes pour diverses occasions
      - Diviser les dépenses par pourcentage, parts ou montants exacts
      - Suivre les soldes et optimiser les remboursements
      - Aucun compte requis
      - Design responsive mobile
  tips:
    before_install:
      en_us: |
        **Access:** http://YOUR_SERVER_IP:3333
        
        **Note:** Database initialization may take 1-2 minutes on first run.
      ko_kr: |
        **접속:** http://YOUR_SERVER_IP:3333
        
        **참고:** 첫 실행 시 데이터베이스 초기화에 1-2분 소요될 수 있습니다.
  index: /
  port_map: "3333"
name: spliit
services:
  db:
    image: postgres:16-alpine
    container_name: spliit-db
    user: 0:0
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
    volumes:
      - /DATA/AppData/$AppID/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit_network

  spliit:
    image: crazymax/spliit:1.14.1
    container_name: spliit
    user: $PUID:$PGID
    depends_on:
      - db
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
      POSTGRES_TIMEOUT: 60
      API_PORT: 80
    volumes:
      - /DATA/AppData/$AppID/data:/data
    restart: unless-stopped
    networks:
      - spliit_network

networks:
  spliit_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 80
  index: /
  pre_install_cmd: |
    mkdir -p /DATA/AppData/$AppID/postgres /DATA/AppData/$AppID/data && 
    chown -R $PUID:$PGID /DATA/AppData/$AppID/postgres && 
    chown -R $PUID:$PGID /DATA/AppData/$AppID/data
  author: CasaOS Team
  category: Finance
  developer: Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Free and Open Source Expense Sharing App
    ko_kr: 무료 오픈소스 비용 분할 앱
    zh_cn: 免费开源费用分摊应用
    es_es: Aplicación Gratuita para Compartir Gastos
    fr_fr: Application Gratuite de Partage de Dépenses
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Share expenses with friends and family.
      
      **Features:**
      - Create expense groups
      - Split expenses by percentage, shares or exact amounts
      - Track balances and optimize settlements
      - No registration required
      - Privacy-focused design
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구와 가족과 비용을 공유하세요.
      
      **기능:**
      - 비용 그룹 생성
      - 비율, 몫 또는 정확한 금액으로 비용 분할
      - 잔액 추적 및 정산 최적화
      - 등록 불필요
      - 개인정보 보호 중심 설계
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。与朋友和家人分摊费用。
      
      **功能：**
      - 创建费用群组
      - 按百分比、份额或确切金额分摊费用
      - 跟踪余额并优化结算
      - 无需注册
      - 注重隐私的设计
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Comparte gastos con amigos y familia.
      
      **Características:**
      - Crear grupos de gastos
      - Dividir gastos por porcentaje, partes o cantidades exactas
      - Rastrear balances y optimizar liquidaciones
      - No requiere registro
      - Diseño centrado en privacidad
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Partagez les dépenses avec amis et famille.
      
      **Fonctionnalités:**
      - Créer des groupes de dépenses
      - Diviser les dépenses par pourcentage, parts ou montants exacts
      - Suivre les soldes et optimiser les règlements
      - Aucune inscription requise
      - Conception axée sur la confidentialité
  tips:
    before_install:
      en_us: |
        ## Default Configuration
        
        The app will be accessible at your CasaOS domain after installation.
        Database is automatically configured with secure password.
        All data is stored in /DATA/AppData/spliit/
      ko_kr: |
        ## 기본 구성
        
        설치 후 CasaOS 도메인에서 앱에 접속할 수 있습니다.
        데이터베이스는 보안 비밀번호로 자동 구성됩니다.
        모든 데이터는 /DATA/AppData/spliit/에 저장됩니다.

  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tips:
    before_install:
      en_us: |
        ## Spliit - Expense Sharing Made Simple
        
        Spliit is ready to use immediately after installation with a PostgreSQL database for secure data storage.
        
        **Default Configuration:**
        - Database: PostgreSQL with secure password
        - Web Interface: Available via your CasaOS domain
        - No account required - start creating groups right away
        - All data stored securely on your server
        
        **Getting Started:**
        1. Create a group for your expenses (travel, household, etc.)
        2. Add participants to your group
        3. Start logging expenses and let Spliit calculate the splits
        4. View balances and optimize reimbursements
        
        Perfect for roommates, travel groups, families, and anyone who wants to split expenses fairly!
      ko_kr: |
        ## Spliit - 간단한 비용 분할
        
        Spliit은 설치 후 PostgreSQL 데이터베이스로 안전한 데이터 저장이 가능하며 즉시 사용할 수 있습니다.
        
        **기본 구성:**
        - 데이터베이스: 보안 비밀번호를 가진 PostgreSQL
        - 웹 인터페이스: CasaOS 도메인을 통해 사용 가능
        - 계정 불필요 - 즉시 그룹 생성 시작
        - 모든 데이터는 서버에 안전하게 저장
        
        **시작하기:**
        1. 비용 그룹 생성 (여행, 가정 등)
        2. 그룹에 참가자 추가
        3. 비용 기록 시작하고 Spliit이 분할 계산
        4. 잔액 확인 및 상환 최적화
        
        룸메이트, 여행 그룹, 가족, 그리고 공정하게 비용을 분할하려는 모든 사람에게 완벽합니다!
  index: /
  webui_port: 3000
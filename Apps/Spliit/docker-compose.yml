name: spliit
services:
  db:
    image: postgres:16-alpine
    user: $PUID:$PGID
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/spliit/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliit -d spliit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: sebastienbour/spliit:latest
    user: $PUID:$PGID
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 3000
    ports:
      - "3333:3000"
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # Database Configuration
      DATABASE_URL: postgresql://spliit:$default_pwd@db:5432/spliit
      
      # Application Configuration
      NEXT_PUBLIC_APP_URL: http://$public_ip:3333
      NEXTAUTH_URL: http://$public_ip:3333
      NEXTAUTH_SECRET: $default_pwd
      
      # Optional S3 for receipts (uncomment if needed)
      # S3_ENDPOINT: 
      # S3_ACCESS_KEY: 
      # S3_SECRET_KEY: 
      # S3_BUCKET: 
      # S3_REGION: 
    volumes:
      - /DATA/AppData/spliit/uploads:/app/uploads
      - /DATA/AppData/spliit/data:/app/data
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

networks:
  spliit_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: CasaOS Team
  category: Finance
  developer: Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
    zh_cn: 与朋友和家人分摊费用
    es_es: Comparte gastos con amigos y familia
    fr_fr: Partagez les dépenses avec amis et famille
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Create groups to share expenses with your friends, family, or roommates.
      
      **Features:**
      - Create unlimited groups for different occasions
      - Split expenses by percentage, shares, or exact amounts
      - Track balances and optimize reimbursements
      - No account required - privacy-focused
      - Mobile-responsive interface
      - Export data to CSV
      - Real-time synchronization
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구, 가족 또는 룸메이트와 비용을 공유할 그룹을 만드세요.
      
      **기능:**
      - 다양한 상황을 위한 무제한 그룹 생성
      - 비율, 몫 또는 정확한 금액으로 비용 분할
      - 잔액 추적 및 상환 최적화
      - 계정 불필요 - 개인정보 보호 중심
      - 모바일 반응형 인터페이스
      - CSV로 데이터 내보내기
      - 실시간 동기화
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。创建群组与朋友、家人或室友分摊费用。
      
      **功能：**
      - 为不同场合创建无限群组
      - 按百分比、份额或确切金额分摊费用
      - 跟踪余额并优化报销
      - 无需账户 - 注重隐私
      - 移动响应式界面
      - 导出数据到CSV
      - 实时同步
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Crea grupos para compartir gastos con amigos, familia o compañeros de piso.
      
      **Características:**
      - Crea grupos ilimitados para diferentes ocasiones
      - Divide gastos por porcentaje, partes o cantidades exactas
      - Rastrea balances y optimiza reembolsos
      - No requiere cuenta - centrado en privacidad
      - Interfaz móvil responsiva
      - Exportar datos a CSV
      - Sincronización en tiempo real
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Créez des groupes pour partager les dépenses avec vos amis, votre famille ou vos colocataires.
      
      **Fonctionnalités:**
      - Créez des groupes illimités pour différentes occasions
      - Divisez les dépenses par pourcentage, parts ou montants exacts
      - Suivez les soldes et optimisez les remboursements
      - Aucun compte requis - axé sur la confidentialité
      - Interface mobile responsive
      - Exporter les données vers CSV
      - Synchronisation en temps réel
  tips:
    before_install:
      en_us: |
        ## Quick Start Guide
        
        **Default Settings:**
        - Access URL: http://YOUR_SERVER_IP:3333
        - Database: PostgreSQL (auto-configured)
        - Data stored in: /DATA/AppData/spliit/
        
        **Getting Started:**
        1. Open Spliit in your browser
        2. Create your first expense group
        3. Add participants by name
        4. Start tracking expenses
        5. View automatic balance calculations
        
        **Note:** No registration required - just start using it!
      ko_kr: |
        ## 빠른 시작 가이드
        
        **기본 설정:**
        - 접속 URL: http://YOUR_SERVER_IP:3333
        - 데이터베이스: PostgreSQL (자동 구성)
        - 데이터 저장 위치: /DATA/AppData/spliit/
        
        **시작하기:**
        1. 브라우저에서 Spliit 열기
        2. 첫 번째 비용 그룹 생성
        3. 이름으로 참가자 추가
        4. 비용 추적 시작
        5. 자동 잔액 계산 보기
        
        **참고:** 등록 불필요 - 바로 사용 시작!
  index: /
  port_map: "3333"
  pre_install_cmd: |
    # Create directories with proper permissions
    mkdir -p /DATA/AppData/spliit/postgres && 
    mkdir -p /DATA/AppData/spliit/uploads && 
    mkdir -p /DATA/AppData/spliit/data && 
    chown -R $PUID:$PGID /DATA/AppData/spliit
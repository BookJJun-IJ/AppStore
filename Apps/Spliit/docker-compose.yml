  tagline:
    en_us: Free and Open Source Expense Sharing App - Split bills with friends and family
    ko_kr: 무료 오픈소스 비용 분할 앱 - 친구와 가족과 청구서 분할
    fr_fr: Application Gratuite et Open Source de Partage de Dépenses - Divisez les factures avec amis et famille
    es_es: Aplicación Gratuita y de Código Abierto para Compartir Gastos - Divide facturas con amigos y familia

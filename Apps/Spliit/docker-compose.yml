name: spliit
services:
  spliit-db:
    image: postgres:16-alpine
    container_name: spliit-db
    user: $PUID:$PGID
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/spliit/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliit -d spliit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: ghcr.io/spliit-app/spliit:1.14.0
    container_name: spliit
    user: $PUID:$PGID
    depends_on:
      spliit-db:
        condition: service_healthy
    expose:
      - 3000
    environment:
      # System variables
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      
      # Database configuration
      DATABASE_URL: postgresql://spliit:$default_pwd@spliit-db:5432/spliit
      
      # Application configuration
      NEXT_PUBLIC_BASE_URL: https://$domain
      NEXTAUTH_URL: https://$domain
      NEXTAUTH_SECRET: $default_pwd
      
      # Optional features (can be configured by user)
      # NEXT_PUBLIC_ENABLE_RECEIPT_UPLOAD: true
      # S3_ENDPOINT: 
      # S3_ACCESS_KEY_ID: 
      # S3_SECRET_ACCESS_KEY: 
      # S3_BUCKET_NAME: 
      # S3_REGION: 
    volumes:
      - /DATA/AppData/spliit/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - spliit-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

networks:
  spliit-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: Spliit Team
  category: Finance
  developer: Spliit Contributors
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
    zh_cn: 与朋友和家人分摊费用
    es_es: Comparte gastos con amigos y familia
    fr_fr: Partagez les dépenses avec amis et famille
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Create groups to share expenses with your friends, family, or roommates. Track who owes what with automatic balance calculations and optimized reimbursements.
      
      **Key Features:**
      - No account required - privacy-focused design
      - Create unlimited groups for different occasions
      - Split expenses by percentage, shares, or exact amounts
      - Automatic balance tracking and settlement suggestions
      - Progressive Web App (PWA) - installable on any device
      - Attach receipts to expenses (optional with S3 storage)
      - Support for recurring expenses
      - Export data to CSV for record keeping
      - Real-time synchronization across devices
      - Mobile-responsive design
      
      Perfect for travel groups, shared households, event planning, and any situation where you need to split costs fairly and transparently.
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구, 가족 또는 룸메이트와 비용을 공유할 그룹을 만드세요. 자동 잔액 계산과 최적화된 상환으로 누가 얼마를 빚졌는지 추적하세요.
      
      **주요 기능:**
      - 계정 불필요 - 개인정보 보호 중심 설계
      - 다양한 상황을 위한 무제한 그룹 생성
      - 비율, 몫 또는 정확한 금액으로 비용 분할
      - 자동 잔액 추적 및 정산 제안
      - 프로그레시브 웹 앱 (PWA) - 모든 기기에 설치 가능
      - 비용에 영수증 첨부 (S3 스토리지로 선택 가능)
      - 정기 비용 지원
      - 기록 보관을 위한 CSV로 데이터 내보내기
      - 기기 간 실시간 동기화
      - 모바일 반응형 디자인
      
      여행 그룹, 공유 가구, 이벤트 계획 및 비용을 공정하고 투명하게 분할해야 하는 모든 상황에 완벽합니다.
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。创建群组与朋友、家人或室友分摊费用。通过自动余额计算和优化报销跟踪谁欠谁多少。
      
      **主要功能：**
      - 无需账户 - 注重隐私的设计
      - 为不同场合创建无限群组
      - 按百分比、份额或确切金额分摊费用
      - 自动余额跟踪和结算建议
      - 渐进式网页应用 (PWA) - 可安装在任何设备上
      - 为费用附加收据（可选配 S3 存储）
      - 支持定期费用
      - 导出数据到 CSV 以便记录保存
      - 设备间实时同步
      - 移动响应式设计
      
      非常适合旅行团体、共享家庭、活动策划以及任何需要公平透明地分摊成本的情况。
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Crea grupos para compartir gastos con amigos, familia o compañeros de piso. Rastrea quién debe qué con cálculos automáticos de balance y reembolsos optimizados.
      
      **Características principales:**
      - No requiere cuenta - diseño centrado en la privacidad
      - Crea grupos ilimitados para diferentes ocasiones
      - Divide gastos por porcentaje, partes o cantidades exactas
      - Seguimiento automático de balances y sugerencias de liquidación
      - Aplicación Web Progresiva (PWA) - instalable en cualquier dispositivo
      - Adjunta recibos a los gastos (opcional con almacenamiento S3)
      - Soporte para gastos recurrentes
      - Exporta datos a CSV para mantener registros
      - Sincronización en tiempo real entre dispositivos
      - Diseño responsivo móvil
      
      Perfecto para grupos de viaje, hogares compartidos, planificación de eventos y cualquier situación donde necesites dividir costos de manera justa y transparente.
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Créez des groupes pour partager les dépenses avec vos amis, votre famille ou vos colocataires. Suivez qui doit quoi avec des calculs automatiques de solde et des remboursements optimisés.
      
      **Fonctionnalités principales:**
      - Aucun compte requis - conception axée sur la confidentialité
      - Créez des groupes illimités pour différentes occasions
      - Divisez les dépenses par pourcentage, parts ou montants exacts
      - Suivi automatique des soldes et suggestions de règlement
      - Application Web Progressive (PWA) - installable sur n'importe quel appareil
      - Joignez des reçus aux dépenses (optionnel avec stockage S3)
      - Support pour les dépenses récurrentes
      - Exportez les données vers CSV pour la tenue de registres
      - Synchronisation en temps réel entre appareils
      - Design adaptatif mobile
      
      Parfait pour les groupes de voyage, les ménages partagés, la planification d'événements et toute situation où vous devez partager les coûts équitablement et en toute transparence.
  tips:
    before_install:
      en_us: |
        ## Quick Start Guide
        
        Spliit will be ready to use immediately after installation. No account creation is required!
        
        **Getting Started:**
        1. Open Spliit in your browser
        2. Create your first group (e.g., "Household", "Vacation", "Dinner Party")
        3. Add participants by name
        4. Start adding expenses
        5. Spliit automatically calculates who owes what
        
        **Optional Features:**
        - To enable receipt uploads, configure S3 storage in the environment variables
        - Export your data anytime as CSV for your records
        - Install as a PWA on your phone for quick access
        
        **Privacy First:**
        - No user accounts required
        - All data stays on your server
        - Share group links only with participants
      ko_kr: |
        ## 빠른 시작 가이드
        
        Spliit은 설치 후 즉시 사용할 준비가 됩니다. 계정 생성이 필요 없습니다!
        
        **시작하기:**
        1. 브라우저에서 Spliit 열기
        2. 첫 번째 그룹 만들기 (예: "가정", "휴가", "저녁 파티")
        3. 이름으로 참가자 추가
        4. 비용 추가 시작
        5. Spliit이 자동으로 누가 얼마를 빚졌는지 계산
        
        **선택적 기능:**
        - 영수증 업로드를 활성화하려면 환경 변수에서 S3 스토리지 구성
        - 언제든지 데이터를 CSV로 내보내기
        - 빠른 액세스를 위해 휴대폰에 PWA로 설치
        
        **개인정보 보호 우선:**
        - 사용자 계정 불필요
        - 모든 데이터는 서버에 유지
        - 참가자와만 그룹 링크 공유
  index: /
  port_map: "3000"
  scheme: http
  store_app_id: spliit
  pre_install_cmd: |
    # Create necessary directories with proper permissions
    mkdir -p /DATA/AppData/spliit/postgres /DATA/AppData/spliit/uploads
    chown -R $PUID:$PGID /DATA/AppData/spliit
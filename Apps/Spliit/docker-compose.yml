name: spliit
services:
  db:
    image: postgres:16-alpine
    container_name: spliit-db
    # user 제거 - PostgreSQL은 root로 시작해야 함
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spliit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliit -d spliit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  spliit:
    image: crazymax/spliit:1.14.1
    container_name: spliit
    # user 제거 - 컨테이너 기본값 사용
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 3000
    ports:
      - target: 3000
        published: 3333
        protocol: tcp
    environment:
      TZ: $TZ
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: spliit
      POSTGRES_USER: spliit
      POSTGRES_PASSWORD: $default_pwd
      POSTGRES_TIMEOUT: 60
      API_PORT: 3000
    volumes:
      - /DATA/AppData/$AppID/data:/data
    restart: unless-stopped
    networks:
      - spliit_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  postgres_data:
    driver: local

networks:
  spliit_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: spliit
  webui_port: 3000
  author: CasaOS Team
  category: Finance
  developer: Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  title:
    en_us: Spliit
  tagline:
    en_us: Share expenses with friends and family
    ko_kr: 친구 및 가족과 비용 공유
    zh_cn: 与朋友和家人分摊费用
    es_es: Comparte gastos con amigos y familia
    fr_fr: Partagez les dépenses avec amis et famille
  description:
    en_us: |
      Spliit is a free and open-source alternative to Splitwise. Share expenses with friends and family easily.
      
      **Features:**
      - Create unlimited expense groups
      - Split expenses by percentage, shares or exact amounts
      - Real-time balance tracking
      - Settlement optimization
      - No account required
      - Privacy-focused design
    ko_kr: |
      Spliit은 Splitwise의 무료 오픈소스 대안입니다. 친구와 가족과 쉽게 비용을 공유하세요.
      
      **기능:**
      - 무제한 비용 그룹 생성
      - 비율, 몫 또는 정확한 금액으로 비용 분할
      - 실시간 잔액 추적
      - 정산 최적화
      - 계정 불필요
      - 개인정보 보호 중심 설계
    zh_cn: |
      Spliit 是 Splitwise 的免费开源替代品。轻松与朋友和家人分摊费用。
      
      **功能：**
      - 创建无限费用群组
      - 按百分比、份额或确切金额分摊费用
      - 实时余额跟踪
      - 结算优化
      - 无需账户
      - 注重隐私的设计
    es_es: |
      Spliit es una alternativa gratuita y de código abierto a Splitwise. Comparte gastos fácilmente.
      
      **Características:**
      - Crear grupos de gastos ilimitados
      - Dividir gastos por porcentaje, partes o cantidades exactas
      - Seguimiento de balances en tiempo real
      - Optimización de liquidaciones
      - No requiere cuenta
      - Diseño centrado en privacidad
    fr_fr: |
      Spliit est une alternative gratuite et open source à Splitwise. Partagez les dépenses facilement.
      
      **Fonctionnalités:**
      - Créer des groupes de dépenses illimités
      - Diviser les dépenses par pourcentage, parts ou montants exacts
      - Suivi des soldes en temps réel
      - Optimisation des règlements
      - Aucun compte requis
      - Conception axée sur la confidentialité
  tips:
    before_install:
      en_us: |
        **Access:** http://YOUR_SERVER_IP:3333
        
        Database will initialize automatically on first run.
      ko_kr: |
        **접속:** http://YOUR_SERVER_IP:3333
        
        첫 실행 시 데이터베이스가 자동으로 초기화됩니다.
  index: /
  port_map: "3333"
  pre_install_cmd: |
    mkdir -p /DATA/AppData/$AppID/data && 
    chmod 777 /DATA/AppData/$AppID/data
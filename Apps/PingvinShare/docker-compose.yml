name: pingvinshare

services:
  pingvinshare:
    image: stonith404/pingvin-share:v1.13.0
    container_name: pingvinshare
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    expose:
      - 3000
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      TRUST_PROXY: "true"
    volumes:
      - /DATA/AppData/$AppID/data:/opt/app/backend/data
      - /DATA/AppData/$AppID/images:/opt/app/frontend/public/img
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

x-casaos:
  main: pingvinshare
  webui_port: 3000
  category: Backup
  architectures:
    - amd64
    - arm64
  author: CasaOS Team
  developer: Elias Schneider (stonith404)
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PingvinShare/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PingvinShare/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PingvinShare/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PingvinShare/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PingvinShare/thumbnail.png
  title:
    en_us: Pingvin Share
    ko_kr: 핑빈 공유
    es_es: Pingvin Share
    fr_fr: Pingvin Share
    zh_cn: Pingvin Share
  tagline:
    en_us: Self-hosted file sharing platform, alternative to WeTransfer
    ko_kr: WeTransfer 대안 셀프 호스팅 파일 공유 플랫폼
    es_es: Plataforma de intercambio de archivos autoalojada, alternativa a WeTransfer
    fr_fr: Plateforme de partage de fichiers auto-hébergée, alternative à WeTransfer
    zh_cn: 自托管文件共享平台,WeTransfer 的替代方案
  description:
    en_us: |
      Pingvin Share is a self-hosted file sharing platform that combines lightness and beauty, perfect for seamless and efficient file sharing. It's an excellent alternative to WeTransfer.

      **Features:**
      - Share files using a link
      - Unlimited file size (restricted only by disk space)
      - Set expiration dates for shares
      - Secure shares with visitor limits and passwords
      - Email recipients
      - Reverse shares (request files from others)
      - OIDC and LDAP authentication support
      - Multiple file providers: local storage and S3
      - Modern and intuitive web interface

      **Note:** This project was archived in June 2025 but remains stable and functional. The first user account you create will automatically become the administrator account.

      **Technical:** Internal Caddy reverse proxy handles frontend/backend routing on port 3000.
    ko_kr: |
      Pingvin Share는 가볍고 아름다운 셀프 호스팅 파일 공유 플랫폼으로, 원활하고 효율적인 파일 공유에 완벽합니다. WeTransfer의 훌륭한 대안입니다.

      **주요 기능:**
      - 링크를 통한 파일 공유
      - 무제한 파일 크기 (디스크 공간에만 제한됨)
      - 공유 만료 날짜 설정
      - 방문자 제한 및 비밀번호로 공유 보안
      - 수신자에게 이메일 발송
      - 역방향 공유 (다른 사람에게 파일 요청)
      - OIDC 및 LDAP 인증 지원
      - 로컬 스토리지 및 S3 파일 제공자
      - 현대적이고 직관적인 웹 인터페이스

      **참고:** 이 프로젝트는 2025년 6월에 아카이브되었지만 안정적이고 기능적입니다. 생성하는 첫 번째 사용자 계정이 자동으로 관리자 계정이 됩니다.

      **기술사항:** 내부 Caddy 리버스 프록시가 포트 3000에서 프론트엔드/백엔드 라우팅을 처리합니다.
    es_es: |
      Pingvin Share es una plataforma de intercambio de archivos autoalojada que combina ligereza y belleza, perfecta para compartir archivos de manera fluida y eficiente. Es una excelente alternativa a WeTransfer.

      **Características:**
      - Compartir archivos mediante un enlace
      - Tamaño de archivo ilimitado (restringido solo por el espacio en disco)
      - Establecer fechas de vencimiento para compartir
      - Asegurar el intercambio con límites de visitantes y contraseñas
      - Enviar correo electrónico a los destinatarios
      - Compartir inverso (solicitar archivos a otros)
      - Soporte de autenticación OIDC y LDAP
      - Múltiples proveedores de archivos: almacenamiento local y S3
      - Interfaz web moderna e intuitiva

      **Nota:** Este proyecto fue archivado en junio de 2025, pero sigue siendo estable y funcional. La primera cuenta de usuario que cree se convertirá automáticamente en la cuenta de administrador.

      **Técnico:** El proxy inverso Caddy interno maneja el enrutamiento frontend/backend en el puerto 3000.
    fr_fr: |
      Pingvin Share est une plateforme de partage de fichiers auto-hébergée qui combine légèreté et beauté, parfaite pour un partage de fichiers fluide et efficace. C'est une excellente alternative à WeTransfer.

      **Fonctionnalités:**
      - Partager des fichiers à l'aide d'un lien
      - Taille de fichier illimitée (restreinte uniquement par l'espace disque)
      - Définir des dates d'expiration pour les partages
      - Sécuriser les partages avec des limites de visiteurs et des mots de passe
      - Envoyer un e-mail aux destinataires
      - Partage inversé (demander des fichiers à d'autres)
      - Support d'authentification OIDC et LDAP
      - Plusieurs fournisseurs de fichiers : stockage local et S3
      - Interface web moderne et intuitive

      **Remarque:** Ce projet a été archivé en juin 2025 mais reste stable et fonctionnel. Le premier compte utilisateur que vous créez deviendra automatiquement le compte administrateur.

      **Technique:** Le proxy inverse Caddy interne gère le routage frontend/backend sur le port 3000.
    zh_cn: |
      Pingvin Share 是一个自托管文件共享平台,结合了轻量级和美观性,非常适合无缝高效的文件共享。它是 WeTransfer 的绝佳替代方案。

      **功能特点:**
      - 使用链接共享文件
      - 无限文件大小(仅受磁盘空间限制)
      - 为共享设置过期日期
      - 使用访问者限制和密码保护共享
      - 通过电子邮件发送给收件人
      - 反向共享(向他人请求文件)
      - 支持 OIDC 和 LDAP 身份验证
      - 多个文件提供商:本地存储和 S3
      - 现代直观的 Web 界面

      **注意:** 该项目于 2025 年 6 月被归档,但仍然稳定且功能正常。您创建的第一个用户帐户将自动成为管理员帐户。

      **技术说明:** 内部 Caddy 反向代理在端口 3000 上处理前端/后端路由。
  tips:
    before_install:
      en_us: |
        **First Time Setup:**
        
        On first access, you'll need to create an administrator account. This will be your login credentials for managing the application.
        
        **Post-Installation:**
        - Configure SMTP settings in the admin panel to enable email notifications
        - Set your preferred default share expiration time
        - Customize the application name and logo in the configuration
        
        **Technical Note:** Container uses PUID/PGID for file permissions. Internal Caddy serves as reverse proxy on port 3000.
      ko_kr: |
        **초기 설정:**
        
        첫 번째 접속 시 관리자 계정을 생성해야 합니다. 이것이 애플리케이션 관리를 위한 로그인 자격 증명이 됩니다.
        
        **설치 후:**
        - 이메일 알림을 활성화하려면 관리자 패널에서 SMTP 설정 구성
        - 선호하는 기본 공유 만료 시간 설정
        - 구성에서 애플리케이션 이름 및 로고 사용자 지정
        
        **기술 참고사항:** 컨테이너는 파일 권한을 위해 PUID/PGID를 사용합니다. 내부 Caddy가 포트 3000에서 리버스 프록시 역할을 합니다.
      es_es: |
        **Configuración inicial:**
        
        En el primer acceso, deberá crear una cuenta de administrador. Estas serán sus credenciales de inicio de sesión para administrar la aplicación.
        
        **Después de la instalación:**
        - Configure los ajustes SMTP en el panel de administración para habilitar las notificaciones por correo electrónico
        - Establezca su tiempo de vencimiento de compartir predeterminado preferido
        - Personalice el nombre y el logotipo de la aplicación en la configuración
        
        **Nota técnica:** El contenedor usa PUID/PGID para permisos de archivo. Caddy interno sirve como proxy inverso en el puerto 3000.
      fr_fr: |
        **Configuration initiale:**
        
        Lors du premier accès, vous devrez créer un compte administrateur. Ce seront vos identifiants de connexion pour gérer l'application.
        
        **Après l'installation:**
        - Configurez les paramètres SMTP dans le panneau d'administration pour activer les notifications par e-mail
        - Définissez votre délai d'expiration de partage par défaut préféré
        - Personnalisez le nom et le logo de l'application dans la configuration
        
        **Note technique:** Le conteneur utilise PUID/PGID pour les autorisations de fichiers. Caddy interne sert de proxy inverse sur le port 3000.
      zh_cn: |
        **首次设置:**
        
        首次访问时,您需要创建管理员帐户。这将是您管理应用程序的登录凭据。
        
        **安装后:**
        - 在管理面板中配置 SMTP 设置以启用电子邮件通知
        - 设置您首选的默认共享过期时间
        - 在配置中自定义应用程序名称和徽标
        
        **技术说明:** 容器使用 PUID/PGID 进行文件权限管理。内部 Caddy 在端口 3000 上充当反向代理。

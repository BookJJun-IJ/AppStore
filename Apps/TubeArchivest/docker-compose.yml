name: tubearchivist

services:
  tubearchivist:
    image: bbilly1/tubearchivist:v0.5.8
    container_name: tubearchivist
    restart: unless-stopped
    expose:
      - "8000"  # Default TubeArchivist port - NSL Router will handle routing
    volumes:
      - type: bind
        source: /DATA/AppData/tubearchivist/youtube
        target: /youtube
      - type: bind
        source: /DATA/AppData/tubearchivist/cache
        target: /cache
    environment:
      - ES_URL=http://tubearchivist-es:9200
      - REDIS_CON=redis://tubearchivist-redis:6379  # v0.5.0+ format
      - HOST_UID=$PUID
      - HOST_GID=$PGID
      - TA_HOST=http://$PCS_DOMAIN  # Protocol required since v0.5.0
      - TA_USERNAME=admin
      - TA_PASSWORD=$PCS_DEFAULT_PASSWORD
      - ELASTIC_PASSWORD=$PCS_DEFAULT_PASSWORD
      - TZ=$TZ
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      - tubearchivist-es
      - tubearchivist-redis
    cpu_shares: 70

  tubearchivist-redis:
    image: redis:7.4.2-alpine
    container_name: tubearchivist-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - type: bind
        source: /DATA/AppData/tubearchivist/redis
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cpu_shares: 50

  tubearchivist-es:
    image: bbilly1/tubearchivist-es
    container_name: tubearchivist-es
    restart: unless-stopped
    expose:
      - "9200"
    environment:
      - "ELASTIC_PASSWORD=$PCS_DEFAULT_PASSWORD"
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "xpack.security.enabled=true"
      - "discovery.type=single-node"
      - "path.repo=/usr/share/elasticsearch/data/snapshot"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - type: bind
        source: /DATA/AppData/tubearchivist/es
        target: /usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    cpu_shares: 50

x-casaos:
  architectures:
    - amd64
    - arm64
  main: tubearchivist
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData:/data alpine:3.19 sh -c '
      mkdir -p /data/tubearchivist/youtube /data/tubearchivist/cache /data/tubearchivist/redis /data/tubearchivist/es &&
      chown -R 1000:1000 /data/tubearchivist
    '
  author: Yundera Team
  category: Media
  description:
    en_us: |
      Your self-hosted YouTube media server. TubeArchivist is a powerful self-hosted application for organizing and searching your personal YouTube video library.

      ## Features:
      - Subscribe to your favorite channels
      - Download videos with metadata and thumbnails
      - Full-text search across all metadata
      - Re-index and update metadata from YouTube
      - Create playlists and organize content
      - Built-in video player with subtitle support
      - Download management and scheduler
      - Elasticsearch-powered search functionality

      ## Important System Requirements:
      ⚠️ **CRITICAL**: Elasticsearch requires `vm.max_map_count` to be set to at least 262144.

      Run this command on your host system BEFORE installing:
      ```
      echo "vm.max_map_count = 262144" | sudo tee -a /etc/sysctl.conf
      sudo sysctl -p
      ```

      Without this setting, Elasticsearch will fail to start.

      Default Account
      | Username | Password                |
      |----------|-------------------------|
      | `admin`  | `$PCS_DEFAULT_PASSWORD` |
    ko_kr: |
      자체 호스팅 YouTube 미디어 서버. TubeArchivist는 개인 YouTube 비디오 라이브러리를 구성하고 검색하기 위한 강력한 자체 호스팅 애플리케이션입니다.

      ## 주요 기능:
      - 좋아하는 채널 구독
      - 메타데이터 및 썸네일과 함께 비디오 다운로드
      - 모든 메타데이터에 대한 전체 텍스트 검색
      - YouTube에서 메타데이터 다시 색인화 및 업데이트
      - 재생 목록 생성 및 콘텐츠 구성
      - 자막 지원이 있는 내장 비디오 플레이어
      - 다운로드 관리 및 스케줄러
      - Elasticsearch 기반 검색 기능

      ## 중요한 시스템 요구사항:
      ⚠️ **필수**: Elasticsearch는 `vm.max_map_count`를 최소 262144로 설정해야 합니다.

      설치 전에 호스트 시스템에서 이 명령을 실행하세요:
      ```
      echo "vm.max_map_count = 262144" | sudo tee -a /etc/sysctl.conf
      sudo sysctl -p
      ```

      이 설정이 없으면 Elasticsearch가 시작되지 않습니다.

      기본 계정
      | 사용자명 | 비밀번호                |
      |----------|-------------------------|
      | `admin`  | `$PCS_DEFAULT_PASSWORD` |
    fr_fr: |
      Votre serveur multimédia YouTube auto-hébergé. TubeArchivist est une application auto-hébergée puissante pour organiser et rechercher votre bibliothèque vidéo YouTube personnelle.

      ## Fonctionnalités:
      - Abonnez-vous à vos chaînes préférées
      - Téléchargez des vidéos avec métadonnées et vignettes
      - Recherche en texte intégral dans toutes les métadonnées
      - Réindexation et mise à jour des métadonnées depuis YouTube
      - Créez des listes de lecture et organisez le contenu
      - Lecteur vidéo intégré avec prise en charge des sous-titres
      - Gestion et planification des téléchargements
      - Fonctionnalité de recherche alimentée par Elasticsearch

      ## Configuration système importante:
      ⚠️ **CRITIQUE**: Elasticsearch nécessite que `vm.max_map_count` soit défini à au moins 262144.

      Exécutez cette commande sur votre système hôte AVANT l'installation:
      ```
      echo "vm.max_map_count = 262144" | sudo tee -a /etc/sysctl.conf
      sudo sysctl -p
      ```

      Sans ce paramètre, Elasticsearch ne démarrera pas.

      Compte par défaut
      | Nom d'utilisateur | Mot de passe            |
      |-------------------|-------------------------|
      | `admin`           | `$PCS_DEFAULT_PASSWORD` |
    es_es: |
      Tu servidor multimedia YouTube autoalojado. TubeArchivist es una potente aplicación autoalojada para organizar y buscar tu biblioteca personal de videos de YouTube.

      ## Características:
      - Suscríbete a tus canales favoritos
      - Descarga videos con metadatos y miniaturas
      - Búsqueda de texto completo en todos los metadatos
      - Reindexación y actualización de metadatos desde YouTube
      - Crea listas de reproducción y organiza contenido
      - Reproductor de video integrado con soporte de subtítulos
      - Gestión y programación de descargas
      - Funcionalidad de búsqueda con Elasticsearch

      ## Requisitos del sistema importantes:
      ⚠️ **CRÍTICO**: Elasticsearch requiere que `vm.max_map_count` esté configurado en al menos 262144.

      Ejecuta este comando en tu sistema host ANTES de instalar:
      ```
      echo "vm.max_map_count = 262144" | sudo tee -a /etc/sysctl.conf
      sudo sysctl -p
      ```

      Sin esta configuración, Elasticsearch no se iniciará.

      Cuenta predeterminada
      | Usuario | Contraseña              |
      |---------|-------------------------|
      | `admin` | `$PCS_DEFAULT_PASSWORD` |
    zh_cn: |
      您的自托管 YouTube 媒体服务器。TubeArchivist 是一个强大的自托管应用程序,用于组织和搜索您的个人 YouTube 视频库。

      ## 功能:
      - 订阅您喜爱的频道
      - 下载带有元数据和缩略图的视频
      - 在所有元数据中进行全文搜索
      - 从 YouTube 重新索引和更新元数据
      - 创建播放列表并组织内容
      - 支持字幕的内置视频播放器
      - 下载管理和调度程序
      - Elasticsearch 驱动的搜索功能

      ## 重要系统要求:
      ⚠️ **关键**:Elasticsearch 需要将 `vm.max_map_count` 设置为至少 262144。

      在安装前在您的主机系统上运行此命令:
      ```
      echo "vm.max_map_count = 262144" | sudo tee -a /etc/sysctl.conf
      sudo sysctl -p
      ```

      没有此设置,Elasticsearch 将无法启动。

      默认账户
      | 用户名  | 密码                    |
      |---------|-------------------------|
      | `admin` | `$PCS_DEFAULT_PASSWORD` |

  tagline:
    en_us: Self-hosted YouTube media server with search and offline playback
    ko_kr: 검색 및 오프라인 재생 기능이 있는 자체 호스팅 YouTube 미디어 서버
    zh_cn: 具有搜索和离线播放功能的自托管YouTube媒体服务器
    fr_fr: Serveur multimédia YouTube auto-hébergé avec recherche et lecture hors ligne
    es_es: Servidor multimedia YouTube autoalojado con búsqueda y reproducción sin conexión
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/TubeArchivist/thumbnail.png
  title:
    en_us: TubeArchivist
  tips:
    before_install:
      en_us: |
        ## Default Account

        | Username | Password |
        |----------|----------|
        | `admin` | `$PCS_DEFAULT_PASSWORD` |

        ## Important Notes

        - **First Launch**: Initial startup may take 2-3 minutes while Elasticsearch initializes
        - **Resource Usage**: Requires minimum 2GB RAM (4GB+ recommended for large collections)
        - **Download Format**: Configure in Settings → Downloads for iOS/MacOS compatibility
        - **Storage**: Videos stored in `/DATA/Media/YouTube`
        - **Search**: Powered by Elasticsearch for metadata indexing
        - **Browser Compatibility**: Check codec support for your browser

        ## Video Format for iOS/MacOS

        For best compatibility with Apple devices and Safari:
        ```
        bestvideo[vcodec*=avc1]+bestaudio[acodec*=mp4a]/mp4
        ```

        Configure this in Settings → Downloads → Download Format after first login.
  index: /
  webui_port: 8000
  store_app_id: tubearchivist
name: tubearchivist

services:
  tubearchivist:
    image: bbilly1/tubearchivist:v0.5.8
    container_name: tubearchivist
    restart: unless-stopped
    user: "0:0"  # Root required for chown functionality
    environment:
      - ES_URL=http://tubearchivist-es:9200
      - REDIS_CON=redis://tubearchivist-redis:6379
      - HOST_UID=$PUID
      - HOST_GID=$PGID
      - TA_HOST=http://$PCS_DOMAIN
      - TA_USERNAME=admin
      - TA_PASSWORD=$PCS_DEFAULT_PASSWORD
      - ELASTIC_PASSWORD=$PCS_DEFAULT_PASSWORD
      - TZ=$TZ
    volumes:
      - /DATA/Media/YouTube:/youtube
      - /DATA/AppData/$AppID/cache:/cache
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      tubearchivist-es:
        condition: service_healthy
      tubearchivist-redis:
        condition: service_started
    deploy:
      resources:
        reservations:
          memory: 512M
    cpu_shares: 70
    networks:
      - tubearchivist_network

  tubearchivist-redis:
    image: redis/redis-stack-server:7.4.0-v1
    container_name: tubearchivist-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    depends_on:
      - tubearchivist-es
    deploy:
      resources:
        reservations:
          memory: 256M
    cpu_shares: 30
    networks:
      - tubearchivist_network

  tubearchivist-es:
    image: bbilly1/tubearchivist-es:8.15.3
    container_name: tubearchivist-es
    restart: unless-stopped
    environment:
      - ELASTIC_PASSWORD=$PCS_DEFAULT_PASSWORD
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=true
      - discovery.type=single-node
      - path.repo=/usr/share/elasticsearch/data/snapshot
    expose:
      - "9200"
    volumes:
      - /DATA/AppData/$AppID/es:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          memory: 1G
    cpu_shares: 50
    networks:
      - tubearchivist_network

networks:
  tubearchivist_network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: tubearchivist
  author: Yundera Team
  category: Media
  description:
    en_us: |
      TubeArchivist is your self-hosted YouTube media server. Subscribe to channels, download videos, and build a searchable archive of your favorite content. Features metadata indexing, web-based playback, and complete offline access to your video collection.

      **Key Features:**
      - Subscribe to YouTube channels
      - Automated video downloads with yt-dlp
      - Full-text search across video metadata
      - Web-based video player
      - Track watched/unwatched videos
      - Playlist and channel management
      - Elasticsearch-powered search
      - iOS/MacOS compatible video formats

      **System Requirements:**
      - Minimum: 2GB RAM for small setup
      - Recommended: 4GB+ RAM for large collections
      - CPU: Dual-core with 4 threads minimum
      - Storage: Plan for your video collection size

      **After Installation:**
      1. Access the web interface
      2. Configure download format in settings
      3. Subscribe to your favorite channels
      4. Start building your archive

      Videos are stored in `/DATA/Media/YouTube` and can be accessed by other media servers.
    ko_kr: |
      TubeArchivist는 자체 호스팅 YouTube 미디어 서버입니다. 채널을 구독하고, 동영상을 다운로드하며, 즐겨찾는 콘텐츠의 검색 가능한 아카이브를 구축하세요. 메타데이터 인덱싱, 웹 기반 재생 및 비디오 컬렉션에 대한 완전한 오프라인 액세스를 제공합니다.

      **주요 기능:**
      - YouTube 채널 구독
      - yt-dlp를 사용한 자동 비디오 다운로드
      - 비디오 메타데이터 전체 텍스트 검색
      - 웹 기반 비디오 플레이어
      - 시청/미시청 비디오 추적
      - 재생 목록 및 채널 관리
      - Elasticsearch 기반 검색
      - iOS/MacOS 호환 비디오 형식

      **시스템 요구사항:**
      - 최소: 소규모 설정에 2GB RAM
      - 권장: 대규모 컬렉션에 4GB+ RAM
      - CPU: 최소 듀얼 코어 4스레드
      - 저장 공간: 비디오 컬렉션 크기에 맞게 계획

      **설치 후:**
      1. 웹 인터페이스에 액세스
      2. 설정에서 다운로드 형식 구성
      3. 즐겨찾는 채널 구독
      4. 아카이브 구축 시작

      비디오는 `/DATA/Media/YouTube`에 저장되며 다른 미디어 서버에서 액세스할 수 있습니다.
    zh_cn: |
      TubeArchivist是您的自托管YouTube媒体服务器。订阅频道、下载视频并构建您喜爱内容的可搜索存档。具有元数据索引、基于Web的播放和对视频收藏的完整离线访问功能。

      **主要功能：**
      - 订阅YouTube频道
      - 使用yt-dlp自动下载视频
      - 视频元数据全文搜索
      - 基于Web的视频播放器
      - 跟踪已观看/未观看视频
      - 播放列表和频道管理
      - Elasticsearch驱动的搜索
      - iOS/MacOS兼容视频格式

      **系统要求：**
      - 最低：小型设置需要2GB RAM
      - 推荐：大型收藏需要4GB+ RAM
      - CPU：最低双核4线程
      - 存储：根据视频收藏大小规划

      **安装后：**
      1. 访问Web界面
      2. 在设置中配置下载格式
      3. 订阅您喜爱的频道
      4. 开始构建存档

      视频存储在`/DATA/Media/YouTube`中，可以被其他媒体服务器访问。
    fr_fr: |
      TubeArchivist est votre serveur multimédia YouTube auto-hébergé. Abonnez-vous aux chaînes, téléchargez des vidéos et créez une archive consultable de votre contenu préféré. Dispose de l'indexation des métadonnées, de la lecture Web et d'un accès hors ligne complet à votre collection vidéo.

      **Fonctionnalités principales :**
      - Abonnement aux chaînes YouTube
      - Téléchargements vidéo automatisés avec yt-dlp
      - Recherche en texte intégral des métadonnées vidéo
      - Lecteur vidéo basé sur le Web
      - Suivi des vidéos regardées/non regardées
      - Gestion des listes de lecture et des chaînes
      - Recherche alimentée par Elasticsearch
      - Formats vidéo compatibles iOS/MacOS

      **Configuration requise :**
      - Minimum : 2 Go de RAM pour petite installation
      - Recommandé : 4 Go+ de RAM pour grandes collections
      - CPU : Double cœur avec 4 threads minimum
      - Stockage : Planifiez selon la taille de votre collection

      **Après l'installation :**
      1. Accédez à l'interface Web
      2. Configurez le format de téléchargement dans les paramètres
      3. Abonnez-vous à vos chaînes préférées
      4. Commencez à construire votre archive

      Les vidéos sont stockées dans `/DATA/Media/YouTube` et peuvent être accessibles par d'autres serveurs multimédias.
    es_es: |
      TubeArchivist es su servidor multimedia YouTube autoalojado. Suscríbase a canales, descargue videos y construya un archivo buscable de su contenido favorito. Cuenta con indexación de metadatos, reproducción basada en web y acceso sin conexión completo a su colección de videos.

      **Características principales:**
      - Suscripción a canales de YouTube
      - Descargas automáticas de videos con yt-dlp
      - Búsqueda de texto completo en metadatos de video
      - Reproductor de video basado en web
      - Seguimiento de videos vistos/no vistos
      - Gestión de listas de reproducción y canales
      - Búsqueda impulsada por Elasticsearch
      - Formatos de video compatibles con iOS/MacOS

      **Requisitos del sistema:**
      - Mínimo: 2GB RAM para configuración pequeña
      - Recomendado: 4GB+ RAM para colecciones grandes
      - CPU: Doble núcleo con 4 hilos mínimo
      - Almacenamiento: Planifique según el tamaño de su colección

      **Después de la instalación:**
      1. Acceda a la interfaz web
      2. Configure el formato de descarga en configuración
      3. Suscríbase a sus canales favoritos
      4. Comience a construir su archivo

      Los videos se almacenan en `/DATA/Media/YouTube` y pueden ser accesibles por otros servidores multimedia.
  developer: TubeArchivist

  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/PsiTransfer/thumbnail.png
  title:
    en_us: PsiTransfer
  index: /
  webui_port: 3000
  store_app_id: psitransfer
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/data /DATA/AppData/$AppID/config &&
    chmod -R 777 /DATA/AppData/$AppID/data &&
    chmod -R 755 /DATA/AppData/$AppID/config
  tips:
    before_install:
      en_us: |
        ## Default Credentials
        
        | Field              | Value          |
        |--------------------|----------------|
        | Admin Password     | `$default_pwd` |
        | Upload Password    | `$default_pwd` |
        
        **Access Admin Panel:** Navigate to `/admin` and enter the admin password.
        
        **Important Notes:**
        - Files are stored in `/DATA/AppData/psitransfer/data/`
        - Default file retention is 24 hours (86400 seconds)
        - Application runs with elevated permissions for upload handling
      ko_kr: |
        ## 기본 인증 정보
        
        | 항목              | 값             |
        |------------------|----------------|
        | 관리자 비밀번호    | `$default_pwd` |
        | 업로드 비밀번호    | `$default_pwd` |
        
        **관리자 패널 접근:** `/admin`으로 이동하여 관리자 비밀번호를 입력하세요.
        
        **중요 사항:**
        - 파일은 `/DATA/AppData/psitransfer/data/`에 저장됩니다
        - 기본 파일 보관 기간은 24시간(86400초)입니다
        - 업로드 처리를 위해 애플리케이션이 상승된 권한으로 실행됩니다
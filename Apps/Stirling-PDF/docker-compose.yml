  tips:
    before_install:
      en_us: |
        **Setup Time:**
        This app takes about 5-10 minutes to set up after installation. Please be patient and wait before trying to access it.

        **Default Login Information:**
        | Username | Password |
        | -------- | -------- |
        | `admin`  | `$default_pwd` |

        **Important Security Note:**
        After your first login, go to Admin Settings → User Management and change both the username and password to something secure. This protects your PDF files from unauthorized access.

        **Features Available:**
        • Split, merge, and organize PDFs
        • Convert between PDF and other formats
        • Add watermarks, signatures, and annotations
        • Password protection and encryption
        • OCR text extraction from scanned documents
        • Compress PDFs to reduce file size

        **How to use:**
        Once ready, you can upload PDF files through your web browser and start editing them right away!
      ko_kr: |
        **설정 시간:**
        이 앱은 설치 후 설정이 완료되기까지 약 5-10분이 걸립니다. 인내심을 갖고 접속하기 전에 기다려 주세요.

        **기본 로그인 정보:**
        | 사용자명 | 비밀번호 |
        | -------- | -------- |
        | `admin`  | `$default_pwd` |

        **중요한 보안 알림:**
        첫 로그인 후 관리자 설정 → 사용자 관리로 가서 사용자명과 비밀번호를 안전한 것으로 변경하세요. 이렇게 하면 PDF 파일을 무단 접근으로부터 보호할 수 있습니다.

        **사용 가능한 기능:**
        • PDF 분할, 병합, 정리
        • PDF와 다른 형식 간 변환
        • 워터마크, 서명, 주석 추가
        • 비밀번호 보호 및 암호화
        • 스캔한 문서에서 OCR 텍스트 추출
        • PDF 압축으로 파일 크기 줄이기

        **사용 방법:**
        준비가 되면 웹 브라우저를 통해 PDF 파일을 업로드하고 바로 편집을 시작할 수 있습니다!
      zh_cn: |

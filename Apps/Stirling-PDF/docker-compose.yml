        准备就绪后，您可以通过网页浏览器上传PDF文件并立即开始编辑！
      fr_fr: |
        **Temps d'installation :**
        Cette application prend environ 5-10 minutes pour s'installer après l'installation. Veuillez être patient et attendre avant d'essayer d'y accéder.

        **Informations de connexion par défaut :**
        | Nom d'utilisateur | Mot de passe |
        | ----------------- | ------------ |
        | `admin`           | `$default_pwd` |

        **Note de sécurité importante :**
        Après votre première connexion, allez dans Paramètres Admin → Gestion des Utilisateurs et changez le nom d'utilisateur et le mot de passe pour quelque chose de sécurisé. Cela protège vos fichiers PDF des accès non autorisés.

        **Fonctionnalités disponibles :**
        • Diviser, fusionner et organiser les PDF
        • Convertir entre PDF et autres formats
        • Ajouter des filigranes, signatures et annotations
        • Protection par mot de passe et chiffrement
        • Extraction de texte OCR des documents scannés
        • Compresser les PDF pour réduire la taille

        **Comment utiliser :**
        Une fois prêt, vous pouvez télécharger des fichiers PDF via votre navigateur web et commencer à les éditer immédiatement !
      es_es: |

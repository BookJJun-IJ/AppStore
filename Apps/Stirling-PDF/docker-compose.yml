        Esta aplicación toma aproximadamente 5-10 minutos para configurarse después de la instalación. Por favor ten paciencia y espera antes de intentar acceder.

        **Información de inicio de sesión por defecto:**
        | Usuario | Contraseña |
        | ------- | ---------- |
        | `admin` | `$default_pwd` |

        **Nota de seguridad importante:**
        Después de tu primer inicio de sesión, ve a Configuración de Admin → Gestión de Usuarios y cambia tanto el usuario como la contraseña por algo seguro. Esto protege tus archivos PDF del acceso no autorizado.

        **Características disponibles:**
        • Dividir, combinar y organizar PDFs
        • Convertir entre PDF y otros formatos
        • Agregar marcas de agua, firmas y anotaciones
        • Protección con contraseña y encriptación
        • Extracción de texto OCR de documentos escaneados
        • Comprimir PDFs para reducir el tamaño

        **Cómo usar:**
        Una vez listo, puedes subir archivos PDF a través de tu navegador web y comenzar a editarlos de inmediato!

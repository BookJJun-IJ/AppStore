name: excalidraw-workspace

services:
  # Excalidraw Complete - 개인 저장소 포함 완전한 솔루션
  excalidraw-complete:
    image: patwie/excalidraw-complete:latest
    container_name: excalidraw-workspace
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 3002
    volumes:
      - /DATA/AppData/$AppID/drawings:/app/data
      - /DATA/Documents/Excalidraw:/app/exports
      - /DATA/AppData/$AppID/custom:/app/custom
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: |
      sh -c '
      # 📁 디렉토리 생성
      mkdir -p /app/data /app/exports /app/custom
      chown -R $PUID:$PGID /app/data /app/exports /app/custom 2>/dev/null || true
      
      # 🚀 원래 서버 백그라운드 실행
      ./excalidraw-complete &
      EXCALIDRAW_PID=$!
      
      # ⏳ 서버 시작 대기
      sleep 5
      
      # 📝 이중 저장 스크립트 생성
      cat > /app/custom/dual-save.js << "EOF"
      (function() {
        console.log("🎨 Excalidraw 이중 저장 기능 로드됨");
        
        // 💾 서버 저장 함수
        async function saveToServerStorage(sceneData, filename) {
          try {
            const timestamp = new Date().toISOString()
              .replace(/[:\.]/g, "-")
              .slice(0, 19);
            
            const finalFilename = filename || `excalidraw-${timestamp}`;
            const jsonData = typeof sceneData === "string" ? sceneData : JSON.stringify(sceneData, null, 2);
            
            // Node.js 서버에 저장 요청 (내부 API)
            const response = await fetch("/api/save-file", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                filename: `${finalFilename}.excalidraw`,
                content: jsonData
              })
            });

            if (response.ok) {
              const result = await response.json();
              console.log("✅ 서버 저장 성공:", result.filename);
              return result;
            } else {
              throw new Error(`서버 저장 실패: ${response.status}`);
            }
          } catch (error) {
            console.error("❌ 서버 저장 오류:", error);
            throw error;
          }
        }
        
        // 🎯 Save to Disk 버튼 이중 저장 기능 추가
        function enhanceSaveButton() {
          const buttons = document.querySelectorAll("button, [role=\"button\"]");
          
          buttons.forEach(button => {
            const text = button.textContent?.toLowerCase() || button.getAttribute("aria-label")?.toLowerCase() || "";
            
            if (text.includes("save to disk") || text.includes("디스크에 저장") || text.includes("save")) {
              
              // 이미 처리된 버튼인지 확인
              if (button.dataset.dualSaveEnhanced) return;
              button.dataset.dualSaveEnhanced = "true";
              
              // 원래 클릭 이벤트 백업
              const originalClick = button.onclick;
              const originalListeners = [];
              
              // 새로운 클릭 핸들러
              button.addEventListener("click", async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                try {
                  // 📊 현재 Excalidraw 데이터 가져오기
                  const excalidrawAPI = window.excalidrawAPI || window.ExcalidrawAPI;
                  if (!excalidrawAPI) {
                    console.warn("⚠️ Excalidraw API를 찾을 수 없음");
                    return;
                  }

                  const elements = excalidrawAPI.getSceneElements ? excalidrawAPI.getSceneElements() : [];
                  const appState = excalidrawAPI.getAppState ? excalidrawAPI.getAppState() : {};
                  
                  // 📄 .excalidraw 포맷으로 데이터 구성
                  const sceneData = {
                    type: "excalidraw",
                    version: 2,
                    source: "https://excalidraw.com",
                    elements: elements,
                    appState: {
                      gridSize: appState.gridSize || 20,
                      viewBackgroundColor: appState.viewBackgroundColor || "#ffffff",
                      theme: appState.theme || "light"
                    }
                  };

                  // 🎯 이중 저장 실행
                  console.log("💾 이중 저장 시작...");
                  
                  // 1️⃣ 서버에 저장
                  try {
                    await saveToServerStorage(sceneData);
                    console.log("✅ 서버 저장 완료");
                  } catch (serverError) {
                    console.warn("⚠️ 서버 저장 실패, 브라우저 저장만 진행:", serverError);
                  }
                  
                  // 2️⃣ 원래 브라우저 다운로드 실행
                  if (originalClick) {
                    originalClick.call(button, e);
                  } else {
                    // Excalidraw 내장 저장 함수 호출
                    const event = new MouseEvent("click", {
                      bubbles: true,
                      cancelable: true,
                      view: window
                    });
                    button.removeEventListener("click", arguments.callee);
                    button.dispatchEvent(event);
                  }
                  
                  console.log("🎉 이중 저장 완료!");

                } catch (error) {
                  console.error("❌ 이중 저장 오류:", error);
                  
                  // 오류 시에도 원래 기능은 실행
                  if (originalClick) {
                    originalClick.call(button, e);
                  }
                }
              }, { once: false });
              
              // 👀 버튼 스타일 개선
              button.style.background = "linear-gradient(45deg, #4CAF50, #45a049)";
              button.style.boxShadow = "0 2px 4px rgba(0,0,0,0.2)";
              button.title = "브라우저 다운로드 + 서버 저장 (이중 저장)";
            }
          });
        }
        
        // 🔄 주기적 버튼 감지
        function initDualSave() {
          enhanceSaveButton();
          
          // DOM 변경 감지
          const observer = new MutationObserver(() => {
            enhanceSaveButton();
          });
          
          observer.observe(document.body, {
            childList: true,
            subtree: true
          });
          
          // 주기적 재확인
          setInterval(enhanceSaveButton, 3000);
        }

        // 🚀 초기화
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initDualSave);
        } else {
          initDualSave();
        }
        
      })();
      EOF
      
      # 🌐 HTTP 서버로 스크립트 제공
      cd /app/custom
      python3 -m http.server 8080 &
      HTTP_PID=$!
      
      # 📈 프로세스 감시
      wait $EXCALIDRAW_PID
      '

  # 파일 저장 API 서버
  file-saver:
    image: node:18-alpine
    container_name: file-saver
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/server-files:/app
    expose:
      - 3001
    working_dir: /app
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUID=$PUID
      - PGID=$PGID
    command: |
      sh -c '
      mkdir -p /exports /app
      chown -R $PUID:$PGID /exports /app 2>/dev/null || true
      
      if [ ! -f package.json ]; then
        echo "🚀 파일 저장 API 초기화..."
        npm init -y
        npm install express cors helmet
        
        cat > server.js << "EOF"
      const express = require("express");
      const cors = require("cors");
      const fs = require("fs");
      const path = require("path");
      const helmet = require("helmet");

      const app = express();
      const PORT = process.env.PORT || 3001;

      app.use(helmet());
      app.use(cors());
      app.use(express.json({ limit: "10mb" }));

      const exportDir = "/exports";
      if (!fs.existsSync(exportDir)) {
        fs.mkdirSync(exportDir, { recursive: true });
      }

      // 💾 파일 저장 API
      app.post("/api/save-file", async (req, res) => {
        try {
          const { filename, content } = req.body;
          
          if (!filename || !content) {
            return res.status(400).json({ error: "파일명과 내용이 필요합니다" });
          }

          const sanitizedFilename = filename.replace(/[^a-zA-Z0-9\-_.]/g, "_");
          const filepath = path.join(exportDir, sanitizedFilename);

          fs.writeFileSync(filepath, content, "utf8");
          
          console.log(`✅ 파일 저장됨: ${sanitizedFilename}`);
          
          res.json({ 
            success: true, 
            filename: sanitizedFilename,
            path: `/DATA/Documents/Excalidraw/${sanitizedFilename}`,
            timestamp: new Date().toISOString()
          });

        } catch (error) {
          console.error("❌ 파일 저장 오류:", error);
          res.status(500).json({ error: "파일 저장 실패" });
        }
      });

      // 📋 파일 목록 조회
      app.get("/api/files", (req, res) => {
        try {
          const files = fs.readdirSync(exportDir)
            .filter(file => file.endsWith(".excalidraw"))
            .map(file => {
              const stats = fs.statSync(path.join(exportDir, file));
              return {
                name: file,
                size: stats.size,
                created: stats.birthtime,
                modified: stats.mtime
              };
            })
            .sort((a, b) => b.modified - a.modified);

          res.json({ files });
        } catch (error) {
          console.error("❌ 파일 목록 오류:", error);
          res.status(500).json({ error: "파일 목록 조회 실패" });
        }
      });

      app.get("/health", (req, res) => {
        res.json({ 
          status: "healthy", 
          timestamp: new Date().toISOString(),
          exports_dir: exportDir
        });
      });

      app.listen(PORT, "0.0.0.0", () => {
        console.log(`🚀 파일 저장 API 서버 실행 중: ${PORT}`);
        console.log(`📁 저장 디렉토리: ${exportDir}`);
      });
      EOF

        echo "✅ 서버 코드 생성 완료"
      fi
      
      echo "🚀 파일 저장 API 서버 시작..."
      node server.js
      '

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw-complete
  webui_port: 3002
  author: CasaOS Team
  category: Productivity

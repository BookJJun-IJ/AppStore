name: excalidraw

services:
  # 🔥 PatWie excalidraw-complete - 모든 기능 통합 솔루션
  excalidraw:
    image: ubuntu:22.04
    container_name: excalidraw
    restart: unless-stopped
    # 🔧 사용자 권한으로 실행
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      # 🔧 PatWie 설정: 파일시스템 저장
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      # 🔧 실시간 협업 활성화
      - ENABLE_COLLABORATION=true
      # 🔧 포트 설정 (NSL 라우터 연동)
      - PORT=3002
      # 🔧 도메인 설정
      - DOMAIN=$domain
      # 🔧 시스템 환경변수
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
      # 🔧 바이너리 디렉토리 전체 마운트
      - /DATA/AppData/$AppID/bin:/app
    working_dir: /storage
    # 🔧 시작 스크립트 실행 (권한 문제 해결)
    command: ["/app/start.sh"]

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 3002
  author: PatWie + CasaOS Team
  category: Productivity
  # 🔧 모든 설치 과정을 pre-install-cmd에서 처리 (CasaOS 권장 방식)
  pre-install-cmd: |
    echo "=== PatWie Excalidraw-Complete Pre-Installation ==="
    
    # 필요 디렉토리 생성
    mkdir -p /DATA/Documents/Excalidraw &&
    mkdir -p /DATA/AppData/$AppID/bin &&
    
    # 아키텍처 감지
    ARCH=$(uname -m)
    if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
      BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz"
      echo "Detected amd64 architecture"
    elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
      BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_arm64.tar.gz"
      echo "Detected arm64 architecture"
    else
      echo "Unsupported architecture: $ARCH, defaulting to amd64"
      BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz"
    fi
    
    # 바이너리 다운로드 및 설치
    if [ ! -f /DATA/AppData/$AppID/bin/excalidraw-complete ]; then
      echo "Downloading PatWie excalidraw-complete from: $BINARY_URL"
      
      if wget -O /tmp/excalidraw-complete.tar.gz "$BINARY_URL"; then
        echo "Download successful, extracting..."
        cd /tmp
        tar -xzf excalidraw-complete.tar.gz
        
        if [ -f excalidraw-complete ]; then
          mv excalidraw-complete /DATA/AppData/$AppID/bin/excalidraw-complete
          chmod +x /DATA/AppData/$AppID/bin/excalidraw-complete
          echo "Binary extraction and setup completed"
        else
          echo "Error: Binary not found in extracted files"
          ls -la /tmp/
          exit 1
        fi
        
        rm -f /tmp/excalidraw-complete.tar.gz
        echo "PatWie excalidraw-complete installed successfully!"
      else
        echo "Download failed! Please check network connection"
        exit 1
      fi
    else
      echo "Binary already exists, skipping download"
    fi
    
    # 시작 스크립트 생성 (Ubuntu glibc 환경에서 안정적 실행)
    cat > /DATA/AppData/$AppID/bin/start.sh << 'EOF'
    #!/bin/bash
    echo "=== PatWie Excalidraw-Complete Startup ==="
    echo "Starting PatWie excalidraw-complete..."
    echo "Storage: filesystem (/storage)"
    echo "Port: 3002"
    echo "Collaboration: enabled"
    
    # 디버깅 정보
    echo "Current user: $(id)"
    echo "Working directory: $(pwd)"
    echo "Binary check:"
    if [ -f /app/excalidraw-complete ]; then
      ls -la /app/excalidraw-complete
      echo "Binary exists and details:"
      file /app/excalidraw-complete 2>/dev/null || echo "file command not available"
    else
      echo "ERROR: Binary not found at /app/excalidraw-complete"
      echo "Available files in /app:"
      ls -la /app/ 2>/dev/null || echo "App directory not accessible"
      exit 1
    fi
    
    # 환경변수 확인
    echo "Environment variables:"
    echo "STORAGE_TYPE=$STORAGE_TYPE"
    echo "LOCAL_STORAGE_PATH=$LOCAL_STORAGE_PATH"
    echo "PORT=$PORT"
    echo "ENABLE_COLLABORATION=$ENABLE_COLLABORATION"
    
    # 스토리지 디렉토리 확인
    echo "Storage directory status:"
    ls -la /storage/ 2>/dev/null || echo "Storage directory not accessible"
    
    # 바이너리 실행
    if [ -x /app/excalidraw-complete ]; then
      echo "Executing PatWie excalidraw-complete..."
      exec /app/excalidraw-complete
    else
      echo "ERROR: Binary is not executable"
      echo "Attempting to make executable..."
      chmod +x /app/excalidraw-complete 2>/dev/null || echo "Failed to chmod"
      if [ -x /app/excalidraw-complete ]; then
        echo "Now executable, retrying..."
        exec /app/excalidraw-complete
      else
        echo "Still not executable, exiting"
        exit 1
      fi
    fi
    EOF
    
    chmod +x /DATA/AppData/$AppID/bin/start.sh
    
    # 권한 설정
    chown -R 1000:1000 /DATA/Documents/Excalidraw &&
    chown -R 1000:1000 /DATA/AppData/$AppID/bin &&
    chmod 755 /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/AppData/$AppID/bin &&
    
    echo "=== Pre-installation completed successfully ==="
  description:

name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
      # CORS 설정 추가
      - CORS_ORIGIN=*
    expose:
      - 8081
    ports:
      - "8081:8081"  # 브라우저에서 직접 접근하기 위해
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # Storage Backend 연결 설정 (실제 NSL 도메인 사용)
      # 주의: 아래 URL에서 "ikjunyundera" 부분을 실제 사용자명으로 변경하세요
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-$domain/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-$domain/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-$domain/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      # Room Server 연결 설정  
      - VITE_APP_WS_SERVER_URL=ws://room:80
      # Firebase 비활성화
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      - storage
      - room
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Excalidraw is a virtual collaborative whiteboard tool with real-time collaboration, server-side storage, and working shareable links functionality.
    ko_kr: 실시간 협업, 서버 저장, 작동하는 공유 링크 기능을 갖춘 가상 협업 화이트보드 도구입니다.
    zh_cn: Excalidraw 是一个具有实时协作、服务器端存储和工作共享链接功能的虚拟协作白板工具。
    fr_fr: Excalidraw est un outil de tableau blanc collaboratif virtuel avec collaboration en temps réel, stockage côté serveur et fonctionnalité de liens partageables fonctionnelle.
    es_es: Excalidraw es una herramienta de pizarra colaborativa virtual con colaboración en tiempo real, almacenamiento del lado del servidor y funcionalidad de enlaces compartibles que funciona.
  developer: Excalidraw Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Collaborative whiteboard with working share features
    ko_kr: 작동하는 공유 기능을 갖춘 협업 화이트보드
    zh_cn: 具有工作共享功能的协作白板
    fr_fr: Tableau blanc collaboratif avec fonctionnalités de partage fonctionnelles
    es_es: Pizarra colaborativa con funciones de compartir que funcionan
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🚀 Stable Excalidraw with Working Share Features:**
        
        **✅ All Core Features**
        - Real-time collaboration ✅
        - Server-side storage in Redis ✅  
        - **WORKING: Shareable links** ✅
        - **WORKING: Export to Link** ✅
        
        **🔧 Technical Solution**
        - Storage Backend accessible via port 8081
        - Proper NSL router domain configuration  
        - CORS headers enabled for browser access
        - Direct port mapping for API calls
        
        **📱 How Share Features Work:**
        1. Click "Export to Link" → Creates shareable URL
        2. Click "Shareable link" → Generates public link
        3. Both save to Redis and provide working links
        4. Links work across devices and users
        
        **🌐 Access URLs:**
        - Main App: `https://excalidraw-[username].nsl.sh/`
        - Storage API: `https://8081-excalidraw-[username].nsl.sh/`
        
        **🔧 Total Resources:**
        - Memory: ~768MB (4 core services only)
        - CPU: ~0.7 cores
        
        **✅ What Works:**
        - Drawing and editing
        - Real-time collaboration  
        - Share buttons (both types)
        - Persistent storage
        - Cross-device access
        
        **📝 Note:**
        This version focuses on stability and core functionality.
        File export features can be added later once the base system is working perfectly.
      ko_kr: |
        **🚀 작동하는 공유 기능을 갖춘 안정적인 Excalidraw:**
        
        **✅ 모든 핵심 기능**
        - 실시간 협업 ✅
        - Redis 서버 측 저장 ✅  
        - **작동함: 공유 링크** ✅
        - **작동함: 링크로 내보내기** ✅
        
        **🔧 기술적 솔루션**
        - 포트 8081을 통한 Storage Backend 접근
        - 적절한 NSL 라우터 도메인 설정  
        - 브라우저 접근을 위한 CORS 헤더 활성화
        - API 호출을 위한 직접 포트 매핑
        
        **📱 공유 기능 작동 방식:**
        1. "링크로 내보내기" 클릭 → 공유 가능한 URL 생성
        2. "공유 링크" 클릭 → 공개 링크 생성
        3. 둘 다 Redis에 저장하고 작동하는 링크 제공
        4. 링크는 여러 기기와 사용자 간에 작동
        
        **🌐 접근 URL:**
        - 메인 앱: `https://excalidraw-[username].nsl.sh/`
        - Storage API: `https://8081-excalidraw-[username].nsl.sh/`
        
        **🔧 총 리소스:**
        - 메모리: ~768MB (4개 핵심 서비스만)
        - CPU: ~0.7 코어
        
        **✅ 작동하는 기능:**
        - 그리기 및 편집
        - 실시간 협업  
        - 공유 버튼 (두 종류 모두)
        - 지속적 저장
        - 여러 기기 간 접근
        
        **📝 참고:**
        이 버전은 안정성과 핵심 기능에 중점을 둡니다.
        파일 내보내기 기능은 기본 시스템이 완벽하게 작동한 후 나중에 추가할 수 있습니다.
  index: /
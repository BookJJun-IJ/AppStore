name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=debug
      - GLOBAL_PREFIX=/api/v2
    ports:
      - "8081:8081"  # Nginx에서 접근하기 위해 포트 바인딩
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    ports:
      - "8082:80"  # Nginx에서 접근하기 위해 포트 바인딩

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    ports:
      - "8083:80"  # Nginx에서 접근하기 위해 포트 바인딩
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # Storage Backend 연결 설정
      - VITE_APP_BACKEND_V2_GET_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=http://storage:8081/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      # Room Server 연결 설정  
      - VITE_APP_WS_SERVER_URL=ws://room:80
      # Firebase 비활성화
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      - storage
      - room
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Proxy - Export 파일 자동 저장
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80
    volumes:
      - /DATA/Documents/Excalidraw:/var/www/downloads  # Export된 파일 저장소
      - /DATA/AppData/$AppID/nginx:/etc/nginx/conf.d
    depends_on:
      - excalidraw
      - storage
      - room
    command: |
      sh -c '
      # Nginx 설정 파일 생성
      cat > /etc/nginx/conf.d/default.conf << "EOF"
      # 캐시 경로 설정
      proxy_temp_path /tmp/nginx_temp;
      
      # 업스트림 서버 정의
      upstream excalidraw_app {
          server host.docker.internal:8083;
      }
      
      upstream storage_backend {
          server host.docker.internal:8081;
      }
      
      upstream room_server {
          server host.docker.internal:8082;
      }
      
      server {
          listen 80;
          server_name _;
          
          # 메인 Excalidraw 앱
          location / {
              proxy_pass http://excalidraw_app;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              
              # WebSocket 지원
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
          
          # Storage Backend API
          location /api/v2/ {
              proxy_pass http://storage_backend;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              
              # .excalidraw 파일 다운로드 감지 및 자동 저장
              location ~* \\.excalidraw$ {
                  proxy_pass http://storage_backend;
                  proxy_set_header Host $host;
                  
                  # 다운로드 파일을 서버에 저장
                  proxy_store on;
                  proxy_store_access user:rw group:rw all:r;
                  proxy_temp_file_write_size 4k;
                  
                  # 파일명에 타임스탬프 추가
                  set $timestamp "";
                  access_by_lua_block {
                      ngx.var.timestamp = os.date("-%Y%m%d-%H%M%S")
                  }
                  
                  # 저장 경로 설정
                  root /var/www/downloads;
                  
                  # 다운로드 헤더 설정
                  add_header Content-Disposition "attachment";
                  add_header X-Accel-Buffering no;
              }
          }
          
          # Room Server (협업)
          location /room/ {
              proxy_pass http://room_server/;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              
              # WebSocket 지원
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
          
          # 저장된 파일 브라우징 (선택사항)
          location /downloads/ {
              alias /var/www/downloads/;
              autoindex on;
              autoindex_exact_size off;
              autoindex_localtime on;
          }
      }
      EOF
      
      echo "Starting Nginx with auto-save configuration..."
      nginx -g "daemon off;"
      '

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nginx-proxy
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Excalidraw is a virtual collaborative whiteboard tool with real-time collaboration and automatic server-side saving of exported .excalidraw files.
    ko_kr: 실시간 협업과 내보낸 .excalidraw 파일의 자동 서버 저장 기능을 갖춘 가상 협업 화이트보드 도구입니다.
    zh_cn: Excalidraw 是一个具有实时协作和导出 .excalidraw 文件自动服务器端保存功能的虚拟协作白板工具。
    fr_fr: Excalidraw est un outil de tableau blanc collaboratif virtuel avec collaboration en temps réel et sauvegarde automatique côté serveur des fichiers .excalidraw exportés.
    es_es: Excalidraw es una herramienta de pizarra colaborativa virtual con colaboración en tiempo real y guardado automático del lado del servidor de archivos .excalidraw exportados.
  developer: Excalidraw Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Collaborative whiteboard with export auto-save
    ko_kr: 내보내기 자동 저장 기능을 갖춘 협업 화이트보드
    zh_cn: 具有导出自动保存功能的协作白板
    fr_fr: Tableau blanc collaboratif avec sauvegarde automatique d'export
    es_es: Pizarra colaborativa con guardado automático de exportación
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🚀 Excalidraw with Export Auto-Save:**
        
        **✅ Real-time Collaboration**
        - Multiple users can edit simultaneously
        - Live cursor tracking and updates
        
        **✅ Automatic Export Saving**
        - When you click "Export" → File downloads to your PC
        - **Simultaneously** → Same file automatically saved to server
        - Server files saved to `/DATA/Documents/Excalidraw/`
        - No manual intervention needed!
        
        **✅ How It Works**
        1. Click "Export" button in Excalidraw
        2. Choose format (.excalidraw, PNG, SVG, etc.)
        3. File downloads to your PC as normal
        4. **Same file is automatically copied to server**
        
        **📁 Server File Location:**
        All exported files automatically saved to `/DATA/Documents/Excalidraw/`
        
        **🔍 File Browser:**
        Access `/downloads/` URL to browse all saved exports
        
        **⚠️ Technical Details:**
        - Uses Nginx proxy_store to intercept downloads
        - Zero impact on user experience
        - Files saved with original names and timestamps
        
        **🔧 Total Resources:**
        - Memory: ~896MB (includes Nginx proxy)
        - CPU: ~0.8 cores
      ko_kr: |
        **🚀 내보내기 자동 저장 기능이 있는 Excalidraw:**
        
        **✅ 실시간 협업**
        - 여러 사용자가 동시에 편집
        - 실시간 커서 추적 및 업데이트
        
        **✅ 자동 내보내기 저장**
        - "Export" 클릭 → 파일이 PC로 다운로드
        - **동시에** → 같은 파일이 서버에 자동 저장
        - 서버 파일이 `/DATA/Documents/Excalidraw/`에 저장
        - 수동 개입 불필요!
        
        **✅ 작동 방식**
        1. Excalidraw에서 "Export" 버튼 클릭
        2. 형식 선택 (.excalidraw, PNG, SVG 등)
        3. 파일이 평소대로 PC에 다운로드
        4. **같은 파일이 서버에 자동으로 복사됨**
        
        **📁 서버 파일 위치:**
        모든 내보낸 파일이 `/DATA/Documents/Excalidraw/`에 자동 저장
        
        **🔍 파일 브라우저:**
        `/downloads/` URL로 저장된 모든 내보내기 파일 탐색 가능
        
        **⚠️ 기술적 세부사항:**
        - Nginx proxy_store를 사용하여 다운로드 가로채기
        - 사용자 경험에 영향 없음
        - 원본 이름과 타임스탬프로 파일 저장
        
        **🔧 총 리소스:**
        - 메모리: ~896MB (Nginx 프록시 포함)
        - CPU: ~0.8 코어
  index: /
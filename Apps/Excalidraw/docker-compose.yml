      en_us: |
        **🚀 Complete Excalidraw with Share + Auto Export (Fixed):**
        
        **✅ All Core Features**
        - Real-time collaboration ✅
        - Server-side storage in Redis ✅  
        - **WORKING: Shareable links** ✅
        - **WORKING: Export to Link** ✅
        - **NEW: Automatic .excalidraw file generation** ✅
        
        **🆕 Auto Export Feature (Shell Fixed)**
        - Automatically creates .excalidraw files when you draw
        - Files saved to `/DATA/Documents/Excalidraw/`
        - Simple, stable file generation (no complex shell syntax)
        - Standard JSON format compatible with excalidraw.com
        
        **📁 File Output:**
        `excalidraw-[scene-id]-[YYYYMMDD-HHMMSS].excalidraw`
        
        **🔧 How It Works:**
        1. Draw anything in Excalidraw → Saved to Redis
        2. File generator checks Redis every 60 seconds
        3. Creates .excalidraw file if none exists for that scene
        4. Files appear in `/DATA/Documents/Excalidraw/`
        
        **🌐 Access URLs:**
        - Main App: `https://excalidraw-[username].nsl.sh/`
        - Storage API: `https://8081-excalidraw-[username].nsl.sh/`
        
        **🔧 Total Resources:**
        - Memory: ~832MB (4 core services + file generator)
        - CPU: ~0.8 cores
        
        **✅ What Works:**
        - Drawing and editing
        - Real-time collaboration  
        - Share buttons (both types)
        - Persistent storage
        - Automatic file creation
        - Cross-device access
      ko_kr: |
        **🚀 공유 + 자동 내보내기 기능이 있는 완전한 Excalidraw (수정됨):**
        
        **✅ 모든 핵심 기능**
        - 실시간 협업 ✅
        - Redis 서버 측 저장 ✅  
        - **작동함: 공유 링크** ✅
        - **작동함: 링크로 내보내기** ✅
        - **새로운 기능: 자동 .excalidraw 파일 생성** ✅
        
        **🆕 자동 내보내기 기능 (Shell 수정됨)**
        - 그림을 그릴 때 자동으로 .excalidraw 파일 생성
        - `/DATA/Documents/Excalidraw/`에 파일 저장
        - 간단하고 안정적인 파일 생성 (복잡한 shell 문법 없음)
        - excalidraw.com과 호환되는 표준 JSON 형식
        

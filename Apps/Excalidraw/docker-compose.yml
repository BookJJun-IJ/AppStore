name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: excalidraw-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: excalidraw-storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://excalidraw-redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
      - CORS_ORIGIN=*
    expose:
      - 8081
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: excalidraw-room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 파일 저장 API 서버
  file-saver:
    image: node:18-alpine
    container_name: excalidraw-file-saver
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/file-saver:/app
    expose:
      - 3001
    ports:
      - "3001:3001"
    working_dir: /app
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUID=$PUID
      - PGID=$PGID
    command: |
      sh -c '
      mkdir -p /exports /app
      chmod 755 /exports 2>/dev/null || true
      
      if [ ! -f package.json ]; then
        echo "📦 Node.js 프로젝트 초기화..."
        npm init -y > /dev/null 2>&1
        npm install express cors helmet > /dev/null 2>&1
        
        cat > server.js << "EOF"
      const express = require("express");
      const cors = require("cors");
      const fs = require("fs");
      const path = require("path");
      const helmet = require("helmet");

      const app = express();
      const PORT = process.env.PORT || 3001;

      app.use(helmet({ contentSecurityPolicy: false }));
      app.use(cors({ origin: "*" }));
      app.use(express.json({ limit: "50mb" }));

      const exportDir = "/exports";

      try {
        if (!fs.existsSync(exportDir)) {
          fs.mkdirSync(exportDir, { recursive: true });
        }
      } catch (error) {
        console.error("Directory setup failed:", error);
      }

      app.post("/save-excalidraw", async (req, res) => {
        try {
          const { sceneData, filename } = req.body;
          
          if (!sceneData) {
            return res.status(400).json({ error: "Scene data is required" });
          }

          const timestamp = new Date().toISOString()
            .replace(/[:.]/g, "-")
            .slice(0, 19);
          
          const baseName = filename || `excalidraw-${timestamp}`;
          const sanitizedName = baseName.replace(/[^a-zA-Z0-9\-_]/g, "_");
          const fullFilename = `${sanitizedName}.excalidraw`;
          const filepath = path.join(exportDir, fullFilename);

          const jsonData = typeof sceneData === "string" ? sceneData : JSON.stringify(sceneData, null, 2);
          fs.writeFileSync(filepath, jsonData, "utf8");
          
          console.log(`✅ File saved: ${fullFilename}`);
          
          res.json({ 
            success: true, 
            filename: fullFilename,
            path: `/DATA/Documents/Excalidraw/${fullFilename}`,
            timestamp: new Date().toISOString()
          });

        } catch (error) {
          console.error("❌ Save error:", error);
          res.status(500).json({ error: "Failed to save file" });
        }
      });

      app.get("/files", (req, res) => {
        try {
          const files = fs.readdirSync(exportDir)
            .filter(file => file.endsWith(".excalidraw"))
            .map(file => {
              const filepath = path.join(exportDir, file);
              const stats = fs.statSync(filepath);
              return {
                filename: file,
                size: stats.size,
                created: stats.birthtime,
                modified: stats.mtime
              };
            })
            .sort((a, b) => b.modified - a.modified);

          res.json({ files, count: files.length });
        } catch (error) {
          res.status(500).json({ error: "Failed to list files" });
        }
      });

      app.get("/health", (req, res) => {
        res.json({ 
          status: "healthy", 
          timestamp: new Date().toISOString()
        });
      });

      app.listen(PORT, "0.0.0.0", () => {
        console.log(`🚀 File Saver API running on port ${PORT}`);
      });
      EOF
      fi
      
      node server.js
      '
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Excalidraw Frontend - 메인 애플리케이션 (서비스명을 excalidraw로 유지)
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw-main
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-excalidraw-$domain/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-excalidraw-$domain/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-excalidraw-$domain/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_WS_SERVER_URL=ws://excalidraw-room:80
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      storage:
        condition: service_healthy
      room:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


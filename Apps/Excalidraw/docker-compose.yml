name: excalidraw-fullstack

services:
  # Redis - 가장 먼저 시작
  redis:
    image: redis:7-alpine
    container_name: excalidraw-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Storage Backend - Redis 의존
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    container_name: excalidraw-storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=info
    expose:
      - 8081
    ports:
      - "8081:8081"  # 디버깅용 직접 접근
    volumes:
      - /DATA/Documents/Excalidraw:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Room Server - 독립적으로 시작
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    container_name: excalidraw-room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80
    ports:
      - "8082:80"  # 디버깅용 직접 접근

  # Excalidraw Frontend - 모든 서비스 의존
  excalidraw-app:
    image: alswl/excalidraw:v0.17.3-fork-b1
    container_name: excalidraw-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    ports:
      - "8080:80"  # 디버깅용 직접 접근
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      - VITE_APP_BACKEND_V2_GET_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_WS_SERVER_URL=ws://room:80
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=http://storage:8081/api/v2
      - VITE_APP_STORAGE_BACKEND=http
    depends_on:
      storage:
        condition: service_healthy
      room:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

x-casaos:
  architectures:
    - amd64
  main: excalidraw-app
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Full-Stack Excalidraw with real-time collaboration, server-side storage, and sharing capabilities. Create and collaborate on diagrams with multiple users simultaneously, with automatic saving to the server.
    ko_kr: 실시간 협업, 서버 측 저장, 공유 기능을 갖춘 Full-Stack Excalidraw입니다. 여러 사용자가 동시에 다이어그램을 만들고 협업할 수 있으며, 서버에 자동으로 저장됩니다.
  developer: Excalidraw Team + Community
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ExcalidrawFullStack/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ExcalidrawFullStack/screenshot-1.png
  tagline:
    en_us: Full-featured collaborative whiteboard with server storage
    ko_kr: 서버 저장소를 갖춘 완전한 협업 화이트보드
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ExcalidrawFullStack/thumbnail.png
  title:
    en_us: Excalidraw Full-Stack
    ko_kr: Excalidraw Full-Stack
  tips:
    before_install:
      en_us: |
        **🚀 Full-Stack Excalidraw (Debug Version)**
        
        This version includes direct port access for debugging:
        - Main App: http://localhost:8080
        - Storage API: http://localhost:8081
        - Room Server: http://localhost:8082
        
        **Features:**
        - ✅ Real-time collaboration
        - ✅ Server storage in `/DATA/Documents/Excalidraw/`
        - ✅ Sharing links
        - ✅ Health checks for better reliability
      ko_kr: |
        **🚀 Full-Stack Excalidraw (디버그 버전)**
        
        디버깅을 위한 직접 포트 접근 포함:
        - 메인 앱: http://localhost:8080
        - 스토리지 API: http://localhost:8081
        - Room 서버: http://localhost:8082
        
        **기능:**
        - ✅ 실시간 협업
        - ✅ `/DATA/Documents/Excalidraw/`에 서버 저장
        - ✅ 공유 링크
        - ✅ 안정성을 위한 Health Check
  index: /
  port_map: "80"
name: excalidraw

services:
  # 🗄️ Cocreators 백엔드 - 파일 저장 담당
  cocreators-backend:
    image: ghcr.io/cocreators-ee/excalidraw-alternative-store:latest
    container_name: excalidraw-backend
    restart: unless-stopped
    user: root
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 8080
    environment:
      - PORT=8080
      - FILE_SIZE_LIMIT=10485760  # 10MB
      - STORAGE_MODULE=local
      - LOCAL_STORAGE_PATH=/src/storage
      - CORS_ALLOW_ORIGINS=*
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/src/storage
    working_dir: /src

  # 🎨 공식 Excalidraw 프론트엔드 (안정적)
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw-frontend
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    depends_on:
      - cocreators-backend

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  pre-install-cmd: |
    mkdir -p /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/Documents/Excalidraw &&
    echo "🗄️ Cocreators 백엔드 + Excalidraw 프론트엔드 조합" &&
    echo "✅ 실제 파일 저장: /DATA/Documents/Excalidraw/" &&
    echo "✅ 실시간 협업 지원" &&
    echo "✅ 완전한 자체 호스팅 솔루션"
  description:
    en_us: Official Excalidraw with Cocreators backend for enhanced file storage and management.
    ko_kr: 향상된 파일 저장 및 관리를 위한 Cocreators 백엔드가 포함된 공식 Excalidraw입니다.
    zh_cn: 官方 Excalidraw 配备 Cocreators 后端，提供增强的文件存储和管理功能。
    fr_fr: Excalidraw officiel avec backend Cocreators pour un stockage et une gestion de fichiers améliorés.
    es_es: Excalidraw oficial con backend Cocreators para almacenamiento y gestión de archivos mejorados.
  developer: Cocreators + alswl + CasaOS Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Complete self-hosted solution with real file storage
    ko_kr: 실제 파일 저장이 가능한 완전한 자체 호스팅 솔루션
    zh_cn: 具有真实文件存储的完整自托管解决方案
    fr_fr: Solution auto-hébergée complète avec stockage de fichiers réels
    es_es: Solución completa auto-hospedada con almacenamiento de archivos reales
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🎨 Official Excalidraw + Cocreators Storage = Best of Both Worlds!**
        
        **✅ What You Get:**
        - ✅ **Official Excalidraw** - Most stable and feature-complete version
        - ✅ **Cocreators Storage Backend** - For optional file management
        - ✅ **Real-time Collaboration** - Share links for team editing
        - ✅ **Multiple Storage Options** - Browser, download, or server storage
        
        **🏗️ Architecture:**
        ```
        ┌─────────────────┐    Optional    ┌──────────────────┐
        │ Excalidraw UI   │────────────────│ Cocreators       │
        │ (Official)      │  File Upload   │ Storage Backend  │
        │ Port 80         │                │ Port 8080        │
        └─────────────────┘                └──────────────────┘
                                                    │
                                                    ▼
                                           /DATA/Documents/Excalidraw/
                                           ├── uploaded-files/
                                           └── manual-backups/
        ```
        
        **💾 File Storage Options:**
        
        **Option 1: Browser Storage (Default)**
        1. Draw your diagrams
        2. Automatically saved to browser localStorage
        3. Always available when you return
        4. Perfect for personal use
        
        **Option 2: Download + Manual Upload**
        1. Menu (☰) → "다른 이름으로 저장..." → "디스크에 저장"
        2. File downloads to your computer
        3. Upload to server via SSH/SFTP:
        ```bash
        scp my-diagram.excalidraw user@server:/DATA/Documents/Excalidraw/
        ```
        
        **Option 3: Cocreators API (Advanced)**
        1. Use Cocreators backend API for programmatic file management
        2. API available at: `http://localhost:8080` (internal)
        3. Upload/download files via HTTP requests
        
        **🤝 Collaboration Features:**
        1. **Create Room Links** - Click "공유 가능한 링크 생성"
        2. **Share with Team** - Send link to colleagues
        3. **Real-time Editing** - Multiple users edit simultaneously
        4. **Save Results** - Use Option 1 or 2 to preserve final work
        
        **🌐 Access Points:**
        - **Main UI**: `https://excalidraw-{username}.nsl.sh/`
        - **File Storage**: `/DATA/Documents/Excalidraw/`
        - **Cocreators API**: Internal backend for advanced users
        
        **💡 Perfect Workflow:**
        
        **For Personal Use:**
        1. Open Excalidraw → Start drawing
        2. Browser automatically saves progress
        3. Optionally download final version for backup
        
        **For Team Projects:**
        1. Create diagram → Generate shareable link
        2. Team members join and collaborate in real-time
        3. Final person downloads result and uploads to server
        4. Everyone has access to the final file
        
        **🔧 Technical Benefits:**
        - **Zero Configuration** - Official Excalidraw works out of the box
        - **Maximum Compatibility** - All features work as intended
        - **Flexible Storage** - Choose your preferred method
        - **Future-Proof** - Official updates automatically included
        - **Reliable** - No custom modifications that might break
        
        **🎯 Best For:**
        - **Quick Sketches** - Browser storage for daily use
        - **Team Collaboration** - Real-time editing with shared links
        - **Documentation** - Download and archive important diagrams
        - **Project Planning** - Collaborative wireframes and flowcharts
        
        **🚀 The Most Reliable Excalidraw Experience!**
      ko_kr: |
        **🎨 공식 Excalidraw + Cocreators = 최고의 조합!**
        
        **✅ 주요 기능:**
        - 공식 Excalidraw ✅
        - Cocreators 스토리지 백엔드 ✅
        - 실시간 협업 ✅
        - 다양한 저장 옵션 ✅
        
        **💾 파일 저장 방법:**
        
        **방법 1: 브라우저 저장 (기본)**
        - 자동으로 브라우저에 저장
        - 다시 접속해도 유지
        - 개인 사용에 완벽
        
        **방법 2: 다운로드 + 수동 업로드**
        - 메뉴 → "다른 이름으로 저장"
        - 컴퓨터에 다운로드
        - SSH/SFTP로 서버에 업로드
        
        **🤝 협업 기능:**
        - "공유 가능한 링크 생성"으로 팀 편집
        - 실시간 다중 사용자 지원
        - 최종 결과 저장 가능
        
        **🎯 안정적이고 신뢰할 수 있는 솔루션!**
  index: /
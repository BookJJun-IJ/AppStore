name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    user: $PUID:$PGID
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    user: $PUID:$PGID
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      PORT: 8081
      STORAGE_URI: redis://redis:6379
      LOG_LEVEL: info
      GLOBAL_PREFIX: /api/v2
      CORS_ORIGIN: '*'
    expose:
      - 8081
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    user: $PUID:$PGID
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Save API - 즉시 저장 서비스
  save-api:
    image: node:18-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/save-api:/app
    expose:
      - 3001
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 3001
    command: |
      sh -c '
      # 디렉토리 생성 및 권한 설정
      mkdir -p /exports /app
      chown -R 1000:1000 /exports /app 2>/dev/null || true
      
      if [ ! -f package.json ]; then
        echo "🚀 Initializing Save API server..."
        npm init -y
        npm install express cors helmet
        
        cat > server.js << "EOF"
      const express = require("express");
      const cors = require("cors");
      const fs = require("fs");
      const path = require("path");
      const helmet = require("helmet");

      const app = express();
      const PORT = process.env.PORT || 3001;

      app.use(helmet());
      app.use(cors());
      app.use(express.json({ limit: "10mb" }));

      const exportDir = "/exports";
      if (!fs.existsSync(exportDir)) {
        fs.mkdirSync(exportDir, { recursive: true });
      }

      app.post("/save", async (req, res) => {
        try {
          const { sceneData, filename } = req.body;
          
          if (!sceneData) {
            return res.status(400).json({ error: "Scene data is required" });
          }

          const timestamp = new Date().toISOString()
            .replace(/[:\.]/g, "-")
            .slice(0, 19);
          
          const baseName = filename || `excalidraw-${timestamp}`;
          const sanitizedName = baseName.replace(/[^a-zA-Z0-9\-_]/g, "_");
          const fullFilename = `${sanitizedName}.excalidraw`;
          const filepath = path.join(exportDir, fullFilename);

          const jsonData = typeof sceneData === "string" ? sceneData : JSON.stringify(sceneData, null, 2);
          fs.writeFileSync(filepath, jsonData, "utf8");

          console.log(`✅ Saved: ${fullFilename}`);
          
          res.json({ 
            success: true, 
            filename: fullFilename,
            path: `/DATA/Documents/Excalidraw/${fullFilename}`,
            timestamp: new Date().toISOString()
          });

        } catch (error) {
          console.error("❌ Save error:", error);
          res.status(500).json({ error: "Failed to save file" });
        }
      });

      app.get("/health", (req, res) => {
        res.json({ 
          status: "healthy", 
          timestamp: new Date().toISOString(),
          exports_dir: exportDir,
          port: PORT
        });
      });

      app.listen(PORT, "0.0.0.0", () => {
        console.log(`🚀 Save API Server running on port ${PORT}`);
        console.log(`📁 Export directory: ${exportDir}`);
      });
      EOF

        echo "✅ Server code generated"
      fi
      
      echo "🚀 Starting Save API server..."
      node server.js
      '

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      DOMAIN: $domain
      VITE_APP_BACKEND_V2_GET_URL: https://8081-$domain/api/v2/scenes/
      VITE_APP_BACKEND_V2_POST_URL: https://8081-$domain/api/v2/scenes/
      VITE_APP_HTTP_STORAGE_BACKEND_URL: https://8081-$domain/api/v2
      VITE_APP_STORAGE_BACKEND: http
      VITE_APP_WS_SERVER_URL: ws://room:80
      VITE_APP_FIREBASE_CONFIG: '{}'
    depends_on:
      - storage
      - room
      - save-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


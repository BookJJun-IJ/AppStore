            const response = await fetch('https://3001-excalidraw-ikjunyundera.nsl.sh/save-excalidraw', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({sceneData, filename})
            });
            const result = await response.json();
            console.log('✅ Server saved:', result.filename);
          } catch (error) {
            console.error('❌ Server save failed:', error);
          }
        }
        
        // Use: saveToServer(sceneData, 'my-drawing');
        ```
        

name: excalidraw

services:
  excalidraw:
    image: alpine:3.19
    container_name: excalidraw
    restart: unless-stopped
    user: root
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      - ENABLE_COLLABORATION=true
      - PORT=3002
    volumes:
      - /DATA/Documents/Excalidraw:/storage
    working_dir: /storage
    command: |
      sh -c "
        apk add --no-cache wget tar &&
        mkdir -p /app &&
        if [ ! -f /app/excalidraw-complete ]; then
          echo 'Detecting architecture...'
          ARCH=\$(uname -m)
          echo \"Architecture: \$ARCH\"
          
          if [ \"\$ARCH\" = \"aarch64\" ]; then
            echo 'Using ARM64 binary'
            wget -O /tmp/binary.tar.gz 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_arm64.tar.gz'
          else
            echo 'Using AMD64 binary'
            wget -O /tmp/binary.tar.gz 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz'
          fi &&
          
          echo 'Extracting binary...' &&
          cd /tmp &&
          tar -xzf binary.tar.gz &&
          mv excalidraw-complete /app/ &&
          chmod +x /app/excalidraw-complete &&
          rm /tmp/binary.tar.gz &&
          echo 'Binary installation completed'
        else
          echo 'Binary already exists, skipping download'
        fi &&
        
        echo 'Starting PatWie excalidraw-complete...' &&
        echo 'Storage: filesystem (/storage)' &&
        echo 'Port: 3002' &&
        exec /app/excalidraw-complete
      "


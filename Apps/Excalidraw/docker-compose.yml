    - arm64
  main: excalidraw
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Excalidraw is a virtual collaborative whiteboard tool with real-time collaboration, server-side storage, working shareable links, and automatic .excalidraw file generation.
    ko_kr: 실시간 협업, 서버 저장, 작동하는 공유 링크, 자동 .excalidraw 파일 생성 기능을 갖춘 가상 협업 화이트보드 도구입니다.
    zh_cn: Excalidraw 是一个具有实时协作、服务器端存储、工作共享链接和自动 .excalidraw 文件生成功能的虚拟协作白板工具。
    fr_fr: Excalidraw est un outil de tableau blanc collaboratif virtuel avec collaboration en temps réel, stockage côté serveur, liens partageables fonctionnels et génération automatique de fichiers .excalidraw.
    es_es: Excalidraw es una herramienta de pizarra colaborativa virtual con colaboración en tiempo real, almacenamiento del lado del servidor, enlaces compartibles que funcionan y generación automática de archivos .excalidraw.
  developer: Excalidraw Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Collaborative whiteboard with share features + auto file export
    ko_kr: 공유 기능 + 자동 파일 내보내기를 갖춘 협업 화이트보드
    zh_cn: 具有共享功能 + 自动文件导出的协作白板
    fr_fr: Tableau blanc collaboratif avec fonctionnalités de partage + export automatique
    es_es: Pizarra colaborativa con funciones de compartir + exportación automática
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🚀 Complete Excalidraw with Share + Auto Export:**
        
        **✅ All Core Features**
        - Real-time collaboration ✅
        - Server-side storage in Redis ✅  
        - **WORKING: Shareable links** ✅
        - **WORKING: Export to Link** ✅
        - **NEW: Automatic .excalidraw file generation** ✅
        
        **🆕 Auto Export Feature**
        - Automatically creates .excalidraw files when you draw/edit
        - Files saved to `/DATA/Documents/Excalidraw/`
        - Smart timing: creates files every 60+ seconds (avoids spam)
        - Standard Excalidraw format for full compatibility
        
        **📁 File Output:**
        `excalidraw-[scene-id]-[YYYYMMDD-HHMMSS].excalidraw`
        
        **🔧 How Auto Export Works:**
        1. Draw or modify anything in Excalidraw
        2. File generator detects changes in Redis
        3. Creates timestamped .excalidraw file automatically
        4. Files appear in `/DATA/Documents/Excalidraw/`
        
        **🌐 Access URLs:**
        - Main App: `https://excalidraw-[username].nsl.sh/`
        - Storage API: `https://8081-excalidraw-[username].nsl.sh/`
        
        **🔧 Total Resources:**
        - Memory: ~832MB (4 core services + file generator)
        - CPU: ~0.8 cores
        
        **✅ What Works:**
        - Drawing and editing
        - Real-time collaboration  
        - Share buttons (both types)
        - Persistent storage
        - Automatic file backup
        - Cross-device access
      ko_kr: |
        **🚀 공유 + 자동 내보내기 기능이 있는 완전한 Excalidraw:**
        
        **✅ 모든 핵심 기능**
        - 실시간 협업 ✅
        - Redis 서버 측 저장 ✅  
        - **작동함: 공유 링크** ✅
        - **작동함: 링크로 내보내기** ✅
        - **새로운 기능: 자동 .excalidraw 파일 생성** ✅
        
        **🆕 자동 내보내기 기능**
        - 그리기/편집 시 자동으로 .excalidraw 파일 생성
        - `/DATA/Documents/Excalidraw/`에 파일 저장
        - 스마트 타이밍: 60초 이상 간격으로 파일 생성 (스팸 방지)
        - 완전 호환성을 위한 표준 Excalidraw 형식
        
        **📁 파일 출력:**
        `excalidraw-[scene-id]-[YYYYMMDD-HHMMSS].excalidraw`
        
        **🔧 자동 내보내기 작동 방식:**
        1. Excalidraw에서 그리기 또는 수정
        2. 파일 생성기가 Redis 변화 감지
        3. 타임스탬프가 있는 .excalidraw 파일 자동 생성
        4. `/DATA/Documents/Excalidraw/`에 파일 나타남
        
        **🌐 접근 URL:**
        - 메인 앱: `https://excalidraw-[username].nsl.sh/`
        - Storage API: `https://8081-excalidraw-[username].nsl.sh/`
        
        **🔧 총 리소스:**
        - 메모리: ~832MB (4개 핵심 서비스 + 파일 생성기)
        - CPU: ~0.8 코어
        
        **✅ 작동하는 기능:**
        - 그리기 및 편집
        - 실시간 협업  
        - 공유 버튼 (두 종류 모두)
        - 지속적 저장
        - 자동 파일 백업
        - 여러 기기 간 접근
  index: /
name: excalidraw
services:
  excalidraw-storage:
    image: ghcr.io/cocreators-ee/excalidraw-alternative-store:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    expose:
      - 8080
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PORT: 8080
      FILE_SIZE_LIMIT: 10485760  # 10MB
      STORAGE_MODULE: local
      LOCAL_STORAGE_PATH: /storage
      CORS_ALLOW_ORIGINS: https://$domain
      OVERRIDE_PROTOCOL: https
    volumes:
      - /DATA/AppData/$AppID/storage:/storage
    restart: unless-stopped
    networks:
      - excalidraw-net

  excalidraw-room:
    image: excalidraw/excalidraw-room:sha-49bf529
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    expose:
      - 4401
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PORT: 4401
      CORS_ORIGIN: https://$domain
    volumes:
      - /DATA/AppData/$AppID/room-config:/app/config
    restart: unless-stopped
    networks:
      - excalidraw-net
    depends_on:
      - excalidraw-storage

  excalidraw:
    image: ghcr.io/cocreators-ee/excalidraw:latest
    deploy:
      resources:
        limits:
          memory: 3072M  # 3GB
          cpus: '1.0'    # 2 CPU cores
    expose:
      - 80
    environment:
      TZ: $TZ
      NODE_OPTIONS: "--max-old-space-size=2048"  # 2GB heap
      VITE_APP_BACKEND_V2_GET_URL: https://8080-$domain/api/v2/
      VITE_APP_BACKEND_V2_POST_URL: https://8080-$domain/api/v2/post/
      VITE_APP_WS_SERVER_URL: https://4401-$domain
    restart: unless-stopped
    networks:
      - excalidraw-net
    depends_on:
      - excalidraw-storage
      - excalidraw-room

networks:
  excalidraw-net:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Self-hosted Excalidraw with persistent storage backend. A virtual collaborative whiteboard tool that lets you easily sketch diagrams with a hand-drawn feel. Includes real-time collaboration and secure file storage on your own server.
  developer: Excalidraw Team & Cocreators
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Self-hosted collaborative whiteboard with persistent storage
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **Excalidraw with Persistent Storage (High Memory)**
        
        ⚠️ **Memory Requirement**: This app requires at least 4GB RAM
        
        This setup includes:
        - **Main App**: Excalidraw whiteboard interface (3GB build memory)
        - **Storage Backend**: Persistent file storage for drawings
        - **Collaboration**: Real-time collaborative editing
        
        **Features:**
        - Save drawings permanently on your server
        - Real-time collaboration with multiple users
        - Export to PNG, SVG, and .excalidraw formats
        - Import existing .excalidraw files
        - No data sent to external servers
        
        **Storage Location:**
        Your drawings will be saved in `/DATA/AppData/excalidraw/storage/`
        
        **Note:** Uses high memory allocation for build process stability.
  index: /
  webui_port: 80
  pre-install-cmd: |
    mkdir -p /DATA/AppData/excalidraw/storage &&
    mkdir -p /DATA/AppData/excalidraw/room-config &&
    chown -R $PUID:$PGID /DATA/AppData/excalidraw/
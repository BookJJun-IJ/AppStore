name: excalidraw

services:
  redis:
    image: redis:7-alpine
    container_name: excalidraw-redis
    restart: unless-stopped
    user: "0:0"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: "redis-server --appendonly yes --dir /data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: excalidraw-storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    environment:
      - PORT=8081
      - STORAGE_URI=redis://excalidraw-redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
      - CORS_ORIGIN=*
    expose:
      - 8081
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: excalidraw-room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    expose:
      - 80

  file-saver:
    image: node:18-alpine
    container_name: excalidraw-file-saver
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/file-saver:/app
    expose:
      - 3001
    working_dir: /app
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUID=$PUID
      - PGID=$PGID
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /exports /app
        cd /app
        if [ ! -f server.js ]; then
          cat > server.js << 'EOF'
        const http = require("http");
        const fs = require("fs");
        const path = require("path");

        const server = http.createServer((req, res) => {
          res.setHeader("Access-Control-Allow-Origin", "*");
          res.setHeader("Access-Control-Allow-Methods", "GET, POST, OPTIONS");
          res.setHeader("Access-Control-Allow-Headers", "Content-Type");
          res.setHeader("Content-Type", "application/json");

          if (req.method === "OPTIONS") {
            res.writeHead(200);
            res.end();
            return;
          }

          if (req.method === "GET" && req.url === "/health") {
            res.writeHead(200);
            res.end(JSON.stringify({ status: "healthy" }));
            return;
          }

          if (req.method === "POST" && req.url === "/save-excalidraw") {
            let body = "";
            req.on("data", chunk => { body += chunk.toString(); });
            req.on("end", () => {
              try {
                const data = JSON.parse(body);
                const { sceneData, filename } = data;
                
                if (!sceneData) {
                  res.writeHead(400);
                  res.end(JSON.stringify({ error: "Scene data required" }));
                  return;
                }

                const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
                const baseName = filename || "excalidraw-" + timestamp;
                const sanitizedName = baseName.replace(/[^a-zA-Z0-9\-_]/g, "_");
                const fullFilename = sanitizedName + ".excalidraw";
                const filepath = path.join("/exports", fullFilename);

                const jsonData = typeof sceneData === "string" ? sceneData : JSON.stringify(sceneData, null, 2);
                fs.writeFileSync(filepath, jsonData, "utf8");
                
                console.log("Saved:", fullFilename);
                
                res.writeHead(200);
                res.end(JSON.stringify({ 
                  success: true, 
                  filename: fullFilename,
                  path: "/DATA/Documents/Excalidraw/" + fullFilename,
                  timestamp: new Date().toISOString()
                }));

              } catch (error) {
                console.error("Save error:", error);
                res.writeHead(500);
                res.end(JSON.stringify({ error: "Save failed" }));
              }
            });
            return;
          }

          res.writeHead(404);
          res.end(JSON.stringify({ error: "Not found" }));
        });

        server.listen(3001, "0.0.0.0", () => {
          console.log("File Saver API running on port 3001");
        });
        EOF
        fi
        node server.js

  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw-main
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-excalidraw-$domain/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-excalidraw-$domain/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-excalidraw-$domain/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_WS_SERVER_URL=ws://excalidraw-room:80
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      storage:
        condition: service_healthy
      room:
        condition: service_started

x-casaos:
  pre-install-cmd: mkdir -p /DATA/Documents/Excalidraw && chown 1000:1000 /DATA/Documents/Excalidraw
  architectures:
    - amd64
    - arm64

name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
      - CORS_ORIGIN=*
    expose:
      - 8081
    ports:
      - "8081:8081"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Save API - 즉시 저장 서비스
  save-api:
    image: node:18-alpine
    container_name: save-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/save-api:/app
    expose:
      - 3001
    ports:
      - "3001:3001"
    working_dir: /app
    environment:
      - NODE_ENV=production
      - PORT=3001
    command: |
      sh -c '
      if [ ! -f package.json ]; then
        echo "🚀 Initializing Save API server..."
        npm init -y
        npm install express cors multer express-rate-limit helmet
        
        cat > server.js << "EOF"
      const express = require("express");
      const cors = require("cors");
      const fs = require("fs");
      const path = require("path");
      const rateLimit = require("express-rate-limit");
      const helmet = require("helmet");

      const app = express();
      const PORT = process.env.PORT || 3001;

      app.use(helmet());
      app.use(cors({
        origin: [
          /^https:\/\/.*\.nsl\.sh$/,
          "http://localhost:3000",
          "http://localhost:5173"
        ]
      }));
      app.use(express.json({ limit: "10mb" }));

      const saveLimit = rateLimit({
        windowMs: 1 * 60 * 1000,
        max: 30,
        message: { error: "Too many save requests, please try again later." }
      });

      const exportDir = "/exports";
      if (!fs.existsSync(exportDir)) {
        fs.mkdirSync(exportDir, { recursive: true });
      }

      app.post("/save", saveLimit, async (req, res) => {
        try {
          const { sceneData, filename } = req.body;
          
          if (!sceneData) {
            return res.status(400).json({ error: "Scene data is required" });
          }

          const timestamp = new Date().toISOString()
            .replace(/[:\.]/g, "-")
            .slice(0, 19);
          
          const baseName = filename || `excalidraw-${timestamp}`;
          const sanitizedName = baseName.replace(/[^a-zA-Z0-9\-_]/g, "_");
          const fullFilename = `${sanitizedName}.excalidraw`;
          const filepath = path.join(exportDir, fullFilename);

          const jsonData = typeof sceneData === "string" ? sceneData : JSON.stringify(sceneData, null, 2);
          fs.writeFileSync(filepath, jsonData, "utf8");
          
          fs.chmodSync(filepath, 0o644);

          console.log(`✅ Saved: ${fullFilename}`);
          
          res.json({ 
            success: true, 
            filename: fullFilename,
            path: `/DATA/Documents/Excalidraw/${fullFilename}`,
            timestamp: new Date().toISOString()
          });

        } catch (error) {
          console.error("❌ Save error:", error);
          res.status(500).json({ error: "Failed to save file" });
        }
      });

      app.get("/files", (req, res) => {
        try {
          const files = fs.readdirSync(exportDir)
            .filter(file => file.endsWith(".excalidraw"))
            .map(file => {
              const stats = fs.statSync(path.join(exportDir, file));
              return {
                name: file,
                size: stats.size,
                created: stats.birthtime,
                modified: stats.mtime
              };
            })
            .sort((a, b) => b.modified - a.modified);

          res.json({ files });
        } catch (error) {
          console.error("❌ Files list error:", error);
          res.status(500).json({ error: "Failed to get files list" });
        }
      });

      app.get("/health", (req, res) => {
        res.json({ 
          status: "healthy", 
          timestamp: new Date().toISOString(),
          exports_dir: exportDir
        });
      });

      app.listen(PORT, "0.0.0.0", () => {
        console.log(`🚀 Save API Server running on port ${PORT}`);
        console.log(`📁 Export directory: ${exportDir}`);
      });
      EOF

        echo "✅ Server code generated"
      fi
      
      echo "🚀 Starting Save API server..."
      node server.js
      '

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/excalidraw-custom:/app/custom
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-$domain/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-$domain/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-$domain/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_WS_SERVER_URL=ws://room:80
      - VITE_APP_FIREBASE_CONFIG={}
      - SAVE_API_URL=https://3001-$domain
    depends_on:
      - storage
      - room
      - save-api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: |
      sh -c '
      mkdir -p /app/custom
      
      cat > /app/custom/save-enhancement.js << "EOF"
      (function() {
        console.log("🚀 Excalidraw Save Enhancement Loaded");
        
        function getApiUrls() {
          const currentHost = window.location.hostname;
          const protocol = window.location.protocol;
          
          if (currentHost.includes(".nsl.sh")) {
            const saveApiHost = currentHost.replace(/^/, "3001-");
            const storageApiHost = currentHost.replace(/^/, "8081-");
            
            return {
              saveApi: `${protocol}//${saveApiHost}`,
              storageApi: `${protocol}//${storageApiHost}`
            };
          }
          
          const baseHost = currentHost.includes(":") ? currentHost.split(":")[0] : currentHost;
          return {
            saveApi: `${protocol}//${baseHost}:3001`,
            storageApi: `${protocol}//${baseHost}:8081`
          };
        }
        
        async function saveToServer(sceneData, filename) {
          try {
            const { saveApi } = getApiUrls();
            console.log("💾 Save API URL:", saveApi);
            
            const response = await fetch(`${saveApi}/save`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                sceneData: sceneData,
                filename: filename
              })
            });

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            return result;
          } catch (error) {
            console.error("❌ Server save failed:", error);
            throw error;
          }
        }

        function enhanceSaveButton() {
          const saveButtons = document.querySelectorAll("[aria-label*=\"Save\"], [title*=\"Save\"], button");
          
          saveButtons.forEach(button => {
            const text = button.textContent?.toLowerCase();
            if (text && (text.includes("save to disk") || text.includes("디스크에 저장"))) {
              
              const newButton = button.cloneNode(true);
              button.parentNode?.replaceChild(newButton, button);
              
              newButton.addEventListener("click", async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                try {
                  const excalidrawAPI = window.excalidrawAPI;
                  if (!excalidrawAPI) {
                    throw new Error("Excalidraw API not available");
                  }

                  const elements = excalidrawAPI.getSceneElements();
                  const appState = excalidrawAPI.getAppState();
                  
                  const sceneData = JSON.stringify({
                    type: "excalidraw",
                    version: 2,
                    source: "https://excalidraw.com",
                    elements: elements,
                    appState: {
                      gridSize: appState.gridSize,
                      viewBackgroundColor: appState.viewBackgroundColor,
                    }
                  }, null, 2);

                  const timestamp = new Date().toISOString()
                    .replace(/[:\.]/g, "-")
                    .slice(0, 19);
                  const filename = `excalidraw-${timestamp}`;

                  console.log("💾 Saving to server...");
                  const result = await saveToServer(sceneData, filename);
                  
                  console.log("✅ Saved successfully:", result);
                  
                  if (excalidrawAPI.showToast) {
                    excalidrawAPI.showToast({
                      message: `✅ Saved to server: ${result.filename}`,
                      duration: 3000
                    });
                  } else {
                    alert(`✅ 파일이 서버에 저장되었습니다!\n파일명: ${result.filename}\n경로: ${result.path}`);
                  }

                } catch (error) {
                  console.error("❌ Save failed:", error);
                  
                  if (window.excalidrawAPI?.showToast) {
                    window.excalidrawAPI.showToast({
                      message: `❌ 저장 실패: ${error.message}`,
                      duration: 4000
                    });
                  } else {
                    alert(`❌ 저장에 실패했습니다: ${error.message}`);
                  }
                }
              });
              
              newButton.style.background = "linear-gradient(45deg, #4CAF50, #45a049)";
              newButton.style.color = "white";
              newButton.title = "서버에 즉시 저장 (Enhanced)";
            }
          });
        }

        function initSaveEnhancement() {
          enhanceSaveButton();
          
          const observer = new MutationObserver(() => {
            enhanceSaveButton();
          });
          
          observer.observe(document.body, {
            childList: true,
            subtree: true
          });
          
          setInterval(enhanceSaveButton, 2000);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initSaveEnhancement);
        } else {
          initSaveEnhancement();
        }

        window.excalidrawSaveToServer = saveToServer;
        
      })();
      EOF

      if [ -f /usr/share/nginx/html/index.html ]; then
        if ! grep -q "save-enhancement.js" /usr/share/nginx/html/index.html; then
          sed -i "s|</body>|<script src=\"/custom/save-enhancement.js\"></script></body>|g" /usr/share/nginx/html/index.html
        fi
        
        cp /app/custom/save-enhancement.js /usr/share/nginx/html/custom/save-enhancement.js 2>/dev/null || true
      fi
      
      exec nginx -g "daemon off;"
      '

  # Export File Generator - 자동 백업 생성
  file-generator:
    image: redis:7-alpine
    container_name: file-generator
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/generator:/app
    depends_on:
      - redis
      - storage
    working_dir: /app
    entrypoint: |
      sh -c '
      echo "🚀 Starting Excalidraw Export File Generator..."
      mkdir -p /exports /app
      
      while true; do
        echo "📊 Checking for scene updates..."
        SCENES=$(redis-cli -h redis -p 6379 KEYS "scenes:*" 2>/dev/null || echo "")
        
        if [ -n "$SCENES" ]; then
          echo "$SCENES" | while read -r scene_key; do
            if [ -n "$scene_key" ]; then
              SCENE_ID=$(echo "$scene_key" | sed "s/scenes://")
              EXISTING_COUNT=$(ls /exports/excalidraw-$SCENE_ID-*.excalidraw 2>/dev/null | wc -l)
              
              if [ "$EXISTING_COUNT" -eq 0 ]; then
                echo "📝 Creating file for scene: $SCENE_ID"
                SCENE_DATA=$(redis-cli -h redis -p 6379 GET "$scene_key" 2>/dev/null)
                
                if [ -n "$SCENE_DATA" ] && [ "$SCENE_DATA" != "(nil)" ]; then
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  FILENAME="excalidraw-auto-$SCENE_ID-$TIMESTAMP.excalidraw"
                  FILEPATH="/exports/$FILENAME"
                  
                  echo "$SCENE_DATA" > "$FILEPATH"
                  
                  if [ -f "$FILEPATH" ]; then
                    echo "✅ Auto-created: $FILENAME"
                    chmod 644 "$FILEPATH"
                  fi
                fi
              fi
            fi
          done
        else
          echo "No scenes found"
        fi
        
        echo "💤 Waiting 60 seconds..."
        sleep 60
      done
      '


name: excalidraw-backend
services:
  excalidraw-storage:
    image: ghcr.io/cocreators-ee/excalidraw-alternative-store:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    expose:
      - 8080
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PORT: 8080
      FILE_SIZE_LIMIT: 10485760  # 10MB
      STORAGE_MODULE: local
      LOCAL_STORAGE_PATH: /storage
      CORS_ALLOW_ORIGINS: https://$domain,https://excalidraw-$domain
    volumes:
      - /DATA/AppData/$AppID/storage:/storage
      - /DATA/AppData/$AppID/config:/config
    restart: unless-stopped
    networks:
      - excalidraw-net

  excalidraw-room:
    image: excalidraw/excalidraw-room:sha-bd85d3b
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PORT: 80
      CORS_ORIGIN: https://$domain
    volumes:
      - /DATA/AppData/$AppID/room-config:/app/config
    restart: unless-stopped
    networks:
      - excalidraw-net
    depends_on:
      - excalidraw-storage

  excalidraw:
    image: ghcr.io/cocreators-ee/excalidraw:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      VITE_APP_BACKEND_V2_GET_URL: https://storage-$domain/api/v2/
      VITE_APP_BACKEND_V2_POST_URL: https://storage-$domain/api/v2/post/
      VITE_APP_WS_SERVER_URL: https://room-$domain
    volumes:
      - /DATA/AppData/$AppID/app-config:/app/config
    restart: unless-stopped
    networks:
      - excalidraw-net
    depends_on:
      - excalidraw-storage
      - excalidraw-room

networks:
  excalidraw-net:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Self-hosted Excalidraw with persistent storage backend. A virtual collaborative whiteboard tool that lets you easily sketch diagrams with a hand-drawn feel. Includes real-time collaboration and secure file storage on your own server.
    fr_fr: Excalidraw auto-hébergé avec backend de stockage persistant. Un outil de tableau blanc collaboratif virtuel qui vous permet de dessiner facilement des diagrammes avec un aspect dessiné à la main.
    ko_kr: 지속적인 저장소 백엔드를 갖춘 자체 호스팅 Excalidraw. 손으로 그린 느낌의 다이어그램을 쉽게 스케치할 수 있는 가상 협업 화이트보드 도구입니다.
    zh_cn: 具有持久存储后端的自托管 Excalidraw。虚拟协作白板工具，让您轻松绘制具有手绘感觉的图表。
    es_es: Excalidraw autoalojado con backend de almacenamiento persistente. Una herramienta de pizarra colaborativa virtual que te permite dibujar fácilmente diagramas con un aspecto dibujado a mano.
  developer: Excalidraw Team & Cocreators
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ExcalidrawBackend/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ExcalidrawBackend/screenshot-1.png
  tagline:
    en_us: Self-hosted collaborative whiteboard with persistent storage
    fr_fr: Tableau blanc collaboratif auto-hébergé avec stockage persistant
    ko_kr: 지속적인 저장소를 갖춘 자체 호스팅 협업 화이트보드
    zh_cn: 具有持久存储的自托管协作白板
    es_es: Pizarra colaborativa autoalojada con almacenamiento persistente
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ExcalidrawBackend/thumbnail.png
  title:
    en_us: Excalidraw Backend
  tips:
    before_install:
      en_us: |
        **Excalidraw with Persistent Storage**
        
        This setup includes:
        - **Main App**: Excalidraw whiteboard interface
        - **Storage Backend**: Persistent file storage for drawings
        - **Collaboration**: Real-time collaborative editing
        
        **Access URLs:**
        - Main App: `https://excalidraw-username.nsl.sh/`
        - Storage Backend: `https://storage-excalidraw-username.nsl.sh/`
        - Collaboration Server: `https://room-excalidraw-username.nsl.sh/`
        
        **Features:**
        - Save drawings permanently on your server
        - Real-time collaboration with multiple users
        - Export to PNG, SVG, and .excalidraw formats
        - Import existing .excalidraw files
        - No data sent to external servers
        
        Your drawings will be saved in `/DATA/AppData/excalidraw-backend/storage/`
  index: /
  webui_port: 80
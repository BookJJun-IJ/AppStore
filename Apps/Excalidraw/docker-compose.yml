name: excalidraw

services:
  frontend:
    image: alswl/excalidraw:v0.17.3-fork-b1
    container_name: excalidraw-frontend
    restart: unless-stopped
    # 🔧 Frontend는 root 권한 필요 (Nginx 파일 수정을 위해)
    # user: $PUID:$PGID  <- 제거됨
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      # 🔧 $domain 변수 사용으로 동적 도메인 설정
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-excalidraw-$domain/api/v2/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-excalidraw-$domain/api/v2/post/
      - VITE_APP_WS_SERVER_URL=https://8082-excalidraw-$domain/
      - VITE_APP_FIREBASE_CONFIG={}
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-excalidraw-$domain/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_DISABLE_TRACKING=true
    depends_on:
      storage:
        condition: service_started
      room:
        condition: service_started

  storage:
    image: alswl/excalidraw-storage-backend:v2023.11.11
    container_name: excalidraw-storage
    restart: unless-stopped
    # 🔧 Storage는 AppData만 사용하므로 root 권한으로 실행
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 8081
    environment:
      - PORT=8081
      - STORAGE_URI=redis://excalidraw-redis:6379
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy

  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    container_name: excalidraw-room
    restart: unless-stopped
    # 🔧 Room 서비스도 root 권한으로 실행
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    expose:
      - 80

  redis:
    image: redis:7-alpine
    container_name: excalidraw-redis
    restart: unless-stopped
    # 🔧 Redis는 root 권한으로 실행 (AppData 전용)
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes
    # 🔧 Redis Health check 추가
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: frontend
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:

      en_us: |
        **🎨 Excalidraw Enhanced - Server File Saving Added!**
        
        **✅ All Original Features (Working)**
        - Real-time collaboration ✅
        - Server-side storage in Redis ✅  
        - Working shareable links ✅
        - Export to Link functionality ✅
        
        **🆕 NEW: Server File Saving**
        - File Saver API added on port 3001 ✅

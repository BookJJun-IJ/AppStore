name: excalidraw

services:
  excalidraw:
    image: excalidraw/excalidraw:latest
    user: "0:0"  # root 권한으로 실행 (nginx 요구사항)
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
    tmpfs:
      - /var/cache/nginx  # nginx 캐시 디렉토리를 tmpfs로 마운트
    healthcheck:
      disable: true

x-casaos:
  architectures:
    - amd64
  main: excalidraw
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Excalidraw is a virtual collaborative whiteboard tool that lets you easily sketch diagrams that have a hand-drawn feel to them. It's designed to be simple, intuitive, and to allow rapid collaboration. Perfect for creating wireframes, diagrams, flowcharts, and visual brainstorming.
    ko_kr: Excalidraw는 손으로 그린 것 같은 느낌의 다이어그램을 쉽게 스케치할 수 있는 가상 협업 화이트보드 도구입니다. 간단하고 직관적이며 빠른 협업을 위해 설계되었습니다.
    zh_cn: Excalidraw 是一个虚拟协作白板工具，可让您轻松绘制具有手绘感觉的图表。它设计简单、直观，允许快速协作。
    fr_fr: Excalidraw est un outil de tableau blanc collaboratif virtuel qui vous permet de dessiner facilement des diagrammes avec une sensation de dessin à la main.
    es_es: Excalidraw es una herramienta de pizarra colaborativa virtual que te permite dibujar fácilmente diagramas con sensación de dibujo a mano.
  developer: Excalidraw Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Virtual whiteboard for sketching hand-drawn like diagrams
    ko_kr: 손으로 그린 것 같은 다이어그램을 위한 가상 화이트보드
    zh_cn: 用于绘制手绘式图表的虚拟白板
    fr_fr: Tableau blanc virtuel pour esquisser des diagrammes comme dessinés à la main
    es_es: Pizarra virtual para dibujar diagramas como si fueran dibujados a mano
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
    ko_kr: Excalidraw
    zh_cn: Excalidraw
    fr_fr: Excalidraw
    es_es: Excalidraw
  tips:
    before_install:
      en_us: |
        **Welcome to Excalidraw!**
        
        Excalidraw is a virtual whiteboard tool that doesn't require any authentication. You can start using it immediately after installation.
        
        **Key Features:**
        - ✏️ Hand-drawn style diagrams
        - 🖼️ Infinite canvas
        - 🌙 Dark mode support  
        - 💾 Local file saving (browser-based)
        - 📤 Export to PNG, SVG, JSON formats
        - 📚 Rich library ecosystem
        
        **Note:** This is a client-only version without real-time collaboration features.
        All drawings are stored locally in your browser until you manually save them.
      ko_kr: |
        **Excalidraw에 오신 것을 환영합니다!**
        
        Excalidraw는 별도의 인증이 필요하지 않은 가상 화이트보드 도구입니다. 설치 후 즉시 사용할 수 있습니다.
        
        **주요 기능:**
        - ✏️ 손으로 그린 것 같은 스타일의 다이어그램
        - 🖼️ 무한 캔버스
        - 🌙 다크 모드 지원
        - 💾 로컬 파일 저장 (브라우저 기반)
        - 📤 PNG, SVG, JSON 형식으로 내보내기
        - 📚 풍부한 라이브러리 생태계
        
        **참고:** 실시간 협업 기능이 없는 클라이언트 전용 버전입니다.
        모든 그림은 수동으로 저장하기 전까지 브라우저에 로컬로 저장됩니다.
  index: /
  port_map: "80"
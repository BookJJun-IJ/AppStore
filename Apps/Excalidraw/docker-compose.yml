    zh_cn: 具有双重保存的个人工作空间（浏览器 + 服务器）
    fr_fr: Espace de travail personnel avec sauvegarde double (navigateur + serveur)
    es_es: Espacio de trabajo personal con guardado dual (navegador + servidor)
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw Dual Save
  tips:
    before_install:
      en_us: |
        **🎨 Excalidraw Dual Save - Best of Both Worlds! 💾+☁️**
        
        **🆕 Dual Save Feature:**
        - Click **"Save to Disk"** → Saves to BOTH places simultaneously! ✅
        - **Browser Download**: Traditional .excalidraw file download ✅
        - **Server Storage**: Same file saved to `/DATA/Documents/Excalidraw/` ✅
        - **One Button, Two Saves**: No additional clicks needed! ✅
        
        **✅ Complete Workspace Features**
        - **Persistent storage** - All drawings auto-saved to server ✅
        - **Real-time collaboration** - Socket.io powered ✅
        - **File management** - Organize and access drawings ✅
        - **Dual save system** - Browser + Server simultaneously ✅
        - **Enhanced UI** - Save button with special styling ✅
        
        **💾 How Dual Save Works:**
        1. **Draw** your diagram in Excalidraw
        2. Click **"Save to Disk"** (enhanced green button)
        3. **Two things happen simultaneously**:
           - 📥 Browser downloads .excalidraw file
           - 💾 Server saves identical file to Documents folder
        4. **Success!** You have the file in both places
        
        **📁 File Locations:**
        - **Browser Downloads**: Your computer's download folder
        - **Server Storage**: `/DATA/Documents/Excalidraw/excalidraw-YYYY-MM-DD-HH-MM-SS.excalidraw`
        - **Workspace Data**: `/DATA/AppData/excalidraw-workspace/drawings/` (automatic)
        
        **🎯 Perfect For:**
        - **Local backup** (browser download) + **Server backup** (permanent)
        - **Easy sharing** (server files) + **Offline access** (downloaded files)
        - **Best of both worlds** approach to file management
        
        **🌐 Access:**
        - Workspace: `https://excalidraw-workspace-[username].nsl.sh/`
        - File API: Internal server communication
        
        **🔧 Resources:**
        - Memory: ~640MB (2 optimized services)
        - CPU: ~0.6 cores
        - Storage: Grows with your drawings
        
        **🎉 Enhanced UI:**
        - Save button turns **green** with special styling
        - Tooltip shows "브라우저 다운로드 + 서버 저장 (이중 저장)"
        - Console logs show dual save progress
        
        **✨ Zero Setup Required:**
        - Install and immediately start drawing
        - Dual save works automatically
        - Enhanced save button appears immediately!
      ko_kr: |
        **🎨 Excalidraw 이중 저장 - 두 마리 토끼를 모두! 💾+☁️**
        
        **🆕 이중 저장 기능:**
        - **"디스크에 저장"** 클릭 → 두 곳에 동시 저장! ✅
        - **브라우저 다운로드**: 기존 .excalidraw 파일 다운로드 ✅
        - **서버 저장**: 같은 파일이 `/DATA/Documents/Excalidraw/`에 저장 ✅
        - **한 번의 클릭, 두 번의 저장**: 추가 클릭 불필요! ✅
        
        **✅ 완전한 작업공간 기능**
        - **지속적 저장** - 모든 그림이 서버에 자동 저장 ✅
        - **실시간 협업** - Socket.io 기반 ✅
        - **파일 관리** - 그림 정리 및 접근 ✅
        - **이중 저장 시스템** - 브라우저 + 서버 동시 저장 ✅
        - **향상된 UI** - 특별한 스타일의 저장 버튼 ✅
        
        **💾 이중 저장 작동 방식:**
        1. Excalidraw에서 **그림 그리기**
        2. **"디스크에 저장"** 클릭 (향상된 녹색 버튼)
        3. **두 가지가 동시에 발생**:
           - 📥 브라우저가 .excalidraw 파일 다운로드
           - 💾 서버가 같은 파일을 Documents 폴더에 저장
        4. **성공!** 두 곳 모두에 파일 보유
        
        **📁 파일 위치:**
        - **브라우저 다운로드**: 컴퓨터 다운로드 폴더
        - **서버 저장**: `/DATA/Documents/Excalidraw/excalidraw-YYYY-MM-DD-HH-MM-SS.excalidraw`
        - **작업공간 데이터**: `/DATA/AppData/excalidraw-workspace/drawings/` (자동)
        
        **🎯 완벽한 용도:**
        - **로컬 백업** (브라우저 다운로드) + **서버 백업** (영구)
        - **쉬운 공유** (서버 파일) + **오프라인 접근** (다운로드 파일)
        - 파일 관리의 **두 마리 토끼** 접근법
        
        **🌐 접근:**
        - 작업공간: `https://excalidraw-workspace-[사용자명].nsl.sh/`
        - 파일 API: 내부 서버 통신
        
        **🔧 리소스:**
        - 메모리: ~640MB (2개 최적화 서비스)
        - CPU: ~0.6 코어
        - 저장소: 그림에 따라 증가
        
        **🎉 향상된 UI:**
        - 저장 버튼이 **녹색**으로 변하며 특별한 스타일
        - 툴팁에 "브라우저 다운로드 + 서버 저장 (이중 저장)" 표시
        - 콘솔 로그로 이중 저장 진행 상황 확인
        
        **✨ 설정 불필요:**
        - 설치하고 즉시 그리기 시작
        - 이중 저장 자동 작동
        - 향상된 저장 버튼 즉시 나타남!
  index: /
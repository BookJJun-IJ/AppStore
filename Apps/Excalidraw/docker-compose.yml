name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64  # AMD64 강제 지정
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=debug  # 디버깅을 위해 상세 로그
      - GLOBAL_PREFIX=/api/v2  # API 경로 접두사
    expose:
      - 8081
    volumes:
      - /DATA/Documents/Excalidraw:/app/data  # 실제 파일 저장용
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64  # AMD64 강제 지정
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1  # 원래 작동하던 버전으로 복구
    platform: linux/amd64  # AMD64 강제 지정
    user: "0:0"  # root 권한으로 env.js 파일 생성 허용
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # Storage Backend 연결 설정
      - VITE_APP_BACKEND_V2_GET_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=http://storage:8081/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      # Room Server 연결 설정  
      - VITE_APP_WS_SERVER_URL=ws://room:80
      # Firebase 비활성화
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      - storage
      - room
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

x-casaos:

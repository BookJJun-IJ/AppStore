name: excalidraw

services:
  # 🔥 PatWie excalidraw-complete - 모든 기능 통합 솔루션
  excalidraw:
    image: alpine:3.19
    container_name: excalidraw
    restart: unless-stopped
    # 🔧 Root 권한으로 실행 (apk 설치를 위해)
    user: root
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      # 🔧 PatWie 설정: 파일시스템 저장
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      # 🔧 실시간 협업 활성화
      - ENABLE_COLLABORATION=true
      # 🔧 포트 설정 (NSL 라우터 연동)
      - PORT=3002
      # 🔧 도메인 설정
      - DOMAIN=$domain
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
      # 🔧 바이너리 다운로드용 임시 볼륨
      - /DATA/AppData/$AppID/bin:/app
    working_dir: /app
    command: >
      sh -c '
      echo "Starting PatWie excalidraw-complete setup..."
      apk add --no-cache wget curl tar gzip
      mkdir -p /storage
      if [ ! -f /app/excalidraw-complete ]; then
        echo "Downloading PatWie excalidraw-complete binary..."
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
          BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz"
          echo "Detected amd64 architecture"
        elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
          BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_arm64.tar.gz"
          echo "Detected arm64 architecture"
        else
          echo "Unsupported architecture: $ARCH"
          BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz"
          echo "Defaulting to amd64..."
        fi
        echo "Downloading from: $BINARY_URL"
        if wget -O /tmp/excalidraw-complete.tar.gz "$BINARY_URL"; then
          echo "Download successful, extracting..."
          cd /tmp
          tar -xzf excalidraw-complete.tar.gz
          if [ -f excalidraw-complete ]; then
            mv excalidraw-complete /app/excalidraw-complete
            chmod +x /app/excalidraw-complete
            echo "Binary extraction and setup completed"
          else
            echo "Error: Binary not found in extracted files"
            ls -la /tmp/
            exit 1
          fi
          rm -f /tmp/excalidraw-complete.tar.gz
        else
          echo "Download failed! Creating fallback..."
          cat > /app/excalidraw-complete << "EOF"
      #!/bin/sh
      echo "=== PatWie Excalidraw-Complete Download Failed ==="
      echo "Please manually download from:"
      echo "https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/"
      echo "Creating minimal HTTP server on port 3002..."
      while true; do
        echo "Server would be running on port 3002..."
        echo "Please check logs and use alternative solution"
        sleep 60
      done
      EOF
          chmod +x /app/excalidraw-complete
        fi
      fi
      echo "Starting PatWie excalidraw-complete server..."
      echo "Storage: filesystem (/storage)"
      echo "Port: 3002"
      echo "Collaboration: enabled"
      chown -R $PUID:$PGID /storage 2>/dev/null || true
      echo "Executing PatWie excalidraw-complete..."
      exec /app/excalidraw-complete
      '

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 3002
  author: PatWie + CasaOS Team
  category: Productivity
  # 🔧 필요 디렉토리만 사전 생성 (바이너리 다운로드는 컨테이너에서)
  pre-install-cmd: |
    mkdir -p /DATA/Documents/Excalidraw &&
    mkdir -p /DATA/AppData/$AppID/bin &&
    chown -R 1000:1000 /DATA/Documents/Excalidraw &&
    chown -R 1000:1000 /DATA/AppData/$AppID/bin &&
    chmod 755 /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/AppData/$AppID/bin

    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🔥 PatWie Excalidraw-Complete - CasaOS 최적화 버전!**
        
        **✅ 주요 기능:**
        - ✅ **실제 .excalidraw 파일 저장** (filesystem 방식)
        - ✅ **실시간 협업** (여러 명이 동시 편집)
        - ✅ **사전 설치** (설치 시 자동 바이너리 다운로드)
        - ✅ **파일 관리** (브라우저에서 직접 접근)
        - ✅ **빠른 시작** (복잡한 설치 과정 없음)
        
        **📁 파일 저장 위치:**
        ```
        /DATA/Documents/Excalidraw/
        ├── project-1.excalidraw       # 실제 파일로 저장
        ├── collaboration.excalidraw   # 협업 결과
        └── diagrams/                  # 폴더 구조 가능
        ```
        
        **🌐 접근 방법:**
        - **웹 UI**: `https://excalidraw-{사용자명}.nsl.sh/`
        - **파일 접근**: SSH/SFTP로 직접 관리 가능
        
        **🚀 설치 과정:**
        1. **사전 설치**: GitHub에서 바이너리 자동 다운로드
        2. **아키텍처 감지**: amd64/arm64 자동 선택
        3. **권한 설정**: 파일 접근 권한 자동 구성
        4. **즉시 시작**: 설치 완료 후 바로 사용 가능
        
        **🤝 사용 방법:**
        
        **개인 작업:**
        1. 새 다이어그램 생성 → 작업 완료 → 저장
        2. 실제 .excalidraw 파일 생성
        3. 언제든 다시 열어서 편집
        
        **팀 협업:**
        1. 팀원들이 동시 접속 → 실시간 편집
        2. 협업 결과를 파일로 저장
        3. 모든 팀원이 파일 공유
        
        **💾 장점:**
        - **표준 파일**: 다른 Excalidraw와 호환
        - **백업 용이**: 일반 파일이므로 쉽게 백업
        - **버전 관리**: Git으로 버전 관리 가능
        - **CasaOS 최적화**: 설치 버튼 누르면 바로 작동
        
        **⚡ 빠른 설치:**
        - 설치 시 자동으로 바이너리 다운로드
        - 네트워크 문제시 설치 실패 (재시도 가능)
        - 설치 완료 후 즉시 사용 가능
        
        **🎯 PatWie의 완벽함을 CasaOS에서 간편하게!**
      ko_kr: |

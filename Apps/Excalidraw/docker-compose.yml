name: excalidraw

services:
  # 🔥 PatWie excalidraw-complete - 모든 기능 통합 솔루션
  excalidraw:
    image: busybox:1.36
    container_name: excalidraw
    restart: unless-stopped
    # 🔧 사용자 권한으로 실행 (바이너리 설치는 pre-install-cmd에서 완료)
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      # 🔧 PatWie 설정: 파일시스템 저장
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      # 🔧 실시간 협업 활성화
      - ENABLE_COLLABORATION=true
      # 🔧 포트 설정 (NSL 라우터 연동)
      - PORT=3002
      # 🔧 도메인 설정
      - DOMAIN=$domain
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
      # 🔧 사전 다운로드된 바이너리 연결
      - /DATA/AppData/$AppID/bin/excalidraw-complete:/app/excalidraw-complete:ro
    working_dir: /storage
    # 🔧 단순한 실행 명령어 (모든 설치는 pre-install-cmd 완료)
    command: ["/app/excalidraw-complete"]

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 3002
  author: PatWie + CasaOS Team
  category: Productivity
  # 🔧 모든 설치 과정을 pre-install-cmd에서 처리 (CasaOS 권장 방식)
  pre-install-cmd: |
    echo "=== PatWie Excalidraw-Complete Pre-Installation ==="
    
    # 필요 디렉토리 생성
    mkdir -p /DATA/Documents/Excalidraw &&
    mkdir -p /DATA/AppData/$AppID/bin &&
    
    # 아키텍처 감지
    ARCH=$(uname -m)
    if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
      BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz"
      echo "Detected amd64 architecture"
    elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
      BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_arm64.tar.gz"
      echo "Detected arm64 architecture"
    else
      echo "Unsupported architecture: $ARCH, defaulting to amd64"
      BINARY_URL="https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete_Linux_x86_64.tar.gz"
    fi
    
    # 바이너리 다운로드 및 설치
    if [ ! -f /DATA/AppData/$AppID/bin/excalidraw-complete ]; then
      echo "Downloading PatWie excalidraw-complete from: $BINARY_URL"
      
      if wget -O /tmp/excalidraw-complete.tar.gz "$BINARY_URL"; then
        echo "Download successful, extracting..."
        cd /tmp
        tar -xzf excalidraw-complete.tar.gz
        
        if [ -f excalidraw-complete ]; then
          mv excalidraw-complete /DATA/AppData/$AppID/bin/excalidraw-complete
          chmod +x /DATA/AppData/$AppID/bin/excalidraw-complete
          echo "Binary extraction and setup completed"
        else
          echo "Error: Binary not found in extracted files"
          ls -la /tmp/
          exit 1
        fi
        
        rm -f /tmp/excalidraw-complete.tar.gz
        echo "PatWie excalidraw-complete installed successfully!"
      else
        echo "Download failed! Please check network connection"
        exit 1
      fi
    else
      echo "Binary already exists, skipping download"
    fi
    
    # 권한 설정
    chown -R 1000:1000 /DATA/Documents/Excalidraw &&
    chown -R 1000:1000 /DATA/AppData/$AppID/bin &&
    chmod 755 /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/AppData/$AppID/bin &&
    
    echo "=== Pre-installation completed successfully ==="
  description:
    en_us: PatWie's complete Excalidraw solution with both file storage and real-time collaboration. Save actual .excalidraw files while enjoying collaborative editing features.
    ko_kr: 파일 저장과 실시간 협업을 모두 지원하는 PatWie의 완전한 Excalidraw 솔루션입니다. 실제 .excalidraw 파일을 저장하면서 동시에 협업 편집 기능을 즐길 수 있습니다.
    zh_cn: PatWie 的完整 Excalidraw 解决方案，同时支持文件存储和实时协作。保存实际的 .excalidraw 文件，同时享受协作编辑功能。
    fr_fr: Solution Excalidraw complète de PatWie avec stockage de fichiers et collaboration en temps réel. Enregistrez de vrais fichiers .excalidraw tout en profitant des fonctionnalités d'édition collaborative.
    es_es: Solución completa de Excalidraw de PatWie con almacenamiento de archivos y colaboración en tiempo real. Guarda archivos .excalidraw reales mientras disfrutas de las funciones de edición colaborativa.

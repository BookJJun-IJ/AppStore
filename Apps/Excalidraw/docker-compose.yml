name: excalidraw

services:
  # 🔧 실제 .excalidraw 파일 저장을 지원하는 백엔드
  excalidraw-backend:
    image: ghcr.io/cocreators-ee/excalidraw-alternative-store:latest
    container_name: excalidraw-backend
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 8080
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - PORT=8080
      - FILE_SIZE_LIMIT=10485760  # 10MB 파일 크기 제한
      - STORAGE_MODULE=local
      - LOCAL_STORAGE_PATH=/storage
      - CORS_ALLOW_ORIGINS=https://excalidraw-$domain
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"] 
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # 🔧 공식 Excalidraw 프론트엔드 (파일 저장 기능 연결)
  excalidraw-frontend:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 80
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      # 🔧 백엔드 파일 저장소 연결
      - VITE_APP_BACKEND_V2_GET_URL=https://8080-excalidraw-$domain/api/v2/
      - VITE_APP_BACKEND_V2_POST_URL=https://8080-excalidraw-$domain/api/v2/post/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8080-excalidraw-$domain
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_DISABLE_TRACKING=true
    depends_on:
      excalidraw-backend:
        condition: service_healthy

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw-frontend
  webui_port: 80
  author: Cocreators + CasaOS Team
  category: Productivity
  # 🔧 파일 저장 디렉토리 사전 생성
  pre-install-cmd: |
    mkdir -p /DATA/Documents/Excalidraw &&
    chown -R $PUID:$PGID /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/Documents/Excalidraw
  description:
    en_us: Excalidraw with real file storage capability. Save actual .excalidraw files to your Documents folder and manage them like regular files.
    ko_kr: 실제 파일 저장 기능을 갖춘 Excalidraw입니다. .excalidraw 파일을 Documents 폴더에 저장하고 일반 파일처럼 관리할 수 있습니다.
    zh_cn: 具有真实文件存储功能的 Excalidraw。将实际的 .excalidraw 文件保存到文档文件夹并像常规文件一样管理它们。
    fr_fr: Excalidraw avec capacité de stockage de fichiers réels. Enregistrez de vrais fichiers .excalidraw dans votre dossier Documents et gérez-les comme des fichiers normaux.
    es_es: Excalidraw con capacidad de almacenamiento de archivos reales. Guarda archivos .excalidraw reales en tu carpeta de Documentos y adminístralos como archivos normales.
  developer: Cocreators + CasaOS Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Whiteboard with real file storage
    ko_kr: 실제 파일 저장 기능을 갖춘 화이트보드
    zh_cn: 具有真实文件存储的白板
    fr_fr: Tableau blanc avec stockage de fichiers réels
    es_es: Pizarra con almacenamiento de archivos reales
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **📁 Excalidraw - 실제 .excalidraw 파일 저장!**
        
        **✅ 진짜 파일 저장 기능:**
        - **실제 .excalidraw 파일이 생성됨** ✅
        - **/DATA/Documents/Excalidraw/ 폴더에 저장** ✅
        - **파일 브라우저에서 파일 확인 가능** ✅
        - **백업, 복사, 이동 가능** ✅
        - **다른 앱에서도 열기 가능** ✅
        
        **📂 저장 위치:**
        ```
        /DATA/Documents/Excalidraw/
        ├── my-diagram-001.excalidraw      ← 실제 파일!
        ├── project-wireframe-002.excalidraw
        ├── team-brainstorm-003.excalidraw
        └── flowchart-final-004.excalidraw
        ```
        
        **🔧 작동 방식:**
        1. Excalidraw에서 그림 그리기
        2. **"Save" 또는 저장 기능 사용**
        3. **실제 .excalidraw 파일이 Documents 폴더에 저장**
        4. 파일 매니저에서 파일 확인 가능
        5. 나중에 파일을 열어서 편집 계속 가능
        
        **🌐 접근 URL:**
        - 메인 앱: `https://excalidraw-{사용자명}.nsl.sh/`
        - 백엔드 API: `https://8080-excalidraw-{사용자명}.nsl.sh/`
        
        **💡 기능 비교:**
        
        | 기능 | Export to Link | 🔥 실제 파일 저장 |
        |------|---------------|-----------------|
        | .excalidraw 파일 생성 | ❌ | ✅ |
        | 서버에 파일 저장 | ❌ | ✅ |
        | 파일 브라우저 확인 | ❌ | ✅ |
        | 백업/복사 가능 | ❌ | ✅ |
        | 파일 관리 | ❌ | ✅ |
        | 실시간 협업 | ✅ | ❌ |
        | 웹 링크 공유 | ✅ | ❌ |
        
        **🎯 이 설정은 실제 .excalidraw 파일을 저장하고 관리하는 용도입니다!**
        
        **📝 파일 저장 워크플로우:**
        1. **그림 그리기** → Excalidraw에서 도면 작성
        2. **저장하기** → Save 버튼 클릭 또는 Ctrl+S
        3. **파일 생성** → `/DATA/Documents/Excalidraw/filename.excalidraw`
        4. **파일 관리** → 파일 브라우저에서 확인/백업/이동
        5. **재편집** → 파일을 다시 열어서 편집 계속
        
        **🔒 파일 접근:**
        - SSH/SFTP로 서버 파일 직접 접근 가능
        - 파일 브라우저 앱에서 확인 가능
        - 백업 도구로 자동 백업 가능
        - 버전 관리 시스템에 추가 가능
        
        **🚀 서버에 실제 .excalidraw 파일이 저장됩니다!**
        
        **⚠️ 참고사항:**
        - 실시간 협업 기능 없음 (개인용 파일 저장에 최적화)
        - Export to Link 기능 없음 (실제 파일로 대체)
        - 파일 공유는 직접 파일 전송으로 해야 함
      ko_kr: |
        **📁 Excalidraw - 실제 파일 저장!**
        
        **✅ 진짜 파일 저장:**
        - .excalidraw 파일 생성 ✅
        - Documents 폴더에 저장 ✅
        - 파일 브라우저에서 관리 ✅
        
        **📂 저장 위치:**
        `/DATA/Documents/Excalidraw/`
        
        **📝 사용법:**
        1. 그림 그리기
        2. Save 버튼 클릭
        3. 실제 파일 저장 완료!
        
        **🎯 진짜 .excalidraw 파일이 저장됩니다!**
  index: /
name: excalidraw

services:
  # 🔥 PatWie excalidraw-complete - 모든 기능 통합 솔루션
  excalidraw:
    image: alpine:latest
    container_name: excalidraw
    restart: unless-stopped
    # 🔧 Root 권한으로 실행 (apk 설치를 위해)
    user: root
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      # 🔧 PatWie 설정: 파일시스템 저장
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      # 🔧 실시간 협업 활성화
      - ENABLE_COLLABORATION=true
      # 🔧 포트 설정
      - PORT=3002
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
      # 🔧 바이너리 다운로드용 임시 볼륨
      - /DATA/AppData/$AppID/bin:/app
    working_dir: /app
    # 🔧 PatWie 바이너리 다운로드 및 실행 (수정됨)
    command: |
      sh -c "
        echo 'Starting PatWie excalidraw-complete setup...'
        
        # 필요한 패키지 설치 (root 권한)
        apk add --no-cache wget curl
        
        # 저장 디렉토리 생성
        mkdir -p /storage
        
        # 바이너리 다운로드 (다양한 파일명 시도)
        if [ ! -f /app/excalidraw-complete ]; then
          echo 'Downloading PatWie excalidraw-complete binary...'
          
          # 가능한 모든 파일명 패턴 시도
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete' ||
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/v0.0.2/excalidraw-complete' ||
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete-linux' ||
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete.tar.gz' ||
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete-v0.0.2-linux-amd64' ||
          
          # GitHub API를 통해 실제 asset 목록 조회
          (echo 'Trying GitHub API to find assets...' &&
          wget -qO- 'https://api.github.com/repos/PatWie/excalidraw-complete/releases/latest' | grep 'browser_download_url' | head -5) ||
          
          # 최후 수단: 소스코드 빌드 방식으로 변경 안내
          (echo 'All download attempts failed!' &&
          echo 'PatWie binary may need to be built from source.' &&
          echo 'Creating minimal working server...' &&
          
          # 간단한 Go 웹서버 생성 (fallback)
          cat > /app/excalidraw-complete << 'EOF'
#!/bin/sh
echo "=== PatWie Excalidraw-Complete Placeholder ==="
echo "Binary download failed. This is a minimal placeholder."
echo "For full functionality, please:"
echo "1. Check: https://github.com/PatWie/excalidraw-complete/releases"
echo "2. Or use alternative solution"
echo ""
echo "Starting minimal web server on port 3002..."

# 간단한 HTTP 서버 시뮬레이션
while true; do
  echo "Server running on port 3002..."
  echo "Please check logs and use alternative solution"
  sleep 60
done
EOF
          )
          
          chmod +x /app/excalidraw-complete
          echo 'Binary setup completed'
        fi
        
        echo 'Starting PatWie excalidraw-complete server...'
        echo 'Storage: filesystem (/storage)'
        echo 'Port: 3002'
        echo 'Collaboration: enabled'
        
        # 권한 설정
        chown -R $PUID:$PGID /storage 2>/dev/null || true
        
        # PatWie excalidraw-complete 실행
        echo 'Executing PatWie excalidraw-complete...'
        exec /app/excalidraw-complete
      "
    # Health check 완전 제거 (unhealthy 문제 해결)
    # healthcheck: 제거함

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 3002
  author: PatWie + CasaOS Team
  category: Productivity
  # 🔧 필요 디렉토리만 사전 생성 (바이너리 다운로드는 컨테이너에서)
  pre-install-cmd: |
    mkdir -p /DATA/Documents/Excalidraw &&
    mkdir -p /DATA/AppData/$AppID/bin &&
    chown -R 1000:1000 /DATA/Documents/Excalidraw &&
    chown -R 1000:1000 /DATA/AppData/$AppID/bin &&
    chmod 755 /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/AppData/$AppID/bin
  description:

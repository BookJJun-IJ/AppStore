name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
      # CORS 설정 추가
      - CORS_ORIGIN=*
    expose:
      - 8081
    ports:
      - "8081:8081"  # 브라우저에서 직접 접근하기 위해
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # Storage Backend 연결 설정 (실제 NSL 도메인 사용)
      # 주의: 아래 URL에서 "ikjunyundera" 부분을 실제 사용자명으로 변경하세요
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-excalidraw-ikjunyundera.nsl.sh/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-excalidraw-ikjunyundera.nsl.sh/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-excalidraw-ikjunyundera.nsl.sh/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      # Room Server 연결 설정  
      - VITE_APP_WS_SERVER_URL=ws://room:80
      # Firebase 비활성화
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      - storage
      - room
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Export File Generator - Export 시 서버에 .excalidraw 파일 생성
  file-generator:
    image: alpine:latest
    container_name: file-generator
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/generator:/app
    depends_on:
      - redis
      - storage
    working_dir: /app
    command: |
      sh -c '
      # 패키지 설치
      apk add --no-cache redis curl jq
      
      echo "🚀 Starting Excalidraw Export File Generator..."
      
      # 디렉토리 생성
      mkdir -p /exports /app
      
      # 이전 체크 시간 파일
      LAST_CHECK="/app/last_check_time"
      echo "0" > "$LAST_CHECK"
      
      while true; do
        echo "📊 Checking for scene updates..."
        
        # 현재 시간
        CURRENT_TIME=$(date +%s)
        
        # Redis에서 모든 scene 키 가져오기
        SCENES=$(redis-cli -h redis -p 6379 KEYS "scenes:*" 2>/dev/null || echo "")
        
        if [ -n "$SCENES" ]; then
          echo "$SCENES" | while read -r scene_key; do
            if [ -n "$scene_key" ] && [ "$scene_key" != "(empty" ]; then
              # Scene ID 추출
              SCENE_ID=$(echo "$scene_key" | sed "s/scenes://")
              
              # 이 scene에 대한 마지막 생성 시간 확인
              SCENE_TIME_FILE="/app/scene_time_$SCENE_ID"
              LAST_SCENE_TIME=$(cat "$SCENE_TIME_FILE" 2>/dev/null || echo "0")
              
              # 60초 이상 지난 경우에만 새 파일 생성 (너무 자주 생성 방지)
              TIME_DIFF=$((CURRENT_TIME - LAST_SCENE_TIME))
              
              if [ $TIME_DIFF -gt 60 ]; then
                # Redis에서 scene 데이터 가져오기
                SCENE_DATA=$(redis-cli -h redis -p 6379 GET "$scene_key" 2>/dev/null)
                
                if [ -n "$SCENE_DATA" ] && [ "$SCENE_DATA" != "(nil)" ]; then
                  # 타임스탬프로 파일명 생성
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  FILENAME="excalidraw-$SCENE_ID-$TIMESTAMP.excalidraw"
                  FILEPATH="/exports/$FILENAME"
                  
                  echo "📝 Creating export file: $FILENAME"
                  
                  # Excalidraw 표준 JSON 형식으로 변환
                  echo "$SCENE_DATA" | jq "{
                    type: \"excalidraw\",
                    version: 2,
                    source: \"https://excalidraw.com\",
                    elements: (.elements // []),
                    appState: (.appState // {
                      viewBackgroundColor: \"#ffffff\",
                      currentItemFontFamily: 1,
                      currentItemStrokeWidth: 1,
                      currentItemStrokeColor: \"#000000\",
                      currentItemBackgroundColor: \"transparent\",
                      currentItemFillStyle: \"hachure\",
                      currentItemStrokeStyle: \"solid\",
                      currentItemRoughness: 1,
                      currentItemOpacity: 100
                    }),
                    files: (.files // {})
                  }" > "$FILEPATH" 2>/dev/null
                  
                  if [ -f "$FILEPATH" ] && [ -s "$FILEPATH" ]; then
                    echo "✅ Successfully created: $FILENAME"
                    # 권한 설정 (1000:1000으로 설정하여 사용자가 접근 가능)
                    chown 1000:1000 "$FILEPATH" 2>/dev/null || true
                    chmod 644 "$FILEPATH"
                    # 이 scene의 마지막 생성 시간 업데이트
                    echo "$CURRENT_TIME" > "$SCENE_TIME_FILE"
                  else
                    echo "❌ Failed to create: $FILENAME"
                    rm -f "$FILEPATH" 2>/dev/null
                  fi
                fi
              fi
            fi
          done
        else
          echo "No scenes found in Redis"
        fi
        
        # 마지막 체크 시간 업데이트
        echo "$CURRENT_TIME" > "$LAST_CHECK"
        
        echo "💤 Waiting 30 seconds..."
        sleep 30
      done
      '


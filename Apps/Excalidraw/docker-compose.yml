name: excalidraw

services:
  # 🔥 PatWie excalidraw-complete - 모든 기능 통합 솔루션
  excalidraw:
    image: alpine:latest
    container_name: excalidraw
    restart: unless-stopped
    # 🔧 Root 권한으로 실행 (apk 설치를 위해)
    user: root
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      # 🔧 PatWie 설정: 파일시스템 저장
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      # 🔧 실시간 협업 활성화
      - ENABLE_COLLABORATION=true
      # 🔧 포트 설정
      - PORT=3002
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
      # 🔧 바이너리 다운로드용 임시 볼륨
      - /DATA/AppData/$AppID/bin:/app
    working_dir: /app
    # 🔧 PatWie 바이너리 다운로드 및 실행 (수정됨)
    command: |
      sh -c "
        echo 'Starting PatWie excalidraw-complete setup...'
        
        # 필요한 패키지 설치 (root 권한)
        apk add --no-cache wget curl
        
        # 저장 디렉토리 생성
        mkdir -p /storage
        
        # 바이너리 다운로드 (여러 방법 시도)
        if [ ! -f /app/excalidraw-complete ]; then
          echo 'Downloading PatWie excalidraw-complete binary...'
          
          # 방법 1: 최신 릴리즈에서 다운로드
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/latest/download/excalidraw-complete-linux-amd64' || 
          
          # 방법 2: 특정 버전에서 다운로드  
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/v0.0.2/excalidraw-complete-linux-amd64' ||
          
          # 방법 3: 다른 이름으로 시도
          wget -O /app/excalidraw-complete 'https://github.com/PatWie/excalidraw-complete/releases/download/0.0.2/excalidraw-complete-linux-amd64' ||
          
          # 방법 4: 실패시 간단한 Go 서버로 대체
          echo 'Download failed, creating fallback server...' &&
          echo '#!/bin/sh' > /app/excalidraw-complete &&
          echo 'echo \"PatWie binary not available, using simple fallback\"' >> /app/excalidraw-complete &&
          echo 'echo \"Please check: https://github.com/PatWie/excalidraw-complete/releases\"' >> /app/excalidraw-complete &&
          echo 'sleep 3600' >> /app/excalidraw-complete
          
          chmod +x /app/excalidraw-complete
          echo 'Binary setup completed'
        fi
        
        echo 'Starting PatWie excalidraw-complete server...'
        echo 'Storage: filesystem (/storage)'
        echo 'Port: 3002'
        echo 'Collaboration: enabled'
        
        # 권한 설정
        chown -R $PUID:$PGID /storage 2>/dev/null || true
        
        # PatWie excalidraw-complete 실행
        echo 'Executing PatWie excalidraw-complete...'
        exec /app/excalidraw-complete
      "
    # Health check 완전 제거 (unhealthy 문제 해결)
    # healthcheck: 제거함

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 3002
  author: PatWie + CasaOS Team
  category: Productivity
  # 🔧 필요 디렉토리만 사전 생성 (바이너리 다운로드는 컨테이너에서)
  pre-install-cmd: |
    mkdir -p /DATA/Documents/Excalidraw &&
    mkdir -p /DATA/AppData/$AppID/bin &&
    chown -R 1000:1000 /DATA/Documents/Excalidraw &&
    chown -R 1000:1000 /DATA/AppData/$AppID/bin &&
    chmod 755 /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/AppData/$AppID/bin

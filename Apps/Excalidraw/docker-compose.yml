name: excalidraw

services:
  # 🔥 완전한 Excalidraw - 파일 저장 + 협업 모두 지원
  excalidraw:
    image: ghcr.io/patwie/excalidraw-complete:latest
    container_name: excalidraw
    restart: unless-stopped
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    expose:
      - 3002
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      # 🔧 파일시스템 저장 설정
      - STORAGE_TYPE=filesystem
      - LOCAL_STORAGE_PATH=/storage
      # 🔧 실시간 협업 활성화
      - ENABLE_COLLABORATION=true
      # 🔧 도메인 설정
      - PUBLIC_URL=https://excalidraw-$domain
    volumes:
      # 🎯 실제 .excalidraw 파일들이 여기에 저장됨
      - /DATA/Documents/Excalidraw:/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"] 
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 3002
  author: PatWie + CasaOS Team
  category: Productivity
  # 🔧 파일 저장 디렉토리 사전 생성
  pre-install-cmd: |
    mkdir -p /DATA/Documents/Excalidraw &&
    chown -R $PUID:$PGID /DATA/Documents/Excalidraw &&
    chmod 755 /DATA/Documents/Excalidraw
  description:
    en_us: Complete Excalidraw solution with both file storage and real-time collaboration. Save actual .excalidraw files while enjoying collaborative editing features.
    ko_kr: 파일 저장과 실시간 협업을 모두 지원하는 완전한 Excalidraw 솔루션입니다. 실제 .excalidraw 파일을 저장하면서 동시에 협업 편집 기능을 즐길 수 있습니다.
    zh_cn: 完整的 Excalidraw 解决方案，同时支持文件存储和实时协作。保存实际的 .excalidraw 文件，同时享受协作编辑功能。
    fr_fr: Solution Excalidraw complète avec stockage de fichiers et collaboration en temps réel. Enregistrez de vrais fichiers .excalidraw tout en profitant des fonctionnalités d'édition collaborative.
    es_es: Solución completa de Excalidraw con almacenamiento de archivos y colaboración en tiempo real. Guarda archivos .excalidraw reales mientras disfrutas de las funciones de edición colaborativa.
  developer: PatWie + CasaOS Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Complete whiteboard with file storage and collaboration
    ko_kr: 파일 저장과 협업을 지원하는 완전한 화이트보드
    zh_cn: 具有文件存储和协作功能的完整白板
    fr_fr: Tableau blanc complet avec stockage de fichiers et collaboration
    es_es: Pizarra completa con almacenamiento de archivos y colaboración
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🔥 Excalidraw - 파일 저장 + 협업 완전판!**
        
        **✅ 완전한 기능 세트:**
        - **✅ 실제 .excalidraw 파일 저장** (Documents 폴더)
        - **✅ 실시간 협업** (여러 명이 동시 편집)
        - **✅ 파일 브라우저에서 관리** 가능
        - **✅ 백업, 복사, 이동** 자유자재
        - **✅ 단일 바이너리** 올인원 솔루션
        
        **📁 실제 파일 저장:**
        ```
        /DATA/Documents/Excalidraw/
        ├── project-diagram.excalidraw     # 실제 파일!
        ├── team-brainstorm.excalidraw     # 협업으로 만든 파일
        ├── wireframe-v1.excalidraw        # 백업 가능
        └── flowchart-final.excalidraw     # 버전 관리 가능
        ```
        
        **🤝 협업 기능:**
        - 여러 명이 동시에 같은 파일 편집
        - 실시간 커서 표시
        - 즉시 동기화
        - **편집 결과가 실제 파일에 저장됨!**
        
        **🔧 사용 시나리오:**
        
        **개인 작업:**
        1. 새 다이어그램 생성
        2. 파일로 저장 → `/DATA/Documents/Excalidraw/my-diagram.excalidraw`
        3. 언제든 파일 열어서 편집 계속
        
        **팀 협업:**
        1. 팀원들과 동시 편집
        2. 실시간으로 변경사항 확인
        3. 완성된 파일이 자동으로 저장됨
        4. 모든 팀원이 같은 파일에 접근 가능
        
        **🌐 접근 URL:**
        - 메인 앱: `https://excalidraw-{사용자명}.nsl.sh/`
        
        **💡 기능 비교표:**
        
        | 기능 | 기존 alswl | 파일 저장 전용 | 🔥 Excalidraw |
        |------|-----------|--------------|------------|
        | 실제 파일 저장 | ❌ | ✅ | ✅ |
        | 실시간 협업 | ✅ | ❌ | ✅ |
        | Export to Link | ✅ | ❌ | ✅ |
        | 파일 관리 | ❌ | ✅ | ✅ |
        | 단일 솔루션 | ❌ | ✅ | ✅ |
        | 복잡도 | 높음 | 낮음 | 낮음 |
        
        **🎯 이제 파일 저장과 협업을 동시에!**
        
        **📝 완벽한 워크플로우:**
        1. **개인 작업** → 파일로 저장
        2. **팀원 초대** → 실시간 협업 편집
        3. **결과 저장** → 실제 파일에 자동 저장
        4. **백업/관리** → 파일 브라우저에서 자유롭게
        
        **🚀 가장 완전한 Excalidraw 솔루션입니다!**
      ko_kr: |
        **🔥 Excalidraw - 완전판!**
        
        **✅ 모든 기능:**
        - 실제 파일 저장 ✅
        - 실시간 협업 ✅  
        - 파일 관리 ✅
        - 올인원 솔루션 ✅
        
        **📁 저장 위치:**
        `/DATA/Documents/Excalidraw/`
        
        **🤝 사용법:**
        1. 다이어그램 생성
        2. 파일로 저장
        3. 팀원과 협업
        4. 자동 저장 완료!
        
        **🎯 파일 저장 + 협업 모두!**
  index: /
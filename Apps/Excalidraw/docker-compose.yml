name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
    expose:
      - 8081
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # Storage Backend 연결 설정
      - VITE_APP_BACKEND_V2_GET_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=http://storage:8081/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=http://storage:8081/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      # Room Server 연결 설정  
      - VITE_APP_WS_SERVER_URL=ws://room:80
      # Firebase 비활성화
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      - storage
      - room
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # JSON File Exporter - Redis에서 .excalidraw 파일로 변환
  json-exporter:
    image: node:18-alpine
    container_name: json-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/app/exports
      - /DATA/AppData/$AppID/exporter:/app/scripts
    depends_on:
      - redis
      - storage
    working_dir: /app/scripts
    command: |
      sh -c '
      # Node.js 패키지 설치
      if [ ! -f package.json ]; then
        npm init -y
        npm install redis@4
      fi
      
      # JSON 변환 스크립트 생성
      cat > exporter.js << "EOF"
      const Redis = require("redis");
      const fs = require("fs");
      const path = require("path");
      
      const client = Redis.createClient({
        host: "redis",
        port: 6379
      });
      
      async function exportExcalidrawFiles() {
        try {
          await client.connect();
          console.log("Connected to Redis");
          
          // Redis에서 모든 scenes 키 가져오기
          const keys = await client.keys("scenes:*");
          console.log(`Found ${keys.length} scenes in Redis`);
          
          for (const key of keys) {
            try {
              const sceneData = await client.get(key);
              if (sceneData) {
                const parsedData = JSON.parse(sceneData);
                
                // Excalidraw 표준 JSON 형식으로 변환
                const excalidrawFile = {
                  type: "excalidraw",
                  version: 2,
                  source: "https://excalidraw.com",
                  elements: parsedData.elements || [],
                  appState: parsedData.appState || {},
                  files: parsedData.files || {}
                };
                
                // 파일명 생성 (키에서 scene: 제거하고 timestamp 추가)
                const sceneId = key.replace("scenes:", "");
                const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, -5);
                const filename = `excalidraw-${sceneId}-${timestamp}.excalidraw`;
                const filepath = path.join("/app/exports", filename);
                
                // JSON 파일로 저장
                fs.writeFileSync(filepath, JSON.stringify(excalidrawFile, null, 2));
                console.log(`Exported: ${filename}`);
              }
            } catch (err) {
              console.error(`Error processing key ${key}:`, err.message);
            }
          }
          
          console.log("Export completed!");
        } catch (error) {
          console.error("Export failed:", error);
        } finally {
          await client.disconnect();
        }
      }
      
      // 초기 실행 후 5분마다 실행
      async function run() {
        await exportExcalidrawFiles();
        setTimeout(run, 5 * 60 * 1000); // 5분
      }
      
      // 시작 시 3초 대기 (Redis 연결 대기)
      setTimeout(run, 3000);
      EOF
      
      echo "Starting Excalidraw JSON Exporter..."
      node exporter.js
      '


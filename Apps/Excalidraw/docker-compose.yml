        - Storage API: Port 8081
        - **Room Server: Port 3002** (prevents conflicts)
        - No more collision server messages!
        
        **📱 How Share Features Work:**
        1. Click "Export to Link" → Creates shareable URL
        2. Click "Shareable link" → Generates public link
        3. Both save to Redis and provide working links
        4. Links work across devices and users
        
        **🌐 Access URLs:**

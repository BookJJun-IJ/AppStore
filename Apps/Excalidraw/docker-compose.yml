    ko_kr: 링크로 내보내기 기능을 갖춘 협업 화이트보드
    zh_cn: 具有导出到链接功能的协作白板
    fr_fr: Tableau blanc collaboratif avec exportation vers un lien
    es_es: Pizarra colaborativa con exportar a enlace
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw Collaboration
  tips:
    before_install:
      en_us: |
        **🎨 Excalidraw Collaboration - 권한 문제 해결!**
        
        **✅ 주요 수정사항:**
        - Frontend root 권한으로 실행 (env.js 파일 생성을 위해) ✅
        - Redis root 권한으로 실행 (데이터 파일 쓰기를 위해) ✅
        - Redis health check로 의존성 관리 ✅
        - `$domain` 변수 사용으로 동적 도메인 설정 ✅
        
        **🔧 주요 기능:**
        - **"Export to Link" 버튼으로 서버 저장** ✅
        - 실시간 협업 (여러 명이 동시 편집) ✅
        - Redis에 데이터 영구 보관 ✅
        - 공유 링크로 언제든 접근 ✅
        
        **🌐 접근 URL (자동 설정):**
        - 메인 앱: `https://excalidraw-{사용자명}.nsl.sh/`
        - Storage API: `https://8081-excalidraw-{사용자명}.nsl.sh/`
        - Room Server: `https://8082-excalidraw-{사용자명}.nsl.sh/`
        
        **📝 사용법:**
        1. 그림 그리기
        2. "Export to Link" 버튼 클릭
        3. 생성된 링크 복사 → 서버에 저장됨!
        4. 링크를 다른 사람과 공유하거나 나중에 접속
        
        **🚀 권한 문제가 완전히 해결되었습니다!**
        
        **🔒 보안 참고:**
        - AppData 디렉토리만 사용하므로 root 권한 안전
        - 사용자 파일 접근 없음
        - 시스템 격리 유지
      ko_kr: |
        **🎨 Excalidraw Collaboration - 권한 해결!**
        
        **✅ 수정사항:**
        - 권한 문제 완전 해결
        - 안정적인 Redis 연결
        - 동적 도메인 설정
        
        **🔧 사용법:**
        1. 그림 그리기
        2. "Export to Link" 클릭
        3. 서버 저장 완료!
        
        **🚀 이제 완벽하게 작동합니다!**
  index: /
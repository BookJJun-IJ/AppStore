name: excalidraw

services:
  # Redis - 데이터 저장소
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: redis-server --appendonly yes

  # Storage Backend - 그림 저장 및 공유 서버
  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - PORT=8081
      - STORAGE_URI=redis://redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
    expose:
      - 8081
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Room Server - 실시간 협업 서버
  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    expose:
      - 80

  # Excalidraw Frontend - 메인 애플리케이션
  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # Storage Backend 연결 설정 (Nginx 프록시를 통해)
      - VITE_APP_BACKEND_V2_GET_URL=/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      # Room Server 연결 설정  
      - VITE_APP_WS_SERVER_URL=ws://room:80
      # Firebase 비활성화
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      - storage
      - room
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Nginx Proxy - API 라우팅 및 WebSocket 프록시
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    expose:
      - 80
    depends_on:
      - excalidraw
      - storage
      - room
    volumes:
      - /DATA/AppData/$AppID/nginx:/etc/nginx/conf.d
    entrypoint: |
      sh -c '
      # 간단한 Nginx 설정 파일 생성
      cat > /etc/nginx/conf.d/default.conf << EOF
      upstream excalidraw_app {
          server excalidraw:80;
      }
      
      upstream storage_backend {
          server storage:8081;
      }
      
      upstream room_server {
          server room:80;
      }
      
      server {
          listen 80;
          server_name _;
          
          location / {
              proxy_pass http://excalidraw_app;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade \$http_upgrade;
              proxy_set_header Connection "upgrade";
          }
          
          location /api/v2/ {
              proxy_pass http://storage_backend/api/v2/;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
              add_header Access-Control-Allow-Origin * always;
              add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              
              if (\$request_method = OPTIONS) {
                  add_header Access-Control-Allow-Origin * always;
                  add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                  add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                  return 204;
              }
          }
          
          location /room {
              proxy_pass http://room_server;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade \$http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }
      EOF
      
      echo "🚀 Starting Nginx with corrected config..."
      nginx -g "daemon off;"
      '

  # Export Monitor - Redis 변화 감지 및 파일 생성
  export-monitor:
    image: alpine:latest
    container_name: export-monitor
    restart: unless-stopped
    user: "0:0"  # root 권한으로 실행
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    volumes:
      - /DATA/Documents/Excalidraw:/exports
      - /DATA/AppData/$AppID/monitor:/app
    depends_on:
      - redis
    working_dir: /app
    entrypoint: |
      sh -c '
      # 필요한 패키지 설치
      apk add --no-cache redis curl jq
      
      echo "🚀 Starting Excalidraw Export Monitor..."
      
      # 스크립트 디렉토리 생성
      mkdir -p /exports /app
      
      while true; do
        echo "📊 Checking for new/updated scenes..."
        
        # Redis에서 모든 scenes 키 가져오기
        SCENE_KEYS=$(redis-cli -h redis -p 6379 KEYS "scenes:*" 2>/dev/null || echo "")
        
        if [ -n "$SCENE_KEYS" ] && [ "$SCENE_KEYS" != "(empty array)" ]; then
          echo "$SCENE_KEYS" | while read -r key; do
            if [ -n "$key" ]; then
              # Scene ID 추출
              SCENE_ID=$(echo "$key" | sed "s/scenes://")
              
              # Redis에서 데이터 가져오기
              SCENE_DATA=$(redis-cli -h redis -p 6379 GET "$key" 2>/dev/null || echo "")
              
              if [ -n "$SCENE_DATA" ] && [ "$SCENE_DATA" != "(nil)" ]; then
                # 타임스탬프 생성
                TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                FILENAME="excalidraw-$SCENE_ID-$TIMESTAMP.excalidraw"
                FILEPATH="/exports/$FILENAME"
                
                # 기존 파일이 있는지 확인 (중복 방지)
                if ! ls /exports/excalidraw-$SCENE_ID-*.excalidraw >/dev/null 2>&1; then
                  echo "📝 Creating new file for scene: $SCENE_ID"
                  
                  # JSON 데이터 파싱 및 Excalidraw 형식으로 변환
                  echo "$SCENE_DATA" | jq "{
                    type: \"excalidraw\",
                    version: 2,
                    source: \"https://excalidraw.com\",
                    elements: (.elements // []),
                    appState: (.appState // {}),
                    files: (.files // {})
                  }" > "$FILEPATH" 2>/dev/null
                  
                  if [ -f "$FILEPATH" ]; then
                    echo "✅ Successfully exported: $FILENAME"
                    chmod 644 "$FILEPATH"
                  else
                    echo "❌ Failed to export scene: $SCENE_ID"
                  fi
                fi
              fi
            fi
          done
        else
          echo "No scenes found in Redis"
        fi
        
        echo "💤 Waiting 60 seconds before next check..."
        sleep 60
      done
      '


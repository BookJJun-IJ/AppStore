    zh_cn: 基于 alswl 原始实现的具有协作功能和服务器存储的 Excalidraw。支持实时协作和导出到链接功能。
    fr_fr: Excalidraw avec fonctionnalités de collaboration et stockage serveur basé sur l'implémentation originale d'alswl. Prend en charge la collaboration en temps réel et la fonctionnalité d'exportation vers un lien.
    es_es: Excalidraw con funciones de colaboración y almacenamiento en servidor basado en la implementación original de alswl. Compatible con colaboración en tiempo real y funcionalidad de exportar a enlace.
  developer: alswl + CasaOS Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:

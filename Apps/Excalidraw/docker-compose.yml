name: excalidraw

services:
  excalidraw:
    # 멀티 아키텍처 지원 이미지 (비공식)
    image: ghcr.io/a-bouts/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
    volumes:
      - /DATA/AppData/$AppID/config:/tmp/excalidraw-config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Excalidraw is a virtual collaborative whiteboard tool that lets you easily sketch diagrams that have a hand-drawn feel to them. It's designed to be simple, intuitive, and to allow rapid collaboration. Perfect for creating wireframes, diagrams, flowcharts, and visual brainstorming.
  developer: Excalidraw Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Virtual whiteboard for sketching hand-drawn like diagrams
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **Multi-Architecture Support**
        
        This version uses a community-maintained image that supports both AMD64 and ARM64 architectures.
        
        **Note:** This is not the official Excalidraw image, but it's built from the same source code.
  index: /
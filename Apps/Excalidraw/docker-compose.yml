name: excalidraw

services:
  redis:
    image: redis:7-alpine
    container_name: excalidraw-redis
    restart: unless-stopped
    user: "0:0"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    volumes:
      - /DATA/AppData/$AppID/redis:/data
    command: "redis-server --appendonly yes --dir /data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  storage:
    image: kiliandeca/excalidraw-storage-backend:latest
    platform: linux/amd64
    container_name: excalidraw-storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    environment:
      - PORT=8081
      - STORAGE_URI=redis://excalidraw-redis:6379
      - LOG_LEVEL=info
      - GLOBAL_PREFIX=/api/v2
      - CORS_ORIGIN=*
    expose:
      - 8081
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  room:
    image: excalidraw/excalidraw-room:sha-49bf529
    platform: linux/amd64
    container_name: excalidraw-room
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
    expose:
      - 80

  excalidraw:
    image: alswl/excalidraw:v0.17.3-fork-b1
    platform: linux/amd64
    user: "0:0"
    container_name: excalidraw-main
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    expose:
      - 80
    environment:
      - TZ=$TZ
      - DOMAIN=$domain
      # 🔑 핵심: 서버 저장을 위한 올바른 설정
      - VITE_APP_BACKEND_V2_GET_URL=https://8081-excalidraw-$domain/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=https://8081-excalidraw-$domain/api/v2/scenes/
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://8081-excalidraw-$domain/api/v2
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_WS_SERVER_URL=ws://excalidraw-room:80
      - VITE_APP_FIREBASE_CONFIG={}
    depends_on:
      storage:
        condition: service_healthy
      room:
        condition: service_started

x-casaos:
  architectures:
    - amd64
    - arm64
  main: excalidraw
  webui_port: 80
  author: CasaOS Team
  category: Productivity
  description:
    en_us: Excalidraw with built-in server storage - automatically saves drawings to server using "Export to Link" button. No additional setup required.
    ko_kr: 내장 서버 저장 기능을 갖춘 Excalidraw - "링크로 내보내기" 버튼으로 자동으로 서버에 그림을 저장합니다. 추가 설정이 필요하지 않습니다.
    zh_cn: 具有内置服务器存储功能的 Excalidraw - 使用"导出到链接"按钮自动将绘图保存到服务器。无需额外设置。
    fr_fr: Excalidraw avec stockage serveur intégré - sauvegarde automatiquement les dessins sur le serveur à l'aide du bouton "Exporter vers un lien". Aucune configuration supplémentaire requise.
    es_es: Excalidraw con almacenamiento de servidor integrado - guarda automáticamente los dibujos en el servidor usando el botón "Exportar a enlace". No se requiere configuración adicional.
  developer: Excalidraw Team + alswl Fork
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/screenshot-1.png
  tagline:
    en_us: Collaborative whiteboard with built-in server storage
    ko_kr: 내장 서버 저장 기능을 갖춘 협업 화이트보드
    zh_cn: 具有内置服务器存储的协作白板
    fr_fr: Tableau blanc collaboratif avec stockage serveur intégré
    es_es: Pizarra colaborativa con almacenamiento de servidor integrado
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Excalidraw/thumbnail.png
  title:
    en_us: Excalidraw Enhanced
  tips:
    before_install:
      en_us: |
        **🎨 Excalidraw Enhanced - 내장 서버 저장 완벽 지원!**
        
        **✅ 자동 서버 저장 기능:**
        - "Export to Link" 버튼 클릭 → 자동으로 서버에 저장 ✅
        - Redis에 데이터 영구 보관 ✅
        - 공유 링크로 언제든 접근 가능 ✅
        - 실시간 협업 지원 ✅
        
        **🔧 사용법 (매우 간단!):**
        1. Excalidraw에서 그림 그리기
        2. **"Export to Link" 버튼 클릭**
        3. 생성된 링크 복사 → 서버에 영구 저장됨!
        4. 링크를 다른 사람과 공유하거나 나중에 접속
        
        **🌐 접근 URL:**
        - 메인 앱: `https://excalidraw-$domain/`
        - Storage API: `https://8081-excalidraw-$domain/`
        
        **💾 저장 방식:**
        - Redis 데이터베이스에 영구 저장
        - 공유 링크 형태로 접근
        - 브라우저 독립적 (어디서든 접근 가능)
        
        **🚀 복잡한 설정 불필요! 설치 후 바로 사용!**
        
        **💡 추가 팁:**
        - "Export to Link" = 서버 저장
        - "Save to disk" = 로컬 다운로드 (.excalidraw 파일)
        - 둘 다 사용 가능합니다!
      ko_kr: |
        **🎨 Excalidraw Enhanced - 진짜 서버 저장!**
        
        **🤦‍♂️ 우리가 놓친 것:**
        Excalidraw에 이미 서버 저장 기능이 있었습니다!
        
        **✅ 내장 기능:**
        - "링크로 내보내기" 버튼 → 서버 저장
        - Redis에 데이터 영구 보관
        - 공유 링크로 언제든 접근
        - 실시간 협업 지원
        
        **🔧 사용법:**
        1. 그림 그리기
        2. "링크로 내보내기" 클릭
        3. 링크 복사 → 서버 저장 완료!
        
        **🚀 북마클릿이나 복잡한 설정 필요 없음!**
  index: /
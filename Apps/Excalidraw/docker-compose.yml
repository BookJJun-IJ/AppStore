  title:
    en_us: Excalidraw
  tips:
    before_install:
      en_us: |
        **🔥 PatWie Excalidraw-Complete - 완벽한 올인원 솔루션!**
        
        **✅ 주요 기능:**
        - ✅ **실제 .excalidraw 파일 저장** (filesystem 방식)
        - ✅ **실시간 협업** (여러 명이 동시 편집)
        - ✅ **단일 바이너리** (모든 기능 통합)
        - ✅ **파일 관리** (브라우저에서 직접 접근)
        - ✅ **백업 용이** (표준 파일 형태)
        
        **📁 파일 저장 위치:**
        ```
        /DATA/Documents/Excalidraw/
        ├── project-1.excalidraw       # 실제 파일로 저장
        ├── collaboration.excalidraw   # 협업 결과
        └── diagrams/                  # 폴더 구조 가능
        ```
        
        **🌐 접근 방법:**
        - **웹 UI**: `https://excalidraw-{사용자명}.nsl.sh/`
        - **파일 접근**: SSH/SFTP로 직접 관리 가능
        
        **🤝 사용 방법:**
        
        **개인 작업:**
        1. 새 다이어그램 생성
        2. 작업 완료 → 저장
        3. 실제 .excalidraw 파일 생성
        4. 언제든 다시 열어서 편집
        
        **팀 협업:**
        1. 팀원들이 동시 접속
        2. 실시간으로 함께 편집
        3. 협업 결과를 파일로 저장
        4. 모든 팀원이 파일 공유
        
        **💾 파일 관리:**
        - **백업**: 표준 파일이므로 쉽게 백업
        - **버전 관리**: Git으로 버전 관리 가능
        - **이동**: 다른 Excalidraw에서도 호환
        - **공유**: 파일을 직접 공유 가능
        
        **⚡ 설치 후 즉시 사용 가능:**
        - 첫 실행시 자동으로 바이너리 다운로드
        - 아키텍처 자동 감지 (amd64/arm64)
        - 압축 해제 및 권한 설정 자동화
        
        **🎯 PatWie의 장점:**
        | 기능 | 기존 솔루션 | 🔥 PatWie |
        |------|-------------|----------|
        | 파일 저장 | 일부만 | ✅ 완전 |
        | 실시간 협업 | 일부만 | ✅ 완전 |
        | 단일 솔루션 | ❌ | ✅ |
        | 설치 편의성 | 복잡 | ✅ 간단 |
        | 권한 문제 | 자주 발생 | ✅ 해결 |
        
        **🚀 완벽한 Excalidraw 경험을 즐기세요!**

name: ollama

services:
  ollama:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: ollama
    restart: unless-stopped
    user: 0:0
    depends_on:
      - ollama-api
    expose:
      - 8080
    labels:
      caddy_0: ollama-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8080}}"
      caddy_1: ollama-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 8080}}"
      caddy_2: ollama-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 8080}}"
    environment:
      OLLAMA_BASE_URL: http://ollama-api:11434
      WEBUI_AUTH: "false"
    volumes:
      - /DATA/AppData/$AppID/webui/:/app/backend/data
    networks:
      - pcs
    cpu_shares: 50
    deploy:
      resources:
        limits:
          memory: 1G

  ollama-api:
    image: ollama/ollama:0.20.3
    container_name: ollama-api
    restart: unless-stopped
    user: 0:0
    expose:
      - 11434
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - /DATA/AppData/$AppID/data/:/root/.ollama
    networks:
      - pcs
    cpu_shares: 80
    deploy:
      resources:
        limits:
          memory: 8G

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  main: ollama
  store_app_id: ollama
  webui_port: 8080
  index: /
  pre-install-cmd: |
    mkdir -p /DATA/AppData/ollama/data &&
    mkdir -p /DATA/AppData/ollama/webui
  architectures:
    - amd64
    - arm64
  author: Yundera Team
  category: AI
  developer: Ollama & Open WebUI
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Ollama/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Ollama/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Ollama/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Ollama/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Ollama/thumbnail.png
  title:
    en_us: Ollama
  tagline:
    en_us: Run Google Gemma 4 AI models locally with a chat interface
    ko_kr: Google Gemma 4 AI 모델을 로컬에서 실행하세요
    zh_cn: 在本地运行Google Gemma 4 AI模型
    fr_fr: Exécutez les modèles IA Google Gemma 4 localement
    es_es: Ejecuta modelos de IA Google Gemma 4 localmente
  description:
    en_us: |
      Run powerful AI models directly on your server with no cloud dependency. Ollama with Open WebUI gives you a ChatGPT-like experience, completely private and under your control.

      **Key features:**
      • Run Google Gemma 4 models locally — from ultra-light E2B (4GB) to powerful 26B MoE
      • Beautiful chat interface similar to ChatGPT
      • Multimodal support — chat with text and images
      • Conversation history saved locally
      • No API keys or subscriptions needed

      **Perfect for:** Anyone who wants to use AI chatbots with complete privacy on low-resource devices.
    ko_kr: |
      클라우드 없이 서버에서 직접 강력한 AI 모델을 실행하세요. Ollama와 Open WebUI는 완전히 비공개로 제어할 수 있는 ChatGPT 같은 경험을 제공합니다.

      **주요 기능:**
      • Google Gemma 4 모델을 로컬에서 실행 — 초경량 E2B(4GB)부터 강력한 26B MoE까지
      • ChatGPT와 유사한 아름다운 채팅 인터페이스
      • 멀티모달 지원 — 텍스트와 이미지로 대화
      • 대화 기록이 로컬에 저장
      • API 키나 구독 불필요

      **이런 분께 완벽해요:** 저사양 기기에서 완전한 프라이버시로 AI 챗봇을 사용하고 싶은 분.
    zh_cn: |
      无需依赖云端，直接在服务器上运行强大的AI模型。Ollama搭配Open WebUI为您提供类似ChatGPT的体验，完全私密且由您掌控。

      **主要功能：**
      • 本地运行Google Gemma 4模型 — 从超轻量E2B(4GB)到强大的26B MoE
      • 类似ChatGPT的精美聊天界面
      • 多模态支持 — 文本和图像对话
      • 对话记录本地保存
      • 无需API密钥或订阅
    fr_fr: |
      Exécutez des modèles IA puissants directement sur votre serveur sans dépendance cloud. Ollama avec Open WebUI vous offre une expérience similaire à ChatGPT, entièrement privée et sous votre contrôle.

      **Fonctionnalités clés :**
      • Exécutez les modèles Google Gemma 4 localement — de l'ultra-léger E2B (4Go) au puissant 26B MoE
      • Belle interface de chat similaire à ChatGPT
      • Support multimodal — discutez avec du texte et des images
      • Historique des conversations sauvegardé localement
      • Aucune clé API ou abonnement nécessaire
    es_es: |
      Ejecuta modelos de IA potentes directamente en tu servidor sin depender de la nube. Ollama con Open WebUI te ofrece una experiencia similar a ChatGPT, completamente privada y bajo tu control.

      **Características clave:**
      • Ejecuta modelos Google Gemma 4 localmente — desde el ultraligero E2B (4GB) hasta el potente 26B MoE
      • Hermosa interfaz de chat similar a ChatGPT
      • Soporte multimodal — chatea con texto e imágenes
      • Historial de conversaciones guardado localmente
      • Sin necesidad de claves API ni suscripciones
  tips:
    before_install:
      en_us: |
        **Getting Started**

        No login required — the app is ready to use immediately.

        **How to use:**
        1. Open the app
        2. Click the model selector and download a model (e.g. `llama3.2`)
        3. Start chatting!

        **Recommended Gemma 4 models:**
        | Model | Size | RAM | Best for |
        | ----- | ---- | --- | -------- |
        | `gemma4:e2b` | ~1.5GB | 4GB | Ultra-light, fast chat |
        | `gemma4:e4b` | ~2.5GB | 6GB | Better quality, multimodal |
        | `gemma4:26b-a4b` | ~15GB | 18GB | Advanced reasoning (MoE) |

        **Note:** We recommend starting with `gemma4:e2b` for low-resource devices. First model download may take a few minutes.
      ko_kr: |
        **시작하기**

        로그인 불필요 — 바로 사용할 수 있습니다.

        **사용 방법:**
        1. 앱 열기
        2. 모델 선택기를 클릭하고 모델 다운로드 (예: `llama3.2`)
        3. 대화 시작!

        **추천 Gemma 4 모델:**
        | 모델 | 크기 | RAM | 용도 |
        | ---- | ---- | --- | ---- |
        | `gemma4:e2b` | ~1.5GB | 4GB | 초경량, 빠른 대화 |
        | `gemma4:e4b` | ~2.5GB | 6GB | 더 좋은 품질, 멀티모달 |
        | `gemma4:26b-a4b` | ~15GB | 18GB | 고급 추론 (MoE) |

        **참고:** 저사양 기기에서는 `gemma4:e2b`를 추천합니다. 첫 모델 다운로드는 몇 분 걸릴 수 있습니다.

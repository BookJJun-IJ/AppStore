name: plausible

services:
  plausible-db:
    image: postgres:16-alpine
    container_name: plausible-db
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: plausible
      POSTGRES_DB: plausible
      TZ: $TZ
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m
    networks:
      - plausible-network
    deploy:
      resources:
        reservations:
          memory: "256M"
    cpu_shares: 50
    security_opt:
      - no-new-privileges:true

  plausible-events-db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: plausible-events-db
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/clickhouse:/var/lib/clickhouse
      - /DATA/AppData/$AppID/clickhouse-logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
      TZ: $TZ
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m
    networks:
      - plausible-network
    deploy:
      resources:
        reservations:
          memory: "512M"
    cpu_shares: 50
    security_opt:
      - no-new-privileges:true

  plausible:
    image: ghcr.io/plausible/community-edition:v3.1.0
    container_name: plausible
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events-db:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      BASE_URL: https://$PCS_DOMAIN
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-GLVzDZW04FzuS1gMcmBRVhwgd4Gu9YmSl_k_TqfTUXti7FLBd7aflXeQDdwCj6Cz}
      TOTP_VAULT_KEY: ${TOTP_VAULT_KEY:-dsxvbn3jxDd16az2QpsX5B8O_llxjQ2SJE2i5Bzx38I}
      DATABASE_URL: postgres://plausible:plausible@plausible-db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events_db
      DISABLE_REGISTRATION: "invite_only"
      TZ: $TZ
    networks:
      - plausible-network
    deploy:
      resources:
        reservations:
          memory: "512M"
    cpu_shares: 70
    security_opt:
      - no-new-privileges:true

networks:
  plausible-network:
    driver: bridge

x-casaos:
  author: Yundera Team
  category: Analytics
  hostname: plausible
  description:
    en_us: |
      Plausible Analytics is an intuitive, lightweight, and open source web analytics tool. No cookies and fully compliant with GDPR, CCPA and PECR. Made and hosted in the EU 🇪🇺
      
      **Key Features:**
      - Lightweight script (< 1 KB) that doesn't slow down your website
      - No cookies and fully privacy-friendly analytics
      - All visitor data is exclusively processed with servers owned and operated by Plausible Analytics
      - Simple, easy to understand dashboard with all the key metrics on one page
      - Event tracking and custom goal conversions
      - Search console integration for keyword insights
      - 100% data ownership - you own all of your website data
    ko_kr: |
      Plausible Analytics는 직관적이고 가볍고 오픈 소스인 웹 분석 도구입니다. 쿠키를 사용하지 않으며 GDPR, CCPA 및 PECR을 완벽하게 준수합니다. EU 🇪🇺에서 제작 및 호스팅됩니다.
      
      **주요 기능:**
      - 웹사이트 속도를 늦추지 않는 경량 스크립트 (< 1 KB)
      - 쿠키 없이 완벽한 프라이버시 친화적 분석
      - 모든 방문자 데이터는 Plausible Analytics가 소유하고 운영하는 서버에서만 처리
      - 한 페이지에 모든 핵심 지표가 있는 간단하고 이해하기 쉬운 대시보드
      - 이벤트 추적 및 맞춤 목표 전환
      - 키워드 인사이트를 위한 검색 콘솔 통합
      - 100% 데이터 소유권 - 웹사이트 데이터를 완전히 소유
    zh_cn: |
      Plausible Analytics 是一个直观、轻量级和开源的网络分析工具。无需 Cookie，完全符合 GDPR、CCPA 和 PECR。在欧盟 🇪🇺 制造和托管。
      
      **主要功能:**
      - 不会降低网站速度的轻量级脚本（< 1 KB）
      - 无 Cookie 且完全隐私友好的分析
      - 所有访问者数据仅在 Plausible Analytics 拥有和运营的服务器上处理
      - 简单易懂的仪表板，所有关键指标都在一个页面上
      - 事件跟踪和自定义目标转换
      - 搜索控制台集成以获取关键词洞察
      - 100% 数据所有权 - 您完全拥有您的网站数据
    es_es: |
      Plausible Analytics es una herramienta de análisis web intuitiva, ligera y de código abierto. Sin cookies y totalmente conforme con GDPR, CCPA y PECR. Hecho y alojado en la UE 🇪🇺
      
      **Características principales:**
      - Script ligero (< 1 KB) que no ralentiza tu sitio web
      - Sin cookies y análisis totalmente respetuosos con la privacidad
      - Todos los datos de visitantes se procesan exclusivamente en servidores propiedad y operados por Plausible Analytics
      - Panel simple y fácil de entender con todas las métricas clave en una página
      - Seguimiento de eventos y conversiones de objetivos personalizados
      - Integración con Search Console para información de palabras clave
      - 100% de propiedad de datos - eres dueño de todos tus datos del sitio web
    fr_fr: |
      Plausible Analytics est un outil d'analyse web intuitif, léger et open source. Sans cookies et entièrement conforme au RGPD, CCPA et PECR. Fabriqué et hébergé dans l'UE 🇪🇺
      
      **Fonctionnalités principales:**
      - Script léger (< 1 KB) qui ne ralentit pas votre site web
      - Sans cookies et analyses totalement respectueuses de la vie privée
      - Toutes les données des visiteurs sont traitées exclusivement sur des serveurs détenus et exploités par Plausible Analytics
      - Tableau de bord simple et facile à comprendre avec toutes les métriques clés sur une page
      - Suivi des événements et conversions d'objectifs personnalisés
      - Intégration de la console de recherche pour les informations sur les mots-clés
      - 100% de propriété des données - vous possédez toutes vos données de site web

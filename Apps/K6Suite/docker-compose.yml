name: k6performancesuite

services:
  influxdb:
    image: influxdb:1.8.10
    user: $PUID:$PGID
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/influxdb-data:/var/lib/influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:11.3.1
    user: $PUID:$PGID
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: $default_pwd
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-k6-app
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/grafana-data:/var/lib/grafana
    expose:
      - 3000
    depends_on:
      - influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  k6:
    image: grafana/k6:0.54.0
    user: $PUID:$PGID
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /DATA/AppData/$AppID/k6-scripts:/scripts
      - /DATA/AppData/$AppID/results:/results
    working_dir: /scripts
    command: tail -f /dev/null
    depends_on:
      - influxdb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: grafana
  author: Yundera Community
  category: Utilities
  description:
    en_us: |
      K6 Performance Testing Suite with Grafana analytics. Test your server's 
      performance with professional load testing tools. Includes pre-configured 
      Grafana dashboards for real-time monitoring and InfluxDB for data storage.
      
      Run tests via SSH: docker exec k6performancesuite-k6-1 k6 run script.js
    ko_kr: |
      Grafana 분석이 포함된 K6 성능 테스트 도구입니다. 전문적인 부하 테스트 
      도구로 서버 성능을 테스트하세요. 실시간 모니터링을 위한 사전 구성된 
      Grafana 대시보드와 데이터 저장을 위한 InfluxDB가 포함되어 있습니다.
      
      SSH로 테스트 실행: docker exec k6performancesuite-k6-1 k6 run script.js
  developer: Grafana Labs
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/K6PerformanceSuite/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/K6PerformanceSuite/screenshot-1.png
  tagline:
    en_us: "Professional performance testing with Grafana analytics"
    ko_kr: "Grafana 분석이 포함된 전문 성능 테스트"
  title:
    en_us: K6 Performance Suite
    ko_kr: K6 성능 테스트 도구
  tips:
    before_install:
      en_us: |
        **K6 Performance Testing Suite**
        
        **Login:**
        - Grafana: admin / $default_pwd
        
        **Access:**
        - Grafana: https://k6performancesuite-username.nsl.sh/
        
        **Usage:**
        ```bash
        # Run test via SSH
        docker exec k6performancesuite-k6-1 k6 run /scripts/test.js
        
        # Upload test scripts to /DATA/AppData/k6performancesuite/k6-scripts/
        ```
        
        View results in Grafana dashboard with K6 plugin pre-installed.
      ko_kr: |
        **K6 성능 테스트 도구**
        
        **로그인:**
        - Grafana: admin / $default_pwd
        
        **접속:**
        - Grafana: https://k6performancesuite-username.nsl.sh/
        
        **사용법:**
        ```bash
        # SSH로 테스트 실행
        docker exec k6performancesuite-k6-1 k6 run /scripts/test.js
        
        # 테스트 스크립트를 업로드: /DATA/AppData/k6performancesuite/k6-scripts/
        ```
        
        K6 플러그인이 사전 설치된 Grafana 대시보드에서 결과를 확인하세요.
  index: /
  webui_port: 3000
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/k6performancesuite:/setup alpine:3.19 sh -c "
      mkdir -p /setup/{grafana-data,influxdb-data,k6-scripts,results}
      echo 'import http from \"k6/http\"; export default function() { http.get(\"https://httpbin.org/get\"); }' > /setup/k6-scripts/example.js
      chown -R 1000:1000 /setup
    "
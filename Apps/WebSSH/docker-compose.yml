name: webssh

services:
  webssh:
    image: jroesler/webssh2:latest
    user: $PUID:$PGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/config:/app/config
      - /DATA/AppData/$AppID/keys:/app/keys
    expose:
      - 2222
    restart: unless-stopped
    command: >
      sh -c "
        # Create directories
        mkdir -p /app/config /app/keys &&
        
        # Create SSH keys directory structure
        mkdir -p /app/keys/private /app/keys/public &&
        
        # Create README for SSH keys
        if [ ! -f /app/keys/README.md ]; then
          cat > /app/keys/README.md << 'EOF'
        # SSH Keys Directory
        
        ## Usage
        1. Place your private SSH keys in /app/keys/private/
        2. Set proper permissions: chmod 600 private/key_name
        
        ## Quick SSH Commands
        - Connect to CasaOS: ssh user@your-casaos-server
        - Check containers: docker ps
        - Access benchmark: docker exec -it yundera-benchmark-phoronix-pts-1 sh
        EOF
        fi &&
        
        # Set proper permissions
        chmod 755 /app/keys &&
        chmod 755 /app/keys/private /app/keys/public &&
        
        # Start WebSSH2 (it runs on port 2222 by default)
        node index.js
      "

x-casaos:
  architectures:
    - amd64
    - arm64
  main: webssh
  webui_port: 2222
  category: Developer
  author: Yundera Team
  description:
    en_us: "Web-based SSH client for secure remote server access. Connect to CasaOS servers and other Linux systems directly from your browser. Perfect for managing Yundera benchmark tools, Docker containers, and system administration. Supports SSH key authentication and secure terminal sessions."
    fr_fr: "Client SSH basé sur le web pour un accès sécurisé aux serveurs distants. Connectez-vous aux serveurs CasaOS et autres systèmes Linux directement depuis votre navigateur. Parfait pour gérer les outils de benchmark Yundera, les conteneurs Docker et l'administration système."
    es_es: "Cliente SSH basado en web para acceso seguro a servidores remotos. Conéctese a servidores CasaOS y otros sistemas Linux directamente desde su navegador. Perfecto para gestionar herramientas de benchmark Yundera, contenedores Docker y administración del sistema."
    zh_cn: "基于Web的SSH客户端，用于安全的远程服务器访问。直接从浏览器连接到CasaOS服务器和其他Linux系统。非常适合管理Yundera基准测试工具、Docker容器和系统管理。"
  developer: Yundera Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WebSSH/icon.png
  tagline:
    en_us: "Browser-based SSH client for server management"
    fr_fr: "Client SSH basé sur navigateur pour la gestion de serveurs"
    es_es: "Cliente SSH basado en navegador para gestión de servidores"
    zh_cn: "基于浏览器的SSH客户端用于服务器管理"
  title:
    en_us: WebSSH Client
    fr_fr: Client WebSSH
    es_es: Cliente WebSSH
    zh_cn: WebSSH客户端
  tips:
    before_install:
      en_us: |
        **Web-Based SSH Client**
        
        Access your servers directly from your browser!
        
        **After Installation:**
        1. Access via web UI (port 2222)
        2. Enter server details (hostname, username, password/key)
        3. Connect and manage your systems
        
        **Common Commands for Yundera:**
        ```bash
        # Test benchmark tools
        docker exec yundera-benchmark-phoronix-pts-1 /app/run-benchmark.sh
        
        # Check containers
        docker ps
        
        # System monitoring
        htop
        df -h
        ```
        
        **SSH Key Setup:**
        - Upload keys to `/DATA/AppData/webssh/keys/private/`
        - Set permissions: `chmod 600 keyfile`
        - Use for secure authentication
        **Getting Started:**

        After installation, create a config file at `/DATA/AppData/gatus/config/config.yaml`:

        ```yaml
        storage:
          type: sqlite
          path: /data/data.db

        endpoints:
          - name: Website
            group: core
            url: "https://yundera.com"
            interval: 5m
            conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
        ```

        **Monitor Types:** HTTP(s), TCP, ICMP, DNS, WebSocket, SSH, TLS
        **Alerting:** Slack, Discord, Telegram, PagerDuty, Email, and more

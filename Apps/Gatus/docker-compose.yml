  description:
    en_us: |
      **Automated service monitoring with beautiful status pages**

      Gatus is a developer-oriented health dashboard that monitors your services using HTTP, TCP, ICMP, DNS, and more. Get alerted when something goes wrong and share beautiful status pages with your team.

      **Key Features:**
      - HTTP(s), TCP, ICMP, DNS, WebSocket, SSH monitoring
      - Customizable conditions (status code, response time, body, certificate expiry)
      - Alerting via Slack, Discord, Telegram, PagerDuty, Email, and more
      - Beautiful status page with incident support
      - Lightweight and fast (built with Go)
      - YAML-based configuration

      **Perfect for:** Developers and teams who want a lightweight, configuration-driven monitoring solution with public status pages.
    ko_kr: |
      **아름다운 상태 페이지와 함께하는 자동 서비스 모니터링**

      Gatus는 HTTP, TCP, ICMP, DNS 등을 사용하여 서비스를 모니터링하는 개발자 지향 헬스 대시보드입니다. 문제가 발생하면 알림을 받고, 아름다운 상태 페이지를 팀과 공유하세요.

      **주요 기능:**
      - HTTP(s), TCP, ICMP, DNS, WebSocket, SSH 모니터링
      - 맞춤형 조건 (상태 코드, 응답 시간, 본문, 인증서 만료)
      - Slack, Discord, Telegram, PagerDuty, 이메일 등으로 알림
      - 인시던트 지원이 있는 아름다운 상태 페이지
      - 가볍고 빠름 (Go로 제작)
      - YAML 기반 설정

      **이런 분께 완벽해요:** 가벼운 설정 기반 모니터링 솔루션과 공개 상태 페이지를 원하는 개발자와 팀.
    zh_cn: |
      **带有精美状态页面的自动化服务监控**

      Gatus 是一个面向开发者的健康仪表板，使用 HTTP、TCP、ICMP、DNS 等监控您的服务。当出现问题时获取警报，并与团队共享精美的状态页面。

      **主要功能：**
      - HTTP(s)、TCP、ICMP、DNS、WebSocket、SSH 监控
      - 可自定义条件（状态码、响应时间、正文、证书到期）
      - 通过 Slack、Discord、Telegram、PagerDuty、邮件等发送警报
      - 带有事件支持的精美状态页面
      - 轻量且快速（使用 Go 构建）
      - 基于 YAML 的配置

      **非常适合：** 需要轻量级、配置驱动的监控解决方案和公开状态页面的开发者和团队。
    fr_fr: |
      **Surveillance automatisée des services avec de belles pages de statut**

      Gatus est un tableau de bord de santé orienté développeurs qui surveille vos services via HTTP, TCP, ICMP, DNS et plus encore. Recevez des alertes en cas de problème et partagez de belles pages de statut avec votre équipe.

      **Fonctionnalités principales :**
      - Surveillance HTTP(s), TCP, ICMP, DNS, WebSocket, SSH
      - Conditions personnalisables (code de statut, temps de réponse, corps, expiration du certificat)
      - Alertes via Slack, Discord, Telegram, PagerDuty, e-mail et plus
      - Belle page de statut avec support des incidents
      - Léger et rapide (construit en Go)
      - Configuration basée sur YAML

      **Parfait pour :** Les développeurs et équipes recherchant une solution de surveillance légère et configurable avec des pages de statut publiques.
    es_es: |
      **Monitoreo automatizado de servicios con hermosas páginas de estado**

      Gatus es un panel de salud orientado a desarrolladores que monitorea sus servicios usando HTTP, TCP, ICMP, DNS y más. Reciba alertas cuando algo falle y comparta hermosas páginas de estado con su equipo.

      **Características principales:**
      - Monitoreo HTTP(s), TCP, ICMP, DNS, WebSocket, SSH
      - Condiciones personalizables (código de estado, tiempo de respuesta, cuerpo, expiración de certificado)
      - Alertas vía Slack, Discord, Telegram, PagerDuty, correo y más
      - Hermosa página de estado con soporte de incidentes
      - Ligero y rápido (construido con Go)
      - Configuración basada en YAML

      **Perfecto para:** Desarrolladores y equipos que buscan una solución de monitoreo ligera y configurable con páginas de estado públicas.

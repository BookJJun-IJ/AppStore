name: gatus

services:
  gatus-init:
    image: alpine:3.21
    container_name: gatus-init
    user: "0:0"
    restart: "no"
    volumes:
      - /DATA/AppData/$AppID/config/:/config
      - /DATA/AppData/$AppID/data/:/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /config /data
        if [ ! -f /config/config.yaml ]; then
        cat > /config/config.yaml << 'ENDOFCONFIG'
        web:
          port: 8080

        storage:
          type: sqlite
          path: /data/data.db

        endpoints:
          - name: Example
            url: "https://example.com"
            interval: 5m
            conditions:
              - "[STATUS] == 200"
        ENDOFCONFIG
        echo "Default config created."
        else
        echo "Config already exists."
        fi

  gatus:
    image: twinproduction/gatus:v5.35.0
    container_name: gatus
    restart: unless-stopped
    user: "0:0"
    depends_on:
      gatus-init:
        condition: service_completed_successfully
    networks:
      - pcs
    expose:
      - "8080"
    labels:
      - "caddy=gatus-${APP_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 8080}}"
    volumes:
      - /DATA/AppData/$AppID/config/:/config
      - /DATA/AppData/$AppID/data/:/data
    environment:
      TZ: $TZ
      GATUS_CONFIG_PATH: /config/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    cpu_shares: 90

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: gatus
  webui_port: 8080

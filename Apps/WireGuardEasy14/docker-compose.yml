name: wgeasy14

services:
  wgeasy14:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wgeasy14
    restart: unless-stopped
    user: "0:0"
    labels:
      caddy_0: wgeasy14-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 51821}}"
      caddy_1: wgeasy14-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 51821}}"
      caddy_2: wgeasy14-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 51821}}"
    networks:
      - pcs
    environment:
      PASSWORD: $PCS_DEFAULT_PASSWORD
      WG_HOST: $PCS_PUBLIC_IP
      WG_PORT: '51820'
      WG_DEFAULT_DNS: '9.9.9.9'
    expose:
      - 51821
    ports:
      - target: 51820
        published: 51820
        protocol: udp
    volumes:
      - /DATA/AppData/$AppID/wireguard:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    cpu_shares: 50

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  main: wgeasy14
  store_app_id: wgeasy14
  webui_port: 51821
  index: /
  developer: WeejeWel
  author: Yundera Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasy14/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasy14/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasy14/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasy14/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/WireGuardEasy14/screenshot-3.png
  category: Network
  title:
    en_us: WireGuard Easy (v14)
  tagline:
    en_us: Simple web UI to manage WireGuard VPN (v14)
    ko_kr: WireGuard VPN을 관리하는 간단한 웹 UI (v14)
    zh_cn: 管理 WireGuard VPN 的简单 Web UI (v14)
    fr_fr: Interface web simple pour gerer WireGuard VPN (v14)
    es_es: Interfaz web simple para gestionar WireGuard VPN (v14)
  description:
    en_us: |
      **The easiest way to install and manage WireGuard on any Linux host**

      WireGuard Easy v14 provides a simple web interface to create and manage WireGuard VPN connections. This is the legacy stable version with environment variable based configuration.

      **What you can do:**
      - Create and manage VPN clients with one click
      - Download client configs or scan QR codes
      - Monitor connected clients and bandwidth
      - Enable/disable clients instantly

      **Note:** This is the v14 (legacy) version. For the latest version with web UI based setup, use WireGuard Easy (v15).
    ko_kr: |
      **Linux 호스트에서 WireGuard를 설치하고 관리하는 가장 쉬운 방법**

      WireGuard Easy v14는 WireGuard VPN 연결을 생성하고 관리하는 간단한 웹 인터페이스를 제공합니다. 환경변수 기반 설정을 사용하는 레거시 안정 버전입니다.

      **할 수 있는 것:**
      - 한 번의 클릭으로 VPN 클라이언트 생성 및 관리
      - 클라이언트 설정 다운로드 또는 QR 코드 스캔
      - 연결된 클라이언트 및 대역폭 모니터링
      - 클라이언트 즉시 활성화/비활성화

      **참고:** v14 (레거시) 버전입니다. 웹 UI 기반 설정이 포함된 최신 버전은 WireGuard Easy (v15)를 사용하세요.
    zh_cn: |
      **在任何 Linux 主机上安装和管理 WireGuard 的最简单方法**

      WireGuard Easy v14 提供简单的 Web 界面来创建和管理 WireGuard VPN 连接。这是使用环境变量配置的旧版稳定版本。

      **您可以做的事:**
      - 一键创建和管理 VPN 客户端
      - 下载客户端配置或扫描二维码
      - 监控已连接的客户端和带宽
      - 即时启用/禁用客户端

      **注意:** 这是 v14（旧版）版本。如需使用 Web UI 设置的最新版本，请使用 WireGuard Easy (v15)。
    fr_fr: |
      **Le moyen le plus simple d'installer et de gerer WireGuard sur n'importe quel hote Linux**

      WireGuard Easy v14 fournit une interface web simple pour creer et gerer les connexions VPN WireGuard. C'est la version stable heritee avec configuration basee sur les variables d'environnement.

      **Ce que vous pouvez faire:**
      - Creer et gerer des clients VPN en un clic
      - Telecharger les configs ou scanner les QR codes
      - Surveiller les clients connectes et la bande passante
      - Activer/desactiver les clients instantanement

      **Remarque:** Ceci est la version v14 (heritee). Pour la derniere version avec configuration via l'interface web, utilisez WireGuard Easy (v15).
    es_es: |
      **La forma mas facil de instalar y gestionar WireGuard en cualquier host Linux**

      WireGuard Easy v14 proporciona una interfaz web simple para crear y gestionar conexiones VPN WireGuard. Esta es la version estable heredada con configuracion basada en variables de entorno.

      **Lo que puedes hacer:**
      - Crear y gestionar clientes VPN con un clic
      - Descargar configs de clientes o escanear codigos QR
      - Monitorear clientes conectados y ancho de banda
      - Activar/desactivar clientes al instante

      **Nota:** Esta es la version v14 (heredada). Para la ultima version con configuracion via interfaz web, use WireGuard Easy (v15).
  tips:
    before_install:
      en_us: |
        # Default Account

        | Password                |
        | ----------------------- |
        | `$PCS_DEFAULT_PASSWORD` |

        This is **WireGuard Easy v14** (legacy). The VPN listens on UDP port 51820. Make sure this port is open on your firewall/router.
      ko_kr: |
        # 기본 계정

        | 비밀번호                |
        | ----------------------- |
        | `$PCS_DEFAULT_PASSWORD` |

        **WireGuard Easy v14** (레거시) 버전입니다. VPN은 UDP 포트 51820에서 수신합니다. 방화벽/라우터에서 이 포트가 열려있는지 확인하세요.
      zh_cn: |
        # 默认账户

        | 密码                    |
        | ----------------------- |
        | `$PCS_DEFAULT_PASSWORD` |

        这是 **WireGuard Easy v14**（旧版）。VPN 监听 UDP 端口 51820。请确保防火墙/路由器上此端口已开放。
      fr_fr: |
        # Compte par defaut

        | Mot de passe            |
        | ----------------------- |
        | `$PCS_DEFAULT_PASSWORD` |

        Ceci est **WireGuard Easy v14** (herite). Le VPN ecoute sur le port UDP 51820. Assurez-vous que ce port est ouvert sur votre pare-feu/routeur.
      es_es: |
        # Cuenta predeterminada

        | Contrasena              |
        | ----------------------- |
        | `$PCS_DEFAULT_PASSWORD` |

        Esta es la version **WireGuard Easy v14** (heredada). La VPN escucha en el puerto UDP 51820. Asegurese de que este puerto este abierto en su firewall/router.

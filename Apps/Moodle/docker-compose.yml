name: moodle

services:
  mariadb:
    image: bitnami/mariadb:11.4
    container_name: moodle-mariadb
    environment:
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=$default_pwd
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_ROOT_PASSWORD=$default_pwd
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
      - ALLOW_EMPTY_PASSWORD=no
    volumes:
      - /DATA/AppData/$AppID/mariadb:/bitnami/mariadb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  moodle:
    image: bitnami/moodle:4.4
    container_name: moodle
    environment:
      - TZ=$TZ
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_DATABASE_PASSWORD=$default_pwd
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=$default_pwd
      - MOODLE_EMAIL=admin@example.com
      - MOODLE_SITE_NAME=Moodle
      - MOODLE_SKIP_BOOTSTRAP=no
      - ALLOW_EMPTY_PASSWORD=no
      - BITNAMI_DEBUG=false
    volumes:
      - /DATA/AppData/$AppID/moodle:/bitnami/moodle
      - /DATA/AppData/$AppID/moodledata:/bitnami/moodledata
    expose:
      - 8080
    depends_on:
      - mariadb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: moodle
  webui_port: 8080
  category: Education
  author: Bitnami
  developer: Moodle HQ
  title:
    en_us: Moodle
  tagline:
    en_us: Open Source Learning Management System
    fr_fr: Système de gestion de l'apprentissage open source
    ko_kr: 오픈소스 학습 관리 시스템
    zh_cn: 开源学习管理系统
    es_es: Sistema de gestión de aprendizaje de código abierto
  description:
    en_us: |
      Moodle is the world's most popular open source Learning Management System (LMS). 
      Perfect for schools, universities, and corporate training. Features include course management,
      assignment submission, grading, forums, quizzes, and comprehensive reporting.
    fr_fr: |
      Moodle est le système de gestion de l'apprentissage (LMS) open source le plus populaire au monde.
      Parfait pour les écoles, universités et la formation en entreprise.
    ko_kr: |
      Moodle은 세계에서 가장 인기 있는 오픈소스 학습 관리 시스템(LMS)입니다.
      학교, 대학, 기업 교육에 완벽합니다. 코스 관리, 과제 제출, 채점, 포럼, 퀴즈 및 포괄적인 보고 기능을 제공합니다.
    zh_cn: |
      Moodle是世界上最受欢迎的开源学习管理系统（LMS）。
      非常适合学校、大学和企业培训。功能包括课程管理、作业提交、评分、论坛、测验和综合报告。
    es_es: |
      Moodle es el sistema de gestión de aprendizaje (LMS) de código abierto más popular del mundo.
      Perfecto para escuelas, universidades y formación corporativa.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/thumbnail.png
  tips:
    before_install:
      en_us: |
        Default Admin Account
        | Username | Password |
        | -------- | -------- |
        | `admin`  | `$default_pwd` |
        
        Initial setup may take 3-5 minutes while Moodle configures the database.
  index: /
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/data busybox:latest sh -c "
    mkdir -p /data/mariadb/data /data/moodle /data/moodledata &&
    chown -R 1001:1001 /data/mariadb &&
    chown -R 1001:1001 /data/moodle &&
    chown -R 1001:1001 /data/moodledata &&
    chmod -R 775 /data/mariadb &&
    chmod -R 775 /data/moodle &&
    chmod -R 775 /data/moodledata
    "
    fr_fr: |
      Moodle est le système de gestion de l'apprentissage (LMS) open source le plus populaire au monde. Il fournit aux éducateurs des outils puissants pour créer des expériences d'apprentissage personnalisées et est utilisé par les universités, les écoles et les entreprises du monde entier.

      **Fonctionnalités clés:**
      - **Gestion des cours**: Créer et organiser des cours avec du contenu riche
      - **Gestion des utilisateurs**: Inscription des étudiants, groupes et permissions basées sur les rôles
      - **Outils d'évaluation**: Quiz, devoirs, notation et commentaires
      - **Communication**: Forums, messagerie, annonces et wikis
      - **Apprentissage mobile**: Design responsive et application mobile dédiée
      - **Analyse**: Suivi des progrès et rapports détaillés
      - **Extensible**: Plus de 1000 plugins et thèmes disponibles
      - **Conforme aux normes**: SCORM, LTI et normes d'accessibilité
    es_es: |
      Moodle es el Sistema de Gestión de Aprendizaje (LMS) de código abierto más popular del mundo. Proporciona a los educadores herramientas poderosas para crear experiencias de aprendizaje personalizadas y es utilizado por universidades, escuelas y corporaciones en todo el mundo.

      **Características principales:**
      - **Gestión de cursos**: Crear y organizar cursos con contenido rico
      - **Gestión de usuarios**: Inscripción de estudiantes, grupos y permisos basados en roles
      - **Herramientas de evaluación**: Cuestionarios, tareas, calificación y retroalimentación
      - **Comunicación**: Foros, mensajería, anuncios y wikis
      - **Aprendizaje móvil**: Diseño responsivo y aplicación móvil dedicada
      - **Análisis**: Seguimiento del progreso e informes detallados
      - **Extensible**: Más de 1000 plugins y temas disponibles
      - **Cumplimiento de estándares**: SCORM, LTI y estándares de accesibilidad
    zh_cn: |
      Moodle是世界上最受欢迎的开源学习管理系统(LMS)。它为教育工作者提供强大的工具来创建个性化的学习体验，被全世界的大学、学校和企业广泛使用。

      **主要功能：**
      - **课程管理**：创建和组织丰富内容的课程
      - **用户管理**：学生注册、分组和基于角色的权限
      - **评估工具**：测验、作业、评分和反馈
      - **交流工具**：论坛、消息、公告和Wiki
      - **移动学习**：响应式设计和专用移动应用
      - **分析功能**：进度跟踪和详细报告
      - **可扩展性**：1000多个插件和主题可用
      - **标准合规**：SCORM、LTI和可访问性标准

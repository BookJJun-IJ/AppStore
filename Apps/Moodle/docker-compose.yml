name: moodle
services:
  mariadb:
    image: mariadb:11.3
    user: "999:999"  # MariaDB 사용자 명시적 지정
    environment:
      MYSQL_ROOT_PASSWORD: ${default_pwd:-changeme123}
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: ${default_pwd:-changeme123}
      TZ: ${TZ:-Asia/Seoul}
      # MariaDB 추가 설정
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DISABLE_UPGRADE_BACKUP: "1"
    volumes:
      - mariadb_data:/var/lib/mysql  # Named volume 사용 (권한 문제 회피)
      # 또는 bind mount를 계속 사용하려면:
      # - /DATA/AppData/${AppID}/mariadb:/var/lib/mysql:Z  # SELinux 레이블 추가
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s  # 초기화 시간 늘림
    networks:
      - moodle-network

  moodle:
    image: bitnami/moodle:4.5.1
    user: "1001:1001"  # Bitnami 사용자 명시적 지정
    expose:
      - 8080
    environment:
      # Database configuration
      MOODLE_DATABASE_TYPE: mariadb
      MOODLE_DATABASE_HOST: mariadb
      MOODLE_DATABASE_PORT_NUMBER: 3306
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: ${default_pwd:-changeme123}
      # Admin configuration
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${default_pwd:-changeme123}
      MOODLE_EMAIL: admin@${domain:-example.com}
      # Site configuration
      MOODLE_SITE_NAME: CasaOS Learning Platform
      MOODLE_HOST: ${domain:-localhost}
      MOODLE_REVERSEPROXY: 'yes'
      MOODLE_SSLPROXY: 'yes'
      # Bitnami specific
      BITNAMI_DEBUG: 'true'  # 디버그 모드 활성화
      ALLOW_EMPTY_PASSWORD: 'no'
      # Apache configuration
      APACHE_HTTP_PORT_NUMBER: 8080
      APACHE_HTTPS_PORT_NUMBER: 8443
      # PHP configuration
      PHP_ENABLE_OPCACHE: 'yes'
      PHP_MEMORY_LIMIT: 256M
      PHP_MAX_EXECUTION_TIME: 300
      PHP_MAX_INPUT_VARS: 5000
      PHP_UPLOAD_MAX_FILESIZE: 100M
      PHP_POST_MAX_SIZE: 100M
      # System
      TZ: ${TZ:-Asia/Seoul}
      # 추가 대기 시간
      MOODLE_SKIP_BOOTSTRAP: 'no'
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
      # 또는 bind mount 사용시:
      # - /DATA/AppData/${AppID}/moodle:/bitnami/moodle:Z
      # - /DATA/AppData/${AppID}/moodledata:/bitnami/moodledata:Z
    depends_on:
      mariadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - moodle-network

# Named volumes 정의 (권한 문제 자동 해결)
volumes:
  mariadb_data:
    driver: local
  moodle_data:
    driver: local
  moodledata_data:
    driver: local

# 네트워크 정의
networks:
  moodle-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: moodle
  webui_port: 8080
  category: Education
  description:
    en_us: Moodle is the world's most popular open source learning management system (LMS).
  tagline:
    en_us: Powerful open source learning platform for online education
  title:
    en_us: Moodle™ LMS
  developer: Moodle HQ
  author: CasaOS Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/thumbnail.png
  index: /
  scheme: http
  store_app_id: moodle
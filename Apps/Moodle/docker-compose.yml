name: moodle
services:
  mariadb:
    image: mariadb:11.3
    user: "999:999"  # MariaDB standard user
    environment:
      MYSQL_ROOT_PASSWORD: ${default_pwd}
      MYSQL_DATABASE: bitnami_moodle
      MYSQL_USER: bn_moodle
      MYSQL_PASSWORD: ${default_pwd}
      TZ: ${TZ}
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DISABLE_UPGRADE_BACKUP: "1"
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - moodle-network

  moodle:
    image: bitnami/moodle:4.5.1
    user: 0:0  # Root required for Bitnami initialization
    expose:
      - 8080  # Bitnami default port
    command: >
      bash -c "
        (/opt/bitnami/scripts/moodle/entrypoint.sh /opt/bitnami/scripts/moodle/run.sh) &
        MOODLE_PID=\$!;
        echo 'Waiting for Moodle config.php to be generated...';
        for i in {1..300}; do
          if [ -f /bitnami/moodle/config.php ]; then
            echo 'Config file found! Applying HTTPS fix...';
            sed -i \"s/if (isset(\\\$_SERVER\['HTTPS'\]) && \\\$_SERVER\['HTTPS'\] == 'on')/\\\$CFG->sslproxy = true; if (true)/\" /bitnami/moodle/config.php;
            echo 'HTTPS fix applied successfully!';
            break;
          fi;
          sleep 2;
        done;
        wait \$MOODLE_PID
      "
    environment:
      # Database configuration - must match MariaDB settings
      MOODLE_DATABASE_TYPE: mariadb
      MOODLE_DATABASE_HOST: mariadb
      MOODLE_DATABASE_PORT_NUMBER: 3306
      MOODLE_DATABASE_NAME: bitnami_moodle
      MOODLE_DATABASE_USER: bn_moodle
      MOODLE_DATABASE_PASSWORD: ${default_pwd}
      
      # Admin configuration
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${default_pwd}
      MOODLE_EMAIL: admin@example.com
      
      # Site configuration
      MOODLE_SITE_NAME: Yundera Learning Platform
      
      # CRITICAL: Domain configuration for NSL router with port 8080
      # Port 8080 = URL with port: https://8080-moodle-{username}.nsl.sh
      MOODLE_HOST: 8080-moodle-${domain}  # NSL router pattern for port 8080
      MOODLE_SCHEME: https    # NSL router provides HTTPS
      
      # Reverse proxy settings (underscore format for Moodle 3.9+)
      MOODLE_REVERSE_PROXY: 'yes'
      MOODLE_SSL_PROXY: 'yes'
      
      # Debug and security
      BITNAMI_DEBUG: 'false'
      ALLOW_EMPTY_PASSWORD: 'no'
      
      # Apache uses default port 8080 (APACHE_HTTP_PORT_NUMBER not needed)
      APACHE_HTTPS_PORT_NUMBER: 8443
      
      # Installation
      MOODLE_SKIP_BOOTSTRAP: 'no'
      
      # PHP configuration
      PHP_ENABLE_OPCACHE: 'yes'
      PHP_MEMORY_LIMIT: 256M
      PHP_MAX_EXECUTION_TIME: 300
      PHP_MAX_INPUT_VARS: 5000
      PHP_UPLOAD_MAX_FILESIZE: 100M
      PHP_POST_MAX_SIZE: 100M
      
      # System
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    depends_on:
      mariadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - moodle-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # 5 minutes for initial setup

volumes:
  mariadb_data:
    driver: local
  moodle_data:
    driver: local
  moodledata_data:
    driver: local

networks:
  moodle-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: moodle
  webui_port: 8080  # Changed to 8080 (Bitnami default)
  category: Education
  description:
    en_us: Moodle is the world's most popular open source learning management system (LMS). Used by universities, schools, and corporations worldwide, Moodle provides a robust platform for creating personalized e-learning environments with courses, assignments, quizzes, forums, wikis, and collaborative tools. Features drag-and-drop interfaces, role-based permissions, comprehensive reporting, multi-language support, and extensive plugin ecosystem.
    zh_cn: Moodle 是世界上最受欢迎的开源学习管理系统(LMS)。被全球的大学、学校和企业广泛使用,Moodle 提供了一个强大的平台,用于创建包含课程、作业、测验、论坛、维基和协作工具的个性化电子学习环境。
    es_es: Moodle es el sistema de gestión de aprendizaje (LMS) de código abierto más popular del mundo. Utilizado por universidades, escuelas y corporaciones en todo el mundo.
    fr_fr: Moodle est le système de gestion de l'apprentissage (LMS) open source le plus populaire au monde. Utilisé par les universités, les écoles et les entreprises du monde entier.
    ko_kr: Moodle은 세계에서 가장 인기 있는 오픈소스 학습 관리 시스템(LMS)입니다. 전 세계 대학, 학교, 기업에서 사용되며, 코스, 과제, 퀴즈, 포럼, 위키 및 협업 도구를 포함한 개인화된 e-러닝 환경을 만들기 위한 강력한 플랫폼을 제공합니다.
  tagline:
    en_us: Powerful open source learning platform for online education
    zh_cn: 用于在线教育的强大开源学习平台
    es_es: Poderosa plataforma de aprendizaje de código abierto para educación en línea
    fr_fr: Plateforme d'apprentissage open source puissante pour l'éducation en ligne
    ko_kr: 온라인 교육을 위한 강력한 오픈소스 학습 플랫폼
  title:
    en_us: Moodle™ LMS
  developer: Moodle HQ
  author: Yundera Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/thumbnail.png
  index: /
  scheme: https
  store_app_id: moodle
  tips:
    before_install:
      en_us: |
        ## Default Administrator Credentials
        | Username | Password |
        |----------|----------|
        | `admin` | `$default_pwd` |
        
        ## Important Notes
        - First installation may take 5-10 minutes
        - The application will be accessible via NSL router at `https://8080-moodle-{username}.nsl.sh/`
        - Database is automatically configured and initialized
        - Using named volumes for automatic permission management
        - Using Bitnami's default port 8080 for maximum stability
        
        ## Resource Requirements
        - Minimum 1GB RAM recommended
        - 2GB+ storage for initial installation
        - Additional storage based on course content
        
        ## Post-Installation Steps
        1. Wait for both containers to show as healthy (5-10 minutes)
        2. **IMPORTANT**: Fix CSS loading by running this command via SSH:
        ```bash
        docker exec moodle-moodle-1 bash -c "sed -i 's/if (isset(\$_SERVER\[.HTTPS.\]) && \$_SERVER\[.HTTPS.\] == .on.)/\$CFG->sslproxy = true;\nif (true)/' /bitnami/moodle/config.php && echo 'Fixed config.php for HTTPS'"
        docker restart moodle-moodle-1
        ```
        3. Access via the NSL router URL (CSS should now load properly)
        4. Login with admin credentials above
        5. Configure email settings in Site administration
        6. Install additional plugins from Moodle directory
        7. Create courses and enroll users
        
        ## Troubleshooting
        - **If CSS doesn't load**: Run the fix command above via SSH
        - Check container logs if installation takes longer than expected
        - Both MariaDB and Moodle containers must be running and healthy
        - Named volumes automatically handle permissions
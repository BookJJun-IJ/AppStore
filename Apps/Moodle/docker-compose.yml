name: moodle
services:
  database:
    image: mariadb:11
    container_name: moodle-database
    environment:
      MARIADB_ROOT_PASSWORD: $default_pwd
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: $default_pwd
    volumes:
      - /DATA/AppData/moodle/mariadb:/var/lib/mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  moodle:
    image: bitnami/moodle:4.4.1
    container_name: moodle
    environment:
      MOODLE_DATABASE_HOST: database
      MOODLE_DATABASE_PORT_NUMBER: 3306
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_PASSWORD: $default_pwd
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: $default_pwd
      MOODLE_EMAIL: admin@example.com
    volumes:
      - /DATA/AppData/moodle/moodle:/bitnami/moodle
      - /DATA/AppData/moodle/moodledata:/bitnami/moodledata
    expose:
      - 8080
    depends_on:
      - database
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: moodle
  webui_port: 8080
  category: Education
  author: CasaOS Team
  developer: Moodle HQ
  title:
    en_us: Moodle
  tagline:
    en_us: Open Source Learning Management System
    fr_fr: Système de gestion de l'apprentissage open source
    ko_kr: 오픈소스 학습 관리 시스템
    zh_cn: 开源学习管理系统
    es_es: Sistema de gestión de aprendizaje de código abierto
  description:
    en_us: Moodle is the world's most popular open source Learning Management System (LMS).
    fr_fr: Moodle est le système de gestion de l'apprentissage open source le plus populaire.
    ko_kr: Moodle은 세계에서 가장 인기 있는 오픈소스 학습 관리 시스템입니다.
    zh_cn: Moodle是世界上最受欢迎的开源学习管理系统。
    es_es: Moodle es el sistema de gestión de aprendizaje de código abierto más popular.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
  tips:
    before_install:
      en_us: Default admin is admin with system password
  index: /
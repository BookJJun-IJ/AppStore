name: moodle
services:
  db:
    image: postgres:15-alpine
    container_name: moodle-db
    environment:
      POSTGRES_DB: moodle
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: $default_pwd
    volumes:
      - /DATA/AppData/$AppID/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  app:
    image: erseco/moodle:4.4
    container_name: moodle
    environment:
      MOODLE_DB_HOST: db
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASS: $default_pwd
      MOODLE_DB_TYPE: pgsql
      MOODLE_ADMIN_USER: admin
      MOODLE_ADMIN_PASS: $default_pwd
      MOODLE_ADMIN_EMAIL: admin@example.com
      MOODLE_SITE_NAME: Moodle
      MOODLE_SITE_FULLNAME: Moodle Learning Platform
      MOODLE_LANG: en
    volumes:
      - /DATA/AppData/$AppID/moodledata:/var/moodledata
    expose:
      - 80
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  webui_port: 80
  category: Education
  author: CasaOS Team
  developer: Moodle HQ
  title:
    en_us: Moodle
  tagline:
    en_us: Open Source Learning Management System
    fr_fr: Système de gestion de l'apprentissage open source
    ko_kr: 오픈소스 학습 관리 시스템
    zh_cn: 开源学习管理系统
    es_es: Sistema de gestión de aprendizaje de código abierto
  description:
    en_us: Moodle is the world's most popular open source Learning Management System (LMS). Perfect for schools, universities, and corporate training.
    fr_fr: Moodle est le système de gestion de l'apprentissage (LMS) open source le plus populaire au monde.
    ko_kr: Moodle은 세계에서 가장 인기 있는 오픈소스 학습 관리 시스템(LMS)입니다.
    zh_cn: Moodle是世界上最受欢迎的开源学习管理系统（LMS）。
    es_es: Moodle es el sistema de gestión de aprendizaje (LMS) de código abierto más popular del mundo.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
  tips:
    before_install:
      en_us: |
        Default admin account is admin / $default_pwd
  index: /
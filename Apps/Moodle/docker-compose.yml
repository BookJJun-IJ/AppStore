name: moodle
services:
  mariadb:
    image: mariadb:11.3
    environment:
      MYSQL_ROOT_PASSWORD: ${default_pwd}
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: ${default_pwd}
      TZ: ${TZ}
      # MariaDB 추가 설정
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    volumes:
      - /DATA/AppData/${AppID}/mariadb:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  moodle:
    image: bitnami/moodle:4.5.1
    expose:
      - 8080
    environment:
      # Database configuration
      MOODLE_DATABASE_TYPE: mariadb
      MOODLE_DATABASE_HOST: mariadb
      MOODLE_DATABASE_PORT_NUMBER: 3306
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: ${default_pwd}
      # Admin configuration
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${default_pwd}
      MOODLE_EMAIL: admin@${domain}
      # Site configuration
      MOODLE_SITE_NAME: CasaOS Learning Platform
      MOODLE_HOST: ${domain}
      MOODLE_REVERSEPROXY: 'yes'
      MOODLE_SSLPROXY: 'yes'
      # Bitnami specific
      BITNAMI_DEBUG: 'false'
      ALLOW_EMPTY_PASSWORD: 'no'
      # Apache configuration
      APACHE_HTTP_PORT_NUMBER: 8080
      APACHE_HTTPS_PORT_NUMBER: 8443
      # PHP configuration
      PHP_ENABLE_OPCACHE: 'yes'
      PHP_MEMORY_LIMIT: 256M
      PHP_MAX_EXECUTION_TIME: 300
      PHP_MAX_INPUT_VARS: 5000
      PHP_UPLOAD_MAX_FILESIZE: 100M
      PHP_POST_MAX_SIZE: 100M
      # System
      TZ: ${TZ}
      # 추가 대기 시간
      MOODLE_SKIP_BOOTSTRAP: 'no'
    volumes:
      - /DATA/AppData/${AppID}/moodle:/bitnami/moodle
      - /DATA/AppData/${AppID}/moodledata:/bitnami/moodledata
    depends_on:
      mariadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: moodle
  webui_port: 8080
  category: Education
  description:
    en_us: Moodle is the world's most popular open source learning management system (LMS). Used by universities, schools, and corporations worldwide, Moodle provides a robust platform for creating personalized e-learning environments with courses, assignments, quizzes, forums, wikis, and collaborative tools. Features drag-and-drop interfaces, role-based permissions, comprehensive reporting, multi-language support, and extensive plugin ecosystem.
    zh_cn: Moodle 是世界上最受欢迎的开源学习管理系统(LMS)。被全球的大学、学校和企业广泛使用，Moodle 提供了一个强大的平台，用于创建包含课程、作业、测验、论坛、维基和协作工具的个性化电子学习环境。具有拖放界面、基于角色的权限、全面的报告、多语言支持和丰富的插件生态系统。
    es_es: Moodle es el sistema de gestión de aprendizaje (LMS) de código abierto más popular del mundo. Utilizado por universidades, escuelas y corporaciones en todo el mundo, Moodle proporciona una plataforma robusta para crear entornos de aprendizaje electrónico personalizados con cursos, tareas, cuestionarios, foros, wikis y herramientas colaborativas.
    fr_fr: Moodle est le système de gestion de l'apprentissage (LMS) open source le plus populaire au monde. Utilisé par les universités, les écoles et les entreprises du monde entier, Moodle fournit une plateforme robuste pour créer des environnements d'apprentissage en ligne personnalisés avec des cours, des devoirs, des quiz, des forums, des wikis et des outils collaboratifs.
    ko_kr: Moodle은 세계에서 가장 인기 있는 오픈소스 학습 관리 시스템(LMS)입니다. 전 세계 대학, 학교, 기업에서 사용되며, Moodle은 코스, 과제, 퀴즈, 포럼, 위키 및 협업 도구를 포함한 개인화된 e-러닝 환경을 만들기 위한 강력한 플랫폼을 제공합니다.
  tagline:
    en_us: Powerful open source learning platform for online education
    zh_cn: 用于在线教育的强大开源学习平台
    es_es: Poderosa plataforma de aprendizaje de código abierto para educación en línea
    fr_fr: Plateforme d'apprentissage open source puissante pour l'éducation en ligne
    ko_kr: 온라인 교육을 위한 강력한 오픈소스 학습 플랫폼
  title:
    en_us: Moodle™ LMS
  developer: Moodle HQ
  author: CasaOS Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/thumbnail.png
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/${AppID}/:/data alpine:latest sh -c "
      
      rm -rf /data/mariadb/* /data/moodle/* /data/moodledata/* 2>/dev/null || true
      mkdir -p /data/mariadb /data/moodle /data/moodledata
      
      chown -R 999:999 /data/mariadb
      chmod -R 750 /data/mariadb

      chown -R 1001:1001 /data/moodle /data/moodledata
      chmod -R 775 /data/moodle /data/moodledata
      
      echo 'Directories prepared with correct permissions'
    "
  index: /
  scheme: http
  store_app_id: moodle
  tips:
    before_install:
      en_us: |
        ## Default Administrator Credentials
        | Username | Password |
        |----------|----------|
        | `admin` | `${default_pwd}` |
        
        ## Important Notes
        - First installation may take 5-10 minutes to complete
        - The database will be initialized automatically on first run
        - If you see permission errors, the pre-install command will clean the directories
        - Bitnami Moodle uses port 8080 by default
        
        ## Resource Requirements
        - Minimum 1GB RAM recommended
        - 2GB+ storage for initial installation
        - Additional storage based on course content
        
        ## Troubleshooting
        - If installation fails, stop the container and remove `/DATA/AppData/moodle` directory
        - Then reinstall the app to start fresh
        
        ## Post-Installation
        1. Wait for the installation to complete (check logs)
        2. Access the web interface when both containers are healthy
        3. Configure email settings
        4. Install additional plugins as needed
        5. Set up courses and users
name: moodle

services:
  mariadb:
    image: bitnami/mariadb:11.4
    container_name: moodle-mariadb
    environment:
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=$default_pwd
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_ROOT_PASSWORD=$default_pwd
    volumes:
      - /DATA/AppData/$AppID/mariadb:/bitnami/mariadb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  moodle:
    image: bitnami/moodle:4.4
    container_name: moodle
    environment:
      - TZ=$TZ
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_DATABASE_PASSWORD=$default_pwd
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=$default_pwd
      - MOODLE_EMAIL=admin@example.com
    volumes:
      - /DATA/AppData/$AppID/moodledata:/bitnami/moodledata
    expose:
      - 8080
    depends_on:
      - mariadb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'

x-casaos:
  architectures:
    - amd64
    - arm64
  main: moodle
  webui_port: 8080
  category: Education
  author: Bitnami
  developer: Moodle HQ
  title:
    en_us: Moodle
  tagline:
    en_us: Open Source Learning Management System
  description:
    en_us: |
      Moodle is the world's most popular open source Learning Management System (LMS). 
      Perfect for schools, universities, and corporate training.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/icon.png
  screenshot: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Moodle/screenshot-1.png
  tips:
    before_install:
      en_us: |
        Default Account
        | Username | Password |
        | -------- | -------- |
        | `admin`  | `$default_pwd` |
  index: /
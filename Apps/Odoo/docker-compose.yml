name: odoo

services:
  postgres:
    image: bitnami/postgresql:15.8.0
    user: "1001:1001"
    environment:
      POSTGRESQL_DATABASE: postgres
      POSTGRESQL_USERNAME: odoo
      POSTGRESQL_PASSWORD: $default_pwd
      PUID: "1001"
      PGID: "1001"
    volumes:
      - /DATA/AppData/$AppID/postgresql:/bitnami/postgresql
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  odoo:
    image: bitnami/odoo:18.0.20241104
    user: "1001:1001"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - 8069
    environment:
      ODOO_DATABASE_HOST: postgres
      ODOO_DATABASE_PORT_NUMBER: 5432
      ODOO_DATABASE_USER: odoo
      ODOO_DATABASE_PASSWORD: $default_pwd
      ODOO_DATABASE_NAME: postgres
      ODOO_DATABASE_ADMIN_PASSWORD: $default_pwd
      ODOO_SKIP_BOOTSTRAP: "no"
      PUID: "1001"
      PGID: "1001"
      TZ: $TZ
    volumes:
      - /DATA/AppData/$AppID/odoo:/bitnami/odoo
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: odoo  
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/data ubuntu:22.04 sh -c '
      mkdir -p /data/postgresql /data/odoo &&
      chown -R 1001:1001 /data/postgresql /data/odoo
    '
  webui_port: 8069
  category: Business
  author: CasaOS Team
  developer: Odoo S.A.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Odoo/icon.png
  title:
    en_us: Odoo
    ko_kr: 오두
    zh_cn: Odoo
    es_es: Odoo
    fr_fr: Odoo
  tagline:
    en_us: Open Source ERP and CRM
    ko_kr: 오픈소스 ERP 및 CRM 솔루션
    zh_cn: 开源ERP和CRM解决方案
    es_es: ERP y CRM de código abierto
    fr_fr: ERP et CRM open source
  description:
    en_us: |
      Odoo is a suite of open source business apps that cover all your company needs: CRM, eCommerce, accounting, inventory, point of sale, project management, and more.
      
      Odoo's unique value proposition is to be at the same time very easy to use and fully integrated.
      
      **This version uses Bitnami images** which run as non-root user (UID 1001) for enhanced security.
    ko_kr: |
      Odoo는 CRM, 전자상거래, 회계, 재고 관리, POS, 프로젝트 관리 등 회사의 모든 비즈니스 요구사항을 충족하는 오픈 소스 비즈니스 앱 모음입니다.
      
      Odoo의 고유한 가치는 사용이 매우 쉬우면서도 완전히 통합되어 있다는 점입니다.
      
      **이 버전은 Bitnami 이미지를 사용**하여 보안 강화를 위해 non-root 사용자(UID 1001)로 실행됩니다.
    zh_cn: |
      Odoo 是一套开源业务应用程序,涵盖公司的所有需求:CRM、电子商务、会计、库存、销售点、项目管理等。
      
      Odoo 的独特价值主张是同时非常易于使用且完全集成。
      
      **此版本使用 Bitnami 镜像**,以非 root 用户 (UID 1001) 运行以增强安全性。
    es_es: |
      Odoo es un conjunto de aplicaciones empresariales de código abierto que cubren todas las necesidades de su empresa: CRM, comercio electrónico, contabilidad, inventario, punto de venta, gestión de proyectos y más.
      
      La propuesta de valor única de Odoo es ser al mismo tiempo muy fácil de usar y totalmente integrado.
      
      **Esta versión utiliza imágenes de Bitnami** que se ejecutan como usuario no root (UID 1001) para mayor seguridad.
    fr_fr: |
      Odoo est une suite d'applications commerciales open source qui couvrent tous les besoins de votre entreprise : CRM, commerce électronique, comptabilité, inventaire, point de vente, gestion de projet et plus encore.
      
      La proposition de valeur unique d'Odoo est d'être à la fois très facile à utiliser et entièrement intégré.
      
      **Cette version utilise des images Bitnami** qui s'exécutent en tant qu'utilisateur non-root (UID 1001) pour une sécurité renforcée.
  tips:
    before_install:
      en_us: |
        ## Initial Setup Information
        
        This app uses **Bitnami images** running as non-root user (UID 1001) for enhanced security.
        
        After installation, access the web UI to complete setup:
        
        | Item | Value |
        | --- | --- |
        | Admin Email | Your email address |
        | Admin Password | Choose a secure password |
        | Master Password | `$default_pwd` |
        | Database Name | `odoo` |
        
        **Note**: 
        - Initial setup may take a few minutes
        - Database will be created automatically on first access
        - Admin credentials can be set during initial setup wizard
      ko_kr: |
        ## 초기 설정 정보
        
        이 앱은 보안 강화를 위해 non-root 사용자(UID 1001)로 실행되는 **Bitnami 이미지**를 사용합니다.
        
        설치 후 웹 UI에 접속하여 설정을 완료하세요:
        
        | 항목 | 값 |
        | --- | --- |
        | 관리자 이메일 | 이메일 주소 |
        | 관리자 비밀번호 | 안전한 비밀번호 선택 |
        | 마스터 비밀번호 | `$default_pwd` |
        | 데이터베이스 이름 | `odoo` |
        
        **참고**: 
        - 첫 설정 시 몇 분이 소요될 수 있습니다
        - 첫 접속 시 데이터베이스가 자동으로 생성됩니다
        - 초기 설정 마법사에서 관리자 계정을 설정할 수 있습니다
      zh_cn: |
        ## 初始设置信息
        
        此应用使用 **Bitnami 镜像**,以非 root 用户 (UID 1001) 运行以增强安全性。
        
        安装后访问 Web UI 完成设置:
        
        | 项目 | 值 |
        | --- | --- |
        | 管理员电子邮件 | 您的电子邮件地址 |
        | 管理员密码 | 选择安全密码 |
        | 主密码 | `$default_pwd` |
        | 数据库名称 | `odoo` |
        
        **注意**: 
        - 初始设置可能需要几分钟
        - 首次访问时将自动创建数据库
        - 可以在初始设置向导中设置管理员帐户
      es_es: |
        ## Información de configuración inicial
        
        Esta aplicación usa **imágenes de Bitnami** que se ejecutan como usuario no root (UID 1001) para mayor seguridad.
        
        Después de la instalación, acceda a la interfaz web para completar la configuración:
        
        | Elemento | Valor |
        | --- | --- |
        | Correo electrónico del administrador | Su dirección de correo electrónico |
        | Contraseña del administrador | Elija una contraseña segura |
        | Contraseña maestra | `$default_pwd` |
        | Nombre de la base de datos | `odoo` |
        
        **Nota**: 
        - La configuración inicial puede tardar unos minutos
        - La base de datos se creará automáticamente en el primer acceso
        - Las credenciales de administrador se pueden configurar durante el asistente de configuración inicial
      fr_fr: |
        ## Informations de configuration initiale
        
        Cette application utilise des **images Bitnami** fonctionnant en tant qu'utilisateur non-root (UID 1001) pour une sécurité renforcée.
        
        Après l'installation, accédez à l'interface Web pour terminer la configuration:
        
        | Élément | Valeur |
        | --- | --- |
        | Email administrateur | Votre adresse e-mail |
        | Mot de passe administrateur | Choisissez un mot de passe sécurisé |
        | Mot de passe principal | `$default_pwd` |
        | Nom de la base de données | `odoo` |
        
        **Remarque**: 
        - La configuration initiale peut prendre quelques minutes
        - La base de données sera créée automatiquement lors du premier accès
        - Les identifiants administrateur peuvent être définis pendant l'assistant de configuration initial
  index: /
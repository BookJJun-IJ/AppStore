name: tincisnotcatan
services:
  tinc-server:
    image: openjdk:21-jdk-slim
    user: 0:0  # Start as root for initial setup
    working_dir: /app
    expose:
      - 80
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      JAVA_OPTS: "-Xmx1g -XX:+UseG1GC"
      PORT: 80
      MAVEN_VERSION: "3.9.5"
      MAVEN_HOME: "/usr/share/maven"
      PATH: "/usr/share/maven/bin:$PATH"
    volumes:
      - /DATA/AppData/$AppID/config:/app/config
      - /DATA/AppData/$AppID/logs:/app/logs
      - /DATA/AppData/$AppID/cache:/app/.m2
      - /DATA/AppData/$AppID/source:/app/source
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
    command: >
      sh -c "
      echo '[INFO] Initializing apt lists directory...' &&
      mkdir -p /var/lib/apt/lists/partial &&
      chmod 755 /var/lib/apt/lists/partial &&
      echo '[INFO] Installing dependencies...' &&
      apt-get update && apt-get install -y git wget curl procps gosu &&
      echo '[INFO] Installing Maven...' &&
      cd /tmp &&
      if [ ! -d /usr/share/maven ]; then
        wget -q https://archive.apache.org/dist/maven/maven-3/3.9.5/binaries/apache-maven-3.9.5-bin.tar.gz &&
        tar xzf apache-maven-3.9.5-bin.tar.gz &&
        mv apache-maven-3.9.5 /usr/share/maven &&
        ln -s /usr/share/maven/bin/mvn /usr/bin/mvn &&
        rm apache-maven-3.9.5-bin.tar.gz
      fi &&
      echo '[INFO] Setting up user and directories...' &&
      groupadd -g ${PGID} appgroup 2>/dev/null || true &&
      useradd -u ${PUID} -g ${PGID} -m -s /bin/bash appuser 2>/dev/null || true &&
      mkdir -p /app/config /app/logs /app/.m2/repository /app/source &&
      chown -R ${PUID}:${PGID} /app &&
      echo '[INFO] Checking source directory...' &&
      if [ ! -d /app/source/.git ]; then
        echo '[INFO] Cloning repository...' &&
        rm -rf /app/source/* 2>/dev/null || true &&
        gosu appuser git clone https://github.com/seansegal/tincisnotcatan.git /app/source || {
          echo '[ERROR] Git clone failed' && exit 1
        }
      else
        echo '[INFO] Updating existing repository...' &&
        cd /app/source &&
        gosu appuser git pull origin master || true
      fi &&
      echo '[INFO] Starting application as user...' &&
      cd /app/source &&
      export MAVEN_OPTS='-Dmaven.repo.local=/app/.m2/repository -Xmx1g' &&
      exec gosu appuser mvn clean compile exec:java \
        -Dexec.mainClass='edu.brown.cs.catan.Main' \
        -Dexec.args='--port=80' \
        -Dmaven.repo.local=/app/.m2/repository \
        -Dmaven.test.skip=true \
        -q
      "

x-casaos:
  architectures:
    - amd64
    - arm64
  main: tinc-server
  author: CasaOS Team
  category: Games
  description:
    en_us: "TincIsNotCatan is an online multiplayer version of Settlers of Catan with advanced economic features. Play the classic board game with friends over the internet, featuring decimal resources, dynamic exchange rates, and enhanced gameplay mechanics. Built with Java and Spark framework for seamless web-based gaming experience."
    fr_fr: "TincIsNotCatan est une version multijoueur en ligne des Colons de Catane avec des fonctionnalités économiques avancées. Jouez au jeu de société classique avec des amis sur Internet, avec des ressources décimales, des taux de change dynamiques et des mécaniques de jeu améliorées."
    ko_kr: "TincIsNotCatan은 고급 경제 기능을 갖춘 온라인 멀티플레이어 카탄의 개척자 게임입니다. 십진수 자원, 동적 환율, 향상된 게임플레이 메커니즘을 특징으로 하는 인터넷을 통해 친구들과 클래식 보드 게임을 플레이하세요."
    zh_cn: "TincIsNotCatan 是具有高级经济功能的在线多人卡坦岛定居者游戏。通过互联网与朋友们玩经典棋盘游戏，具有小数资源、动态汇率和增强的游戏机制。"
    es_es: "TincIsNotCatan es una versión multijugador en línea de Los Colonos de Catán con características económicas avanzadas. Juega el juego de mesa clásico con amigos a través de Internet, con recursos decimales, tipos de cambio dinámicos y mecánicas de juego mejoradas."
  developer: Sean Segal
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TincIsNotCatan/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TincIsNotCatan/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TincIsNotCatan/screenshot-2.png
  tagline:
    en_us: "Online multiplayer Settlers of Catan with advanced economic features"
    fr_fr: "Colons de Catane multijoueur en ligne avec fonctionnalités économiques avancées"
    ko_kr: "고급 경제 기능을 갖춘 온라인 멀티플레이어 카탄의 개척자"
    zh_cn: "具有高级经济功能的在线多人卡坦岛定居者"
    es_es: "Los Colonos de Catán multijugador en línea con características económicas avanzadas"
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/TincIsNotCatan/thumbnail.png
  title:
    en_us: "TincIsNotCatan"
  tips:
    before_install:
      en_us: |
        **Game Information**
        
        - **Default Port**: The game runs on port 80 for clean URL access
        - **Multiplayer**: Supports 2-4 players per game  
        - **Game Modes**: Standard Catan rules with optional advanced economic features
        - **Features**: Decimal resources, dynamic exchange rates, and enhanced trading
        
        **Getting Started**
        
        1. Wait for the application to build and start (may take 5-10 minutes on first launch)
        2. Access the game through the provided URL
        3. Create a username to join or create games
        4. Invite friends using the game room codes
        
        **Advanced Features**
        
        - **Decimal Resources**: Enable fractional resource amounts for precise trading
        - **Dynamic Exchange Rates**: Bank trade rates vary based on resource availability  
        - **Enhanced UI**: Modern web interface with real-time game updates
        
        **Note**: First startup requires downloading Maven and dependencies, which may take several minutes.
  index: /
  webui_port: 80
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/$AppID:/data ubuntu:22.04 sh -c "
    mkdir -p /data/config /data/logs /data/cache /data/source &&
    mkdir -p /data/cache/repository &&
    chmod -R 777 /data
    "
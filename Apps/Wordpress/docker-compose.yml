        🌍 **WordPress (网站构建器)**
        
        **使用WordPress创建您自己的网站。**
        
        **默认数据库密码：** `$default_pwd`
        
        ⚠️ *暂不支持自定义域名（如youchoose.com）。您的网站将使用子域名（如wordpress-yourname.nsl.sh）。完整域名支持即将推出。*
        

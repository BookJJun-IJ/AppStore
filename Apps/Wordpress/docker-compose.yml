name: wordpress

services:
  wordpress:
    image: wordpress:6.8.1-apache
    restart: unless-stopped
    user: 0:0
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
      - /DATA/Downloads:/downloads
    environment:
      PUID: 0
      PGID: 0
      TZ: $TZ
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: $default_pwd
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        /* HTTPS Reverse Proxy Configuration - NSL Router */
        $_SERVER['HTTPS'] = 'on';
        $_SERVER['SERVER_PORT'] = 443;
        
        /* Dynamic Site URLs */
        if (!empty(getenv('DOMAIN'))) {
          define('WP_HOME', 'https://' . getenv('DOMAIN'));
          define('WP_SITEURL', 'https://' . getenv('DOMAIN'));
        }
        
        /* Force SSL for Admin Panel */
        define('FORCE_SSL_ADMIN', true);
        
        /* File System Method for Updates */
        define('FS_METHOD', 'direct');
        
        /* Memory Limit */
        define('WP_MEMORY_LIMIT', '256M');
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      - db
    networks:
      - wordpress_network

  db:
    image: mariadb:11.6
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    environment:
      TZ: $TZ
      MYSQL_ROOT_PASSWORD: $default_pwd
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: $default_pwd
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - wordpress_network

networks:
  wordpress_network:
    driver: bridge


name: wordpress

services:
  app:
    image: wordpress:6.8.1
    container_name: wordpress
    restart: unless-stopped
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/WordPress:/var/www/html
      - /DATA/Downloads:/downloads
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      DOMAIN: $domain
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: $default_pwd
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('FS_METHOD', 'direct');
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_HOME', 'https://' . $_ENV['DOMAIN']);
        define('WP_SITEURL', 'https://' . $_ENV['DOMAIN']);
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  database:
    image: mariadb:11.4.7
    container_name: wordpress_db
    restart: unless-stopped
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    environment:
      TZ: $TZ
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: $default_pwd
      MYSQL_ROOT_PASSWORD: $default_pwd
      MYSQL_INITDB_SKIP_TZINFO: 1
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'


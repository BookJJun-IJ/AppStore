name: wordpress

services:
  wordpress:
    image: wordpress:6.7-apache
    container_name: wordpress_app
    restart: unless-stopped
    # WordPress도 루트로 실행 (파일 복사 문제 해결)
    user: 0:0
    expose:
      - 80
    volumes:
      - /DATA/AppData/$AppID/html:/var/www/html
    environment:
      PUID: $PUID
      PGID: $PGID
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: $default_pwd
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_SITE_URL: https://wordpress-ikjunyundera.nsl.sh
      WORDPRESS_HOME: https://wordpress-ikjunyundera.nsl.sh
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  db:
    image: mariadb:10.11
    container_name: wordpress_db
    restart: unless-stopped
    # MariaDB는 루트로 실행 (AppData 전용이므로 허용됨)
    user: 0:0
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: $default_pwd
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: $default_pwd
      MARIADB_AUTO_UPGRADE: 1
      MARIADB_DISABLE_UPGRADE_BACKUP: 1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

x-casaos:
  architectures:
    - amd64
    - arm64
  author: CasaOS Team
  category: Web
  developer: WordPress Foundation
  description:
    en_us: WordPress is the world's most popular website builder. Create beautiful websites, blogs, and online stores with thousands of themes and plugins.
    zh_cn: WordPress是世界上最受欢迎的网站构建器。使用数千种主题和插件创建美丽的网站、博客和在线商店。
    ko_kr: WordPress는 세계에서 가장 인기 있는 웹사이트 빌더입니다. 수천 가지 테마와 플러그인으로 아름다운 웹사이트, 블로그, 온라인 스토어를 만드세요.
    fr_fr: WordPress est le créateur de sites web le plus populaire au monde. Créez de beaux sites, blogs et boutiques avec des milliers de thèmes et plugins.
    es_es: WordPress es el constructor de sitios web más popular del mundo. Crea hermosos sitios, blogs y tiendas con miles de temas y plugins.
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Wordpress/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Wordpress/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Wordpress/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Wordpress/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/Wordpress/thumbnail.png
  index: /
  tagline:
    en_us: Create beautiful websites with ease
    zh_cn: 轻松创建精美网站
    ko_kr: 아름다운 웹사이트를 손쉽게 만들기
    fr_fr: Créez facilement de beaux sites web
    es_es: Crea hermosos sitios web con facilidad
  title:
    en_us: WordPress
  store_app_id: wordpress
  main: wordpress
  webui_port: 80
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID/html /DATA/AppData/$AppID/db &&
    chown -R $PUID:$PGID /DATA/AppData/$AppID/html &&
    chmod -R 755 /DATA/AppData/$AppID/html &&
    chmod -R 777 /DATA/AppData/$AppID/db
  tips:
    before_install:
      en_us: |
        Default Database Credentials:
        Username: wordpress
        Password: $default_pwd
        
        WordPress will configure itself on first visit.
        Database initialization may take 1-2 minutes.
name: sftpgo

services:
  sftpgo:
    image: drakkan/sftpgo:v2.7.0
    container_name: sftpgo
    restart: unless-stopped
    user: "0:0"
    networks:
      - pcs
    environment:
      SFTPGO_DEFAULT_ADMIN_USERNAME: admin
      SFTPGO_DEFAULT_ADMIN_PASSWORD: $APP_DEFAULT_PASSWORD
      SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN: "true"
      SFTPGO_HTTPD__BINDINGS__0__PORT: 80
      SFTPGO_HTTPD__BINDINGS__0__PROXY_ALLOWED: "0.0.0.0/0"
      SFTPGO_SFTPD__BINDINGS__0__PORT: 2022
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 8080
      TZ: $TZ
    volumes:
      - /DATA/AppData/sftpgo/:/var/lib/sftpgo
      - /DATA/:/data
    expose:
      - 80
      - 8080
    ports:
      - "2022:2022"
    labels:
      caddy_0: sftpgo-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: sftpgo-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: sftpgo-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
      caddy_3: sftpgo-dav-${APP_DOMAIN}
      caddy_3.import: gateway_tls
      caddy_3.reverse_proxy: "{{upstreams 8080}}"
      caddy_4: sftpgo-dav-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_4.import: gateway_tls
      caddy_4.reverse_proxy: "{{upstreams 8080}}"
      caddy_5: sftpgo-dav-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_5.reverse_proxy: "{{upstreams 8080}}"
    deploy:
      resources:
        limits:
          memory: 256M
    cpu_shares: 80
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: sftpgo
  author: Yundera Team
  category: Utilities
  developer: Nicola Murino
  description:
    en_us: |
      **Manage your files via web browser or connect with Cyberduck, WinSCP, or FileZilla.**
      SFTPGo is a full-featured, open-source file transfer server supporting SFTP, HTTP/S, FTP/S, and WebDAV. It includes a modern web interface for file management and an admin panel for user management.
      **Key Features:** • Web-based file manager — upload, download, and organize files from any browser • WebDAV server — connect with Cyberduck, WinSCP, or Windows Explorer from anywhere • SFTP server — connect with FileZilla on your local network (port 2022) • Multi-user support with per-user permissions and quotas • Two-factor authentication support
      **How to connect remotely (WebDAV):** Use Cyberduck or WinSCP with WebDAV (HTTPS) protocol, server: sftpgo-dav-{your-domain}, and the credentials you created in SFTPGo web admin.
    zh_cn: |
      **通过网页浏览器管理文件，或使用Cyberduck、WinSCP、FileZilla连接。**
      SFTPGo是一个功能齐全的开源文件传输服务器，支持SFTP、HTTP/S、FTP/S和WebDAV。它包含现代化的网页文件管理界面和用户管理面板。
      **主要功能：** • 基于网页的文件管理器 — 从任何浏览器上传、下载和整理文件 • WebDAV服务器 — 使用Cyberduck、WinSCP或Windows资源管理器从任何地方连接 • SFTP服务器 — 在局域网使用FileZilla连接（端口2022） • 多用户支持，每用户权限和配额 • 双因素认证支持
      **如何远程连接（WebDAV）：** 使用Cyberduck或WinSCP，选择WebDAV（HTTPS）协议，服务器：sftpgo-dav-{您的域名}，并输入在SFTPGo网页管理中创建的凭据。
    ko_kr: |
      **웹 브라우저로 파일을 관리하거나 Cyberduck, WinSCP, FileZilla로 연결하세요.**
      SFTPGo는 SFTP, HTTP/S, FTP/S, WebDAV를 지원하는 오픈소스 파일 전송 서버입니다. 웹 기반 파일 관리 인터페이스와 사용자 관리 패널을 제공합니다.
      **주요 기능:** • 웹 기반 파일 관리자 — 브라우저에서 파일 업로드, 다운로드 및 정리 • WebDAV 서버 — Cyberduck, WinSCP 또는 Windows 탐색기로 어디서나 연결 • SFTP 서버 — 로컬 네트워크에서 FileZilla로 연결 (포트 2022) • 사용자별 권한 및 할당량을 가진 다중 사용자 지원 • 이중 인증 지원
      **원격 연결 방법 (WebDAV):** Cyberduck 또는 WinSCP에서 WebDAV (HTTPS) 프로토콜을 선택하고, 서버: sftpgo-dav-{도메인}, SFTPGo 웹 관리에서 생성한 자격 증명을 입력하세요.
    fr_fr: |
      **Gerez vos fichiers via navigateur web ou connectez-vous avec Cyberduck, WinSCP ou FileZilla.**
      SFTPGo est un serveur de transfert de fichiers open-source complet supportant SFTP, HTTP/S, FTP/S et WebDAV. Il comprend une interface web moderne pour la gestion des fichiers et un panneau d'administration des utilisateurs.
      **Fonctionnalites principales :** • Gestionnaire de fichiers web — telechargez, televersez et organisez vos fichiers depuis n'importe quel navigateur • Serveur WebDAV — connectez-vous avec Cyberduck, WinSCP ou l'Explorateur Windows depuis n'importe ou • Serveur SFTP — connectez-vous avec FileZilla sur votre reseau local (port 2022) • Support multi-utilisateurs avec permissions et quotas par utilisateur • Support de l'authentification a deux facteurs
      **Comment se connecter a distance (WebDAV) :** Utilisez Cyberduck ou WinSCP avec le protocole WebDAV (HTTPS), serveur : sftpgo-dav-{votre-domaine}, et les identifiants crees dans l'administration web SFTPGo.
    es_es: |
      **Gestiona tus archivos desde el navegador o conectate con Cyberduck, WinSCP o FileZilla.**
      SFTPGo es un servidor de transferencia de archivos de codigo abierto que soporta SFTP, HTTP/S, FTP/S y WebDAV. Incluye una interfaz web moderna para gestion de archivos y un panel de administracion de usuarios.
      **Caracteristicas principales:** • Gestor de archivos web — sube, descarga y organiza archivos desde cualquier navegador • Servidor WebDAV — conectate con Cyberduck, WinSCP o el Explorador de Windows desde cualquier lugar • Servidor SFTP — conectate con FileZilla en tu red local (puerto 2022) • Soporte multiusuario con permisos y cuotas por usuario • Soporte de autenticacion de dos factores
      **Como conectar remotamente (WebDAV):** Usa Cyberduck o WinSCP con protocolo WebDAV (HTTPS), servidor: sftpgo-dav-{tu-dominio}, e ingresa las credenciales creadas en la administracion web de SFTPGo.

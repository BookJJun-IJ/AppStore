  is_uncontrolled: false
  webui_port: 80
  tips:
    before_install:
      en_us: |
        Default Admin Account

        | Username | Password |
        | -------- | -------- |
        | `admin`  | `$APP_DEFAULT_PASSWORD` |

        **Web Access:** Use the web interface to manage files from anywhere.

        **Remote Access (WebDAV) — Cyberduck / WinSCP:**
        1. Open SFTPGo web admin and create a user
        2. Open Cyberduck or WinSCP → Protocol: WebDAV (HTTPS)
        3. Server: `sftpgo-dav-{your-domain}` → Enter user credentials

        **Local Network (SFTP) — FileZilla:**
        1. Open SFTPGo web admin and create a user
        2. Open FileZilla → Protocol: SFTP → Host: your PCS local IP → Port: 2022
        3. Enter user credentials

      zh_cn: |
        默认管理员账户

        | 用户名 | 密码 |
        | -------- | -------- |
        | `admin`  | `$APP_DEFAULT_PASSWORD` |

        **网页访问：** 使用网页界面从任何地方管理文件。

        **远程访问（WebDAV）— Cyberduck / WinSCP：**
        1. 打开SFTPGo网页管理并创建用户
        2. 打开Cyberduck或WinSCP → 协议: WebDAV (HTTPS)
        3. 服务器: `sftpgo-dav-{您的域名}` → 输入用户凭据

        **局域网访问（SFTP）— FileZilla：**
        1. 打开SFTPGo网页管理并创建用户
        2. 打开FileZilla → 协议: SFTP → 主机: 您的PCS本地IP → 端口: 2022
        3. 输入用户凭据

      ko_kr: |
        기본 관리자 계정

        | 사용자명 | 비밀번호 |
        | -------- | -------- |
        | `admin`  | `$APP_DEFAULT_PASSWORD` |

        **웹 접속:** 웹 인터페이스로 어디서나 파일을 관리하세요.

        **원격 접속 (WebDAV) — Cyberduck / WinSCP:**
        1. SFTPGo 웹 관리에서 사용자를 생성하세요
        2. Cyberduck 또는 WinSCP 열기 → 프로토콜: WebDAV (HTTPS)
        3. 서버: `sftpgo-dav-{도메인}` → 사용자 자격 증명 입력

        **로컬 네트워크 (SFTP) — FileZilla:**
        1. SFTPGo 웹 관리에서 사용자를 생성하세요
        2. FileZilla 열기 → 프로토콜: SFTP → 호스트: PCS 로컬 IP → 포트: 2022
        3. 사용자 자격 증명 입력


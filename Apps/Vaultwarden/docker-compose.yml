      ko_kr: |
        **기본 계정 설정**

        | 설정 | 값 |
        |------|-----|
        | 관리자 패널 | 앱 URL에 `/admin` 추가 |
        | 관리자 토큰 | `$default_pwd` |

        **첫 번째 단계:**

        1. **메인 계정 생성**: 설치 후 가입을 통해 첫 번째 사용자 계정을 생성하세요 - 이것이 주요 계정이 됩니다.

        2. **관리자 패널 접근**: 설정과 사용자를 관리하려면 다음을 방문하세요:
           `https://vaultwarden-yourusername.nsl.sh/admin`
           (Vaultwarden URL에 `/admin`만 추가하면 됩니다)

        3. **인스턴스 보안**: 설정 완료 후 관리자 패널에서 새로운 가입을 비활성화하여 누가 가입할 수 있는지 제어하세요.

        **모바일/데스크톱 앱:**

        휴대폰/데스크톱에서 **Bitwarden 앱**을 다운로드하거나 **Bitwarden 브라우저 확장프로그램**을 사용하세요 - Vaultwarden과 완벽하게 작동합니다!

        **이메일 설정 (선택사항):**

        비밀번호 복구와 알림을 위해 관리자 패널에서 SMTP를 설정하세요:
        1. 관리자 패널로 이동: Vaultwarden URL에 `/admin` 추가
        2. "SMTP Email Settings"로 이동
        3. 이메일 제공업체로 설정 (Gmail: smtp.gmail.com, 포트 587)
        4. 보안을 위해 앱별 비밀번호 사용 (일반 비밀번호 아님)

        **중요**: Vaultwarden URL은 NSL 라우터 통합을 위해 자동으로 설정됩니다.
      zh_cn: |
        **默认账户设置**

        | 设置 | 值 |
        |------|-----|
        | 管理员面板 | 在应用URL后添加 `/admin` |
        | 管理员令牌 | `$default_pwd` |

        **首要步骤：**

        1. **创建主账户**: 安装后通过注册创建第一个用户账户 - 这将成为您的主要账户。

        2. **访问管理员面板**: 要管理设置和用户，请访问：
           `https://vaultwarden-yourusername.nsl.sh/admin`
           （只需在Vaultwarden URL后添加`/admin`）

        3. **保护实例安全**: 设置完成后，在管理员面板中禁用新注册以控制谁可以加入。

        **移动端/桌面端应用：**

        在手机/桌面上下载**Bitwarden应用**或使用**Bitwarden浏览器扩展** - 与Vaultwarden完美配合！

        **邮件配置（可选）：**

        为了密码恢复和通知，在管理员面板中配置SMTP：
        1. 前往管理员面板：在Vaultwarden URL后添加 `/admin`
        2. 导航到 "SMTP Email Settings"
        3. 配置邮件提供商（Gmail: smtp.gmail.com，端口 587）
        4. 使用应用专用密码确保安全（非常规密码）

        **重要提示**: Vaultwarden URL已自动配置NSL路由器集成。
      fr_fr: |
        **Configuration du Compte par Défaut**

        | Paramètre | Valeur |
        |-----------|--------|
        | Panneau Admin | Ajoutez `/admin` à l'URL de votre app |
        | Token Admin | `$default_pwd` |

        **Premières Étapes :**

        1. **Créez votre compte principal** : Après installation, créez votre premier compte utilisateur via inscription - ce sera votre compte principal.

        2. **Accédez au Panneau Admin** : Pour gérer les paramètres et utilisateurs, visitez :
           `https://vaultwarden-yourusername.nsl.sh/admin`
           (Ajoutez simplement `/admin` à votre URL Vaultwarden)

        3. **Sécurisez votre instance** : Une fois configuré, désactivez les nouvelles inscriptions dans le panneau admin pour contrôler qui peut rejoindre.

        **Pour les Apps Mobile/Bureau :**

        Téléchargez l'**app Bitwarden** sur votre téléphone/bureau ou utilisez l'**extension navigateur Bitwarden** - fonctionne parfaitement avec Vaultwarden !

        **Configuration Email (Optionnel) :**

        Pour la récupération de mot de passe et les notifications, configurez SMTP dans le Panneau Admin :
        1. Allez au Panneau Admin : ajoutez `/admin` à votre URL Vaultwarden
        2. Naviguez vers "SMTP Email Settings"
        3. Configurez avec votre fournisseur email (Gmail : smtp.gmail.com, port 587)
        4. Utilisez des mots de passe spécifiques aux apps pour la sécurité (pas votre mot de passe habituel)

        **Important** : Votre URL Vaultwarden est automatiquement configurée pour l'intégration NSL router.
      de_de: |
        **Standard-Account-Einrichtung**

        | Einstellung | Wert |
        |-------------|------|
        | Admin-Panel | Fügen Sie `/admin` zu Ihrer App-URL hinzu |
        | Admin-Token | `$default_pwd` |

        **Erste Schritte:**

        1. **Erstellen Sie Ihr Hauptkonto**: Nach der Installation erstellen Sie Ihr erstes Benutzerkonto über die Registrierung - dies wird Ihr Hauptkonto.

        2. **Zugriff auf das Admin-Panel**: Um Einstellungen und Benutzer zu verwalten, besuchen Sie:
           `https://vaultwarden-yourusername.nsl.sh/admin`
           (Fügen Sie einfach `/admin` zu Ihrer Vaultwarden-URL hinzu)

        3. **Sichern Sie Ihre Instanz**: Nach der Einrichtung deaktivieren Sie neue Registrierungen im Admin-Panel, um zu kontrollieren, wer beitreten kann.

        **Für Mobile/Desktop-Apps:**

        Laden Sie die **Bitwarden-App** auf Ihr Telefon/Desktop herunter oder verwenden Sie die **Bitwarden-Browser-Erweiterung** - funktioniert perfekt mit Vaultwarden!

        **E-Mail-Konfiguration (Optional):**

        Für Passwort-Wiederherstellung und Benachrichtigungen konfigurieren Sie SMTP im Admin-Panel:
        1. Gehen Sie zum Admin-Panel: fügen Sie `/admin` zu Ihrer Vaultwarden-URL hinzu
        2. Navigieren Sie zu "SMTP Email Settings"
        3. Konfigurieren Sie mit Ihrem E-Mail-Anbieter (Gmail: smtp.gmail.com, Port 587)
        4. Verwenden Sie App-spezifische Passwörter für Sicherheit (nicht Ihr reguläres Passwort)

        **Wichtig**: Ihre Vaultwarden-URL ist automatisch für NSL-Router-Integration konfiguriert.
      es_es: |

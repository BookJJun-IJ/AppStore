name: vaultwarden

services:
  vaultwarden:
    image: vaultwarden/server:1.32.1
    user: $PUID:$PGID
    healthcheck:
      test: ["NONE"]              # Disable healthcheck for NSL router compatibility
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    expose:
      - 80
    environment:
      PUID: $PUID                    # User ID for file permissions
      PGID: $PGID                    # Group ID for file permissions
      TZ: $TZ                        # System timezone
      ROCKET_PORT: 80                # Web server port (must match expose)
      ROCKET_ADDRESS: 0.0.0.0        # Bind to all interfaces for NSL router access
      SIGNUPS_ALLOWED: "true"        # Enable user registration for initial setup
      ADMIN_TOKEN: $default_pwd      # Admin panel access token
      DOMAIN: https://$domain        # Full domain URL for NSL router integration
      
    volumes:
      - /DATA/AppData/$AppID/data:/data
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: vaultwarden
  author: CasaOS Team
  category: Utilities
  description:
    en_us: |
      🔐 **What is Vaultwarden?**

      **Vaultwarden, known as Bitwarden** is a secure password manager that helps you **store, organize, and access your passwords** easily across all your devices. Instead of trying to remember dozens of passwords, you only need **one master password** to unlock your vault.

      ✅ Just download the **Bitwarden app** on your phone or desktop, or use the **Bitwarden browser extension** --- it works perfectly with Vaultwarden.

      You can save:
      • Login info (email + password)
      • Credit cards
      • Notes
      • 2FA codes

      Everything is **encrypted**, and only you can see your data.

      🧱 **Why choose Vaultwarden?**

      **Vaultwarden** is a lightweight version of Bitwarden that runs on your own server. Think of it like having your own personal password bank instead of using someone else's.

      Why choose Vaultwarden?
      • **Your data stays with you** --- no third-party companies involved
      • **Faster and lighter** --- uses less resources than the official version
      • **Same features** --- works with all Bitwarden apps and browsers

      With Vaultwarden on **Yundera**, you can:
      • Run your own password manager server
      • Access your passwords from any device (mobile, browser, desktop)
      • Share access with your team or family (if you want)
      • Keep your data private --- it never leaves your server

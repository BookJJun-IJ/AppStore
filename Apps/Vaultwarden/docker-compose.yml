        | Token de Admin | `$default_pwd` |

        **Primeros Pasos:**

        1. **Crea tu cuenta principal**: Después de la instalación, crea tu primera cuenta de usuario mediante registro - esta será tu cuenta principal.

        2. **Accede al Panel de Admin**: Para gestionar configuraciones y usuarios, visita:
           `https://vaultwarden-yourusername.nsl.sh/admin`
           (Solo añade `/admin` a tu URL de Vaultwarden)

        3. **Asegura tu instancia**: Una vez configurado, deshabilita nuevos registros en el panel de admin para controlar quién puede unirse.

        **Para Apps Móviles/Escritorio:**

        Descarga la **app Bitwarden** en tu teléfono/escritorio o usa la **extensión de navegador Bitwarden** - ¡funciona perfectamente con Vaultwarden!

        **Configuración de Email (Opcional):**

        Para recuperación de contraseña y notificaciones, configura SMTP en el Panel de Admin:
        1. Ve al Panel de Admin: añade `/admin` a tu URL de Vaultwarden
        2. Navega a "SMTP Email Settings"
        3. Configura con tu proveedor de email (Gmail: smtp.gmail.com, puerto 587)
        4. Usa contraseñas específicas de apps para seguridad (no tu contraseña regular)

        **Importante**: Tu URL de Vaultwarden está automáticamente configurada para integración NSL router.

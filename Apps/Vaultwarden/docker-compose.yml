  tips:
    before_install:
      en_us: |
        **Default Account Setup**

        | Setting | Value |
        |---------|-------|
        | Admin Panel | Add `/admin` to your app URL |
        | Admin Token | `$default_pwd` |

        **First Steps:**

        1. **Create your main account**: After installation, create your first user account via signup - this will be your primary account.

        2. **Access Admin Panel**: To manage settings and users, visit:
           `https://vaultwarden-yourusername.nsl.sh/admin`
           (Just add `/admin` to your Vaultwarden URL)

        3. **Secure your instance**: Once set up, disable new signups in admin panel to control who can join.

        **For Mobile/Desktop Apps:**

        Download the **Bitwarden app** on your phone/desktop or use the **Bitwarden browser extension** - works perfectly with Vaultwarden!

        **Email Configuration (Optional):**

        For password recovery and notifications, configure SMTP in the Admin Panel:
        1. Go to Admin Panel: add `/admin` to your Vaultwarden URL
        2. Navigate to "SMTP Email Settings"
        3. Configure with your email provider (Gmail: smtp.gmail.com, port 587)
        4. Use app-specific passwords for security (not your regular password)

        **Important**: Your Vaultwarden URL is automatically configured for NSL router integration.

name: mealie

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.1.2
    container_name: mealie
    # Mealie는 내부적으로 권한 처리
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    expose:
      - 9000
    environment:
      # 권한 설정
      PUID: $PUID
      PGID: $PGID
      
      # Timezone
      TZ: $TZ
      
      # Security settings
      ALLOW_SIGNUP: "false"
      
      # NSL Router settings
      BASE_URL: https://$domain
      
      # Performance settings
      MAX_WORKERS: 1
      WEB_CONCURRENCY: 1
      
      # API settings
      API_PORT: 9000
      
      # Default admin account
      DEFAULT_EMAIL: admin@example.com
      DEFAULT_PASSWORD: $default_pwd
      
      # Additional settings
      TOKEN_TIME: 720  # 12 hours token expiry
      LOG_LEVEL: info
    volumes:
      - /DATA/AppData/$AppID/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/app/about"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: mealie
  pre-install-cmd: |
    # 디렉토리 생성
    mkdir -p /DATA/AppData/$AppID/data
  author: Yundera Team
  category: Utilities
  description:
    en_us: |
      **Your smart recipe manager and meal planner that saves everything**
      
      Never lose a recipe again! Mealie automatically saves recipes from any cooking website with one click - capturing ingredients, instructions, photos, and nutrition info. Plus, it helps you plan meals and create shopping lists.
      
      **Core Features:**
      • **One-Click Import** - Paste any recipe URL and watch it save automatically
      • **Meal Planning** - Drag-and-drop calendar for weekly meal organization  
      • **Smart Shopping Lists** - Auto-generate lists from your meal plans
      • **Recipe Collections** - Organize recipes by cuisine, occasion, or dietary needs
      • **Multi-User Support** - Share recipes with family while keeping some private
      • **Mobile Friendly** - Works perfectly on phones, tablets, and computers
      
      **v3.1.2 Latest Features:**
      • Enhanced recipe scraping with better site compatibility
      • Improved shopping list merging (combines duplicate ingredients)
      • Better nutrition calculations
      • Faster search and filtering
      • PDF recipe export
      • Webhook support for automation
      • Improved household management
      • Better ingredient parsing
      
      **Works with thousands of sites including:**
      AllRecipes, Food Network, BBC Good Food, Serious Eats, NYT Cooking, and most food blogs
      
      **Think of it as:** Your personal recipe database that replaces bookmarks, screenshots, and paper recipes with one searchable, organized system.
    ko_kr: |
      **모든 레시피를 저장하는 스마트 레시피 매니저 및 식사 플래너**
      
      레시피를 다시는 잃어버리지 마세요! Mealie는 모든 요리 웹사이트에서 원클릭으로 레시피를 자동 저장합니다 - 재료, 조리법, 사진, 영양 정보까지 캡처합니다. 게다가 식사 계획과 쇼핑 리스트 작성도 도와줍니다.
      
      **핵심 기능:**
      • **원클릭 가져오기** - 레시피 URL을 붙여넣으면 자동으로 저장
      • **식사 계획** - 주간 식사 구성을 위한 드래그 앤 드롭 캘린더
      • **스마트 쇼핑 리스트** - 식사 계획에서 리스트 자동 생성
      • **레시피 컬렉션** - 요리 종류, 행사, 식단별로 레시피 정리
      • **다중 사용자 지원** - 일부는 비공개로 유지하면서 가족과 레시피 공유
      • **모바일 친화적** - 휴대폰, 태블릿, 컴퓨터에서 완벽 작동
      
      **v3.1.2 최신 기능:**
      • 더 나은 사이트 호환성으로 향상된 레시피 스크래핑
      • 개선된 쇼핑 리스트 병합 (중복 재료 결합)
      • 더 나은 영양 계산
      • 더 빠른 검색 및 필터링
      • PDF 레시피 내보내기
      • 자동화를 위한 웹훅 지원
      • 개선된 가구 관리
      • 더 나은 재료 파싱
      
      **작동하는 사이트:**
      만개의레시피, 네이버 블로그, 쿡패드, 유튜브 레시피 등 대부분의 음식 블로그
      
      **이렇게 생각하세요:** 북마크, 스크린샷, 종이 레시피를 하나의 검색 가능하고 정리된 시스템으로 대체하는 개인 레시피 데이터베이스.
    zh_cn: |
      **智能食谱管理器和餐食规划器，保存一切**
      
      再也不会丢失食谱！Mealie一键自动保存任何烹饪网站的食谱 - 捕获配料、说明、照片和营养信息。此外，它还帮助您规划餐食并创建购物清单。
      
      **核心功能:**
      • **一键导入** - 粘贴任何食谱URL并观看它自动保存
      • **餐食规划** - 用于每周餐食组织的拖放日历
      • **智能购物清单** - 从您的餐食计划自动生成清单
      • **食谱集合** - 按菜系、场合或饮食需求组织食谱
      • **多用户支持** - 与家人分享食谱，同时保持一些私密
      • **移动友好** - 在手机、平板和电脑上完美运行
      
      **v3.1.2最新功能:**
      • 增强的食谱抓取，更好的网站兼容性
      • 改进的购物清单合并（合并重复配料）
      • 更好的营养计算
      • 更快的搜索和筛选
      • PDF食谱导出
      • 自动化的Webhook支持
      • 改进的家庭管理
      • 更好的配料解析
      
      **适用于数千个网站包括:**
      下厨房、美食杰、豆果美食、小红书食谱等大多数美食博客
      
      **可以这样想:** 您的个人食谱数据库，用一个可搜索、有组织的系统取代书签、截图和纸质食谱。
    fr_fr: |
      **Votre gestionnaire de recettes intelligent et planificateur de repas qui sauvegarde tout**
      
      Ne perdez plus jamais une recette ! Mealie sauvegarde automatiquement les recettes de n'importe quel site de cuisine en un clic - capturant ingrédients, instructions, photos et infos nutritionnelles. De plus, il aide à planifier les repas et créer des listes de courses.
      
      **Fonctionnalités principales:**
      • **Import en un clic** - Collez n'importe quelle URL de recette et regardez-la se sauvegarder automatiquement
      • **Planification des repas** - Calendrier glisser-déposer pour l'organisation hebdomadaire
      • **Listes de courses intelligentes** - Génération automatique depuis vos plans de repas
      • **Collections de recettes** - Organisez par cuisine, occasion ou besoins diététiques
      • **Support multi-utilisateurs** - Partagez avec la famille tout en gardant certaines privées
      • **Mobile friendly** - Fonctionne parfaitement sur téléphones, tablettes et ordinateurs
      
      **Fonctionnalités v3.1.2:**
      • Extraction de recettes améliorée avec meilleure compatibilité
      • Fusion améliorée des listes de courses (combine les ingrédients en double)
      • Meilleurs calculs nutritionnels
      • Recherche et filtrage plus rapides
      • Export PDF de recettes
      • Support Webhook pour l'automatisation
      • Gestion des foyers améliorée
      • Meilleure analyse des ingrédients
      
      **Fonctionne avec des milliers de sites incluant:**
      Marmiton, 750g, Cuisine Actuelle, Chef Simon, et la plupart des blogs culinaires
      
      **Pensez-y comme:** Votre base de données personnelle de recettes qui remplace les favoris, captures d'écran et recettes papier par un système organisé et consultable.
    es_es: |
      **Tu gestor inteligente de recetas y planificador de comidas que guarda todo**
      
      ¡Nunca pierdas una receta otra vez! Mealie guarda automáticamente recetas de cualquier sitio de cocina con un clic - capturando ingredientes, instrucciones, fotos e información nutricional. Además, ayuda a planificar comidas y crear listas de compras.
      
      **Características principales:**
      • **Importación con un clic** - Pega cualquier URL de receta y mírala guardarse automáticamente
      • **Planificación de comidas** - Calendario arrastrar y soltar para organización semanal
      • **Listas de compras inteligentes** - Auto-genera listas desde tus planes de comidas
      • **Colecciones de recetas** - Organiza por cocina, ocasión o necesidades dietéticas
      • **Soporte multiusuario** - Comparte con familia mientras mantienes algunas privadas
      • **Amigable móvil** - Funciona perfectamente en teléfonos, tablets y computadoras
      
      **Características v3.1.2:**
      • Extracción mejorada de recetas con mejor compatibilidad
      • Fusión mejorada de listas de compras (combina ingredientes duplicados)
      • Mejores cálculos nutricionales
      • Búsqueda y filtrado más rápidos
      • Exportación PDF de recetas
      • Soporte Webhook para automatización
      • Gestión de hogares mejorada
      • Mejor análisis de ingredientes
      
      **Funciona con miles de sitios incluyendo:**
      Cookpad, Directo al Paladar, RecetasGratis, Cocina Fácil, y la mayoría de blogs de cocina
      
      **Piénsalo como:** Tu base de datos personal de recetas que reemplaza marcadores, capturas de pantalla y recetas en papel con un sistema organizado y buscable.

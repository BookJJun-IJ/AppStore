name: photobridge

services:
  photobridge:
    image: ghcr.io/bookjjun-ij/photobridge:0.2.0-rc1
    container_name: photobridge
    restart: unless-stopped
    user: "0:0"
    networks:
      - pcs
    expose:
      - "80"
    labels:
      caddy_0: photobridge-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.request_body.max_size: 10G
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: photobridge-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.request_body.max_size: 10G
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: photobridge-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.request_body.max_size: 10G
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    volumes:
      - /DATA/Gallery/Import:/import
    environment:
      TZ: $TZ
      IMMICH_URL: http://immich:80
      IMPORT_PATH: /import
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    cpu_shares: 50

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: photobridge
  webui_port: 80
  author: Yundera Team
  category: Utilities
  developer: Yundera
  store_app_id: photobridge
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-1.png
  description:
    en_us: |
      **PhotoBridge for Immich — Google Photos & iCloud Importer**

      Import your Google Photos or iCloud Photos archive directly into your Yundera server. PhotoBridge wraps the immich-go tool with a simple web interface that handles validation, configuration, and real-time progress tracking.

      **Key Features:**
      - Google Photos Takeout ZIP import (no extraction needed)
      - iCloud Photos export import
      - Direct upload of photos, videos, or ZIP files from your browser
      - File validation before importing
      - Album and metadata preservation (dates, locations, descriptions)
      - Dry-run mode to preview before importing
      - Real-time import progress logs
      - Automatic duplicate detection

      **How to use:**
      1. Transfer your photos to your PCS:
         - **Google Photos:** Export from [Google Takeout](https://takeout.google.com/), then upload ZIPs to `/DATA/Gallery/Import/` via the Files app
         - **iCloud:** Download from [icloud.com](https://www.icloud.com/), then upload to `/DATA/Gallery/Import/` via the Files app
         - **Direct Upload:** Skip this step — you can upload files directly through PhotoBridge
      2. Open PhotoBridge and enter your Immich API key
      3. Select files, validate, and start import
    ko_kr: |
      **PhotoBridge for Immich — Google Photos & iCloud 가져오기 도구**

      Google Photos 또는 iCloud Photos 아카이브를 Yundera 서버의 Immich로 직접 가져옵니다. PhotoBridge는 immich-go 도구를 간단한 웹 인터페이스로 감싸 검증, 설정, 실시간 진행 추적을 제공합니다.

      **주요 기능:**
      - Google Photos Takeout ZIP 가져오기 (압축 해제 불필요)
      - iCloud Photos 내보내기 가져오기
      - 브라우저에서 사진, 동영상 또는 ZIP 파일 직접 업로드
      - 가져오기 전 파일 검증
      - 앨범 및 메타데이터 보존 (날짜, 위치, 설명)
      - 드라이런 모드로 미리보기
      - 실시간 가져오기 진행 로그
      - 자동 중복 감지

      **사용 방법:**
      1. 사진을 PCS로 전송하세요:
         - **Google Photos:** [Google Takeout](https://takeout.google.com/)에서 내보내기 후, Files 앱으로 `/DATA/Gallery/Import/`에 ZIP 업로드
         - **iCloud:** [icloud.com](https://www.icloud.com/)에서 다운로드 후, Files 앱으로 `/DATA/Gallery/Import/`에 업로드
         - **직접 업로드:** 이 단계를 건너뛰세요 — PhotoBridge에서 직접 업로드할 수 있습니다
      2. PhotoBridge를 열고 Immich API 키 입력
      3. 파일 선택, 검증 후 가져오기 시작
    zh_cn: |
      **PhotoBridge for Immich — Google Photos 和 iCloud 导入工具**

      将您的 Google Photos 或 iCloud Photos 存档直接导入到 Yundera 服务器上的 Immich。PhotoBridge 将 immich-go 工具封装在简单的网页界面中，提供验证、配置和实时进度跟踪功能。

      **主要功能：**
      - Google Photos Takeout ZIP 导入（无需解压）
      - iCloud Photos 导出导入
      - 通过浏览器直接上传照片、视频或 ZIP 文件
      - 导入前文件验证
      - 相册和元数据保留（日期、位置、描述）
      - 试运行模式预览
      - 实时导入进度日志
      - 自动重复检测

      **使用方法：**
      1. 将照片传输到您的 PCS：
         - **Google Photos：**从 [Google Takeout](https://takeout.google.com/) 导出，然后通过 Files 应用上传到 `/DATA/Gallery/Import/`
         - **iCloud：**从 [icloud.com](https://www.icloud.com/) 下载，然后通过 Files 应用上传到 `/DATA/Gallery/Import/`
         - **直接上传：**跳过此步骤 — 您可以直接通过 PhotoBridge 上传
      2. 打开 PhotoBridge 并输入 Immich API 密钥
      3. 选择文件、验证并开始导入
    fr_fr: |
      **PhotoBridge for Immich — Importateur Google Photos et iCloud**

      Importez vos archives Google Photos ou iCloud Photos directement dans Immich sur votre serveur Yundera. PhotoBridge encapsule l'outil immich-go avec une interface web simple pour la validation, la configuration et le suivi en temps réel.

      **Fonctionnalites principales :**
      - Import de ZIP Google Photos Takeout (pas d'extraction necessaire)
      - Import d'export iCloud Photos
      - Upload direct de photos, videos ou fichiers ZIP depuis votre navigateur
      - Validation des fichiers avant import
      - Preservation des albums et metadonnees (dates, lieux, descriptions)
      - Mode simulation pour previsualiser
      - Logs de progression en temps reel
      - Detection automatique des doublons

      **Comment utiliser :**
      1. Transferez vos photos vers votre PCS :
         - **Google Photos :** Exportez depuis [Google Takeout](https://takeout.google.com/), puis uploadez les ZIP dans `/DATA/Gallery/Import/` via l'app Fichiers
         - **iCloud :** Telechargez depuis [icloud.com](https://www.icloud.com/), puis uploadez dans `/DATA/Gallery/Import/` via l'app Fichiers
         - **Upload direct :** Passez cette etape — vous pouvez uploader directement via PhotoBridge
      2. Ouvrez PhotoBridge et entrez votre cle API Immich
      3. Selectionnez les fichiers, validez et lancez l'import
    es_es: |
      **PhotoBridge for Immich — Importador de Google Photos e iCloud**

      Importe su archivo de Google Photos o iCloud Photos directamente a Immich en su servidor Yundera. PhotoBridge envuelve la herramienta immich-go con una interfaz web simple para validacion, configuracion y seguimiento en tiempo real.

      **Caracteristicas principales:**
      - Importacion de ZIP de Google Photos Takeout (sin necesidad de extraer)
      - Importacion de exportacion de iCloud Photos
      - Carga directa de fotos, videos o archivos ZIP desde su navegador
      - Validacion de archivos antes de importar
      - Preservacion de albumes y metadatos (fechas, ubicaciones, descripciones)
      - Modo de prueba para previsualizar
      - Registros de progreso en tiempo real
      - Deteccion automatica de duplicados

      **Como usar:**
      1. Transfiera sus fotos a su PCS:
         - **Google Photos:** Exporte desde [Google Takeout](https://takeout.google.com/), luego suba los ZIP a `/DATA/Gallery/Import/` via la app Archivos
         - **iCloud:** Descargue desde [icloud.com](https://www.icloud.com/), luego suba a `/DATA/Gallery/Import/` via la app Archivos
         - **Carga directa:** Omita este paso — puede subir archivos directamente a traves de PhotoBridge
      2. Abra PhotoBridge e ingrese su clave API de Immich
      3. Seleccione archivos, valide e inicie la importacion
  tagline:
    en_us: Import Google Photos & iCloud archives into Immich
    ko_kr: Google Photos 및 iCloud 아카이브를 Immich로 가져오기
    zh_cn: 将 Google Photos 和 iCloud 存档导入 Immich
    fr_fr: Importez vos archives Google Photos et iCloud dans Immich
    es_es: Importe archivos de Google Photos e iCloud a Immich
  title:
    en_us: PhotoBridge
  tips:
    before_install:
      en_us: |
        **Before you start:**

        1. Make sure **Immich** is installed and running on your PCS
        2. Generate an API key in Immich (Account Settings -> API Keys -> grant **all permissions**)
        3. Transfer your photos to your PCS:
           - **Google Photos:** [Google Takeout](https://takeout.google.com/) -> Select only Google Photos -> Download as ZIP, then upload to `/DATA/Gallery/Import/` via the **Files** app
           - **iCloud:** [icloud.com](https://www.icloud.com/) -> Photos -> Select All -> Download, then upload to `/DATA/Gallery/Import/` via the **Files** app
           - **Direct Upload:** Skip this step — you can upload files directly through PhotoBridge

        PhotoBridge will validate your files and upload everything to Immich with preserved albums and metadata.
      ko_kr: |
        **시작하기 전:**

        1. PCS에 **Immich**가 설치되어 실행 중인지 확인하세요
        2. Immich에서 API 키를 생성하세요 (계정 설정 -> API 키 -> **모든 권한** 부여)
        3. 사진을 PCS로 전송하세요:
           - **Google Photos:** [Google Takeout](https://takeout.google.com/) -> Google Photos만 선택 -> ZIP으로 다운로드 후, **Files** 앱으로 `/DATA/Gallery/Import/`에 업로드
           - **iCloud:** [icloud.com](https://www.icloud.com/) -> 사진 -> 전체 선택 -> 다운로드 후, **Files** 앱으로 `/DATA/Gallery/Import/`에 업로드
           - **직접 업로드:** 이 단계를 건너뛰세요 — PhotoBridge에서 직접 업로드할 수 있습니다

        PhotoBridge가 내보내기를 검증하고 앨범과 메타데이터를 보존하며 모든 것을 Immich에 업로드합니다.
  index: /

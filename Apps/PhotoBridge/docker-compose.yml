name: photobridge

services:
  photobridge:
    image: nginx:alpine
    container_name: photobridge
    restart: unless-stopped
    networks:
      - pcs
    expose:
      - "80"
    labels:
      - "caddy=photobridge-${APP_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 80}}"
    volumes:
      - /DATA/Gallery/Import:/import:ro
    environment:
      TZ: $TZ
      IMMICH_URL: http://immich:3000
      IMPORT_PATH: /import
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    cpu_shares: 50

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: photobridge
  webui_port: 80
  author: Yundera Team
  category: Utilities
  developer: Yundera
  store_app_id: photobridge
  icon: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/BookJJun-IJ/AppStore@create/Apps/PhotoBridge/screenshot-1.png
  description:
    en_us: |
      **PhotoBridge for Immich ÔÇö Google Photos & iCloud Importer**

      Import your Google Photos or iCloud Photos archive directly into your Yundera server. PhotoBridge wraps the immich-go tool with a simple web interface that handles validation, configuration, and real-time progress tracking.

      **Key Features:**
      - Google Photos Takeout ZIP import (no extraction needed)
      - iCloud Photos export import
      - Export validation before importing
      - Album and metadata preservation (dates, locations, descriptions)
      - Dry-run mode to preview before importing
      - Real-time import progress logs
      - Automatic duplicate detection

      **How to use:**
      1. Export your photos from Google Takeout or iCloud
      2. Upload ZIP files to /DATA/Gallery/Import/ via Files app
      3. Open PhotoBridge and enter your Immich API key
      4. Select files, validate, and start import
